body:
  text: 嗣法門人傳我等編住翠巖寺語録元旦上堂拈香祝聖畢乃云九上三登持燈覓火百城遍歷入海算沙布毛吹落西子湖婆兒氣象腳尖踢破飛鳶嶺三老生涯無著天親同坑無異土德山臨濟餿飯祭間神直得隔山見煙便知是火隔牆見角便知是牛不出家而頓徹心源不參方而頓明差別不動步而經歷河沙剎海不晤對而勘盡天下宗師總春夏秋冬為一時會得喪榮枯同一致猶未是衲僧分上事有時延一日為一劫有時促一劫為一日有時拈頭作尾有時拈尾作頭有時殺人不用刀有時活人不用劍有時全活即殺有時全殺即活有時全賓即主有時全主即賓有時把住黃頭碧眼飲氣吞聲有時放行白牯黧奴放光動地然雖如是猶是建立邊事未出化門所以道若論戰也箇箇力在轉處卻物為上逐物為下又道此事如擊石火似閃電光搆得搆不得未免喪身失命且作麼生得箇出身底活路到者裏也須是恁麼人始得所以道承當恁麼事須是恁麼人若是恁麼人何愁恁麼事即今春光明媚春日熙和春色蒼茫春風浩蕩各各分上同添一歲且道無位真人年多少還委悉麼還鄉盡是兒孫事祖父從來不出門復舉浮山遠禪師因僧問如何是佛遠云大者如兄小者如弟師云諸人還識遠公意旨麼一不成二不是杖頭歷歷清風起上元上堂智燈常燦不屬晦明心月孤縣了無圜缺六凡四聖皆為此月之光萬別千差悉是此燈之影諸人若於影未彰光未發時覷得透去盡大地無纖毫過患撮十方如粟米粒拈燈籠來佛殿裏將三門來燈籠上髑髏常于世界鼻孔摩觸家風雖然如是麻三斤乾屎橛三腳驢子弄蹄行即不問汝諸人且道日月燈明佛即今在甚麼處還會麼鳥啼華發春風裏社舞村歌化日中卓拄杖下座解制上堂九十日中參得底不勞拈出數千里外學來底閣向一邊覿面無私便請相見僧問大事未明名為結制大事已明始為解制正當解制一句作麼生道師云雪晴山脊現進云謝師指示師云杓卜聽虛聲僧便喝師云好一喝祇是你不知落處問結制與解制不同亦不異如何是無同異底句師云屋角梅華開已遍溪邊弱柳正揚眉乃云春日晴春鳥鳴春華吐蕊春樹萌西來大意十分明演若迷頭心自惸不須惸迦葉峰前路坦平春江浩渺春水盈春風無恙片帆輕況值九旬功告成住者仍住行者行舟行陸行遠行近行一任迢迢東浙與南京芒鞋踏破歸來也依舊雙眉眼上橫然雖如是中途或遇卒風暴雨前面是焦尾大蟲後面是南山鱉鼻左邊是萬丈懸崖右邊是無底深坑當恁麼時進不得退不得左不得右不得作麼生是諸人出身底活路若也道得獨步丹霄若道不得莫道翠巖山勢險前頭更有最高峰復舉歸宗禪師因僧辭去宗云甚處去僧云諸方學五味禪去宗云諸方有五味禪山僧者裏祇有一味僧便問如何是和尚一味禪宗便打黃檗和尚聞云馬師會下出八十餘員善知識箇箇屙漉漉地唯有歸宗較些子師云大小歸宗正是驢揀溼處尿説甚麼較些子直是未在翠巖者裏也沒有甚麼一味五味愛暖同烘榾柮爐破寒共植青松樹飢則雲堂恣飽餐倦來壞衲支頭睡衆中或有睡不著喚不醒底衲僧要向諸方學五味禪去但向他道途中善為且道與古人是同是別大悲生辰上堂金沙灘上醜態異常玉浪堆中癡心轉甚是處放憨賣俏隨方撒土揚沙惱亂天下衆生三十烏藤有分豎拂云即今又向山僧拂子頭上現出千手千眼口喃喃地説道應以比丘身得度者即現比丘身而為説法應以居士身得度者即現居士身而為説法山僧道大士大士少賣弄我且問你居士身已現了作麼生是所説底法大士道風暖鳥聲碎日高華影重擲拂子云放過一著復云大衆還識現前皈依底劉居士麼三年以前山僧因避兵泐潭居士冒暑相訪為竟夕之談中間自序參見諸尊宿機緣末云弟子做工夫至急切處只要殺人時如何山僧云試借刀看士沉吟山僧便掌士釋然作禮嗣後山僧住翠巖居士復寄書云自蒙指示後雖隨緣應物而不挂寸絲者自在獨露一頭展開兩手其何敢忘寶珠峰頂一掌之恩復以高峰海底泥牛偈演成四首云海底泥牛銜月走忽聽海門師子吼泥牛顫得口開張吐月流涎三百斗巖前石虎抱兒眠懷中迸出乳如泉腥聞百族咸相造尾掃成堆一口吞鐵蛇鑽入金剛眼眨緊眼皮蛇尾亶驀然突出頂門來獨露獰猙誰敢瞷崑崙騎象鷺鷥牽牽至眉端遇普賢喝下崑崙騎著象一行白鷺上青天大衆高峰大師從無中唱出可謂耀古騰今劉居士向矢上加鐵不妨風流儒雅山僧杜撰亦有一偈露柱著靴行水面燈籠乘馬到峰前爐中飛出三冬雪碓觜華開香滿天卓拄杖下座復喚劉居士近前云作偈作頌意識卜度得來祖師門下貴在當機當機道得始見真參實悟試問居士如何是金剛正眼士云無所視師云未在更道士云瞎師云放汝三十棒士禮拜廬山隱光禪人送米入山飯僧上堂僧問承古有言世間有五種不易如何是不易底事師云黃龍猶在進云更有一種不易是甚麼人師云面南看北斗進云學人一番提起一番新去也師云鄭州出曹門問扭合虛空架萬弓歸來龍象隱重重當仁不讓多英俊虔請吾師一句通師云天高群象正海闊百川朝進云燈籠露柱笑和尚時如何師云腳跟下蹉過了也進云畢竟承誰恩力師豎拂子進云從前汗馬無人識祇要重論蓋代功師云兔子喫牛妳乃云西山僧喫廬山米世上人修天上因施受諦觀如夢幻當陽現證本來身大衆上是日月星辰雲霞煙雨下是山河大地草木叢林外六塵內六根中六識悉是空華皆非實相那箇是本來身豎拂云還見麼若向者裏證得高超三界獨拔四生若證未得三界無安猶如火宅衆苦充滿甚可怖畏所以勞他黃面大師屈曲垂慈多方接引千説萬説打盡葛藤直至法華會上開方便門示真實相放出眉間白毫大光普照當恁麼時還有文字相也無還有言説相也無還有心緣相也無言説文字皆離爭奈群疑滿腹旁邊幸有箇文殊大士是他屋裏人知他屋裏事乃云今佛放光明助發實相義豎拂云者箇是放底光明那箇是實相義擊拂云橫塘宿鷺斜飛起幾隻銀瓶挂樹腰復舉青原思禪師因僧問如何是佛法大意思云廬陵米作麼價師云大衆還識青原老漢立地處麼但見皇風成一片不知何處有封疆張不空居士六旬初度請上堂有物渾成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道大衆昨夜老聃倒騎青牛上三十三天撞著帝釋云憍尸迦恭喜賀喜帝釋云賀喜箇甚麼老聃云憍尸迦汝不知耶我南閻浮提內長定鄉間六十年前生下箇優婆塞字曰張不空敬信三寶勤修十善他日善法堂中又添一人是故特來相賀帝釋云善哉善哉希有希有但願普天之下皆持五戒修十善則干戈偃息河海晏清獄可空刑可措閻羅老子聽見忿然從地涌出云好大哥爾賞善我罰惡假使普天之下皆持戒修善我輩當作何事正恁麼時舜若多神出來震聲一喝云住住者裏是甚麼所在説善説惡説賞説罰豈不見老聃道有物渾成先天地生既是先天地生汝二人作麼生賞得罰得既賞不得天堂曾弗住既罰不得地獄豈能留然雖如是我更為你勘過者老漢遂趨前云老聃你道有物渾成是甚麼物字之曰道是甚麼道若也道得我將舍身為床座而供養之若道不得椎折你青牛腳老聃被伊一問直得無言可對無理可伸依舊倒騎青牛歸達磨峰下默然而坐衆中還有為老聃出氣者麼出來與翠巖相見如無翠巖卻請木上座為渠出氣去也卓拄杖云六般神用空不空一顆圜光色非色壽山何啻大椿年塵沙劫又塵沙劫喝一喝無住道人請上堂僧問大道不分男女相如何是大道師云步步踏著進云踏著後如何師云長江依舊向東流乃云無知是真知無見為正見無住為淨住無心是道心道心既生凡情自盡凡情既盡聖解不留掣開金鎖玄關直透向上一竅且如何是向上一竅山雲海月俱拋卻贏得莊周蝶夢長余行一行嗣二居士請上堂薩陀波崙賣心肝而求般若焦磚打著連底凍怛薩阿羯舍全身而求半偈剎竿頭上仰蓮心乃至斷臂安心推門折腳一口吸盡西江水半路俄聞丹桂香者一隊不唧溜漢雖是醫得眼下瘡爭奈剜卻心頭肉殊不知紅塵堆裏人人鼻孔遼天赤肉團邊箇箇壁立萬仞青峰杳靄緑樹陰濃魚躍鳶飛樵歌牧唱斷崖雪瀑轟動地之晴雷幽谷煙霞布遙天之秀色文殊普賢起佛見法見貶向二鐵圍山了也衆中還有出類拔萃獨脫無依者麼若有便可與祖佛為師人天作眼可以移風易俗釋縛解黏可以點鐵成金點金成鐵不求福而福至不修慧而慧生不祈嗣而嗣滿寰區不延齡而齡同龜鶴然雖如是人從建昌來卻得武昌信又作麼生參佛誕升座兼請監寺書記監修侍者及謝淨修尼齋僧出畫圜相云正恁麼時還是降生耶涅槃耶師云鐵牛吞大象進云和尚何不別道取一句師云罕逢穿耳客多遇刻舟人乃云三腳驢才生兒孫遍天下一字不著畫文彩已全彰鈯斧拈來玉殿瓊樓齊現扇子既破犀牛蹄角分明若向者裏著得隻眼去便見得未離兜率已降王宮未出母胎度人已畢是最初第一杓惡水金團選家玉象跨日入摩耶腹降淨飯宮分手指天地作大師子吼上下及四維無能尊我者是第二杓惡水末後於靈山會上拈起金色波羅華瞬視大衆是第三杓惡水西天東土四七二三乃至天下老和尚被此三杓惡水一潑落盡眉鬚縱使城東老姥調達魔王乃至三界內外若男若女若老若少跛鱉盲龜蝦蟆蚯蚓悉無回避處山僧今日特為諸人雪屈卻將一杓惡水潑者黃面老漢去也乃云美如西子離金闕嬌似楊妃下玉樓猶把紅羅扇遮面不令人見轉風流天中節上堂舉天童悟和尚云今朝五月五日知事頭首請老僧升座應箇時節老僧無計可處何以雄黃燒酒固也不可要且無箇銅錢買糯穀思量到計窮力極忽然得箇富不有餘貧無不足底平等法門正可以與世移風易俗遂豎起雙拳云祇將者兩箇大粽子供養大衆一任橫咬豎咬忽然咬著自家底直教人人飽足免得窮廝煎餓廝炒為甚如此到底終輸自家寶師云天童老漢大似空拳誑小兒若是者箇粽子莫道現前大衆無下口處縱使三世諸佛出來看即有分翠巖者裏有飯噇飯無飯啜粥不將角黍纏不用蘭湯浴隨儉隨豐千足萬足足即不無試問大衆如何是自家寶抴拄杖便下座優婆夷禮千佛名經披剃請上堂頂相巍難見今朝始豁開眉間舒佛眼刀下斷凡胎有髮還須剃無鬚不用栽末山芳躅在紹續是英才復舉昔有秀才參長沙岑禪師因看千佛名經次遂問百千諸佛祇聞其名未審居何國土還化物也無沙云黃鶴樓崔皓題詩後秀才還曾題也未才云不曾沙云得間題取一篇好大衆長沙古佛善應來機爭奈措大猶忙遂辜鶴樓勝概今日或有問翠巖百千諸佛居何國土但向他道碧玉殿流聲浩浩紫金光涌汗淋淋天童悟和尚十周忌辰上堂僧問十方無縫罅四面亦無門天童老人即今向甚處行履師云鑊湯爐炭裏驢胎馬腹中進云和尚虔誠設供未審還來赴也無師云天共白雲曉水和明月流進云恁麼則盡大地衲僧皆飽足去也師云闍黎分上又作麼生僧禮拜師乃云束無邊太虛空為一棒二十餘年朝打暮打不曾打著一人拈百億須彌盧為一舌六坐道場橫説豎説不曾説著一字山僧昔年行腳在鳳陽穎州幸自可憐生無端被一陳業風吹到寧波府太白山下曲彔床邊撞著者沒面目底老凍膿將錯就錯拜了幾拜究竟不曾聽得一言既不曾聽得一言則無恩可報既不曾説著一字則無法可傳既無法可傳無恩可報則設忌燒香豈不皆成虛套且作麼生説箇不虛底道理不因樵子徑爭到葛洪家重開古港上堂僧問師今登座海衆雲臻從上宗乘請師一舉師云稱鎚浮水面進云恁麼則千古風規今日猶在師云手執夜明符幾箇知天曉進云昔日百丈開田為衆説義今日翠巖開港與衆合作麼生師云終不為蛇畫足進云恁麼則緊捎草鞋大家普請去也師云莫待雨淋頭問成就文殊智海先入普賢行門如何是文殊智海師云寸草不曾留進云如何是普賢行門師云萬法齊彰現進云文殊普賢即今在什麼處安身立命師豎拂云見麼進云處處分明猶礙眼密移一步始相親師云如何是密移底消息進云金鋤不動土水到自渠成師云未在更道僧禮拜云功不浪施去也師云過一邊立乃云湍水橫流二百年香臺無像篆無煙今朝直濬洪溪路看取禪燈萬古傳大衆洪溪路淹鍬鋤可濬曹溪路塞大禹難疏到者裏如何著力若也諳得落處不費纖毫力觸處自流通所以道靈源明皎潔枝派暗流注如是則滔天沃日處涓滴不留積石飛埃中波濤無盡縱使滄桑迭易佛國巍然舟壑夜移禪燈宛爾直得洪溪與曹溪並遠湍水共法水同源正恁麼時且歸源一句作麼生道水流西澗朝東澗雲起南巒過北巒上堂舍戒定慧縱貪瞋癡謗諸佛毀於法不入衆數終不得滅度是一闡提人分上事勤修戒定慧息滅貪瞋癡玉潔冰清滴水滴凍是奴兒婢子邊事直得入林不動草入水不動波劍刃上翻身冰凌裏走馬若到翠巖門下勘過了打畢竟如何但有路可上更高人也行復舉三祖大師云歸根得旨隨照失宗須臾返照勝卻前空師喝一喝云大小祖師猶有者箇在洞山己和尚請上堂僧問四七西天傳法旨二三唐土永流芳自從五派支分後一段真風到處揚如何是臨濟宗師云棒敲師子骨進云如何是曹洞宗師云白鳥入蘆華進云臨濟曹洞是同是別師云清風對明月進云恁麼則落華無背面流水自東西師云何不向自宗上道取一句進云掀翻五位無偏正劈破三玄作兩邊師云好與三十棒問佛日升天法雷震地臨濟家風即不問如何是五位君臣底句師云草深無異路進云如何是君師云金殿寥寥絶見聞進云如何是臣師云玉階密密向邊行進云如何是君視臣師云桂輪皎皎映波心進云如何是臣向君師云環佩珊珊拜聖明進云如何是君臣道合師云半夜日頭光爍爍進云祇如五宗收不得三藏莫能詮又作麼生師云擺手出章江進云恁麼則玲瓏巖畔玉華開迦葉峰前金果熟去也師云瞻仰有分乃云寒鴉立雪夜半正明孤鶴巢松天曉不露明穿玉線暗度金針五位宏開三根普利掃盡法中姦斃整起洞上頽綱直得留雲峰畔瑞氣騰空寶鏡池邊祥光耀宇此是洞山己和尚戴角披毛橫身為物處諸人還知著落麼若也知得便見古釋迦不先今彌勒不後新豐洞不淺滹沱河不深然雖如是渠我交參正偏回互即不問汝諸人且道釋迦峰與彌勒峰聚首對談何事還委悉麼無孔笛逢氈拍版吹吹拍拍韻高寒昔洞山己公參天童先師問人境俱忘未審主人公在甚麼處先師把住云道道山就手一推先師遂拓開山禮拜先師又一腳踏住云道道山攔腳一拳先師便打山便出大衆玲瓏巖峻古策風高一腳一拳星飛電卷非特解搖鱗尾抑且善捋虎鬚既然如是為什麼向他家齏甕裏淹殺乃顧專使云試道道看使無語師云蒼天蒼天師誕日兩序大衆請上堂僧問頂𩕳本父母歷劫共團圞時中無觸背處處露慈顏如何是本來父母師云無影樹頭風颯颯進云養育恩深劬勞德重大地椿萱如何報答師云不萌枝上月團團進云可謂將此深心奉塵剎是則名為真報恩師云闍黎報恩一句作麼生道進云拾得驪珠光燦爛相將攜手上高峰師云一椎粉碎問昨夜庚星現今朝師子鳴千峰呈瑞彩萬派慶無生如何是無生底句師云雲收山嶽露進云頭頭無滯礙處處自天然師云雨過竹風清進云恁麼則南極黎明宣壽域北風半夜舞三臺師云波斯入漢關進云祇如和尚壽量還落延促也無師云劫石有銷日此翁無老時進云學人現在生死中如何出得師云三生六十劫僧一喝師云野干鳴進云不得中郎鑑還同野舍薪師云稱錘蘸醋問如何是生以不生生為生義師云白雲影裏怪石露進云如何是死以不死死為死義師云緑水光中古木清進云明知生是不生之法為甚被生死之所流師云廚庫對山門進云恁麼則棒下無生忍臨機不見師隨聲便喝師云喝即不無無生句子即未在進云不勞重注腳師便喝問爐飄玉篆燭秉金蘭第一義諦即不問祝延一句請師宣師云釋迦峰頂萬年松進云恁麼則滿堂雲水咸加額共祝師年等太虛師云八十翁翁牙不動進云昔日世尊初生時道天上天下唯我獨尊未審他以何為尊師云無孔鐵鎚當面擲進云雲門道我當時若見一棒打殺與狗子喫又作麼生師云知恩方是報恩人進云祇如和尚今日生辰又以何為尊師云萬岫聳寒色進云恁麼則大衆禮拜去也師云禮拜直須頭點地乃云甲寅年甲戌月癸未日癸亥時高陽村裏深閨內黑頭生得白頭兒大衆山僧本命元辰年庚八字一時説向諸人了也還有善推詳者麼若推詳得出五行羅不得三界豈能收其或未然慶生何似無生慶慶得無生生死休以拂子擊禪床下座立知事頭首上堂僧問不禮須彌王便登師子座為是神通妙用為是法爾如然師云師子堀中師子栴檀林裏栴檀進云祇如少林五葉遍界芬芳為甚臨濟一枝寰中獨秀師云還他嫡骨兒獨步乾坤外進云與麼則人人全象力箇箇奮師威師云放汝三十棒進云萬國共知金屋貴六街齊聽靜鞭聲師云也不消得問一句臨機賓主齊現如何是賓主句師云燈籠入露柱進云如何是賓師云觸目是埃塵進云如何是主師云覿面無儔侶進云如何是主中賓師云大地盡皆春進云如何是賓中主師云腦後自薦取進云如何是賓中賓師云説起愁人愁殺人進云如何是主中主師云橫按莫邪無佛祖進云臨濟兩堂首座同喝賓主歷然和尚正令當行賓主在什麼處師便喝僧亦喝師又喝僧禮拜師云猶欠一著在進云橫身當宇宙誰是出頭人師云好與三十棒乃云唆臨濟喫棒心毒如蛇升兜率白椎口甜似蜜皮膚脫落腦後更下一椎明暗雙忘機前雷轟四喝直饒不入者保社鼻孔先穿刈得三百箇祖師舌頭拖地翠巖今日拈條斷貫索子將者夥破落戶一串穿來頓向無陰陽地上非特毗贊宗乘紀綱法社要使爪牙俱備攫霧九霄羽翼齊成摶風萬里正恁麼時共相建立一句作麼生道妙舞正應誇遍拍三臺須是大家催開爐上堂僧出衆禮拜起便喝云若論第一義被某甲一喝百雜碎了也且道又作麼生觀師云楚雞不是丹山鳳僧打圜相云即今捏聚收來時如何師以拂子一劃進云祇如不收不放請師道師云蝦蟆口裏一粒椒僧一喝師云再喝看僧又喝師云野干鳴進云巍巍逼塞虛空際歷落當陽亙古今師云餿飯泥茶瓶進云和尚莫謾人好師云保福道底問朔風寒凜冽法雨潤蒼生撥轉紅爐焰佛祖一齊烹既是開爐為什麼不施柴炭師云凍徹你骨髓進云箇中還有不假鍛煉者麼師云鄠杜月頻滿瀟湘人未歸進云目前景象人皆見焰裏明珠幾箇知師云闍黎還知麼進云利劍拂開天地靜霜刀才舉斗牛寒師云布袋裏老鴉僧便喝師亦喝僧又喝師云三喝四喝後又作麼生僧拂袖歸衆師云放過一著乃云亙天烈焰金鐵俱鎔出匣靈鋒蛇龍盡斬直得黃頭碧眼飲氣吞聲臨濟德山望風斂衽更若分迷分悟落盡眉毛説性説心橫尸萬里縱使露堂堂明歷歷正是貼肉汗衫分玄要立主賓何異野狐涎唾到者裏須是出格英靈不顧危亡全身拶入始得獨脫無依正恁麼時如何是獨脫無依底句透過荊棘林斫倒栴檀樹以拂子擊禪床喝一喝非浪禪人請上堂一念未生已前淨裸裸赤灑灑盡大地無纖毫過患一念既生之後亦淨裸裸赤灑灑遍十方沒半點塵埃既沒半點塵埃又無纖毫過患為甚麼十箇有五雙到者裏一似撞牆撞壁還知麼巨浪涌千尋澄波不離水復舉雪峰禪師因僧參峰問那裏來僧云覆船來峰云生死海未渡為甚麼覆卻船僧無語歸舉似覆船船云你問我僧理前問船云渠無生死大衆還識渠麼長長底箇矮子光下頜箇鬍兒晚參山僧昨晚不曾落堂堂中走卻禪師左右鄰單不覺大家高枕鼾呼鼾呼即不無或若被人竊去衣鉢時如何僧云家賊難防師云恁麼則闍黎著賊了也僧無語師云你問我僧理前問師云者老賊復舉溈山問仰山天寒人寒仰云大家在者裏溈云何不直説仰云適來也不曲和尚如何溈云且須隨流師云溈仰父子主賓互換縱奪可觀仔細檢點將來一人理上偏枯一人事上不足要得事理圜融更買草鞋行腳始得人日晚參人日晴天下平干戈偃聖賢生聖賢既生且道是何面目豎拄杖云大衆見麼分明月在梅華上看到梅華香已遲僧問如何是無陰陽地師云踏著即禍生如何是無根樹師云繫驢橛如何是叫不應山谷師云相隨來也因事晚參山僧撥草方外十有餘年學得箇海上仙方一向祕惜不妄宣傳今晚不免説向諸人去也此方不假望聞問切不假針炙按摩丸藥末藥草藥君臣藥總不消得祇是不得作世法會不得作佛法會若能直下領得用得頓使身病心病佛病祖病乃至禪和子八萬四千毛病一時頓愈諸人切須記取記取諦聽諦聽乃連作打呼聲歸方丈晚參佛法相見不比尋常低頭擬議歧路亡羊不亡羊頭角分明沒處藏且那箇是分明底頭角喝一喝晚參竹梆一響攙先去雲版三鳴尚未歸道念若同情念切倒騎白象步如飛衆兄弟逐日上去下來那箇是騎底白象若委悉得箇箇是活普賢如或未知翠巖為汝指出便抴杖歸方丈晚參六七十員窮衲子夜寒無絮晝無禪霜風颯颯侵毛骨無位真人聞不聞大衆颯颯霜風千林木落箇箇皆聞作麼生説箇不聞底道理若委悉去寒暑莫能侵死生得自在其或未然但知事逐眼前過不覺老從頭上來貼單小參有名有位東西相對無位無名大地平沉大地既平沉諸人向甚麼處安立首座便喝師云喝即不無親切道一句看座云選佛場中親及第人人鼻孔盡遼天師云放過一著衆禮拜師歸方丈人日杜偉之居士預慶四旬請上堂頂門眼正始明棒下無生胸次情枯乃能逢緣不惑外不被六塵所惑則見色如盲聞聲如響雖處塵勞不為塵染內不被六識所惑則三際頓斷一念不生中不被一切語言文字所惑則能脫羅籠出窠臼改禾莖為粟柄易短壽作長年所以臨濟祖師道達摩西來祇是覓箇不受惑底人即今衆中莫有不受惑者麼試出來説説看如無山僧因齋慶贊去也卓拄杖云裂破塵勞網還他英偉人
