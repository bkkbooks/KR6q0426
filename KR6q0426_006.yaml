body:
  text: 嗣法門人傳我等編住翠巖寺語録佛成道日淡菴莊內翰送大獅子吼額至洪爐禪人請上堂僧問南浦雲開宗風大扇西山日出祖印重光法窟當興即不問獅王大吼事如何師云野狐倒退三千里進云可謂正覺峰前千古秀無雲嶺上一枝新師云風吹石臼念摩訶進云全憑補袞調羹手撥轉如來正法輪師云大家共證明問靈山正令翠巖權衡祇如高沙彌來和尚作麼生接師云不入洪爐裏爭見是精金問一句當陽真面目千聖傳來盡無為無為即不問如何是真面目師云撲碎菱花鏡通身是慧光僧禮拜師乃云王宮初降日已作獅子吼何事入深山特地觀星斗還會麼洪爐焰焰浪花飛雪白眉毛生腦後復舉蘇東坡內翰參佛印禪師值入室次印云此間無坐榻學士來作甚麼士云暫借和尚四大作禪床印云老僧有一問學士若道得即請坐若道不得輸下玉帶子士云請和尚問來印云老僧四大本空五蘊非有學士向甚麼處坐士無語遂留玉帶以鎮山門大衆東坡無語且置試問諸人還道得否衆下語不契師云三千劍客今何在獨許莊周定太平熊少宰送大雄寶殿金額至小參佛恩難報佛法難聞佛理難明佛世難值所以教中道諸佛出世如優曇鉢羅華時一現耳大衆要知三世諸佛不離自心是故自心衆生滅則佛現自心衆生生則佛隱然一切衆生生滅流注念念不停爭得諸佛時時出現諸佛既不現則一切佛法亦不現一切佛宮殿亦不現一切佛妙莊嚴具亦不現一切佛三十二相八十種好亦不現一切佛殊勝希有事亦不現既皆不現則一切衆生無由瞻仰無由起信無由種天人之福無由越三塗之苦無由聞難聞之法無由報難報之恩譬如翠巖祖庭自淹沒以來殿閣莊嚴一切化為烏有四鄉善士雖欲植福無地可植雖欲聞法無處可聞雖欲報佛深恩無因可報幸有護法善神先懸雪上之讖諸山耆舊同罄鉢中之餘諸大宰官居士或以翰墨為佛事或以金玉為佛事或以讚揚為佛事或以毀謗為佛事乃至五湖衲子半夜敲門頻年擊柝口勞舌沸骨露皮穿所以嵯峨寶殿頓還唐宋舊觀煥爛銀鉤倍增巖巒秀色山僧本是一箇精光窮漢上無片瓦下無卓錐道不足以恢弘佛祖德不足以感動天龍鬼神智短才疏緣微福薄豈能建立大功成就大事此蓋全賴護法耆舊及諸賢衲之力今則佛殿已成佛恩已報且道如何是諸佛正法試舉箇古人公案與列位商量昔梁武帝問達摩祖師云朕自即位以來造寺度僧不計其數未審有何功德摩云無功德帝云為甚無功德摩云此是人天小果有漏之因帝云如何是真功德摩云淨智妙圜體自空寂如是佛法不以世求大衆對病下藥因時制宜須是達摩祖師若是翠巖即不然或問造寺度僧有何功德但向他道水漲船高泥多佛大或云如何是淨智妙圜體自空寂但向他道明辰上正梁大家齊著力豎天人師殿上堂雪中寶殿久已呈祥雲裏畫梁兮朝方豎布金施粟檀那深植無漏之因竭力勞心衲子同圜未了之願大功既就大用全彰大智洞然大機普應轉法輪于塵際現寶剎於毫端直得百億虛空同聲喝采恆沙諸佛靡不光臨所以道我此道場如帝珠十方諸佛影現中大衆即今四衆畢集萬指圍繞豈不是現底影子且道諸佛在甚麼處豎拂云一梁聳拔青霄上六戶常明翠竇間開爐上堂山僧自住翠巖以來七載之間八度結制皆以五七間敗屋為禪堂以三寸舌頭為爐𩍁以鐵如意子為鉗鎚冷灰堆裏間或爆出一顆兩顆祇是不堪上眼獨有今年迥與尋常不同九夏三秋之間卻以六七十里山溪為禪堂以牽板篾纜為爐𩍁以汀州清流樹為鉗錘一期之間鍛鍊得一夥銅頭鐵額漢箇箇可以為梁為棟大衆若據山僧見解一向用底卻是小爐𩍁謂之作死馬醫縱使醫得活來不耐風霜不靳熬鍊今年用底卻是大爐𩍁若能受得即成一行三昧又謂之妙莊嚴三昧無盡藏三昧大衆且道今冬結制還是用大爐𩍁邪小爐𩍁邪喝一喝云觸目不會道運足焉知路迎佛登殿晚參佛殿雖有新舊佛身原無大小隨分拈一毫頭盡現八十種好拈杖云者豈不是一毫頭還見八十種好麼喝一喝云直饒親見得也是眼裏黃金屑除夕解制熊少宰設普茶請小參一歲除群機息倉廩雖罄空且無私債逼祖師禪休外覓斷磚碎瓦盡隋珠木頭竹葉皆荊璧衲僧家須委悉百年三萬六千朝回首看來駒過隙既解制重打七自己心頭須著急心頭不急眼不開未免因循虛度日且道不虛度時如何淨名原是老維摩陳行遂居士請上堂僧問共說無生話千古羡龐公檀那今再請煩師一線通師云蒿箭射虛空僧禮拜師乃云蒿箭射虛空虛空百雜碎全機獨露時超出世出世大衆隨順慳貪嫉妒嗔恚愚癡造種種業受種種苦是世間法勤修六度萬行永斷九結十使乃至菩提涅槃真如解脫是出世間法世間法如病出世間法如藥以無上之妙藥起必死之膏肓病盡藥除即妙劑靈丹亦成長物所以道衆生罪業深可怖於百千劫不見佛漂淪生死受衆苦為是等故佛興世驀豎拂云佛已出興也諸人還見麼若也見得則無罪不除無願不遂可以盡凡情可以躋聖位脫或未然好將江上沫覷等夢中身無改優婆夷請上堂三冬無暖氣止水不藏龍一語具三玄瓊花開碓觜所以有時恁麼有時不恁麼有時恁麼中不恁麼有時不恁麼中卻恁麼有如是操略得如是自在乃能東湧西沒纖毫無改出生入死隨地稱尊且道正當恁麼時如何山盡疑無路溪回別有村出郡歸晚參舉臨濟大師示衆云有一人常在途中不離家舍有一人常在家舍不離途中且道那箇合受人天供養大慧云賊身已露師云山僧出郡數日便不在家你們終日在家便不曾出路作麼生說箇常在途中不離家舍底意旨衆下語不契師云山僧為汝拈出一句定綱宗須是大慧老漢一語分玄要還他臨濟大師且道翠巖又作麼生擊香几云單重交拆古眉山侄禪師請上堂坐斷十方時聲不是聲色不是色密移一步處山依舊是山水依舊是水於密移處薦得便能顯大機發大用權衡佛祖提唱宗乘不向毒海裏汩沒於坐斷時便休終是鶻臭布衫炙脂帽子所以道從天降下則貧窮從地湧出則富貴門裏出身易身裏出門難正恁麼時如何是身裏出門底句頷下眉毛倒插天南山起雲北山雨復舉楊歧禪師上堂云薄福住楊歧年來氣力衰寒風吹敗葉猶喜故人歸囉囉哩拈起死柴頭且向無煙火大衆楊歧遠祖提持箇事如指諸掌爭奈熟處難忘翠巖則不然薄福住翠巖天寒髮不芟故人從遠至默對口喃喃既是默對因甚口喃喃澄潭不許蒼龍蟠上堂以洴澼纊為事須有不龜手之藥以射猿猴為事須有養由基之箭以超生死越涅槃為事須有爍迦羅之眼此眼一開方能辦龍蛇別緇素梯航萬有津濟群靈所以道生死海中以眼為津梁然此亦是曲為今時途中受用即不無向上一著即未在且如何是向上一著戳瞎爍迦羅眼後黧奴白牯盡揚眉復舉仰山問中邑禪師如何得明見佛性邑云譬如一室六窗內有一獼猴外獼猴喚云猩猩內獼猴應諾如是六窗俱喚俱應山云承和尚譬喻無不明了或若內獼猴睡著時如何邑下禪床執山手云猩猩與你相見了也大衆能近取譬中邑可謂仁矣惜乎被仰山一拶未免手忙腳亂翠巖即不然或有問如何得明見佛性劈脊便棒何故免得猩猩貪瞌睡勞他六戶喚頻頻涓涓胡佛子等披剃請上堂僧問凡胎刀下盡頂相歷然彰棒下無生旨請師為舉揚師云霜葉已辭原上樹進云與麼則親入洪崖社凡心即佛心師云冰花尚鎖洞中泉僧禮拜師乃云百千佛法不出一掌直下知歸猶隔霄壤既是知歸因甚又隔霄壤九苞鳳尚縈金網且裂破網羅一句作麼生道和風吹愛日冰樹自涓涓昔趙州禪師示衆云北方來者與之上載南方來者與之下載大衆趙州老漢雖善撥轉天關掀翻地軸未免隨人上下翠巖則不然南方來者光剃頭淨洗鉢北方來者淨洗鉢光剃頭若人會得不妨四楞踏地成道豎毗尼應供香積三堂謝定邦二監修程齡伯居士薦母請上堂幽明之故死生之說一點星輝千差頓徹或演毗尼或惟一默或應供于天上人間或分飯于香積佛國或升忉利度現在之母或坐雪山指群靈之月正眼觀來總不出者箇時節若知者箇時節則生而非生滅亦不滅雖不滅不生卻能現男現女現俗現僧定國安邦成家立業正恁麼時且道程門朱氏畢竟在甚麼處豎拂云是處是慈氏無門無善財復舉教中道世間一切諸凡夫信是法者甚難得若能勤修清淨福以昔因力乃能信大衆祇如今辰檀越飯僧薦母豈不是清淨福作麼生是法卓拄杖下座何介甫居士請上堂異類中行底始可受得人天供養一切不會底乃能親與佛祖為師祇如西天打鼓東土作舞南山起雲北山下雨又作麼生陋巷不騎金色馬回途卻著破藍衫頌云一年一度修香供山愈崚嶒海愈深不是多生培福智肯將黃葉博黃金下座舉慶西堂瑩如二禪人薦師三貧請上堂僧問千眼頓開十方坐斷未審亡靈向甚處遊履師云湘之南潭之北進云外不住凡聖內不住根本底人來還受得人天供養麼師云趁出三門外進云遍界且無尋覓處分明一點座中圜師云你眉鬚因甚墮落僧無語師云猶缺分明在乃云未學參禪且學陶流泉夜夜鼓寒濤一聲驚斷幽人夢湧出摩尼價倍高豎拂云大衆還見摩尼麼當陽如未委問取慶西堂除夕上堂僧問本無去來為甚麼迎春送臘師云天左旋地右轉進云古人烹露地白牛與衆分歲和尚又作麼生師云金剛圈栗棘蓬進云向上還有事也無師云有進云如何是向上事師云明日來與你三十棒師乃云屋廬已蓋了要緊是搬柴搬盡渾無事端趺享歲齊下座元旦上堂牢山道士儼如仙章水老儒年八十涯岸不封疆不分同聽法王義第一所以世尊道十方諸佛國惟一無二乘孔子道吾道一以貫之老子道抱一為天下式諸人若了得一無事不畢無教不明無疑不息大衆今朝恰逢元旦一且道一在甚麼處拽拄杖便下座上元解制尊禪人六旬請上堂月遲遲燈燦燦㘞地一聲全體煥但能不昧獨尊兒逝水年光何必算白蘋洲緑楊岸處處枝頭花爛熳燕語鶯啼總是春爭奈狂心猶未斷整芒鞋削扁擔千山萬山恣遊玩前途忽遇把關人莫教忘卻舊公案且作麼生是舊公案上元原是正月半喝一喝下座法雲菴智玉禪人請上堂大智無分別而玉石判然大法絶階梯而升沉宛爾未明大法逐境生情情重則永劫沉淪情亡則立地解脫立地解脫則無分別大智廓爾現前大智既現前則剖石出玉拈玉為石移頭作尾以尾為頭然後運大悲心入生死海或布施或愛語或利行或同事以四攝法接一切人皆其土苴緒餘不費纖毫鹽醬若能如是是真持戒是名佛子所以道佛子受佛戒即入諸佛位佛位既入且道如何履踐法雲在處為霖雨心月隨方破暗迷佛誕如僧優婆夷請上堂僧問雪山六載即不問七步稱尊事若何師云千年石虎誕麒麟進云雲門道一棒打殺與狗子喫又作麼生師云拔出腦後楔乃云入王宮又出王宮片月何曾下碧空一念未生前薦得通身頓現紫金容所以道一念心清淨即是佛出世一念心染污即是佛滅度是知一念頓空則凡聖齊泯染淨雙亡於雙亡後何妨六臂三頭正齊泯時不礙千形百狀所以具足優婆夷雖無女業示受女身素服清潔常能大捨遂於忍辱波羅蜜中具足十種波羅蜜八歲龍女以旁生之身具菩薩之行須臾之間變成男子直往南方無垢世界坐寶蓮華成等正覺大衆要知無垢世界麼即汝現前一念清淨心是所以僧問馬祖大師如何是佛祖云即心是佛大衆除卻四大五蘊那箇是汝心卓拄杖云日破浮雲宇宙清上堂真性本無生浮生皆幻四大是假借有借必還動轉還風暖氣還火涕唾還水骨肉還地如是四大各還真性不滅四大和合真性不生所以道四大性自復如子得其母翠巖所說不生不滅之法用薦王門黃氏早悟真常之性同趨解脫之場大衆祇如黃氏四大離散已周一載眼耳鼻舌悉同灰壤縱使紫金光聚渠亦不見獅子吼音渠亦不聞作麼生說箇薦拔底道理還知麼無見見時為正見不聞聞處是真聞擊拂子下座移佛像過新應供堂獨尊上座請上堂坐斷十方底人直須密移一步密移一步底漢依然坐斷十方有如是胸襟負如是氣概始能鼎新革故在處稱尊拈尾作頭隨機導物正恁麼時頭正尾正一句作麼生道一口平吞十八灘臥龍飛躍起波瀾喝一喝送本山歷代祖位入尊宿堂上堂道眼圜明之謂尊德臘俱高之謂宿古今共坐一堂中浩浩商量舊題目大衆且道舊題目中所說何事莫是說直指人心見性成佛麼且喜沒交涉莫是說真如涅槃菩提解脫麼且喜沒交涉莫是說善惡因果毫氂無差麼且喜沒交涉莫是說三玄三要四禁五位乃至千七百則葛藤麼且喜沒交涉既都不是畢竟如何是舊題目豎拂云見麼若向者裏覷得透不妨與古尊宿同起同坐同入同出始堪消受人天供養開鑿人天眼目所謂以先知覺後知以先覺覺後覺是故先師住天童時特立先覺堂以祀歷代諸祖朔望率衆炷香瞻拜且勒石以紀其事山僧初住翠巖亦曾升座告衆設位安奉但未有堂今于大殿東特立一堂名曰尊宿以奉本山歷代諸祖蓋先覺尊宿名異旨同朔望禮儀仍照先師成式後之說法此山者皆可相繼而入大衆祇如本山尊宿歷梁唐宋元滅度已久即今山僧設位檀越設供且道還來赴也無翠巖不惜眉毛為諸人挑剔看拈拄杖云饅頭䭔子初蒸熟一鉢盂邊散一枚住白法院語録新僧堂成羅鳳山居士請小參石帽峰頂選佛場開一句當天萬機頓息果然頓息去便可攪長河為酥酪變大地作黃金於一毫端現寶王剎坐微塵裏轉大法輪人人常光現前箇箇壁立萬仞不勞肯綮修證直下及第心空鋤月耕雲盡是西來大意開單展鉢無非古佛家風所以道行亦禪坐亦禪語默動靜體安然衆兄弟且道那箇是安然底體莫是喝一喝拍一拍麼莫是豎一拳頓一腳麼莫是畫一圜相作女人拜麼如斯舉措盡是弄精魂漢所謂依他作解障自悟門而今諸方多是學底禪往往向知識口角邊方冊上東卜西卜忽然卜得一機一境便道我會也似則也似是即未是縱饒你學得十成無滲漏說得攢華簇錦巧妙鑯新及到眼光落地時一點也用不著何故從門入者不是家珍直須自胸迸出始可蓋天蓋地白法者裏鋪席初開也無差珍異寶與諸人搬弄憶得昔年在太白峰前拾得一籃栗棘蓬幾箇金剛圈拋向諸人面前一任吞透若也吞得落透得過不妨擺手出章江其或未然七尺單前高著眼莫教空過好時光復舉王常侍參臨濟大師偕入僧堂侍云者一堂僧還看經麼濟云不看經侍云還參禪麼濟云不參禪侍云未審教伊作甚麼濟云一箇箇教伊成佛作祖去侍云金屑雖貴落眼成翳濟云將謂你是箇俗漢師云臨濟若無後語洎被打破蔡州然雖如是未免旁觀者哂今日鳳山居士入山設供偕山僧入僧堂他既不問如之若何山僧亦不曾向他道教伊成佛作祖去且道與古人是同是別平蕪盡處是青山行人更在青山外除夜小參臘月三十日到來也還有脫灑自由底衲僧麼出衆𨁝跳看僧問如何是白法境師云石帽峰高日月寒如何是境中人師云亮公洞裏笑相親如何是人中意師云腳下泥深三尺進云人境已蒙師指示向上宗乘事若何師打云放過即不可進云恁麼則水向石邊流出冷風從華裏過來香師云切忌詐明頭乃云年盡月盡日盡時盡好箇到家消息爭奈無人諦信卻道一年將盡夜萬里未歸人悽悽客路悲霜鬢試問堂中衆弟兄胸次疑團盡未盡若也盡當陽顯出毗盧印印破十方無邊太虛空掀翻八萬四千塵勞阱剎剎皆為解脫場塵塵總是大圜鏡從他四序推移八風飄鼓萬年一念一念萬年常在定也無生也無死也無老也無病也無迷悟并凡聖翻憶西來碧眼胡道箇直指人心見性成佛也是鉢盂口上重添柄雖然祇如雲門扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾又作麼生五九盡處又逢春復舉天童先和尚因僧問學人遠來要問和尚討箇佛做童云佛也是你分外事師云斬釘截鐵本分宗師直下知歸罕逢達者還委悉麼渾身已在含元殿何事嘮嘮問帝都歲旦小參年新月新日新時新三陽開泰萬物咸新驀拈拄杖云唯有山僧拄杖子不屬陰陽與故新有時卓在孤峰頂上壁立萬仞有時突出十字街頭和光同塵若向和光同塵處與拄杖子相見大似浮雲遮日面若向壁立萬仞處與拄杖子相見未免重添眼裏釘去此二途畢竟向甚處與拄杖子相見卓一下云還會麼若向者裏見得和光同塵處灼然壁立萬仞壁立萬仞處不妨和光同塵有權有實有照有用雙明雙暗全主全賓如是則終日喫飯不曾嚼一粒米終日著衣不曾挂一縷絲終日行不曾移一步終日說不曾動口脣所以道諸人總被十二時辰使山僧使得十二時然此猶是向下論量若也向上提持去直得三世諸佛不敢正眼覷著歷代祖師箇箇飲氣吞聲且道拄杖子有甚長處得恁麼奇特擲下云出頭天外看誰是我般人復舉鏡清因僧問新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啓祚萬物咸新僧云謝師答話清云鏡清今日失利明教因僧問新年頭還有佛法也無教云無僧云年年是好年日日是好日為甚麼卻無教云張公喫酒李公醉僧云老老大大龍頭蛇尾教云明教今日失利師云說有道無即不無二大老若是新年頭佛法總未夢見在今日或有問白法如何是新年頭佛法但向他道拄杖正開封他若擬議劈脊便棒且道是有是無試定當看香城請弘戒示衆昨夜壇上石羅漢得得走過西天相訪優波離尊者尊者見羅漢騰空而來倉忙起身恭迎就座遂問屈荷仁者金錫遙臨有何見教羅漢云遠來無別特有所啓佛出世時以佛為師佛滅度後以戒為師尊者乃吾佛大弟子持戒第一當此像法之際我南閻浮提衆生貢高我慢障閡嫉妒不奉戒律不守威儀乃至殺盜妄淫十惡五逆中外相侵尊卑倒置臣弒其君者有之子弒其父者有之徒悖其師者有之弟逆其兄者有之因此國界不安兵戈四起血流漂杵骨積成山尊者何不乘悲願力分身剎塵廣弘戒法普利人天耶尊者喟然太息云善哉仁者乃能為閻浮提衆生作大請主可謂內祕菩薩行外現是聲聞第某螢火之光焉能破其暗昧況震旦國中原有大乘氣象若僧若俗皆是大乘根器一聞千悟得大總持自有當當性戒了無持犯之殊豈假區區相名妄生縛脫之見所謂心平何勞持戒行直何用參禪諸戒定慧及淫怒癡俱是梵行一切障閡即究竟覺正作是語時被山僧聽見震威一喝云你者兩箇老凍膿大似徐六擔版各見一邊若知我祖師門下向上關捩子爭肯恁麼道作是語已復喝一喝二公逡巡而退各歸本位大衆前一喝且置敢問後一喝意作麼生試道道看若道不得山僧打葛藤去也不達境唯心起種種分別達境唯心已分別即不生豎拂子云大衆者箇豈不是境畢竟阿那箇是心若向者裏覷得倜儻分明去不妨向聲色頭上坐聲色頭上臥處處全彰頭頭顯露不落見聞知覺不墮意想情塵淨裸裸絶承當赤灑灑無回互等閒吐一詞三藏莫能詮尋常行一步鬼神莫能測非是不參禪都緣無禪可參非是不受戒祇緣無戒可受雖知有為虛幻而不輕小善雖達罪性本空而不造諸惡所謂無我無作無受者善惡之業亦不忘近代有般狂禪僞學開口便引六祖心平何勞持戒之說以自覆其短啖肉飲酒靡所不至癡人我且問你六祖還得心平也未若道未得心平因甚卻傳五祖衣鉢若道已得心平因甚又從智光律師受戒殊不知古人一時抑揚之說對機之談便乃撥無因果自招殃禍又有一等盲修瞎煉耽名著相之徒不諳無作戒體祇管膠柱鼓瑟執藥成病單單以受持衣鉢為戒殊不知持戒但束身非身無所束從上大律師如道宣本嵩輩何嘗不達毗尼性體來又有一等也不參禪也不受戒飽食終日無所用心但祇剃光了頭便言我是禪師癡人我且問你喚甚麼作禪具箇甚麼眼目便可以為人師難道曉得兩部三官血盆壽生高王等經便可稱禪師耶更有一等自暴自棄自甘客作開口便言受戒參禪是禪和子事我們是應赴和尚便放肆些也不妨癡衆生吾佛制戒且令七衆同受梵網經云一切國王王子百官受位時應先受菩薩戒一切鬼神救護王身百官之身王臣且令受戒何況毀形壞服稱大比丘而不受佛戒耶昔洞山問僧云世間何物最苦僧云地獄最苦山云不然向此袈裟下失卻人身是為最苦大衆且道作麼生出得此苦聻山僧為汝注破若要世世不失人身直須嚴持戒律若要頓超三界應須洞達唯心已上所舉近代法門流斃諸方種種偏執總是不達唯心境界故起種種分別昔本嵩律師因楊無為請問終南宣律師所述毗尼性體嵩答以偈云情智何嘗異犬吠蛇自行終南的的意日午打三更大衆你道律師不識禪得麼若識得此偈落處始名真奉律山僧續貂亦有一偈日午打三更冰華焰裏生誰識南昌郡便是古洪城白總戎請就香城論梵網經并啓華嚴萬佛會小參大法離文字至理絶言詮處處露真機塵塵揚妙諦所以道諸佛不出世四十九年說祖師不西來少林有妙訣到者裏不可以眼覷不可以耳聞不可以心思不可以識識須是大根大器大丈夫漢向生佛未分前睹聞莫及處直下承當全機透脫便可高揖釋迦不拜彌勒婢視聲聞奴呼菩薩如是則三藏十二分教還同故紙祖師西來無風起浪天下老和尚橫說豎說總是熱碗鳴聲上不見有諸佛可攀下不見有衆生可度內不見有自己外不見有大地山河森羅萬象一片本地風光凝然獨露一著本來面目廓爾現前然雖如是更須知有轉身一路始能顯大機明大用殺活自在照用並行無佛處示佛無祖處作祖無言處演言無相中現相或現天大將軍身鎮干城於閫外或現丈六比丘身斷鬚髮於雲間或慈或威或順或逆以同事攝現百億身全承此箇威光不假他人氣力可以祝無疆之聖壽可以報罔極之深恩可以定國安邦可以延齡益算以此懺愆無愆不滅以此集福無福不臻以此保子孫綿綿瓜瓞以此續慧命焰焰聯輝所以千佛萬佛佛佛同源大乘小乘乘乘普利到者裏心外無法法外無心一瞻一禮全明心地法門一香一華盡是舍那境界故梵網云一華百億國一國一釋迦各坐菩提樹一時成佛道豎拂云釋迦老子即今在山僧拂子頭上成等正覺轉法輪度衆生了也諸人還見麼從前汗馬無人識祇要重論蓋代功復舉梁武帝請傅大士講金剛經士升座撫尺一下便下座志公和尚問云陛下還會麼帝云不會志云大士講經已竟大衆武帝祇索一顆夜明珠大士便打開無盡藏直得七珍八寶一時現前然雖如是若不得志公證明洎成瓦礫拋卻乃顧視左右云衆中還有別寶者麼卓拄杖一下喝一喝復云殺人刀即活人刀定國安邦勳業高提起此刀能自斷凡情聖解一時超示衆舉梵網放火焚燒戒乃云黃面瞿曇原來膽小若據山僧見解要明菩薩心地大戒直須大大底放一把火將目前頑山笨石敗葉枯枝以至三千大千世界燒得乾乾淨淨洞無一物諸人本源心地不妨覿體現前所以道一人發真歸元十方虛空悉皆消隕虛空既消隕何處得山河大地草木叢林來又何處得樓臺屋宅鬼畜昆蟲來如是則上無能害之人下無可害之物誰是菩薩誰是衆生誰是持戒人誰為犯戒者所謂般若大智如大火聚擬之則燎卻面門直饒你不擬亦未免眉鬚墮落且道畢竟作麼生良久云從來無背面隨處任縱橫遊廬山歸示衆茫茫極目起烽煙拄杖思量走上天誰識此間原自穩歸來仍可伴雲眠大衆還識此間麼三世諸佛於此間利生演揚妙法歷代宗師於此間全提正令拔楔抽釘一切異類於此間舍身受身橫出豎沒大浸稽天此間不溺劫火洞然此間不壞毗嵐飄鼓此間不移二六時中折旋俯仰去來動靜不離此間縱使遊遍匡廬雲居天台南嶽乃至歷盡百億須彌盧不可說浮幢王剎亦不離此間所以道佛子住此地即是佛受用常在於其中經行及坐臥若果親到此間便可倒戈卸甲海晏河清凡聖情忘生死見謝虎無所施其爪兵無所投其刃正與麼時不動尊如來出來道長老還曾到此間麼山僧云到不動尊云長老既到此間便該千穩百當為甚麼慞惶怕怖東奔西走山僧呵呵大笑云老凍膿也許你大膽祇是要脫炙脂帽子更進一步始得且道畢竟如何深洞白雲無住著不妨飛去又飛來復舉天童先和尚因僧問如何是不動尊童云此去徑山五百里師云天童先師貫用金剛寶劍覿面全提者僧若知落處便好百草頭上卸卻干戈今日或有問山僧如何是不動尊但向他道露柱騎牛登五老燈籠踏雪返西峰久立衆慈伏惟珍重
