body:
  text: 嗣法門人傳我等編普説一除夕普説入道不通理復身還信施長者八十一其樹不生耳衆兄弟且喚甚麼作理即汝各各本具廣大靈明妙淨底心是祇如理又作麼生通直須縣崖撒手絶後再穌一番始能通達始消得他信施報得他恩德苟或未然粒米寸絲盡須披毛戴角償還他即今臘月三十日到來舉衆仍欣然笑談自若曾不念古德聞一言半句不明直下飲食無味坐臥不安每見日落西山便垂泣云我今日工夫不得力光陰又虛度了爭奈何是故縣梁刺股繼晷然膏晝三夜三時刻無間直至啐地折嚗地斷方始罷參何況一年又虛度了己事未明痛哭流涕不徹又豈有工夫戲笑雜談耶大抵參學人先要題目認得清題目若認不清才有纖毫不耐煩便要告假才有些些病痛便生怨嗟此無他只為視叢林猶驛館行苦行若當官竟不思自己行門非倚衆莫能成就若認得題目清拌身拌命入泥入水俱不辭勞祇如山僧自進院已來每日劫劫波波灑掃寮舍修葺殿宇毋論淨穢一以身先也祇為題目認得清所以不惜勞苦不避忌諱盡心盡力行向前去如今有底便謂某人祇是好出頭便受許多纍我們又不思量做人討者許多纍作麼大衆者般底喚作障蔽魔王自不能行反障他人你看釋迦老子因地中為我等故舍身舍命經無窮劫無有疲猒難道也是好出頭耶殊不知為人如為己身彼此事辦頃承諸公棄菴舍捐鉢資撥繁冗忘位貌光贊祖庭助揚法化遂使紀綱頓整內外一如誠可謂千載一時久參宿學各自知時不假山僧饒舌後進初機也須猛著精彩究到徹頭徹尾始得先聖道居則曰不吾知也如或知爾則何以哉尋常懶惰不肯操履便説我不思量做人一朝業緣既至被人推出祇恐無回避處若説我當時也曾見作家來爭奈觸事面牆若道我當時不曾見作家又成妄語若道我當時親知識祇為本分事那裏打帳做人難道做人又是分外事恁麼又話成兩歇衆兄弟人身難得佛法難聞知識難遭怖心難發倘能居安思危生大怖畏念生死苦發菩提心既遇知識忘軀炙侍既聞佛法知者篤行之不知者審問之庶不虛度此身如今人多是臨渴掘井忙時抱佛腳病苦臨身煎逼不過求生不得生求死不得死到此方來問做工夫了生死事癡人如今要做世間功名也須藝窗下篝燈十餘年苦工才得成就何況要學無上菩提之道了脫曠大劫來生老病死等苦豈是容易底事所以道欲隆佛種須紹門風諦審先宗是何標格昔文悅禪師親近翠巖芝老才入室求開示芝云法輪未轉食輪先轉後生家趁色力康健且為衆持鉢去悅領疏遂去化米歸來又求開示芝云天寒且為衆化炭佛法不怕爛卻悅又化炭歸白芝云某甲己事未明乞和尚慈悲指示芝云堂司乏人你且為我料理悅恨不去心若是如今禪和子早已卷包跑路了也他卻不然祇是自恨自疑自鞭自逼一日坐後架上桶箍爆斷忽然大悟山僧昔住白法時有西山懷古十首中有懷悅公一首云乞米乞炭任堂司為法忘軀敢固辭痛恨自心疑未瞥桶箍忽散展雙眉大衆且道悅公見箇甚麼道理便悟去芝老既是大善知識因甚不教人看話頭做工夫三回四轉祇教人化米化炭作職事且道還有指示無指示若道無指示悅公為甚便悟去若道有指示則三家村裏負販漁樵皆會佛法又用祖師西來知識出世作麼者裏甄別得出方識芝老用處如善射人箭不虛發翠巖今日承諸山種種護念不化米而米至不化炭而炭來職事雖不齊箇箇皆是有德業者同心同德一切兼攝趁此百事現成色力康健之際正好努力參努力學努力行苦行行門若足福緣自備學問若到習氣自銷融參到無可參處至理自通達至理既達便與祖師無二無別且道祖師即今在甚麼處時寒伏惟珍重普説佛法無人説開口成雙橛雖慧不能了喫飯便知飽譬如暗中寶晝夜光皎皎無燈不能見開眼便不薦大衆山僧與麼道且道是發明古人意耶違背古人意耶若撿點得出始具參學眼其或未然不免葛藤一上三世諸佛歷代祖師無非為一大事因緣故出現於世作世間燈是故釋迦老子才出胞胎便道天上天下唯我獨尊豈不是以一大事因緣示一切人作世間燈後來有箇跛腳阿師説道我當時若見一棒打殺與狗子喫卻貴圖天下太平豈不是以一大事因緣示一切人作世間燈及至臨末梢頭對人天衆前拈起金色波羅華獨飲光默契其機遂破顏微笑豈不是以一大事因緣示一切人作世間燈嗣後達摩大師特特航海梯山而來説道教外別傳不立文字直指人心見性成佛向嵩山山下面壁九年方於深雪堆中接得箇半臂神光豈不是以一大事因緣示一切人作世間燈五傳至曹溪法遍支那二枝五派萬別千差無非以一大事因緣示一切人作世間燈是故臨濟喫黃檗三頓痛棒豁然大悟便道元來佛法無多子後來建立許多間門破戶所謂三玄三要四賓主四料揀等豈不是以一大事因緣示一切人作世間燈曹洞親契寶鏡三昧於無中唱出正偏五位三墮四禁金針玉線敲唱雙行豈不是以一大事因緣示一切人作世間燈溈仰暗機圜合體用互呈豈不是以一大事因緣示一切人作世間燈雲門於睦州嶮崖之下拾得秦時𨍏轢鑽便道一鏃破三關分明箭後路豈不是以一大事因緣示一切人作世間燈法眼以三界唯心萬法唯識指示諸人一大事因緣作世間燈乃至臨濟正宗的的相承迄我天童老人於銅棺山頂徹悟此大事因緣便道情與無情煥然等現後來説法二十餘年祇以一條白棒示一切人作世間燈山僧既承嗣天童因甚不行棒行喝祇管打葛藤説道理不見道慈悲之故有落草之談然則世間燈相續不斷暗中寶覿體現前諸人還知落處麼若知得此寶落處便可傳從上佛祖不傳之燈燈燈續焰常照世間永無有盡現前僧俗不避風雨不惜劬勞遠來翠巖或求戒或求法或隨喜或助揚無非為一大事因緣莫非宿植德本故獲遇茲勝會然此一大事因緣各各具足各各現成祇因無始以來妄習深厚乍聞此事如風過樹頭是故從迷至迷生死相續所以釋迦老子道若諸世界一切衆生其心不淫則不隨其生死相續又道若諸衆生其心不殺不盜不妄則不隨其生死相續此四種清淨明誨三世諸佛所共叮嚀若能遵依便超三途更能修定方超六欲更能修慧頓超三界大衆且道慧如何修你但二六時中放下一切善惡諸緣放下一切間學間解提起一句本參話頭如屑落眼中相似千方百計祇要出卻眼中屑更不思食思睡思財思欲一切人我是非無明煩惱不須排遣自然瓦解冰消忽然屑出眼光如故當此劫火之餘白骨遍野平日親朋法侶十無一存可見人命無常呼吸難保生死二字僧俗貴賤皆所不免生死事大無常迅速兩句現話豈可不知因甚不肯努力真參虛懷請益大抵今時參禪不得力者總為體面放不下生怕裝村生怕落下風殊不知祇者護惜體面底心便是無量劫來生死根本豈不見慈明冒難參汾陽經二年不許入室凡有所訓皆流俗鄙事一日進方丈白云自至法席已經二載念歲月飄忽時不待人有失出家之利語未竟陽拈棒連打明痛極失聲請救陽以手掩其口明豁然大悟乃云是知臨濟道出常情高峰參雪巖才開口便痛棒打出天童先師周旋龍池老人左右二十餘年池唯加罵詈不假詞色若是如今琉璃瓶子禪生怕捱著才相警策便道老凍膿不識好惡輕我慢我我如此為護叢林如此精誠求道博不得箇好詞色覓不得句好言語心憤憤口悱悱恨不插翅而去嗟夫醍醐上味為世所珍遇斯等人翻成毒藥現前諸公皆是英靈倜儻漢子豈假山僧絮絮忉忉幸自鞭逼自挨拶不顧得失不顧危亡不護體面則生死根本自斷大事因緣自明大事因緣既明則一切法即是佛法又豈待開兩片皮掉三寸舌然後為説佛法哉今晚因省愚禪人為乃師圜戒設茶山僧因茶普説因説示衆然則説已説了注已注了若作佛法會入地獄如箭射不作佛法會亦入地獄如箭射離此二途轉得一機不妨來方丈通消息普説五夏已前專精戒律無繩而自束五夏已後方許聽教參禪掘地覓青天正當不前不後時且道受戒是參禪是𠟨利漢向者裏挨拶得入便見腳跟下有條通天大路千聖牢籠不住衆魔潛覷無門直下坐斷報化佛頭不落證修階級豈不見青原初參六祖便問當何所務即不落階級祖云子曾作甚麼來云聖諦亦不為祖云落何階級云聖諦尚不為何階級之有祖深器之衆兄弟青原既知聖諦亦不為又用見祖師作麼不見道不經敏手終成廢器丹霞於途中遇禪者聞有選佛之説遂詣西江參馬祖才相見便作整冠束帶勢祖云子緣不在此可往南嶽見石頭去霞便去見石頭依前作整冠束帶勢頭云著槽廠去若是如今學者便道堂頭不具眼我們選官底人如何作得槽廠裏事霞依教便去異日石頭云來日佛殿前鏟草一衆各備鍬鋤霞獨洗頭胡跪殿上頭便與剃髮復云子莫要受戒麼霞便掩耳而出衆兄弟你道丹霞見甚麼道理便掩耳而出莫是撥無因果麼且喜沒交涉須知此事貴在英靈特達之士向未舉已前薦得自然如水投水似空合空不落理路窠臼不被知解糾纏不假爐鞴鉗鎚不費師家鹽醬你看六祖石頭何嘗嘮嘮忉忉為丹霞青原打葛藤來所以山僧尋常向諸人道要急相應直須向佛未出世祖未西來時會取你道佛未出世祖未西來時還有許多名號也無還有四聖六凡種種差別也無還有戒可受有禪可參有教可聽也無衆兄弟須知本來無事本來現成本來平等本來解脫祇因迷頭認影遂至向外馳求所以道演若達多失卻頭狂心歇卻即無事圜覺云知是空華即無輪轉亦無身心受彼生死楞嚴云妙性圜明離諸名相本來無有世界生死法華云是法住法位世間相常住教乘中宗門下千般譬萬般喻滿口道破和盤托出爭奈自己夙無靈骨命根不斷偷心不死動是隨語生解逐境飄流見人説有便著有見人説空便著空見人説無事便坐在無事甲裏譬如強盜打劫相似見人説此屋有寶便信道有或向道無又疑是無直待一拳打破門來一看原來真箇是空底方悔從前虛費許多氣力平日偷心當下頓歇學道亦然你若偷心不死縱使學得一知半解轉得一機兩機坐到純清絶點身心俱忘也未是到家底消息衆兄弟時光倏忽歲月蹉跎才方結制又是一月了也直須努力不可等間況是千里萬里受盡波吒行腳到翠巖經冬過夏豈是為片衣口食無非要發明己躬大事翠巖者裏也不管你五夏前五夏後也不管你𠟨利不𠟨利也不管你是老是少才進門來便覿面提持開口見膽你若信得及見得徹直下四楞踏地昔世尊在日有一大富長者子名曰億耳投佛出家為求道故日夜精勤行諸苦行以精勤故遂致身體尪羸足破血流意欲退道佛知其故乃謂耳曰爾在家時善彈琴不曰能佛曰絃太急太緩時如何曰聲不成曲佛曰不急不緩時如何曰曲韻方成佛曰我佛法中求道亦然太急則疲倦太緩則懈怠適中則道成矣耳奉教不逾月遂證阿羅漢果如今衆中精勤者固多懈怠者亦不少倘能受戒參禪行行學事皆如調絃相似緩急得中則思過半矣且道沒絃琴上如何著力各各請歸堂明朝是初一解制普説違真順俗未脫根塵卻謝招陶猶存取舍翠巖法社迥異諸方去亦不招來亦不拒真亦不立俗亦不違若是摩霄俊鶻直下承當跳出金剛圈吞卻栗棘蓬便解石女腰邊橫裁兔角鐵牛背上倒刮龜毛須彌頂上行船鄱洋湖裏走馬拈取香至國與新羅國鬥額不為分外到者裏佛亦是塵更説甚麼念佛投於亂心亂心不得不佛淨亦不著更説甚麼清珠下於濁水濁水不得不清清濁既亡心佛無二雜念淨念皆為解脫成法壞法無非涅槃柳巷華衢淫坊酒肆漁樵耕牧將相公侯一一現本身舍那處處示當體阿逸既然如是佛印因甚又道蘇學士胸中有萬卷書下筆無一點塵祇是不知性命落處聻衆兄弟灼然有他恁麼道你若不知性命落處縱饒胸羅萬卷筆瀉千篇諸子百家五經十七史乃至三藏十二部一切修多羅一時會盡到眼光落地時半點也用不著豈不見魯哀公問性命之道於孔子子曰分於道之謂命形於一之謂性化於陰陽象形而發之謂生化窮數盡之謂死是故命者數之始也死者生之終也有始則必有終矣大衆生死始終陰陽變化之理孔夫子固分析得甚詳若是無生無滅無始無終者一著子畢竟不曾點得破為甚不點破急則治其標我祖師門下談佛性之理即不然昔異見王問波羅提尊者曰佛性在甚麼處者曰性在作用曰若當作用幾處出現者曰當作用時其處有八曰八處出現當為我説者曰在胎為身處世名人在眼曰見在耳曰聞在鼻辨香在舌談論在手執捉在足運奔遍現俱該沙界收攝在一微塵識者知是佛性不識喚作精魂大衆佛性精魂是一是二若道是二正是撥波求水若道是一又是認影迷頭到者裏須是自悟始得你若自悟一回便見得根根塵塵周遍法界生滅去來本如來藏所以文殊問菴提遮女曰生以何為義女曰生以不生生為生義曰如何是生以不生生為生義女曰若能明知地水火風四緣未嘗自得有所和合而能隨其所宜是為生義曰如何是死以不死死為死義女曰若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義大衆菴提遮女説道理打葛藤即不無殊不知鼻孔被文殊大士穿卻今日或有問翠巖如何是生以不生生為生義劈脊便棒如何是死以不死死為死義連棒打出若明得棒下意旨便知得自己性命落處回觀菴提遮波羅提佛印孔子之説皆為剩語今晚因少宰熊公遙寄淨資為衆設茶解制山僧不免引些陳爛葛藤與大衆作箇熱鬧其實此事不在言句上所以少宰昨來書中自序云少年曾參圜通諸老灼知此事不由言説即今萬念寒灰獨此因緣如魚在水大衆你看此老雖在金紫行中猶能不昧般若正因等間説箇喻子多少親切諸人若能二六時中履踐此事如魚在水如鳥翔空則結制也在裏許解制也在裏許生也在裏許死也在裏許乃至動靜去來折旋俯仰無有不在裏許者雖然祇如魚鳥俱潛水空並隕時此段因緣又作麼生行到水窮處坐看雲起時復云卻謝招陶亦偶然雁門也是老婆禪一回入得洪崖社五濁泥中綻白蓮普説今宵不必宣規約打起精神透祖關言下豁然開正眼始知結制亦無端正眼既開不在限正眼未開出衆決擇衆不出師乃云問得也好不問更高問去答來於本分中了無交涉豈不見香嚴參溈山山云聞子在百丈問一答十問十答百此皆是聰明意識邊事試向父母未生前道將一句來嚴不能答乞山説破山云父母所生口終不為子説嚴云今日乃知畫餅不可充飢此生誓作箇長行粥飯僧決要明者一著子一日因聞擊竹聲打破漆桶遂遙望溈山禮拜云溈山和尚大慈恩逾父母當時若為我説破何處有今日復述偈云一擊忘所知更不假修持大衆祇者兩句已自透頂透底如今人參禪不得力蓋為所知障耳所以道入此門來莫存知解又有箇跛腳阿師參睦州幾度扣門不容見一日又去扣門州云誰云文偃州開門文才跨入州遂推上門云秦時𨍏轢鑽文被拶折腳忽然大悟你道他當時問頭也未置得因甚便悟去良遂棄講參麻谷谷見來便閉卻門遂再去谷才見又荷鋤往園中去遂有省乃云某甲若不來見和尚洎被經論賺過一生歸謂學徒云諸人知處良遂總知良遂知處諸人不知夫為善知識者當慈悲方便接引後昆為甚見人來參總不理答他且道麻谷為人在甚麼處臨濟在黃檗會下三年不曾問一句話一日因睦州教問如何是佛法大意三度發問三度被打當時黃檗因甚亦無指示若覷得黃檗心行破便見得麻谷溈山睦州等同坑無異土近代宗師得此機用者不道全無祇是少學者才求開示便授一箇死話頭學者思量得一句合頭語一答答了師家連忙印證云好好虧你祇是要明差別公案便好為人遂將五家宗旨一齊向伊注破祇是自己分中依舊黑漫漫地如此行徑正所謂日中灌瓜揠苗令長但知與兒酥酪消與不消都總不知你若消不得酥酪亦成雜毒自餘分玄分要配三配五大法小法之流固是不堪齒録時當末法明眼宗師固少正因行腳者大似披星揀月祇是趁熱鬧圖軟暖貴耳賤目聽見三千五千處便道是真善知識青黃不辦菽麥不分及到叢林中自己事且不著急祇管管人間事東家杓柄長西家杓柄短某知識慈悲肯為人説某知識有福報肯為衆某知識有學問語句鑯新走過幾箇叢林見得幾員知識便以老參自居空腹高心向無眼人前稱王稱鄭妄自尊大及到明眼面前依舊來不得不免納降款似此等輩謂之州縣白踏僧打野榸漢打殺千千萬萬有甚麼罪過又有一等𠟨利些底將古人殘羹餿飯築向一肚皮也作得幾首歪偈轉得幾轉套語及至勘驗將來毫無實據依稀倣佛鹵莽顢頇也不管自己穩當不穩當祇圖宗師説箇是説箇好便歡喜不了拈徵別代一齊都安排得停停當當祇是手卷拂子一到手便向三家村裏旋蒸熱賣去甚至付而又取取而又付師資矛盾兄弟仇讎古風掃地目擊寒心此無他蓋為末上擔簦行腳便無正因耳法華舉云行腳人須具正因始得不是遊州縣玩山門景致過日子蓋為生死事大尋師訪友決擇疑團誠哉是言從上諸祖現身塵剎豎立法幢無非要人發明生死大事即翠巖初興恆産未復錢穀亦不足以安衆內外職事一年拮據東家化幾斗西家化幾升無非成就湖海有志高衲於此名山大剎中了脫生死大事諸公不憚劬勞千山萬水到翠巖晝三夜三無眠失食也祇要決擇生死大事千里之行一步為初九旬之期今夜為始毋論堂內堂外皆當痛為生死真切做工夫日前有幾箇禪和子再三要求進堂見山僧不允便哭山僧祇是好笑難道禪畢竟要在堂內始參得堂外便參不得禪耶殊不知钁頭邊東司上乃至搬柴運水舂米抴磨總是諸人放身命處祇為你心粗頭頭錯過如今要得急切相應但將從前知識處學得底册子上記得底零零碎碎解得底盡情拋向東洋海裏胸次中虛虛間間寬寬曠曠更須生起三種大慚愧心一者自念我與釋迦老子無二無別祇因不達本地風光所以流浪生死經無窮劫而今幸得人身六根完具又逢善友得聞正法即今若不討箇分曉將來又被業識牽向驢牛肚裏翻筋斗去有甚麼了期此豈不是大可慚愧底事二者古德千言萬語及天下知識橫説豎説無非直指此事而今開卷便是銀山萬疊見知識説話似鴨聞雷問著本分事口如膠黏教中呵為啞羊僧此豈不是大可慚愧底事三者兩鬢垂雪一事無成生無益於時死無聞於後此實可慚可愧可羞可恥奮起三種慚愧心了疑情自然發得起工夫自然做得上不著更問人別人為你説底都是死法子一部禪關策進祇是箇切字注腳你若生死心不切直饒從朝至暮從暮至朝説到彌勒下生也沒交涉今晚聚首百餘員皆老成篤實之士且無虛頭伎倆九十日內要了無量劫來生死事不是等間直須切上加切猛上加猛驀地築著磕著要透祖師關捩也不難且道如何是祖師關待諸人一一打破漆桶來與汝注破告香普説古人不復見古規不大行古風欲墜地古道焉得明欲明古道須行古規古規既清古道自振何者為古道直指人心見性成佛是何者為古規三八入室旦望五參是然旦望五參不過提綱挈要唯入室一著乃細密鉗錘所謂由也升堂矣未入於室也昔慈明參汾陽經二載不許入室凡有所訓皆流俗鄙事是故先德説法觀時觀機不妄下刃不輕發藥一發刃下藥必使命根斷百病除百病既除藥亦無用學者服藥未得通身汗下者固不在言已得通身汗下者往往執藥成病所謂閨閣中物舍不得譬如靈龜負圖自取喪身之兆昔夾山未見船子之先洛浦未見夾山之先皆害此病若不遇大手眼宗師卒難整頓現前兄弟各各氣宇如王一知半見不道全無要得透頂透底頭尾相稱祇恐達摩峰未肯點頭在適來參頭為衆啓請云現前兄弟各為生死事大無常迅速伏望慈悲開示因緣大衆祇者生死事大無常迅速一段因緣已是為虛空穵耳穴了也何況舉古舉今説長説短於諸人本分中祇益戲論且道本分中如何通信若道不得山僧不免為須彌安鼻孔去也豎拂子云見麼箇箇眼裏有珠必定是見擊拂云聞麼人人耳中有竅畢竟是聞聞底不是聲見底不是色聲色全真見聞不隔所以道即此見聞非見聞無餘聲色可呈君箇中若了全無事體用何妨分不分衆兄弟還了得麼若真箇了得便見得生即無生死本無死更説甚麼生死事大日月往來春生夏長四序推遷靈臺不變更説甚麼無常迅速然雖如是也須實證實悟始得你若一向學將來解將去爭奈生死到來依舊手忙腳亂譬如説食終不飽人所以參貴真參悟須實悟莫打野榸弄虛頭虛度一生一失人身萬劫不復豈不見佛果在五祖會下機辨迅捷每呈伎倆時五祖祇是不肯他佛果以為用心行移換人五祖道你他日著熱病打時方思量老僧話在佛果忿然而去在金山果遭熱病打一頓病中著忙方思五祖之言不虛病愈即歸五祖後因聞頻呼小玉話始得打破漆桶大慧天資敏利英俊過人參了一十八年禪諸方老宿無一不印可他祇是不肯自欺及至天寧聞熏風自南來話始得一念不生前後際斷可見先德皆從實證實悟中來所以光明烜赫照耀今昔日前有箇禪和到翠巖頗聰明也有些猢猻伎倆祇是到結角羅紋處便來不得因放他在侍者寮要朝夕鍛煉一晚問他萬法歸一一歸何處他云今晚不向和尚道山僧道你與麼答話何曾夢見他云和尚不肯某甲諸方自有人肯我在山僧道你他日著熱病打時方思量我在後在侍者寮大病一場叫爺叫娘撒屎撒尿不逾月起單到諸方便付屬去了大衆可見古今不相及不啻天淵古風欲墜地於此可見翠巖者裏不敢效諸方大宗師輕易放行縱使拈得頌得石火電光也來得入理深談也來得更須審你悟處真實始得縱使悟處真實更須驗你行處真實始得所謂解行相應名之為祖縱使解行相應更須用處親切始得你若大法不明宗旨不透用處不親臨機不免瞎人眼目如何為人抽得釘拔得楔解得黏釋得縛奉勸現前兄弟須看先德典型莫逐今時流弊從今告杳之後有鼻孔者遇挂牌時不妨入室中披肝瀝膽微細決擇未得入者直須抖擻精神豎起脊梁將三百六十骨節八萬四千毛孔并作一箇疑團莫管他是莫管他非莫管他古莫管他今晝夜忙間行住坐臥茶不知茶飯不知飯疑來疑去逼來逼去左不得右不得吞不得吐不得死不得活不得百不得時忽然失腳踏破虛空平沉大地譬如泗州見大聖遠客還故鄉那時方見告香入室也是多事旦望五參也是多事了生脫死也是多事成佛作祖也是多事雖然若守著者箇見解坐在無事甲裏正是膏肓之病拄杖不在苕帚柄聊與三十
