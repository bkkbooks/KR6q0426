body:
  text: 嗣法門人傳我等編住翠巖寺語録受建州黃巖寺請上堂師至法座前拈帖云文彩未彰家音已達文彩既彰弩牙頓發弩牙既發且道箭頭落在甚麼處遞帖與維那云便請維那分明剖露升座僧問金風體露消殘暑千里秋江一棹通八字打開文彩現請師主法紫雲峰未審和尚去即是不去即是師云百尺竿頭五兩垂進云一人有慶兆民賴之師云長因送客處憶得別家時進云九萬里鵬才展翅數千年鶴便翱翔師云君子可八乃云溪山千里隔重重順逆灘頭一棹通迓取故人歸故國鳥啼華笑總春風豎拂云大衆還見故人麼若向者裏見得則舉足動步無非自己道場瞬目揚眉盡是故鄉田地一見一切見一明一切明一真一切真一證一切證住也雲橫幽谷去也雁過長空譬如寶鏡臨臺無形不鑑鏞鐘在虡有扣即鳴如是則若去若來了無眹迹或彼或此豈有乖殊況黃巖古剎原是故山而白髮高檀扁舟遠至焉敢飾辭固讓理應直下承當但赴黃巖則違西江道舊住洪井又辜閩嶠來機到者裏畢竟如何即是喝一喝云雷音已遍河沙國南北東西共一家蕭氏優婆夷禮千佛名經請上堂僧問真風已遍三千界蓋色騎聲事若何師云兔角杖挑潭底月進云迦葉峰高則且置向上一句請師宣師云龜毛繩繫太虛空進云不是堅持冰雪操爭見梅華滿樹新師云崖州萬里問赤手提臨濟宗風白棒開群生正眼四衆臨筵請師垂示師云風並秋濤急進云太虛寥廓煙雲盡古澗寒泉徹底清師云不許臥龍蟠進云恁麼則赤肉團邊孤迥迥去也師云古廟裏師子乃云夫婦之愚可以與知飢則喫飯寒則添衣金風拂拂玉露垂垂雁飛南浦魚躍深池當恁麼時無法可求無罪可懺無佛道可成無生死可斷雖然拄杖𨁝跳上天即不問汝且道龍女手中珠從甚處得來擊拂云千佛不知何處去蕭蕭黃葉滿庭除復舉趙州禪師因婆子問弟子是五障之身如何免得州云願一切人生天願婆婆永沉苦海大衆趙州與麼答話雖是本分鉗錘爭奈語驚時聽忽有問翠巖五障之身如何免得但向他道荷盡已無擎雨蓋菊殘猶有傲霜枝九日晚參黃華冷笑秋容瘦紅葉暗瞋朝露寒不必登高望鄉國山河百億鏡中觀大衆祇如鏡子破了山河隕了一雙肉眼盲了兩隻臭腳跛了當與麼時寸步不能移泰山不能見何況察秋毫登萬仞縱使絳囊萸酒難釋其災鶴氅黃冠罕能自救若向者裏有箇出身活路去樹樹皆秋色頭頭是故鄉脫或未然白髮終難變黃金不可成開爐上堂僧問昔日天童老人道太白山中儘有柴一株不許衆人搬不是老僧多護惜祇要諸人徹骨寒未審老人還有為人處也無師云雲送千峰雨進云正當恁麼時未審是誰家風月師云天寒萬壑冰進云祇如今日人天普集選佛場開條令斬新如何施設師云燈籠沿壁上須彌進云恁麼則一拳築破虛空面佛祖齊教立下風師云腳跟下與汝三十棒乃云今冬雖然結制不説第一義諦截斷老胡葛藤滅卻西來大意為甚如此達摩師不是祖太末蟲吞卻虎喝一喝晚參昨夜驪龍打瞌睡頷下明珠曾不祕東海波斯竊得歸驀地一椎成粉碎驪龍睡眼忽瞪開不見明珠始大哀攪海翻空尋不得誰知祇在一塵該登拂云大衆還識驪珠麼擲下云是甚間家具晚參逼人打七大似牽牛上壁將心覓心何殊入海尋針豈不見教中道假使滿世間皆如舍利弗盡思共度量不能測佛智你輩懵懂禪和二六時中半睡半醒半真半假要測佛祖妙智洞達本地風光正類螢火爇須彌且道畢竟如何是佛智庭前種萵苣萵苣生火箸火箸長蓮華蓮華結木瓜木瓜才剖破一顆大芝麻若向者裏會得許你測佛智其或未然總是影響之流復舉法眼禪師示衆云見山不是山見水何曾別山河與大地都是一輪月三交嵩和尚云大小法眼未出涅槃堂三交即不然見山河與大地刀錐各自用大衆二大老提持箇事如指諸掌仔細檢點將來一人事上偏枯一人理上不足有人道得事理完全句許伊是箇𠟨利衲僧良久云三冬枯木秀九夏雪華飛上堂僧問斬釘截鐵本分提持轉位投機如何舉唱師云馬頭安兔角進云釋迦峰𨁝跳上天鉢盂山驀地粉碎時如何師云牛背刮龜毛進云山前一片間田地踏著方知寸草無師云如何是間田地僧一喝師云猶未踏著在乃云翠巖有句話頭不假著意參求若人直下薦得成佛也是縣疣且道是甚麼話頭抴拄杖便下座靈宗化士請上堂赤腳復科頭長年衣糞掃欲飯五湖僧隆冬賣卻襖如此為衆心福多享不了更有貼肉衫及時應料掉大衆正當天氣凝寒料掉貼肉衫子且道如何度日冰河才焰發枯樹亦華開上堂僧問無心即是戒如何是無心戒師云野色籠寒霧山光斂暮煙進云迦葉道倒卻門前剎竿著又作麼生師云煬帝開汴河進云佛之一字尚不喜聞今日翠巖因甚為蛇添足師云你放寶劍在甚麼處僧擬議師便打乃云禪乃佛心戒乃佛行教乃佛語誦佛語行佛行達佛心便是活佛迷佛心壞佛行背佛語便是衆生翠巖今日將佛與衆生縛作一束擲向章江免得諸人取一舍一倚門傍戶不得自由然雖如是倚天長劍即不問你一口吸盡西江時如何可憐敗國亡家恨萬古春風吹不消安義徐進士王孝廉請上堂首座問錦章遠至聖境高推入廛垂手群機普應如何是入廛垂手底事師云覓火和煙得進云即今四衆圍繞群英畢集又作麼生與他勘辦師云擔泉帶月歸進云六根未具眹兆未分還有利生處也無師云稱錘飛上九重天進云六根已具眹兆已分且道生又如何利師云識得衣珠管取幡風不動進云更有一問請師直答師云認明燈火從他橋水偕流行音居士問弟子不會問佛法問句世法時如何師云何得話作兩橛進云化了別人財成就他家事未審自己還有功德分也無師云無功德進云勸人向上引導同流為甚麼卻無功德師云倚天長劍逼人寒士禮拜師乃云本來面目離色離聲劫外風光非僧非俗離婁師曠聞見難施張儀蘇秦智辨叵測天地以之覆載日月以之照臨七金五嶽以之崔嵬萬渤千溪以之流注草樹以之扶疏榮暢風雲以之聚散飄颻君以之協和萬邦臣以之股肱王室士君子以之孝弟忠信庶人以之耕牧漁樵商賈負販西方聖人以之睹星雪嶠東魯先覺以之設教杏壇天下宗師以之弘開爐鞴烹佛烹祖所以道天人群生類皆承此恩力豎拂云大衆還識此恩麼若向者裏見得則柳巷華衢無非彌勒酒樓肉案盡是釋迦夜夜觀星時時成道三大阿僧祇不離當念百千香水海祇在一塵不來相而來笑看鐵鋸舞三臺不見相而見猛焰爐中飛雪片如是則五龍城內達摩峰前不隔纖毫時常覿面豈不見紫團居士啓中道磬敲螭臥剖五宗未剖之宗風麈拂鳳棲窮千聖無窮之聖諦大衆即今塵已拂了磬已敲了作麼生是未剖之宗風無窮之聖諦喝一喝云鐵船未泛龍江上寶月先輝雁塔前昔龐居士參馬大師問不與萬法為侶者是甚麼人馬大師云待汝一口吸盡西江水即向汝道龐於言下大悟大衆馬大師遊刃磅礡目無全牛龐居士葉落知秋動絃別曲今日忽有問翠巖不與萬法為侶者是甚麼人但向他道待汝推倒五老峰即向汝道更為頌出滄江歲晚問關津野水連天不見人不是一回親吸盡爭明浩浩劫前春除夕上堂僧問一年已盡是夜將除衲子家風如何通信師云松攲半巖雪進云恁麼則天上年光回北斗人間春色報南枝師云竹覆一溪冰進云祇如古人活剝泥牛與大衆分歲翠巖者裏又作麼生師云薄㓟明月細切清風乃云一歲幾終星回斗轉四時迭易月冷風高若向月冷風高處薦得則百怪自消不假大儺旁磔若於星回斗轉處薦得則一物常靈誰更貪生惜死所以道有物先天地無形本寂寥能為萬象主不逐四時凋既不逐四時凋即今臘盡春回時如何擊拂云無言童子笑呵呵昔龍牙禪師因僧問二鼠侵藤時如何牙云須知有隱身處始得僧云如何是隱身處牙云還見儂家麼大衆九重深密水泄不通還他龍牙老漢若是翠巖即不然忽問二鼠侵藤時如何但向他道城上已吹新歲角窗前猶點舊年燈更為頌出侵藤二鼠叩龍牙見得儂家路轉差何似寒梅深雪裏一年一度一開華元旦上堂僧問村歌社舞鬧駢闐柳眼梅腮淑氣添百草頭邊親切句請師拈起祝堯年師云雲藏無縫襖進云金鳳穿林過曇華匝地開師云春到不萌枝進云空裏忙忙書卍字錦上鋪華又一重師云火中突出金師子進云為復是神通妙用為復是法爾如然師云一聲哮吼震乾坤進云學人到者裏只得兵隨印轉去也師云矮子泥壁乃云正法眼藏春色來青嶂涅槃妙心晴光轉緑蘋實相無相社舞村歌原野上微妙法門兜樓畢力正氤氳祇如世尊拈華迦葉因甚卻微笑眉鑯迸出遼天鷂喝一喝上元上堂僧問自從少室燈傳後續焰聯芳滿大唐如何是續焰聯芳底事師云甕中道士乾坤闊進云與麼則森羅及萬象一法之所印師云十影神駒立海涯進云昔日臨濟大師有箇三玄三要底句今當人天衆前請師指示師云次第問將來進云如何是第一玄師云崖前石虎抱兒眠如何是第二玄師云九曲黃河徹底乾如何是第三玄師云榑桑人種陝西田如何是第一要師云遼空飛木鷂如何是第二要師云機前擒虎豹如何是第三要師云扇子高𨁝跳進云如是則千峰勢到嶽邊止萬派聲歸海上消師云間言語乃云喚作竹篦則觸萬象森羅常滿目不喚作竹篦則背聾盲瘖啞成群隊觸不得背不得猛焰爐中光烜赫不得有語不得無語又作麼生日頭正晝打三更晚參蚖蛇戀穴固是不堪評品撩起便行亦非後人模範衲僧家母固母必母取母舍可行則行可住則住其住也不離寶華王座遍現天上人間其行也歷盡塵沙剎海依然不出戶庭且道衲僧家有何長處得如是自在擊拂云自從舞得三臺後拍拍元來總是歌昔文殊師利菩薩問維摩居士云菩薩於生死有畏當何所依士云當依如來功德之力殊云菩薩依於如來功德之力當何所住士云當住度脫一切衆生大衆維摩居士固是古佛再來遊戲生死海中隨類度脫得大無畏祇如文殊是會了恁麼問不會恁麼問若道是會了問既是會了又問作麼若道是不會文殊為七佛之師焉有不明此段道理者裏著得隻眼便見文殊維摩同坑無異土昨熊少宰來書云客冬因大襄勞頓不及赴參請之末質問疑義特寄淨資設茶供衆兼命茶話大衆即今茶已喫了話已説了還有疑情頓釋底麼知音不在頻頻舉達者還須暗裏驚退院上堂斬新法椅舊堂頭退鼓何緣響未休短杖欲敲閩嶠月不徒懷土事間遊衆中還有共相出手底麼問答敘謝畢復云承乏三年已過期葛藤延蔓又牽枝如今剪斷枝和蔓一任狂風上下吹且道還有吹不動底麼自云有如何是吹不動底拈拄杖下座便行熊少宰陳司理洎通郡合山諸護法耆舊等留師再住翠巖上堂重重主伴聚溪頭同德同心固挽留既是業緣猶未了何妨添餌再拋鉤衝浪金鱗自知時節追風良驥豈在加鞭但能唱拍相隨自然聲和響順不唯宗風不墜且使法社恆新是故世尊説法梵王帝釋天子大臣為之啓請長者居士為之布金植樹文殊普賢目連鶖子諸大士為之贊襄法化十方諸佛為之出廣長舌吐微妙音互相激揚互相贊歎俾一切博地凡夫未信者信未證者證未解脫者令得解脫未滅度者令得滅度然在釋迦老子及諸大士分上原無尊卑優劣亦無佛及衆生等見所以道滅度一切衆生實無衆生得滅度者大衆既無衆生得度祇如千聖出興當為何事還會麼不因紫陌華開早爭得黃鶯下柳條敘謝畢復舉黃龍南禪師退院歸示衆云去時一溪流水送歸來滿谷白雲迎一身去住非去住二物無情似有情大衆黃龍老人卷舒無礙得大總持即且置祇如現前諸公為留山僧歸寺往往來來去去住住那箇是非去住底乃起立鞠躬云孟春猶寒恭惟護法耆舊起居多福下座解制上堂僧問兩堂共聚究無生幾箇曾親悟現成倏忽一期今已滿請師方便示群情師云厚翳未曾落毛輪焉得消進云鴻鵠衝雲漢何處不逍遙師云走煞闍黎乃云仲春朔寒梅漸逐香風落桃華李華相次開靈雲睡眼俄驚覺謝三郎諾不諾等間抴脫岸邊樁南北東西隨處泊然雖如是忽遇白浪滔天時如何擊拂云幾度黑風翻大海未曾聞道釣舟傾復舉應菴遠祖示衆云三十三州七十僧驢腮馬面得人憎諸方若具羅龍手今日無因到淨明翠巖續貂亦有一偈十三郡縣百餘僧寒餓同甘絶愛憎百結疑情如頓息團團夜日自明明佛誕熊少宰請上堂形興未質白淨王宮初誕日名起未名天人殊號幾經更大衆且道形名未兆以前者一著落在甚麼處豎拂云還見麼若向者裏委悉得則無剎不現隨處稱尊迭為主賓互相唱和若在法王法王中尊若在人王人王中尊若在宰官宰官中尊若在長者居士長者居士中尊若在天人天人中尊雖非天非人而能天能人非佛非祖而誕佛誕祖所以道天上天下唯我獨尊大衆還見我麼優闐雕不得顧陸畫難成復頌云鋸解稱錘分兩段驢拖三腳到深宮不須更問如何是優鉢羅開烈焰中其旋葉居士懺報母齋請上堂僧問無依道人是諸佛之母三世諸佛從之受生如何是無依道人底體師豎拂云見麼進云恁麼則知恩有分師云作麼生是報恩底句進云粉骨碎身未足酬一句了然超百億師云剎竿頭上仰蓮心進云謝師證明師乃云齋戒沐浴三聖同倫惡殺好仁千賢共轍是故成湯之網仲尼之釣子堅終身蔬食德及魚羊隋侯親獲夜光恩沾蛇虺一鉢和羅飯聖僧現在母升淨域九旬忉利天説法至今語播人間所以道大孝釋迦尊歷劫報親恩果能擴此一點孝思非但可以報罔極酬乳哺即超凡入聖脫死了生恢恢乎遊刃有餘地昔育王大千禪師示衆云諸人從無始以來飲乳如四大海水積骨如毗富羅山那箇是諸人最初底父母大衆大千老漢卻似對萱親覓阿娘然雖如是知恩者少諸人要見最初父母麼玉容寂寞倚闌干梨華一枝春帶雨更有一偈舉似大衆積骨逾富羅飲乳若滄海最初父母顏毫髮不曾改葉公知此恩蔬食周六載正值聖人生千祥如霧靄命我説伽陀萬峰齊喝采母子常不離芙蕖綻埃塏喝一喝下座天中節張不空居士請上堂僧問門縣雙艾虎五毒已全消應時及節一句請師直道師云翠竹籜分青嶂裏進云恁麼則人人有分去也師云黃鶯聲老緑楊中進云天童老人豎起拳云祇將者箇粽子供養大衆和尚又作麼生師云滯貨不勞拈出乃云空山寂歷杳絶煩囂鼉鼓未嘗喧龍舟不聞競祇見秧針刺木老農賡陌上之歌榴火噴空白鷺墜炎天之雪誰管蕤賓節屆禁足時臨但見殿閣風涼杉松月冷當恁麼時好箇太平氣象無端突出三閭大夫道舉世皆濁我獨清衆人皆醉我獨醒翠巖隨聲一喝云住住眼華作麼大衆三閭若知得者一喝底落處便可和其光同其塵忘得失喪我人免得汨羅江上抱石自沉直至如今無出身處諸人還知出身處麼擊拂云但得香蒲浮茗碗不須角黍膩人牙結夏上堂僧問夏雨連綿落當陽細指陳何當重禁足特地鼓埃塵師云金烏吞玉兔幾箇是知音進云恁麼則聖凡無異路權引有多門師云畫龍焉能致雨進云爭奈波底月明天不夜爐中香靄室常春師云易開終始口難保歲寒心問火雲初布爐鞴重開消息分明請師舉示師云門前八字牆進云直透萬重關去也師云放汝三十棒問如何是佛師云破草鞋乃云翠巖今日結夏不論寅昏晝夜逼得無位真人箇箇通身汗下大衆且道無位真人還有身也無晚參一期又過一七衲僧須自著急莫待老病龍鍾仰天揮淚無及所以道少壯不努力老大徒傷悲衆兄弟不用悲丹朱元是帝堯兒上堂僧問臨濟大師示衆有三句如何是第一句師云猛虎當途踞如何是第二句師云貓兒倒上樹如何是第三句師云稱錘生鐵鑄進云恁麼則學人薦取去也師云你向那一句中薦得進云橫按莫邪全正令佛祖從教立下風師云且緩緩問南泉斬貓即不問趙州戴草鞋明甚麼邊事師云春來草自青乃云眉毛眼睛常在一處各不相見雖然不相見彼此不隔線衆生諸佛常共一屋各不相知雖然不相知晝夜未嘗離如今有等鹵莽禪和聞翠巖與麼提持便點胸點脅道我會也忽若針眼魚吞卻四大海瘦蚊子踢倒須彌盧又作麼生商量喝一喝云簾疏月到床復舉鹽官安國師因僧問如何是本身盧舍那安云與老僧過淨瓶來僧移淨瓶至安云卻放舊處著僧移至舊處復問如何是本身盧舍那安云古佛過去久矣師云國師婆心片片未免指鹿為馬者僧只解移瓶度水不覺放光動地諸人要見本身盧舍那麼抴拄杖便下座晚參四方戎馬雜沓老幼逃竄紛紛唯有深山窮谷理亂付之不聞既是理亂不聞正好商量此事昔藥山禪師因高沙彌參山問甚處來高云長安來山云我聞長安甚鬧是不高云長安雖鬧我國晏然山云你還從請益得從看經得高云也不從請益得也不從看經得山云大有人不請益不看經為甚麼不得高云不道他不得祇是不肯承當大衆承當二字在諸人分上大似土上加泥雖然如是不因柳毅傳書信何緣得到洞庭湖翠巖門下承當底固不少祇是不得敢問大衆既肯承當為甚麼不得毫氂有差天地縣隔上堂僧問鼓聲才罷海衆雲臻覿面相呈請師的的師云無毛鷂子貼天飛進云昔日臨濟大師示衆有四喝請問如何是一喝如金剛寶劍師云佛祖亦不留如何是一喝如踞地師子師云野狐爭敢近如何是一喝如探竿影草師云你是黑漆桶如何是一喝不作一喝用師云千山絶點埃如何是向上事師便打乃云小暑六月節天道向東行蟋蟀走上壁腐草化為螢況值月初滿日干又上吉沐浴裁衣經絡開市栽種牧養件件皆宜祇是不宜瞌睡所以孔夫子道朽木不可雕也糞土之牆不可杇也拄杖子聽得山僧作如是説出來道長老寶華座上須是與人抽釘拔楔何得一味世諦流布山僧隨聲便喝云你者死木頭曉得箇甚麼豈不見我本師和尚云粗言及細語皆歸第一義大衆要見第一義麼歸堂去晚參園頭送上李子一雙山僧不敢偏衆獨享有一語問大衆若道得相當與你平分若道不得山僧依舊偏衆去也古人道瓜田不納履李下不整冠在衲僧門下明得甚麼邊事一僧云百華叢裏過一葉不沾身一僧云阿誰欠少師皆不諾一僧請代師云偷心死盡眼麻迷石女夢中毛卓豎晚參一七二七無眠失食盡力追尋杳無消息有消息鼻孔眼睛都打失大衆正當打失時如何一僧云通身慶快師云你見箇甚麼道理僧擬議師便打中元解制請上堂僧問一著高一著一步闊一步高高峰頂如何通信師云有眼還如盲進云恁麼則千峰勢到嶽邊止萬派聲歸海上消師云轉身一路作麼生僧一喝師云三喝四喝後如何進云一句全提無少剩師云未在更道進云今日曾居士遠來設齋薦拔一句作麼生師云遍界獨露進云全憑一句無生忍劍樹刀山勢自摧師云重説偈言問聖制告圜即不問報本追親事若何師云野水瘦時秋潦退進云本來真父母佛眼覷不見和尚還見不師云白雲斷處舊山寒進云恁麼則曠劫椿萱恩已報不須重誦蓼莪章師云𠟨利衲僧一撥便轉問九旬禁足即不問大鵬展翅事如何師云非汝境界進云扇竭滄溟無滴水森森露出珊瑚枝師云信你不及乃云四五年來江西浙東撥草瞻風已得大死底禪客并現前檀越所薦慈母今日一箇箇教伊活且作麼生活豎拂云無陰陽地華重發兩三箇月晝參夜參廢寢忘餐未得大死底禪客今日一箇箇教伊死且作麼生死擲拂云萬象森羅無可睹大衆要識大死底人麼即你本來母是要識大活底人麼即你嫡骨兒是而今有等活了死不得底往往認賊為子正所謂拋卻甜桃樹沿山摘醋梨又有一等死了活不得底未免滯殼迷封譬如困魚止濼鈍鳥棲蘆要得子母團圜死活一致麼翠巖更煩木上座為汝念一道無盡藏真言去也卓拄杖下座晚參西天結夏原為禁足護生此土起期祇貴明心見性即今一期已滿各自思量還曾明得心見得性也未若真箇見得自性則無生可護無足可禁無夏可結無制可解出沒卷舒盡在圜覺伽藍之內殺活縱奪全歸當人掌握之中所以道護生須是殺殺盡始安居會得箇中意鐵船水上浮大衆且道鐵船水上浮是殺耶是活耶一僧云章江波底紅塵起西山頂上浪華生師云且道龐公即今在甚麼處僧云覿面相呈師打云也少你一棒不得因事晚參舉寶壽和尚會下有僧參父母未生前本來面目話久之未有省發一日作街坊聞二人相毆云你得恁麼無面目豁然頓悟歸呈所得壽印之師云目前箇箇是有面目底那箇是無面目底衆下語不契僧請代師云老漢也須喫一頓始得師四十衆請上堂僧問滿園芳菊糝黃金閩海泥牛誕活麟攫得白峰峰頂月祥光耀處淨無塵四衆臨筵願聞慶贊師云空中尋鳥迹進云遍界雖無著眼處分明一點座中圜師云興化道底乃云與佛同年生生平好罵佛佛法渾不諳世法又淈𣸩大衆既不通世法又不諳佛法如何敢罵佛喝一喝云大千沙界海中漚一切聖賢如電拂九日張不空居士請上堂僧問威音已前輝天鑑地未審以何為證師云山峻石頭高進云不惑之後耀古騰今如何保任師云地肥茄子大進云趙州七百甲子寶掌千歲春秋祇如無位真人壽年多少師云蘇州有杭州有進云恁麼則腹裏嬰兒頭似雪巖前石虎吼如雷師云借人面具舞三臺乃云有生有滅識錮情封無滅無生澄潭止水直得兩頭俱坐斷一法不當情猶是歧路邊事到家一句作麼生道採菊東籬下悠然見南山復舉龐居士偈云易復易即此五蘊有真智十方世界一乘同無相法身豈有二大衆你看者俗漢子被馬大師鈍置一上便能廓清五蘊吞盡十方諸人要見無相法身麼竹馬才離步霜華又到頭授戒晚參參禪不受戒騏驥蹄先壞受戒不參禪秋月罩雲煙禪戒俱不明生生墜火坑禪戒俱透徹與佛何殊別驀豎如意云大衆還見佛麼若向者裏見得則禪即是戒戒即是禪自無偏枯之斃豈有先後之殊若是中下二機未能直下領略必先受戒以約身心然後參禪以開知見知見既正則不被一切境界之所搖動所以道心縛於境界覺想智隨轉無所有及勝平等智慧生大衆且道如何是平等智慧撫几云雨催燕子歸巢疾風撼桐花落檻遲
