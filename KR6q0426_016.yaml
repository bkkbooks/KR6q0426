body:
  text: 嗣法門人傳我等編啓復徐王衆鄉紳伏以玉毫未燭東震唯尊道德之儒金粟既生西乾悉仰髮須之佛河海雖別日月寧殊恭惟閣下筆翻春浪句燦朝霞飛鶚表而揚眉還同拾芥奪龍標而吐氣不異探囊鏡第芙蓉天眼先窺其兆華敷丹桂帝心已察其優丁五龍之在田珠藏玉韞念一馬之去寺境寂人稀欲起闔邑已墜之宗風肯辭大法將興之盟主由是倩溪聲為長舌遙吐妙音拓香飯於鄰邦廣崇佛事台函遠降猊座令升五柳之高風未衰二蘇之芳規再振杲言慚鄙陋識乏圜通難邀天界之華敢伐雷門之鼓第厚幣遙施尤勝鬻心之供鼎言下屬殊超斷臂之誠仰藉台光聊抒管見移大唐於西巘直令五湖四海同登不二之門掇摩竭於南州頓使三教九流共入毗耶之室統倥傯而申謝唯慶贊以無涯復黃巖檀越伏以玉移丹井尚留蓬蓽之輝翰灑翠筒更引圭璋之重恭承鈞召義切鳧趨一錫未飛千峰尚隔恭惟衆護法一剎金湯八閩山斗青鹽白酒天高逸老之風晉字唐詩家衍善傳之寶千匝金回蘭若地躬迓仙雲一莖草建蕊珠宮親聞天語門迎五柳疑看火宅迸青蓮手植三槐預教朝陽捧鷲鳥佛敕長者覺道津梁某智窮五技偶濫瑟乎竿門才篾一絲敢受胾于梓里謬蒙推轂益懼負墉瑤簡重開喜復深于奉檄星槎欲附期又掣于戍瓜毋乃爨底枯桐有待知音而發響須知圜中老劍終逢俠氣以騰光世叨方外朱陳道合絃中伯子寂光沙界長老之藏身無門桂子香浮學士之握手有日先資露布漫展葛藤統冀丙融并言申謝復黃巖耆舊伏以一葦未折道氣已兆於神州五派才分宗風多扇於閩嶺機緣有待時節無違恭惟諸尊宿鉢傳旴錫掛紫雲鋤月耕煙琛老家風具在忘機罷釣備公面目依然腳頭未跨飛鳶芒鞋先破信手拈來莖草梵剎已成禪講瓶瀉於當年英俊雲興於此日長幼千指內外一如某駑駘下質孤苦頑童鏟草堂前早沐提攜之法愛瞻風海外俱承激勵之威神欣遇作家頓休狂念爰居大剎悉非本懷楓落吳江每恨友師之隔鴈飛南浦寧忘父母之邦華髮漸抽歸思愈切忽蒙書幣遠至緇素俯臨慚感惟深奔趨恐後然退鼓未撾百二十斤之鐵枷難遽脫垢衣已卸六七尺長之竿木任優游師祖祖翁窣堵前之右匝必繞弟兄叔侄祇園內之夜話匪遙第客路飄零鄉音盡改他山旅泊家法俱忘尚俟趨筵側聆謦咳厚儀拜領禮謝容躬肅此奉酬伏惟慈照復佛頂檀越伏以玉殿聳莖茅久羡賢人之芳躅金磚羅勝地咸欽長者之高風苟非乘悲願輪焉能現大佛頂恭惟大檀越鳳毛濟濟麟角牚牚發軔雲程已見揚眉吐氣染指法味自當得髓傳心會儒釋于不二之軒誓金湯於大千之土閩山知為巨擘吉里共仰儀型某同邑同門愧雙眉之不白異鄉異室等孤鶴而初還乍蒞雲端席未熱而章水之徵書旁午才登彊仕面欲皺而岸樹之病葉所以力拒翠巖之招痛灑專使之淚適承華翰召主祖庭深荷台光寵臨寒谷第以蒲柳之質復當鋒鏑之餘未能跨灶起家徒追水源木本然黃巖佛頂兩剎似齒與唇豈可同秦越人之視肥瘠況法乳罔極二恩如川及嶽自當若側陋子之事椿萱義不容辭分宜竭力尚俟登龍之日親聽指揮淨除翳目之華肅清梵苑伏祈崇照不既所懷復佛頂耆舊伏以金地遙招已點江陵之首玉函再啓欣瞻佛頂之光唱拍果爾相隨風雲自當際會恭惟佛頂諸耆舊戒珠獨朗德水恆滋退己讓人不減近代謐師伯忘身為法何殊昔日備頭陀雖未獲挹乎清光久已懷其令聞某居塵不孝難免無後之譏入道未深極負克家之望濫竽祖席於章水偶爾成文僭尸法位於紫雲頽然無補蓋以幻軀多疾利衆乏珍頻興石室之思久冷津梁之念曩承檀越命主禪庭就之力不勝任卻之分非所宜雖然冒昧承當猶自逡巡未決復蒙再召益深恧慚顧駑鈍不堪騁馳而頑愚應聆謦咳尚俟剪如蝟之雜冗九頓浮屠捏似鳩之短筇一登寶所相見伊邇不既所懷伏冀衆慈俯垂照鑑復龍山檀越伏以山無小大賢聖棲之即名法絶窳隆邪外混之而壞所以干城之托全賴檀那宗教之興須資苾芻恭惟衆居士溫恭足法慈善可風金布龍山穢地翻成寶地玉移紫岫凡心已合佛心痛先祖之手澤猶存鵲巢鳩占念後昆之門風不振鼓寂鐘沉是以飛翰下招重興上剎衲癡鈍無似譾劣不堪久倦梁津三卻西江之召諦思源本一開故里之爐百念寒灰諸緣嚼蠟但以諸公象駕遙臨自宜疾荷孤笻登龍門而聆至教先祖浮屠在是分當右繞三匝酌杯水以酬法恩尚俟解期肅遵嚴命伏祈台照不備所懷復仰山檀越伏以丹詔紫衣雨露曾沾於北闕柏臺章閣金湯久擅於南閩最可喜王臣歷歷堪稽獨奈何宗教寥寥不振恭惟衆護法望隆山斗學貫天人丘索典墳已窺其奧偏圜半滿兼徹其微扶洞曹之一枝四海欽聞虎嘯協孫子之三葉百里復錫鸞箋某慕藺有年瞻韓無自忽承鈞召亟擬鳧趨第以久客洪都謬承公卿之獎藉乍歸梓里益深風木之餘哀是以屢卻翠巖之招頻興天目之想且積煙與羅首磕額祖師面目宛然菡萏共優鉢呈祥龐老機鋒具在惟冀遴選實德勿采虛名庶副祖庭之休徵不辜群情之引領肅此辭謝無任主臣復燕溪李又蓁衆文學伏以絲浮緑水意注吞舟之鼇弩發丹崖機在衝霄之鳳所以周流列國為道求人立教固分三門歸元原無二致恭惟衆居士仙才超太白佛種續毗耶金粟翻身四海稔聞先太宰錦標入手萬家應見活如來憶對天曆之榴瓶已承寵顧再揮夜臺之珠淚復辱鴻招知按劍以無虞欣登龍而有自但以洪都道俗冒鋒鏑以相迎故里知交合邇遐而共挽且也雷門布鼓未敢輕敲而下里巴歌豈堪垂聽尚容杯土負竟勉挈逢場之竿雜冘掃清敬躡登山之屐肅此裁謝不既縷懷復南橋李龔吳衆文學伏以卜地建精藍洵大儒之宏願傾心求至道乃傑士之高風所以二尼之教並振華夷五宗之燈同聯緇白恭惟衆居士儒門師表梵苑干城乃武乃文已擅名於聖世若將若相將繼起於清時某不孝凡僧之尊者之神足再歸梓里圜先子之夜臺恨廬墓以非宜擬離鄉而弗忍適承雅召為我創蓼莪正愜鄙懷知君同須達奈以西江紳士四返相迎而黃巖弟兄千指同挽行藏用舍權衡固不由人先後始終舉措必須合法尚俟婉辭千里之使或可摳趨萬仞之門碧水丹山共新法王宮殿晨鐘暮磬偕宣少室宗風晤教有期縷懷不悉復仁溪王楊張衆檀越伏以玉兔下千溪五十三人皆知識金燈傳萬井一千七百半簪纓是知跡似雲泥心無黑白恭惟列位衆居士澤深智海掌耀神珠數萬甲兵不動而波旬潰旅八千子弟才呼而野豕潛蹤詢百里之干城為一鄉之巨擘所以遠邇寧謐雞犬無虞致澆俗於淳源保殘黎於亂地某親同梓里念切瞻韓辱華翰之下招喜登龍之有自但以久淹客路陟遙岵而崩心乍上夜臺對新碑而泣血念劬勞之未答五內如焚悲蒸嘗之無人雙眸欲瞽是以形骸頓稿飲食俱蠲尚容殘喘稍蘇挹清風於丹桂哀毀將節刊白字於青松更冀同心七姓合里千門不忘金口之叮嚀永作名藍之保障救人救雀定應獲銜環結草之酬知佛知儒自當踐紆金拖紫之域統此鳴謝不既所懷伏惟台照不宣復吉田陳鍾子衆檀越伏以傾蓋相逢道固資於目擊隔江趨去機愈妙於神交所以良驥追風不煩鞭影莫邪出匣待爐鎚恭惟衆居士才堪補袞德可傳燈斫額望他傑閣曾凌碧漢深心學佛高軒親到黃巖琴劍未升三雪堂行徑已同一宿覺某志學離塵慕道萍蹤同野鶴彊仕歸里思親雨淚類春溪報罔極以無門趨佳城而運甓忽承榮召感激良深奈翠巖已剪之藤枝逢春又發而白髮將殘之病骨無念不灰然同鄉同姓且同聲豈敢方命俟秋月秋風迓秋色或遂瞻韓則遠山木樨再撲分寧之鼻吉田瑞草同邀濟水之滋肅此辭謝不盡依馳復高陽本族衆居士伏以閩吳異域難忘恃怙之邦儒釋同宗每切塤箎之誼愧大風之未播思錫類以何從恭惟亞父諸兄及諸賢侄家聲克振浩氣元充竹林繼茂於高陽華萼聯輝於武嶺現居士現宰官久佩覺王之先囑居畎畝居廊廟無非金粟之後身某幼既孤貧長離鄉族托空桑而寄跡類野鶴之翱翔對風木而增悲灑皋魚之涕泗居諸易邁老大無聞升忉利之未能瞻山斗而倍切忽承寵召歸里弘宗益感殊恩敢方嚴命第佛誕屆期衲子駢至既添主法於紫雲復將弘戒於白月容竣一期之佛事趨布草載之闊悰五穀巖前團圞叔侄弟兄共唱無生之曲尚義堂畔相邀尊卑長幼同登不二之門率勒楮言伏祈台照統此鳴謝弗及另裁復廣州劉總戎伏以雲自無心常捧中天之日春如有腳能敷遍地之華草木承滋煙霞生色恭惟某居士才兼文武教洞釋儒即兩粵作毗耶變五羊為佛國衲景仰徒切芝晤末由適承華翰先施始知金容已現爐冶之力何殊淨飯重來寶座之敷不異燈王再借某自當伏迎虔吉道左瞻注東風懸知棨戟遙臨光揚西岫良晤有期神馳無息伏祈台照不宣復廣州劉司馬伏以海不揚波已見陶唐之化鱷無遺患重窺侯伯之誠緇素同歡古今共仰恭惟某居士仁風久播德望彌高鼙鼓聲中喚醒同袍興佛事干戈叢內頓令兆庶樂堯天誠聖代之孫吳禪門之韓富也欽羡欽羡翠巖法席章水名藍自鳩占以來久弗獲瞻三十二相龍興而後何幸復見丈六金身若非諸護法慨擲二千五百餘金焉得新如來遽升八萬四千寶座伏願指日高升羹調鼎鼐回機自悟齒叩春秋則青史與僧史同芳王化偕法化並振也江山迢遞晤對難期惟冀不忘十力之囑付廣培萬劫之津梁肅復不備統祈崇照不宣東天童林野和尚庚峰一別斗柄十移不謂法梁遽摧遂致天人靡恃恭惟法兄和尚道契鄮峰機投欈李寶華王之法座次補三升師子兒之雄威當陽一吼山川迢遞稱賀末由日月居諸神馳匪間某酸寒無似蠢笨不堪匿跡西山擬與亮公一賽出頭丹井敢同真老並驅念道法之夌夷西江為甚觀祖庭之蕪沒翠巖獨深由是冒昧承當展螂臂於轍下黽勉紹續耀爝火於日中然法乳恩隆捐軀莫報提攜義重滴水未將幾欲致瓣香於窣堵波前竟弗獲負鍬於玲瓏巖畔先師靈骨猶在小弟葵心逾堅敬遣二禪代躬一候粗布衲之薄獻略輪寸忱伊蒲塞之遙齎聊供萬指仰冀高提祖印大震雷音使僻壤遐方均聆妙諦劣蹄下質共步芳塵則曹溪之源流歷千古而不竭太白之苗裔遍塵剎以常存統冀慈光高垂鑒可復南峰來雲禪師伏以鏡水秦山從來飛鳥不度雲門石傘還他鐵骨堪掌詎意不毛之鄉疊荷如天之幬恭惟來公禪師機投胡餅派接新豐小老佛之稱七歲知名於閭里阿蘭若之勝六番標指於閩邦頑石既能點頭鵙舌亦應歡舞某爐中鈍鐵爨後焦桐出既無裨於法門退復有辜於罔極哀毀成疾百念頓灰食息不寧雙門久杜是以一刺未投於劍浦寸心徒耿於雲端忽承鈞命直揚九帶三玄深沐仁風披拂千巖萬壑但以支離病骨頗類孟八郎枯稿餘骸儼同元五斗儻乾城其未隱尚晤對以堪期方命之愆統祈原宥香積之惠飽德無涯草率奉復嗣容躬謝不備
