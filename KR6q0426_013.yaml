body:
  text: 嗣法門人傳我等編頌古世尊睹星燦燦疏星午夜晴閻浮幾箇獨惺惺老胡夢裏雖先覺無奈金沙翳眼睛世尊拈華直指拈華已自彎頭陀何事獨高攀而今覿露投機句萬象森羅盡破顏殃崛尊者救産難溪清白石出天寒紅葉稀山路元無雨空翠溼人衣七賢女遊尸陀林一女指尸云尸在者裏人向甚處去一女云作麼作麼諸姊諦觀各各契悟遂感帝釋散華云聖姊有何所須我當終身供給女云我家四事七珍悉皆具足唯要三般物一要無根樹子一株二要無陰陽地一片三要叫不響山谷一所帝釋云一切所須我悉有之若者三般我實無得女云汝若無此爭解濟人帝釋罔措遂同往白佛佛云憍尸迦我諸弟子大阿羅漢不解此義唯有諸大菩薩乃解此義三般皆滯貨不值半文錢堪笑七賢女賺殺散華天楞嚴經云若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍若執分別性鉢盂口上重添柄若離分別性掘地覓天還落阱二途不涉契無生覿體全彰明似鏡妍媸現時毫髮清胡漢不來光自淨絶是非泯凡聖龜毛端裏攝乾坤兔角杖頭行正令慶喜兄信不信滿握醍醐灌頂門何事夢憨猶未醒百丈禪師再參馬祖祖豎起拂子丈云即此用離此用祖挂拂子於舊處乃云你已後將何為人丈取拂子豎起祖云即此用離此用丈亦挂拂子於舊處祖震威一喝丈耳聾三日後黃檗聞舉便吐舌一喝西江水逆流惡聲從此播神州耳聾吐舌成何事笑倒雲門六不收百丈禪師每上堂有一老人常隨衆聽法一日獨留丈問立者何人老人云某非人也於過去迦葉佛時曾住此山有學人問大修行人還落因果也無某云不落因果遂墮五百生野狐身今請和尚代一轉語丈云汝但問老人便問大修行人還落因果也無丈云不昧因果老人於言下大悟脫野狐身江南塞北一毛頭鼙鼓何緣戰未休解用不須霜刃劍鉛刀拈出鬼神愁南泉禪師因東西兩堂爭貓兒遂提起貓兒示衆云道得即不斬道不得即斬卻也衆無對泉便斬卻拈起當機下一刀兩堂窮命悉難逃誰知箇裏乾坤闊百沸鐺中走活貓鹽官國師一日喚侍者云將犀牛扇子來者云破也官云扇子既破還我犀牛兒來者無對扇子破索犀牛可惜當機不解酬若是金毛獅子子攔胸便與一拳頭浮杯和尚因凌行婆問盡力道不得底句分付阿誰杯云浮杯無賸語婆云未到浮杯不妨疑著杯云更有長處不妨拈出婆斂手哭云蒼天中更添冤苦杯無語婆云語不知偏正理不識倒邪為人即禍生後有僧舉似南泉泉云苦哉浮杯被者老婆摧折一上婆聞笑云王老師猶少機關在澄一禪客逢見行婆便問怎生是南泉猶少機關婆乃哭云可悲可痛一罔措婆云會麼一合掌而立婆云跂死禪和如麻似粟一舉似趙州州云我若見者臭老婆問教口啞一云未審和尚怎生問他州便打一云為甚卻打某甲州云似者跂死漢不打更待何時連打數棒婆聞卻云趙州合喫婆手裏棒後僧舉似趙州州哭云可悲可痛婆聞乃合掌嘆云趙州眼光爍破四天下州令僧問如何是趙州眼婆豎起拳頭僧回舉似州州作偈云當機覿面提覿面當機疾報汝凌行婆哭聲何得失婆以偈答云哭聲師已曉已曉復誰知當時摩竭令幾喪目前機使盡機關用盡心無輸贏處話輸贏俊鷹不打籬邊雀黃鳥紛紛覓友聲丹霞禪師至慧林寺遇天寒取木佛燒火向院主訶云何得燒我木佛霞以杖撥灰云吾燒取舍利主云木佛何有舍利霞云如無舍利更取兩尊燒主自後眉須墮落不是風顛不是寒肝腸如火熱團團若非碧落浮雲盡爭見孤蟾出翠巒大顛禪師因韓文公問師春秋多少顛提起數珠云會麼公云不會顛云晝夜一百八公不曉遂回次日再來至三門見首座舉前話問意旨如何座叩齒三下及見顛理前問顛亦叩齒三下公云元來佛法無兩般顛云是何道理公云適來問首座亦如是顛乃召首座是汝如此對不座云是顛便打趁出院碧桃紅杏鬥芳菲蝴蝶尋春上下飛祇見落華吹莫雨不知春色在南支齊安禪師因僧問如何識得自己佛安云一葉明時消不盡松風韻罷怨無人如何是自己佛安云草前駿馬實難窮妙盡還須畜生行葉盡風停境寂寥巖前古木赤條條遊人更問途中事看取虛空背上毛臨濟禪師在黃檗會中時睦州為首座勉令問話濟遂去問如何是佛法的的大意聲未絶檗便打如是三度發問三度被打濟便辭檗檗令參大愚愚問甚處來濟云黃檗來愚云黃檗有何言句濟云某甲三度問佛法大意三度被打不知某甲有過無過愚云黃檗恁麼老婆心為你得徹困更來者裏問有過無過濟於言下大悟云元來黃檗佛法無多子愚搊住云者尿床鬼子適來道有過無過如今又道黃檗佛法無多子你見箇甚麼道理速道速道濟向愚肋下築三拳愚拓開云汝師黃檗非干我事盡道盧醫有異方誰知黃檗勝砒霜命根喪盡空拳在便把砒霜毒大唐黃檗禪師一日普請次臨濟隨後行檗回頭見濟空手乃問钁在何處濟云有一人將去了也檗云近前來共汝商量箇事濟近前檗豎起钁云祇者箇天下人拈掇不起濟就手摯得豎起云為甚麼卻在某甲手裏檗云今日自有人普請便回寺乳虎雖然氣食牛當機驗勘貴親酬果能倒握峰前钁隨處滄波下直鉤臨濟禪師在黃檗普請鋤地次見檗來拄钁而立檗云者漢困那濟云钁也未舉困箇甚麼檗便打濟接住棒一送送倒檗呼維那扶起我來那扶起云和尚爭容者風顛漢無禮檗便打維那濟钁地云諸方火葬我者裏活薶兩箇貓兒一箇獰通身牙爪任施呈扶持全得風顛力老漢而今快一生臨濟禪師一日在黃檗僧堂裏睡檗入堂見以拄杖打版頭一下濟舉首見是檗卻又睡檗又打版頭一下卻往上間見首座坐禪乃云下間後生卻坐禪汝在者裏妄想作麼座云者老漢作甚麼檗又打版頭一下便出去臥龍與鳳雛都盧在一罔海宇既澄清茅廬不須訪黃檗禪師因入廚下問飯頭作甚麼頭云揀衆僧飯米檗云一頓喫多少頭云二石五檗云莫太多麼頭云猶恐少在檗便打頭舉似臨濟濟云我與汝勘者老漢才到侍立檗舉前話濟云飯頭不會請和尚代一轉語檗云汝但舉濟云莫太多麼檗云來日更喫一頓濟云説甚來日即今便喫隨後便掌檗云者風顛漢又來者裏捋虎須濟喝一喝便出逆水興波是巨鼇盲鰍何事亦滔滔鉤頭已得吞舟物今古從他説價高臨濟禪師半夏上黃檗見檗看經濟云我將謂是箇人元來是掩黑豆老和尚住數日便辭檗云汝破夏來何不終夏去濟云某甲暫來禮拜和尚檗便打趁令去濟行數里疑此事卻回終夏復辭檗檗云甚處去濟云不是河南便歸河北檗便打濟約住與一掌檗大笑乃喚侍者將百丈先師禪版几案來濟云侍者將火來檗云不然子但將去已後坐斷天下人舌頭去在楔出楔機奪機疑不決去還歸虎須倒捋緣何事棒下從來有孝兒臨濟禪師一日謂普化克符二上座云我欲於此建立黃檗宗旨汝且成禠我二人珍重下去三日後普化問和尚三日前説甚麼濟便打三日後克符問和尚前日打普化作甚麼濟亦打至晚小參云有時奪人不奪境有時奪境不奪人有時人境俱奪有時人境俱不奪奪人不奪境煙昏昏復霧濛濛涿鹿貔貅有應龍斬卻蚩尤歸細柳軒轅從此代神農奪境不奪人咸陽庫藏既全封帝璽分明屬沛公不戮已降誠大度三章重約見英雄人境兩俱奪席卷山河數百州雄雄六國一時休蓬萊高誓渾間事肯著盧公入海求人境俱不奪垂衣而治是陶唐風不鳴條雨不傷如日如雲咸帝德萬邦何處弗歌揚臨濟禪師因僧問如何是真佛真法真道濟云佛者心清淨是法者心光明是道者處處無礙淨光是三即一皆是空名而無實有如真正學道人念念不間斷自達摩大師從西土來祇是覓箇不受人惑底人後遇二祖一言便了始知從前虛用工夫山僧今日見處與祖佛不別若第一句中薦得堪與祖佛為師若第二句中薦得堪與人天為師若第三句中薦得自救不了第一句驅盡耕夫牛奪卻飢人食夜半捉金烏晴空轟霹靂第二句間步出深村橫吹無孔笛點鐵悉成金還丹祇一粒第三句水煮乾蘆蔔一餐喫一碗不是懶逢迎臂長衫袖短三玄三要第一玄抬頭不見天萬里無寸草千峰月正圜第二玄靈符肘後縣當機才顧佇鼻孔一時穿第三玄猢猻夜簸錢燈籠才拍掌露柱便擎拳第一要秋山逢野燒颯颯露金風翩翩飛鐵鷂第二要殺活機輪票言下捉獰龍風前擒虎豹第三要隨流皆得妙霧起見龍吟風生聞虎嘯四喝有時喝似金剛劍海竭山崩天地轉一任銅頭鐵額來直下分身成兩段有時一喝如師子踞地咆哮百獸死凜凜威風遍界彰全力不施聲自美有時一喝如探竿淺深真贋辨何難主賓若自知時節把手相將笑未闌有時喝不作喝用鎮日喃喃口不動拈起新羅鷂子看卻是丹山五色鳳四賓主賓中賓子在陳思量起愁殺人賓中主子得母驀相逢不相睹主中賓降絲綸天之下盡吾臣主中主氣如虎正令行無佛祖臨濟禪師聞德山垂示云道得也三十棒道不得也三十棒乃令洛浦去問道得為甚麼也三十棒待伊打汝接住棒送一送看他作麼生浦如教而問山便打浦接住棒一送山便歸方丈浦回舉似濟濟云我從來疑著者漢雖然汝還見德山麼浦擬議濟便打賊賊摰電之機誰識得一支箭入紫雲端三十棒分華嶽色阿呵呵見也麼同風千里從來事路上行人蹉過多臨濟禪師示衆云我於黃檗先師處三度問佛法的的大意三度被打如蒿支拂相似如今更思一頓誰為下手時有僧出云某甲下手濟度與拄杖僧擬接濟便打萬仞崖頭跌一交通身粉碎沒纖毫起來獨立崖頭上推落兒孫是幾遭臨濟禪師上堂次兩堂首座相見同時下喝僧問濟還有賓主也無濟云賓主歷然復召衆云要會臨濟賓主句問取堂中二首座緑楊深處子規啼華滿支頭月滿溪玉女憑闌人共見不知嫂嫂是兄妻臨濟禪師將入滅謂衆云吾滅後不得滅卻吾正法眼藏三聖云爭敢滅卻和尚正法眼藏濟云已後有人問你向他道甚麼聖便喝濟云誰知吾正法眼藏向者瞎驢邊滅卻臨濟正法眼是甚破沙鍋瞎驢邊滅卻清光轉更多睦州禪師喚僧僧回首州云擔版漢喚轉頭來便云擔版𠟨利衲僧無處著眼照用並行兮電光輝機輪活潑兮有何限陳睦州陳睦州善鼓弄人何日休俱𦙆和尚凡有人參問唯豎一指有一供過童子每見人問事亦豎指人謂胝云和尚童子亦會佛法凡有問皆如和尚豎指胝一日潛袖刀子問童云聞你會佛法是不童云是胝云如何是佛童便豎指胝以刀斷其指童叫喚走出胝召童童回首胝云如何是佛童舉手不見指豁然大悟兒童學語亦堪憐何苦逢人結惡緣縱使一時遭毒手奈何十指不完全香嚴禪師上堂云若論此事如人上樹口銜樹支手不攀支腳不踏支樹下忽有人問西來意不對則違他所問若對又喪身失命當恁麼時作麼生即得時有虎頭上座出衆云樹上即不問未上樹請和尚道嚴乃呵呵大笑竹邊拾得蜣蜋彈樹上高縣瑪瑙盤南海波斯相見了呵呵笑得舌頭乾道吾禪師因趙州來豫著豹皮褌把吉獠棒在三門前等候才見州來便高聲唱喏而立州云小心祇候著吾又唱喏一聲而去吉獠棒豹皮褌小心祗候立三門不得潘郎低眼看奴奴賣俏是裝村大隨禪師菴側有一龜僧問一切衆生皮裏骨者箇衆生為甚骨裏皮隨拈草鞋覆龜背上僧無語卦兆才分事已彰吉凶何必再商量孫臏收卻門前鋪直使人人露賊贓德山禪師一日因飯遲拓鉢下堂時雪峰作飯頭才見便問者老漢鐘未鳴鼓未響拓鉢向甚麼處去山便低頭歸方丈峰舉似巖頭頭云大小德山不會末後句山聞令侍者喚頭來問你不肯老僧那頭密啓其意山來日上堂果與尋常不同頭於僧堂前撫掌大笑云且喜老漢會末後句雖然如是祇得三年後三年果遷化滯殼迷封也大差數聲羌笛為誰家至今三月桃華浪雷電轟轟送爪牙德山禪師一日謂巖頭云我者裏有兩僧入山住菴多時汝去看他怎生頭遂將一斧去見兩人在菴內坐頭乃拈起斧云道得也一下斧道不得也一下斧二人殊不顧頭擲下斧云作家作家歸舉似山山云汝道他如何頭云洞山門下不道全無若是德山門下未夢見在把住封疆水莫通將軍空自逞英雄饒伊起倒能生殺爭奈蠻王不展鋒巖頭禪師值沙汰隱為渡子凡見人來舉棹示之忽有婆子抱一孩兒來問呈橈舞棹即不問且道婆手中兒甚處得來頭便打婆云婆生七子六箇不遇知音祇者一箇也不消得便拋向水中祇者一箇也不消二月春風利似刀兩隻黃鸝鳴翠柳一行白鷺上青霄高亭禪師參德山隔江才見便云不審山乃搖扇招之亭忽開悟乃橫趨而去更不回顧一搖鞭影便橫趨不是追風天馬駒未動步前擒德嶠肯將形迹落江湖寶壽禪師開堂三聖推出一僧壽便打聖云恁麼為人非但瞎卻者僧眼瞎卻鎮州一城人眼在壽擲下拄杖歸方丈赤手全提入鬧藍是誰不受瞎驢謾無孔笛逢氈拍版一唱一和韻高寒雲門禪師因僧問達摩面壁意旨如何門云草七雲門草七達摩面壁若到翠巖拳打腳踢保福禪師問僧殿裏底是甚麼僧云和尚試定當看福云釋迦佛僧云和尚莫謾人好福云卻是你謾我又問飯頭鑊闊多少頭云和尚試量看福以手作量勢頭云和尚莫謾人好福云卻是你謾我又問僧汝作甚麼業得恁麼長大僧云和尚短多少福卻蹲身作短勢僧云和尚莫謾人好福云卻是你謾我楊子江心泛小舟隨波逐浪恣悠悠等間撒下漫天罔蝦蟹魚龍一并收罔中徒𨁝跳天外孰昂頭漁歌聲罷秋風冷萬頃蒼茫動客愁鼓山國師赴閩王請雪峰門送回至法堂云一隻聖箭直射九重城裏去也孚上座云待我勘過始得遂趁至中路問師兄向甚麼處去山云九重城裏去孚云忽遇三軍圍繞時如何山云他家自有通霄路孚云恁麼則離宮失殿去也山云何處不稱尊孚拂袖便回峰問如何孚云好隻聖箭中路折了也遂舉前話峰云奴渠語在孚云者老凍膿猶有鄉情在虎生三子必有一豹象骨巖高徒勞𨁝跳鵝湖禪師一日不赴堂侍者來請赴堂齋湖云我今日在莊上喫油餈飽者云和尚不曾出入湖云你但去問取莊主者才出門忽見莊主歸謝和尚到莊喫油餈喫得油餈飽未休旁觀證據有莊頭幾多受餓餈邊客滿口垂涎似水流明招禪師一日天寒上堂衆才集招云風頭稍硬不是汝安身立命處且歸暖室商量便歸方丈衆隨至立定招云才歸暖室便見瞌睡以拄杖一時趁下寒風吹不入暖室豈能藏可憐謙獨眼兩處錯商量翠巖可真禪師嘗參慈明因之金鑾同善侍者過夏善與語知其未徹叱之真因還石霜明問如何是佛法大意真云無雲生嶺上有月落波心明喝云頭白齒豁猶作者箇見解如何脫離生死真悚然求指示明云汝問我真理前問明震聲云無雲生嶺上有月落波心真於言下大悟腦後一槌百雜碎嶺雲溪月兩悠悠解醫何必需參桂鴆毒投來病亦瘳翠巖文悅禪師初參大愚芝芝問來何所求悅云求心法芝云法輪未轉食輪先轉後生家趁色力健何不為衆乞食我忍飢不暇何暇為汝説禪乎悅不敢違未幾芝移席翠巖悅納疏罷復過翠巖求開示芝云佛法未到爛卻天寒宜為衆乞炭悅亦奉命能事畢復造方丈芝云堂司乏人今以煩汝悅受之不樂恨芝不去心地坐後架桶箍忽散自架墮落忽然開悟頓見芝用處走搭伽黎上寢堂芝迎笑云且喜維那大事了畢海若幾回愁渴殺卻從河伯覓蹄涔忽然踏著來時路始覺通身浸碧潯翠巖璣禪師因張無盡丞相過訪問如何是翠巖境璣云門近洪崖千尺井石橋分水繞松杉張深喜之門近洪崖井上安尊官已被老僧謾而今若問山中境向道雙溪月一團五祖演禪師因白雲忌日示衆去年正當恁麼時多前年三件事今年正當恁麼時多去年七件事此十件事數不過者甚多何也去卻七三存一事是去年説是今日急如箭黑如漆無言童子口吧吧無足仙人劈胸躍乃云交今年七共去年三古廟香爐過海南踏斷蒼龍頭上角霏霏煙雨出澄潭圜悟禪師上堂舉僧問雲門如何是諸佛出身處門云東山水上行若是天寧即不然設問如何是諸佛出身處但向道熏風自南來殿閣生微涼時大慧在座下聞舉大悟日出巖房暖風來殿閣涼翛然行復坐正體露堂堂大慧禪師嘗握竹篦問僧云喚作竹篦則觸不喚作竹篦則背不得有語不得無語僧擬議慧便打南蠻鼙鼓喧無極北狄旌旗拂未闌巨闕一揮天下定堂堂擺手出長安大慧禪師一日遣謙上座通張無垢書謙云我參禪二十餘年無入頭處更作此行決定荒廢意欲無行友人宗元者叱云不可在路便參禪不得也去吾與汝俱往謙不得已而行在路泣語元云我一生參禪殊無得力處今又途路奔波如何得相應去元云你但將諸方參得底悟得底圜悟妙喜為你説得底都不要理會途中可替事我盡替你祇有五件事替你不得你須自家支當謙云五件者何事元云著衣喫飯屙屎放尿馱箇死尸路上行謙於言下領旨不覺手舞足蹈一道神光亙古不昧本自圜成何須特地卓爾獨彰兮誰悟誰迷坦然無事兮何難何易飢即餐倦即睡自家妙用誰能替一自同參點破歸至今不負娘生鼻翠巖守真禪師通嗣法天目禮書禮上堂云洪崖井邊翠巖寺裏山遮半月江礙斜陽不是諸佛眼睛亦非祖師巴鼻召專使云會麼歸去滕王閣上卷起珠簾看取十八灘頭煙波鼎沸煙波鼎沸幾時休法乳皆從太白流誰謂老真無一字山遮半月古今幽高峰禪師因雪巖問日間浩浩作得主麼峰云作得巖云睡夢中作得主麼峰云作得巖云正睡著時無夢無想無見無聞主人公在甚麼處峰無對一日因枕子墮地作聲忽大悟乃云如在羅罔中跳出夢想見聞俱坐斷主人面目甚分明不因枕子敲殘月爭得殊方定太平千巖長禪師因僧問如何是祖師西來意巖云野馬入牛闌達摩未來時如何巖云在西天來後如何巖云在東土野馬入牛闌踢踏任君看西天并東土當央受熱謾忽然謾不得撞頭磕額乾坤窄九曲慶祥禪師因僧問險惡道中以何為津梁祥云以此為津梁僧云如何是此祥云築著鼻孔險中以此為津梁劍樹刀山信步行築著鼻頭猶不會覆盆休怪月無光唯菴然禪師上堂衆才集菴顧視左右云分明記取便下座和麩糶麵老唯菴醜態全彰面不慚若是久經行市客禪床好與便掀翻海雲簡禪師參中和璋問某甲不來而來作麼生相見和云參須實參悟須實悟莫打野榸雲云某甲因擊石火迸散乃知眉橫鼻直和云吾此處別雲云如何通信和云牙是一具骨耳是兩片皮雲云將謂別有和云錯雲便喝云草賊大敗和休去死款供來猶似鈍生機拶出始驚人衝開百匝漫天罔玉轉珠回著著親笑巖禪師一日於金沙灘陽濱塌地而坐二僧侍側時忽見一沙門執錫緣濱而來貌古奇雅逼前卓立朗聲問云仁者可識從上相承密論密義不巖云密則非論論則非義門退後一步以錫橫肩上翹一足云是甚麼義巖於地上書一更字門以錫畫地一畫闊兩脛立上復以錫橫按腹上亞身而視云是甚麼義巖於地上書一嘉字門卓錫地上以兩手叉腰翹一足切齒怒目作降魔勢云是甚麼義巖於地上書一之字門分手指天地復旋繞一匝云是甚麼義巖於地上書一尢字門進前一步叉手作女人拜復分手指侍僧云是甚麼義巖於地上書一蠶字門旋繞三匝於前作禮立於巖右巖於地上書一字云會麼門擬進語巖云設到此地更須知有者箇時節始得門忽歡喜合爪歎云咦真摩訶衍薩婆若上士耶乃作禮浩然而去侍僧皆驚喜罔測問云彼是何所沙門所為復何義耶巖良久云還識此人不俱云不識巖云此是應真賢聖所呈乃金剛王變相三昧及三昧王三昧用來勘吾然彼亦將有新證大義離言説最密而最顯激揚向上機須具超方眼紛紛變相辦來端一一分疏珠走盤珍重巍巍穿耳客魔佛應知一體觀金剛王三昧王分明觸處露堂堂龍池傳禪師因僧問如何是奇特事池云蝦蟆捕大蟲僧云恁麼則不奇特也池云貓兒捉老鼠僧禮拜池便喝一句已彰奇特事三玄何待更安排禪和縱爾承當得電火光中又活薶僧問雲門如何是諸佛出身處門云東山水上行又僧問龍池如何是諸佛出身處池云西河火裏坐東山水上行赤腳波斯入大明西河火裏坐焦尾大蟲當路臥潦倒放癡憨不知成話墮不話墮鬼面神頭能幾箇咦壽昌經禪師上堂云臘月三十日年年即有之要似今朝夜世間是罕希大衆且道今夜有甚長處一僧云殘雪方開徑春風送客歸昌云未在僧云和尚作麼生昌云汝不鑑乎僧云公孫遺布被大禹衣輕裘昌云鑑猶未真在年去年來元不變華開華落盡春風要知此夜何長處石女樓邊撞曉鐘雲門澄禪師因僧問如何是法身門云背倚秦望山如何是法身向上事門云有口道不得僧云道了也門云好狗不逐塊背倚秦望山腳踏滄溟水覿面為君通銀盆盛雪子天童本師悟和尚二十七歲在俗上山作務見積薪有省年三十棄妻出家祇覺生死到來畢竟不穩當每請益龍池池唯加罵詈至三十七歲池命監院事一日自城歸過銅棺山頂豁然大悟忽覺情與無情煥然等現趨見池呈所得池印之拾得驪珠百草頭盧公活計已風流無端踏碎銅山頂秦楚封疆一筆勾龍池師翁一日喚本師和尚入室云老僧昨夜起來走一回把柄都在手裏了汝當為我扶持佛法尚云若據某甲扶佛法任他都來總與三十棒莫道分明為賞罰池休去鐵牛生下石師兒一吼寰中百獸危家計不須分付得爪牙今已利如錐僧問本師和尚如何是奪人不奪境尚云百萬軍中斬顏良如何是奪境不奪人尚云取了荊州放魯肅如何是人境兩俱奪尚云殺卻陳友諒并吞數十州如何是人境俱不奪尚云當今天下太平國王萬歲進云料揀已蒙師指示全提向上事如何尚以拄杖連擉云退去退去宗旨分明為舉揚箭鋒相直豈尋常可憐逐塊韓盧子猶把虛空較短長僧問本師和尚如何是三寶尚云一頓糊餅兩頓粥云不問者三飽尚云老僧日日奉持梵語唐言字不同未經翻譯兩難通東風昨夜枝頭發吹出山華片片紅石簣陶會元參本師和尚問弟子久於此事留心何以迥無入處尚云居士即今在什麼處陶云有何方便令得入否尚涌身云但恁麼入陶欣然作禮日日黃金殿上行不知身在九重城忽聞環珮丁當響始覺頭頭奉聖明僧問本師和尚如何是禪尚云一棒打得髑髏穿云更有問時如何尚云足方頭頂圓云更有問又如何尚云口裏舌頭鑯云更有問又如何尚打云你若喚作禪入地獄如箭射滔天沃日未為闊浸爛虛空始是深堪笑不毛山裏漢頻將折箸探滄溟元公黃司理參本師和尚問風清月白時如何尚云大家在者裡黃云弟子有時做到風清月白時候有時做到山崩海裂時候畢竟那頭是尚云總不是黃云如何即是尚便打黃釋然作禮十里涼亭五里橋桃華落盡李華飄可憐未到家鄉日西望長安路轉遙錢相國參本師和尚問如何是如來大意尚云居士今日從甚處來錢云從人行過底路來尚云恁麼則不如來了錢從此領旨玉殿沉沉絶往還六臣何處覲龍顏一回指出曹溪路千古名喧太白山居士問本師和尚如何是無上菩提道尚云俗人頭戴僧官帽露柱進燈籠裏立烏雞向白雪中飛未曾親入天童室誰識全提玄要機居士問本師和尚持咒念佛還了得生死不尚云了不得云畢竟如何了得尚打云向者裏會得便了云和尚還有生死不尚云你若有時我也有你若無時我亦無丹砂洞內訪神仙問盡仙方丹未傳卻向仙家尋玉婦笑看秋水對長天
