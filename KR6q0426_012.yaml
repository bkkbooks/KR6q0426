body:
  text: 嗣法門人傳我等編問答機緣僧問如何是賓中賓師云十扣朱門九不開如何是賓中主師云滿身風雪又歸來如何是主中賓師云入門懶睹妻兒面如何是主中主師云撥盡寒爐一夜灰賓主已蒙師指示向上宗乘事若何師云腳跟下痛與三十棒問如何是死句師云嘉州大象陝府鐵牛如何是活句師云陝府鐵牛能哮吼嘉州大象念摩訶問杲日當空無所不照為甚者邊有那邊無師云闍黎且莫認影問如何是藏身處沒蹤迹師云月落潭無影如何是沒蹤迹處莫藏身師云雲生山有衣問趙州道佛之一字吾不喜聞是如何師云一翳在眼空華亂墜問法身畢竟是有相是無相師云背陰山子向陽多問丹霞燒木佛意旨如何師云因風吹火用力不多院主眉鬚落又作麼生師云不因夜來雁爭見海門秋問如何是收師云笛樓霜夜月如何是放師云玉殿笑春風如何是收中放師云池暖冰先化如何是放中收師云菊敷天漸寒問如何是本來面目師云階前石磉盤僧禮拜師云看看磉盤動也問如何是應無所住而生其心師云八角磨盤空裏走僧呈偈有寒潭不是養龍窩之句師問即今龍在甚麼處僧便喝師云好一喝僧擬議師便打云某甲以良久對師云寒潭不是養龍窩僧禮拜問正睡著時無夢無想無見無聞如何是大用現前底句師云行到水窮處坐看雲起時山子均可二居士遊羅漢壇歸師問羅漢將何款待二公士無語師代云滿谷白雲一天風月居士問依經解義三世佛冤離經一字即同魔説畢竟如何師云居士喚甚麼作經云穿衣喫飯師云錯後有僧問如何是經師云一字不著畫問父母未生前請師道一句師云明月正當空云不會師云片雲迷遠岫雲津楊孝廉問達摩面壁意旨如何師云倚天長劍逼人寒云雲門道草七又作麼生師云多年曆日云人人有箇不滅真性未審在甚麼處師便打僧箍桶次師問參禪須要打破漆桶你為甚麼卻箍起云有時恁麼有時不恁麼師不肯乃代云且圖大家受用僧請益唐玄宗斬畫像因緣師云你試道看云惱亂春風卒未休師云山僧即不然云師意如何師云金風吹一葉萬樹盡皆秋問久嚮西山一日出一馬蹄金特來借些用師便掌云謝布施師云你作麼生用僧無語師復掌云死漢師問麟上座云麒麟為甚麼祇有一隻角云築著磕著師不肯乃代云唯我獨尊無念教道人參師問莫謂無心云是道無心猶隔一重關且道是那一重關道人無語師代云富嫌千口少師問衆露柱舞春風是第幾機衆無語師代云淡煙籠碧岫細雨溼蒼苔問如何是本來面師云爛泥團云擊碎後如何師云你向甚處下手僧擬議師便打甘行者做稻場次問如何是道場師云寸草不生問南泉斬貓意旨如何師云萬象森羅盡陸沉趙州戴草鞋出又作麼生師云山盡疑休去峰高又起來問萬法歸一一歸何處師云紅爐飛片雪師一日至養牛窩看終南上座因問牛作麼生養云請大師道師云遇茶喫茶遇飯喫飯云弟子持觀音經常疑一段義經中道若有罪若無罪杻械枷鎖撿繫其身有罪且置無罪為甚麼也撿繫其身師云臥龍最怖碧潭清云此是禪機未審教意作麼生師云自有三乘座主在問不離當念時如何師云猢猻繫露柱居士問弟子做工夫有時祇要殺人是如何師云試借刀看士擬議師便打問弟子紅塵中人未審還做得此事不師云甚麼事云本分事師云何用更做云如何是萬象之中獨露身師云火裏鐵牛行問圜通拄杖即不問如何是天童法乳師便打云大師原來作者樣見解師云你又作麼生僧便喝師復打云你原來也作者樣見解又問百丈再參意旨如何師云大洋海底火燒天云恁麼則木人驟步上台巔師云且喜沒交涉云法燈道他家自有兒孫在意作麼生師云家無小使不成君子云某甲從今向異煩中行去也師云放汝三十棒僧禮拜師問一老宿聖凡兩絶底人因甚牽犁抴耙云種田博飯家常事師云不是飽參人不知云請大師代語師云不風流處也風流問古人云你若坐我須立你若立我須坐意旨如何師云賓主歷然云除卻賓主又作麼生師云切忌向鬼堀裏作活計問如何是祖師西來意師云夜深天寒明早向汝道問如何是衲衣下事師云炎天不著褲如何是法身師云皮裏骨埋菴師舉洞山好佛祇是無光話問師作麼生師云爛泥中有刺云還在羅山分上洞山分上師便掌云未在更道師又掌菴亦掌師云你者掌落在甚麼處云爛泥中有刺師云且喜放光也問如何是諸佛出身處師云搕𢶍堆頭熏風自南來又作麼生師云舌拄上齶問熏風自南來殿閣生微涼意旨如何時值版鳴師云山僧騎佛殿過齋堂去也僧欣然作禮問猛虎以肉為命為甚不食其子師云石筍暗抽條如何是虎子師云眼橫鼻直問如何是五家宗旨師云姑蘇城外寒山寺黃鶴樓前鸚鵡洲如何是第一玄師云夜半金烏掌上圜如何是第二玄師云紅爐釣得赤鮹還如何是第三玄師云胡僧雙耳帶金環如何是第一要師云鐵錘無孔竅如何是第二要師云孤雁鳴煙島如何是第三要師云拾得遇寒山拍手呵呵笑三玄三要蒙師指一句全該事若何師云一棒一條痕一掌一握血云祇如天童三峰臨濟的嗣因甚舉揚宗旨各各不同師云師子咬人韓盧逐塊僧鼓掌三下便行師隨後打三棒埒彝薑孝廉和亮公洞詩有法界威光從此徹之句師云如何是法界威光云請大師道師云覿面不曾藏問如何是正眼師云金州漆師復問僧如何是正眼云爍破乾坤絶點塵師指階前石云者箇喚作甚麼云石頭師云又道絶點塵問牛頭未見四祖時如何師云茅屋畫麟門見後如何師云懸崖生石耳師一日至園中問僧諸法真實相不生亦不滅如何是真實相僧舉菜葉師云如蟲蝕木僧禮辭師問那裏去云某甲受業師已歸空師云空歸何所僧無語師便打僧舉汾陽頌古云一般叩齒叢林異出院韓公始得間師問首座出院因甚韓公得間云不會請和尚指示師云斬草蛇頭落新到參師問擔囊負鉢來何所求云並無所求師云既無所求來作何事云自己亦不少師云將出你不少底來看僧一喝師便打問既是金剛經為甚被蟲蛀破師云若不蛀破爭見金剛師垂問遍體綾羅非是衲僧行徑寸絲不挂未為作者風規離此二途轉得一機相契山僧與伊一腰褌一僧云掬水月在手弄華香滿衣師便與師問僧狗子無佛性話作麼生會云趙州何曾有此語師云你甚處見趙州僧擬議師便打問四賓主還有分別也無師云榑桑夜半日頭紅如何是賓中賓師云盡日尋春不見春如何是賓中主師云芒鞋踏破嶺頭雲如何是主中賓師云歸來笑捏梅華嗅如何是主中主師云春到枝頭已十分云除卻賓主還有向上事也無師便打師問僧一向作甚麼云學法華經師云經中道今佛放光明助發實相義如何是實相僧無語師顧春侍者云你道如何是實相云今日肩頭疼師休去四僧參師云同行耶云不同師云既是不同行為甚卻同到云一箇鼻子兩孔出氣師云有箇無鼻孔漢汝還知麼僧無語師便打復問汝從那裏來云廬山來師云五老峰為甚倒卻僧無語師云謾我師問僧撥草瞻風祇圖見性即今性在甚麼處云不離方寸間師云方寸敗壞時如何僧無語旁僧云遍界不曾藏師舉杯云者箇喚作甚麼云喚作一物即不中師云世尊拈華又作麼生云不會師云又道遍界不曾藏實際參師問如何是實際云綿密不通風師云你那裏得者消息云曾經霜雪苦師云腳跟下親切道一句看云步步踏實地師云好與三十棒誦戒次師問經中道若遇餓虎狼師子一切餓鬼悉應舍身肉手足而供養之然後一一次第為説正法既是身肉手足都舍了又將甚麼説法僧云皮膚脫落盡唯有一真實師云如何是一真實云遍界不曾藏師休去問那吒太子析肉還母析骨還父乃現本身為父母説法未審如何是本身師云片葉飄庭際西風萬里秋茶次問用處不換機請師速道師云者箇是瓜子洞山專使馳書至師啓緘見書中云祖道垂秋法多姦弊遂問專使祇如法中姦斃作麼生除得云不會師云你問我與你道云某甲不會問師云舉話也不會使禮拜師打云且喜姦斃已除了也僧參師問那裏來云東山來師云在東山作甚麼云作書記師以如意打圜相云者箇是甚麼字云不識師云者箇字也不識如何作得書記僧禮拜師便打師落堂垂問衣裏有珠即不問堂中無佛時如何一僧云天上天下一僧從東過西從西過東師不諾歸方丈問春侍者你作麼生會云我者裏容他不得師休去問千里特來呈舊面請師方便一提攜師云新羅原在海門東云恁麼則相逢無主伴萬里絶塵埃師云莫將魚目作明珠師一晚落堂隨衆坐香畢起身繞堂一匝豎起如意云祇者是便出次日有僧進方丈云承師有言祇者是未審是箇甚麼師便打師入堂見一僧經行師云衆人皆睡你為甚在者裏打之繞云放不過師云放不過底是甚麼云此事師云如何是此事僧擬開口師便打僧禮拜師又打一僧胡跪佛前師云更深夜靜跪在者裏做甚麼云遣昏沉不開師云你即今不昏沉也在者裏做甚麼僧無語師打云何得話頭都忘卻春日大雪次師垂問但得雪消去自然春到來即今春已到為甚雪轉深一僧云竹密不妨流水過一云官嫌千口少師皆不諾一云不妨錦上更鋪華師深喜之問入門須辦主端的請師分師云子規啼處百華香辦後如何師云大地盡皆春德侍者作禮拈兩條坐具師云別人祇是一箇你為甚卻有兩箇云和尚莫作兩箇會師云你又作麼生者擲下一具師云依舊是兩箇問弟子工夫聲未絶師便掌僧擬進語師連掌云者漆桶有甚麼屎工夫快拈大棒來僧便走師有偈云泥不濁兮水不清獨清須是解騎聲因問衆聲作麼生騎一僧云試聽簷頭水點點滴舊痕師云忽遇天晴時如何云舊痕猶在師云癩馬繫枯樁又僧請代師云常憶江南三月裏鷓鴣啼處百華香誦戒次師垂問經中道一切地水是我先身一切火風是我本體圜覺又道一切衆生妄認四大為自身相者裏合作麼生體會一僧云達得真常理身心合太虛師云如何是真常理僧下語不契因請代師云地水火風問承師有言拈得翠巖無柄杓卻是曹溪古鉢盂如何是古鉢盂師便打云因甚無柄師云無汝摸索處云恁麼則世出世間希有事顯發須憑過量人便禮拜師與一踏云者箇是甚麼云好一腳師云亂道問弟子領了話頭兩年並無得力處乞師指示師云你當初將甚麼去領話頭云某甲愚蠢望垂慈悲師打云者箇元不愚僧復求話頭師云更嫌鉢盂無柄那僧患癤師問僧如何是金剛不壞身云密密清楚悄然機師云未在僧理前問師云臀邊一箇大癤兒周思永居士問本來無物教弟子如何究心師云剎竿頭上舞三臺士沈師云會麼云説得即不是師云道火何曾燒著口問如何得超終始之患師云那邊不坐空王殿爭肯耘田向日輪問如何是門裏出身易師云低頭不見地如何是身裏出門難師云春色滿江南如何是回互師云上無衫下無褲如何是不回互師云鳥自啼華自吐秀才問如何是法身師云鬚髮白如銀云死了燒了畢竟向甚處相見師云待山僧有舌頭即向汝道問如何是不住於相而行布施師云十二處忘間影響三千界放淨光明天童和尚忌日師垂問今日是先師十周忌若道先師已滅度是謗先師若道先師未滅度亦是謗先師作麼生得不謗去一僧云離此二途請師別道師便打僧歸位師云何不進語云箇箇飽齁齁師云直須吐卻又僧云有相皆不是無相亦非真識得天童面七月七立春師云你那裏卜度得來云和尚不妨疑著師云我疑且置闍黎又作麼生僧便喝師便打師一晚落堂連聲云了了見無一物一僧云山河大地聻師便出堂一晚落堂舉子湖半夜入堂喊云有賊你們快些起來一僧才出湖便擒住云賊在者裏了僧云不是湖云是到是祇是你不肯承當師云子湖老漢可謂射虎不真徒勞沒羽翠巖堂中莫有真賊麼一僧云一場敗闕師云是者僧敗闕是子湖敗闕僧復云敗闕師打云卻是你敗闕問把住在者裏無纖毫異念時如何師云猢猻繫露柱僧沈吟師打云繫殺了也問一念不生前後際斷時如何師云你曾作甚麼來云天上天下唯我獨尊師云那箇是獨尊底僧豎指師便打僧呈偈有萬象森羅露真容之句師問如何是真容云雪後始知松柏操師云松柏亦是萬象畢竟如何是真容云全機獨露師云露後如何云法外無心師便打問盡夜貓兒腳不停時如何師云亂走作麼云還許他捉鼠也無師云不許云為甚不許師云無你著力處問耀古騰今即不問天翻地覆時如何師云待虛空粉碎來向汝道云粉碎後如何師云耀古騰今云既是耀古騰今為甚麼要虛空粉碎師云不因夜來雁爭見海門秋問疑情頓發時如何師云萬里一條鐵云本來成現事何故最難明師云演若迷頭心自狂新到參師云隨喜耶求住耶云悉憑和尚師云不許住不許去僧無語知客云謝和尚安單師休去問學人上來請師賜棒師云不打死漢問二六時中如貓捕鼠為甚不知安身立命處師云老鼠已走卻了也僧佇思師打云向道走卻了又思量箇甚麼問學人初到此間乞師指示師云何時到此間云去年到師云到即不點云乞師指示師打云又説去年到師問僧如何是無位真人云千聖不識師云無位真人還有身也無云掬水月在手弄華香滿衣師云前三三後三三又作麼生僧擬議師便打問東山水上行意旨如何師云牛頭尾上安云殿閣生微涼又作麼生師云前三三後三三云如何是諸佛出身處師便打問昔日聞風今朝覿面覿面一句請師分付師云棒打石人頭問人人腳跟點地各各鼻孔遼天因甚有凡有聖師云但得不亡羊何須泣歧路云兩頭俱不涉一劍倚天寒師云你劍在甚麼處云拄杖邊薦取師打云何曾夢見師一晚垂問白日青天即不問你三更半夜道將一句來衆無語師代云眼似眉毛師垂問懸崖撒手自肯承當絶後再穌欺君不得絶後再穌即且置如何是縣崖撒手底句衆無語師代云阿師因題天童先和尚贊云我雖腳下兒自慚百不像乃問衆既是百不像爭做得他家兒孫一僧云曹溪波浪如相似無限平人被陸沈二僧參師問那裏來云百丈師云時中如何用心云看念佛是誰師云不念佛底是誰云不會師云不會底又是誰云不會不會師打云直饒你不會也未免喫山僧手裏棒又問次僧你到者裏做甚麼僧默然師云禪和不開口諸佛難下手山僧卻下得手便打獨尊上座為師慶壽請上堂師問教中道本來無有世界衆生因妄有生既是妄生何足稱慶一僧云移華兼蝶至買石得雲饒師休去問圓通不開生藥鋪單單祇賣死貓頭如何是死貓頭師云黃連甘草云不會師云抴出死貓著徐居士問學人登山涉水請師弘法為甚麼不允師云從來不出戶進云大唐險峻不比翠巖馬大師到此出手不得未審和尚如何出手師云已踏殺天下人了也進云色身朽壞如何是堅固法身師云水緑山青士云暗點飛龍馬草裏出頭來橫行三界外萬古絶塵埃師云夢裏惺惺士禮拜問師子是百獸之王為甚被文殊騎師云水流濕火就燥問春雪冬雪俱不問如何是古雪師云一條界破青山色問春日溫夏日熱未審佛日如何師云春溫夏熱淡庵莊內翰問無生之體在什麼處師云不離動用間又云見性成佛畢竟性在何處師舉茶杯云見麼莊云信手拈來頭頭是道師云祇如南泉斬貓又作麼生莊云請師道破師云推倒西山即向居士道莊罔措通夕不寐次晨師問昨夜公案作麼生莊云虛空粉碎一切不留師休云師問觀首座泗大聖因甚在揚州出現觀云無鬚鎖子兩頭搖又問蓮首座蓮云有利無利不離行市又問一僧僧云南山起雲北山下雨師云不是不是師落堂問僧整日整夜者樣走為甚踏不著自家田地僧云無下足處師云如何是自家田地僧云踏著即禍生師休去師一日問僧喚作竹篦則觸不喚作竹篦則背畢竟喚作甚麼僧云某甲喚作無根樹師云如何是無根樹僧云從來不開丫師云我道春至便開華師問僧如何是如如體僧云衣寶不曾藏師云卸卻衣時寶在何處僧云舟行岸不移師云如何是真實相僧云門外鉢盂今古傳師云好與三十棒師問僧黃檗為甚打臨濟三頓棒僧云直至如今痛未休師云臨濟死去多少年為甚至今猶痛僧云阿耶耶師便打垂問釋迦峰峻洪井源深畢竟是誰親到石鐘石磬晝夜喧闐因甚不聞其聲團圞一鉢常在目前因甚拈掇不起果熟香飄大家共享為甚雷偏護橘入室師問僧大顛打首座意旨如何云倚勢欺人師云晝夜一百八又作麼生云切忌當頭道著師云一般叩齒為甚擯出首座云若不擯出爭得文公悟去師云忽若問你春秋多少又作麼生云向道今年四十一師云何異流俗阿師云一任分別師云爭奈文公何問僧一口吸盡西江玉浪復從何起云沒溺天下人師云溺即不無浪從何發云好箇問頭師云青州布衫又作麼生云是甚間家具師云如何是下載清風云朔風凜凜骨毛寒師云未在且去問僧如何是涅槃心云大地無寸土如何是差別智云萬派皆歸海前三三後三三又作麼生僧擬議師便打問僧你向來用底火杈呈似山僧看僧豎指師云道得也杈下死道不得也杈下死道不得且置道得為甚也杈下死云知恩者少負恩者多師云祕魔老漢即今在甚麼處云作麼師云者是祕魔底奴子如何是祕魔底正主僧禮拜師云更參三十年問僧庭前柏樹子意旨如何云盡大地風颯颯師云先師無此語又作麼生云用處最親切師云懷州牛喫禾為甚益州馬腹脹僧擬議師便打問僧野渡無人舟自橫時如何云某甲親到者裏師云死了燒了向甚處與山僧相見云向不生不滅處與和尚相見師云未在云和尚又作麼生師便打問僧如何是正體云覿面更無私如何是妙用云遇茶喫茶遇飯喫飯體用互呈時如何云萬派皆歸海千山必仰宗便禮拜師亦打入室畢復問雪覆千山因甚孤峰不白一僧云從來不與衆為鄰一云蓋覆不得師休去問僧如何是第一座僧呈座具師云此是第二座云直下來也師云未在更道云和尚又作麼生師便打云者箇便是第一座麼師云莫錯認僧禮拜云謾某甲不得也師云死了燒了畢竟向甚處與山僧相見云幾回零落盡又見長新條師休去問僧如何是堂中主云逼塞乾坤如何是主中主云橫按莫邪無伴侶師云未在云和尚又作麼生師云打殺釋迦趁出彌勒問僧如何是法身云頂天立地如何是法身向上事云明月松間照清泉石上流問僧既是歷歷分明因甚不聞云綿密不通風如何是前三三云團圞無縫罅如何是後三三云何處不風流師云你明日砍柴時不要被葛藤絆倒僧入師云一向不曾打得你今晚要痛打一頓便打僧亦打師連棒打出僧良久復入師對衆云叵耐者僧膽大打山僧明日要擯他出院云和尚莫作打會好師云你又作麼生云知恩報恩師休去
