body:
  text: 萬安龍德院嗣法門人傳我等編住洪都翠巖寺語録山門俗氣都銷盡斯門頓豁開一回親得入萬古絶塵埃佛殿巍巍堂堂輝輝煌煌睹聞莫及聲色全彰既是聲色全彰因甚睹聞莫及海底金烏天上日據室此是從上諸祖為湖海衲子抽釘楔解黏縛底去處哲上座到者裏如何施設七尺烏藤為君決衆護法宰官居士及諸山耆舊等請開堂拈疏百千法門無量妙義盡被諸大護法向毛錐子上漏逗了也諸人還委悉麼其或未然卻請維那宣讀法座高而無上仰不可及要識須彌燈王步步同行同陟遂升拈香此一瓣香尊貴中尊貴奇特中奇特爇向爐中專為祝延今上皇帝聖躬萬歲萬歲萬萬歲伏願道高堯舜德邁羲軒兵革頓銷還同揖讓之世漁樵樂業時聞擊壤之歌次拈云此一瓣香本自現成豈從人得八載執侍巾瓶一旦親蒙密印幾度狂風吹八面不曾移易一絲毫今對人天衆前信手拈出爇向爐中專伸供養明州天童堂上傳曹溪正脈第三十四世上密下雲先和尚用酬法乳之恩斂衣就座維那白椎云法筵龍象衆當觀第一義師隨聲便喝云還觀得麼恁麼觀得方為正觀若他觀者名為邪觀久參宿學未舉先知匹馬單刀便請相見僧問祖庭復振海衆雲臻拈椎豎拂即不問重續翠巖舊機緣一句作麼生舉揚師云石鐘石磬一齊鳴進云恁麼則雲卷千峰碧溪流萬派新師云且得闍黎共證明問翠巖久據紅塵客師今重整舊家風如何是破沙盆底意旨師云七華八裂進云恁麼則燈燈續焰聯芳久祖祖宣揚舌廣長師云未到闍黎在進云古人道此事如秋潭月影靜夜鐘聲猶是生死岸頭事超生脫死一句作麼生道師云紅爐焰裏浪滔天進云恁麼則斫卻月中桂清光何處無師云且莫詐明頭僧禮拜師乃云祖庭既復四海同歡祖令當行千差坐斷直得如天普蓋如地普擎如風普吹如日普照無一絲毫滲漏無一絲毫囊藏無一絲毫塵埃無一絲毫間斷淨裸裸露堂堂清寥寥白的的僧也如是俗也如是凡也如是聖也如是到者裏一道平等浩然大均人人懷滄海之珠箇箇抱荊山之璧溪光野色共演真常月渚風柯時談般若石鐘石磬恆鳴劫外之音山鉢山松獨聳雲中之秀塵塵爾剎剎爾念念爾法法爾無一法不是真乘無一念而非佛事無一剎不是佛剎無一塵不是祖師所以道一入信門便登祖位翠巖如此告報已是撒沙向諸人眼裏了也若是𠟨利衲僧一撥便轉又何待起模畫樣畫地為牢長期短期中期下期蛇足重添執燈尋火哉然雖如是不是一番寒徹骨爭得梅華撲鼻香敘謝不録復舉波斯匿王白佛勝義諦中還有世俗諦不若言其有智不應二若言其無智不應一一二之義其義云何世尊云大王昔於龍光佛所曾問此義我今無説汝亦無聞無説無聞是名一義二義今日或有問翠巖一二之義但向他道落霞孤鶩齊飛秋水長天一色復有一偈舉似大衆雞犬喧喧穢法筵緇流聞見每悽然今朝喜對爐煙靄願祝堯仁億萬年維那白椎云諦觀法王法法王法如是下座當晚小參清淨圓明古道場松杉環繞尚蒼蒼全提祖印光寰宇須是吾宗逸格郎還有逸格超群者麼出來互相酬唱僧問朱紫誰為號丘山絶點埃既是丘山為甚絶點埃師云腦後看取僧禮拜師乃云現成公案不勞擬議尋思覿體無私祇貴全身擔荷若也擔荷得的當便可全提祖印獨步大方隨處作主遇緣即宗法隨法行法幢隨處建立有時孤峰頂上墾土耕煙有時十字街頭拖泥帶水卷舒出沒任運縱橫總在古道場中不曾斯須相離任是三世諸佛出頭來也侵他一毫不得任是一切異類衆生群居雜處也污他一毫不得所以道彌滿清淨中不容他如是則生滅去來不異鏡中之像聖凡迷悟還同水上之漚諸公還識當人本有底古道場麼豎拂子云向者裏薦取若也未薦直須通身白汗恢復一番始得所以道雖然舊閣間田地一度贏來方始休譬如翠巖古剎湮沒百有餘載雞羊犬豕蹂躝其間不是諸山耆舊諸大護法戮力重興安得鼓鐘再振受用現成諸公要識衆耆舊等苦心麼也只為成就後昆於此古道場中恢復自己本有道場祇如本有道場又且如何恢復一吸吸盡西江水一踢踢倒須彌盧拈得翠巖無柄杓卻是曹溪古鉢盂昔翠巖可真禪師嘗參慈明自負天下無可意者一日與金鑾善侍者山行議論鋒發善拈一片瓦礫置磐石上曰若向者裏下得一轉語許你親見慈明真左右視擬對之善叱曰佇思停機情識未透何曾夢見真自愧悚即還石霜慈明見來叱曰本色行腳人必知時節有甚急事夏未了至此真泣曰被善兄毒心終礙塞人故來見明遽問如何是佛法大意真曰無雲生嶺上有月落波心明瞋目喝曰頭白齒豁猶作者箇見解如何脫離生死真悚然求指示明曰汝問我真理前語問之明震聲曰無雲生嶺上有月落波心真言下大悟師云慈明用頂上鉗錘敲出鳳凰五色髓真老於言下吐氣撲碎驪龍明月珠雖則師資妙協啐啄同時檢點將來未免喫翠巖手中痛棒何故無雲生嶺上有月落波心淵監寺請上堂僧問鉤頭毒餌吞吐誠難直饒總不恁麼早已喪身失命如何得自由去師云獨腳蜘蛛夜渡江進云庭前柏子青州布衫麻三斤乾屎橛即不問如何是翠巖斬新條令師云腳跟下痛與三十棒進云恁麼則洪崖一滴水散作九垓霖師云一言已出問名藍復振爐鞴弘開如何是鍛煉凡聖底句師云石火迸青天乃云淵默雷聲尸居龍見鉢盂裏走馬虛空中放箭一箭射著無位真人倒騎牛兮入佛殿且道那箇是無位真人聽取一偈輔得慈明三十年綿綿正脈至今傳撥開向上機關子洪井深深浪拍天玉知客請上堂僧問今年已前即不問三十日到來事若何師云通天徹地進云畢竟死歸何處師云鐵蛇橫古路進云如何是衲僧本分事師云切忌斬頭覓活乃云大道廓然了無向背靈機卓爾迥絶根塵一切處現成亙古今常露不與萬法為侶不與千聖同廛不逐四時推移不共群芳凋謝所以道十世古今始終不離於當念微塵剎海自他不隔於毫端諸兄弟也須實參實究實悟實證到恁麼田地始得不是説了便休底事只如今隔牆隔壁隔溪隔山青黃赤白李四張三便分析不出作麼生是不隔底道理過現未來寒暑迭更才逢八月中秋又是臘月三十念念不停新新不住作麼生是不離當念底意旨向者裏著得隻眼覷捕得透便可統剎海於毫端擲大千於方外促一劫為一日延一日為一劫如是則二六時中折旋俯仰運水搬柴迎賓待客作揖打躬全彰本地風光一一騎聲蓋色然雖如是更須知有末後一句方能去住自由殺活自在所以道末後一句始到牢關把斷要津不通凡聖即今年窮歲盡節換時移作麼生是末後一句還委悉麼來年更有新條在惱亂春風卒未休復舉盤山禪師道可中學道似地擎山不知山之孤峻如石含玉不知玉之無瑕若能如是是真出家大慧云若能如是捏目生華大衆要見盤山則易要見大慧則難翠巖不惜眉毛為諸人下箇注腳太平本是將軍致不許將軍見太平歲旦悟園頭請上堂新年頭新號令覿面提持高低普應直得黧奴白牯俱放寶光露柱燈籠同時納慶當恁麼時如意子鞠躬向前問訊云恭喜賀喜和尚新年千如意萬如意腳下兒孫遍大地山僧道你是第幾箇如意云我是第一箇拄杖子出來道老兄低聲你恁麼駁駁斑斑曲曲彎彎要作翠巖兒孫也未得在山僧道木上座何得壓良為賤殊不知曲中有直直中曲六六原來三十六大衆要識曲中直麼以手拍左膝云向者裏薦取要識直中曲麼以手拍右膝云向者裏薦取縱饒如是薦得正好朝打三千暮打八百豈不見米胡遣僧問仰山云今時人還假悟也無山云悟即不無爭奈落第二頭何僧歸舉似米胡胡深肯之大衆悟既落二且作麼是第一頭良久云披蓑側立千峰外引水澆蔬洪井邊上元解制熊少宰請上堂聖制既滿台旆光臨不落言詮便請相見僧問一棒全提古今不異請問和尚如何是不異底境界師云徹骨徹髓進云衲僧到此還有行腳分也無師云截斷腳跟進云若遇銅頭鐵額漢來和尚又作麼生與他相見師云正好與他三十棒進云也須另著眼始得師云依稀似曲才堪聽又被風吹別調中乃云大事未明謂之結活捉虛空敲出血大事已明謂之解蟭螟吞卻東洋海解非解結非結倒跨楊歧三腳驢等間挨落天邊月大衆還會麼會得也是眼裏一粒黃金屑會不得他時撞著黑面老兒打算飯錢莫怪翠巖預先不為諸人説復舉提刑郭功甫過訪白雲端禪師雲為上堂夜來枕上作得箇山頌謝功甫大儒廬山二十年之舊遠訪白雲之勤此頌非惟謝功甫大儒直要與天下有鼻孔衲僧脫卻鶻臭布衫乃云上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也功甫因此有省雲印以偈曰藏身不用縮頭斂迹何須收腳金烏夜半遼天玉兔趕他不著大衆白雲遠祖善舞太阿不犯鋒鋩正所謂殺人須是殺人刀活人須是活人劍今日乃天上月圓之際堂中解制之辰伏承少宰特特入山設供命山僧舉揚般若山僧昨夜倦來即眠枕上不曾作得山頌現前諸公亦無鶻臭布衫可脫無布衫可脫是真獨脫無頌子可謝是真報謝豈不見仲尼一見溫伯雪了無文字并言説然雖如是道火何曾燒著舌雖慚戛玉鏗金且圖應時應節乃云村歌社舞鬧翻天是處青燈徹夜縣但得胸中群惑盡不須更問祖師禪上堂佛祖頂𩕳一機佛祖罔測天人腳下一著天人莫知沒蹤迹處萬象樅然正見聞時纖塵不立所以道聖名凡號總是虛聲殊相劣形皆為幻色若是大丈夫漢有殺人不眨眼底作略直下承當便可橫揮寶劍獨據寰中截斷葛藤掀翻窠臼二六時中壁立萬仞見佛見祖如生冤家偶然道箇佛字漱口三日特地説箇受戒掩耳而趨到者裏聖解尚不生況復更隨世間喜怒哀樂殺盜淫妄貪瞋癡等習氣所轉所以道幾回生幾回死生死悠悠無定止自從頓悟了無生於諸榮辱何憂喜且道如何是無生底句寶山一寶親披露遍界騰輝不染塵復舉白樂天侍郎參鳥窠禪師請問如何是佛法大意窠云諸惡莫作衆善奉行白云三歲孩兒也解恁麼道窠云三歲孩兒雖道得八十翁翁行不得白禮拜大衆古人與麼答話大似看錮鏴著生鐵翠巖即不然忽有問如何是佛法大意攔腮便摑伊若道三歲孩兒也解恁麼行但向他道莫將支遁鶴喚作右軍鵝浴佛上堂毗藍園裏九龍吐雨沐金軀洪井洞邊一盆惡水當頭潑潑即不無且道釋迦老子即今在甚麼處豎拂子云大衆還見麼若向者裏見得則箇箇獨尊不勞外覓本來清淨淨亦不居行棒也打他不著行喝也喝他不得苟或未然縱饒日日澆香水洗到驢年也不清開爐升座僧問世尊拈華迦葉微笑還是結制時節解制時節師云旭日銜青嶂晴雲洗緑潭進云恁麼則翠巖靈鷲不隔纖毫師云闍黎甚處得者消息僧便喝師噓一聲問從上宗乘請師提唱師云百尺竿頭輥繡毬乃云翠巖啓大爐鞴柴炭渾無半塊一雙赤手空拳鍛盡凡情聖解且道鍛盡後如何火裏蝍蟟吞卻螃蟹復舉天童和尚上堂云禹門院裏結制須與諸人一議不用諸人參禪不用諸人會理單單不許瞌睡若也瞌睡一棒打出骨髓天童先師雖是為衆竭力不免犯手傷鋒既是不用參禪又不用會理正好臥藤蘿下塊石枕頭因甚不許瞌睡翠巖即不然而今若有善睡底山僧卻令侍者汲洪源水烹武夷茶請他何故彼自無瘡勿傷之也冬至小參一剝一復物極則變魯史書雲漢宮添線直得釋迦峰畔石筍抽條洪井溪頭寒冰發焰且道無陰陽地上還有剝復也無趙州東壁挂葫蘆復舉七賢女同遊尸陀林一女云尸在者裏人在甚麼處一女云作麼作麼諸姊諦觀各各契悟遂感帝釋雨華云諸姊有何所需我悉當供給姊云我家七珍八寶無不具足但要三般物一要無根樹子一株二要無陰陽地一片三要叫不響山谷一所帝釋云若要者三般卻沒有姊云既無此物將何濟人帝釋因往問世尊佛云我弟子中諸阿羅漢皆不會此義唯諸大菩薩乃能知之師云者七箇臭老婆才向死骷髏上嗅得些氣息便向帝釋面前賣弄當時賴遇帝釋放過翠巖若見他索者三般物便與攔胸一踏踏倒教伊至今起不得雖然只如一姊云作麼作麼諸姊便悟去又作麼生還知麼掬水月在手弄華香滿衣天中節上堂明明百草頭明明祖師意百草頭今日同採百草湯大家共浴還曾夢見祖師意麼若也夢見一任長伸兩腳眠苟或未然莫道夜長日短多蚊子剔起雙眉正好參晚參翠巖重興後有則奇特因緣舉似大衆此去十里許居民王氏家有銅範初生像一尊不知降自何年一夕託夢其妻室云我於此住得不安願歸翠巖王氏夫婦素不知敬信三寶初猶忽之既而託夢者再乃驚異之適典客霞公過其門王氏具述此像所以欲離之意霞乃欣然請歸供養大衆金人入夢教法始布支那太子還山宗風必當丕顯然此奇特因緣正要奇特人證據若作奇特話會未免蹉過釋迦老子敢問大衆教中道佛身充滿於法界普現一切群生前因甚釋迦老子不住俗家願歸僧寺因祖塔涌出寺西北隅晚參釋迦説法多寶佛塔證明古剎重典祖師靈塔出現鐵鐘宛爾玉骨如新且道是那箇祖師底靈塔豎拂云還見麼自古上賢猶不識造次凡流豈可名晚參舉天童山翁和尚一晚入堂大叫云適來欄中不見了牛普請大衆把火上山尋牛去一僧才出翁便低頭歸方丈師云天童欄裏牛雖不見要且頭角全彰翠巖一頭水牯牛常在欄中祇是無蹤迹可尋敢問大衆既是常在欄中為甚卻無蹤迹晚參愁愁一夜悽惶半白頭喜喜忽然撞著自家底歇歇甕裏何曾走卻鱉休休佛是西天老比丘會得者四轉語了切忌向翠巖門下過一棒打折驢腰莫言不道大衆既是會得了為甚要喫棒一僧云放過即不可師云未在僧無語良久復顧衆云者箇且置畢竟如何是自家底衆無語師云若總道不得山僧為諸人下箇注腳乃云時寒不煩久立受淨裸裸江谷王海深深明明衆佛子為僧小參父母未生淨裸裸父母既生淨裸裸淨裸裸兮絶承當獨露摩尼珠一顆摩尼光射斗牛寒爍破河山千萬朵回看火宅未醒人不啻披枷兼帶鎖枷鎖脫始超江尊貴天然百谷王會得明明祇者是信步深深海底行靈宗禪人請上堂南泉斬貓歸宗斬蛇金牛喚飯趙州喫茶盡謂是宗門向上全提底時節仔細簡點將來俱未作家何故淨白地上不可撒沙復舉趙州因僧問萬法歸一一歸何處州云老僧在青州作領布衫重七斤山僧初看此話如蚊子咬鐵釘相似及至打破漆桶始知饅頭是麵做今日或有問翠巖萬法歸一一歸何處但向他道冬日朔風寒成道日值中旭上人送到衲衣上堂豎拄杖云大衆看看釋迦老子來也説道奇哉普觀一切衆生皆具如來智慧德相但因妄想執著而不證得遂喝一喝云黃面老漢將謂你睹星悟道有多少奇特猶作者箇説話喚甚麼作妄想阿那箇曾執著翠巖今日為汝諸人打開籓籬翻轉釋迦老子舊案奇哉普觀一切衆生皆具如來智慧德相春至百華開黃鶯啼柳上旁邊或有箇衲僧出來道長老與麼説法美則美矣爭奈不及時節翠巖但向他道冬行春令復舉雲門大師示衆云聞聲悟道見色明心觀世音菩薩將錢買胡餅放下手卻是饅頭大衆齋堂裏饅頭一任你橫吞豎咬作麼生是諸人明底心悟底道遂以拄杖卓一下喝一喝復頌云尼連河側諦思惟觀察衆生得度時六載後緣方始熟憐兒豈惜兩莖眉既不惜眉毛出來畢竟成得甚麼邊事三事衲衣青嶂外一爐沉水白雲中安奉本山歷代祖位兼募復千僧田上堂諸祖法位亙古不移諸祖化緣隨時更變其隱也如羚羊挂角其顯也如曇華乍開其建立法幢也如千江月影其普度群迷也如洪爐雪片降伏鏡裏魔軍成就夢中佛事翻穢邦為淨土攪酥酪作醍醐無法處説法無祖處作祖無名處彰名無相中示相隨方自在隨處稱尊隨機現形隨緣導物緣盡則隱緣熟則現所以道淨法界身本無出沒大悲願力示現受生大衆既是本無出沒只如翠巖未興以前十八代祖師畢竟在甚麼處安立若知得落處則祖師與諸人眉毛廝結同失同得同死同生同暗同明同照同用如是則諸人便是活祖師祖師便是諸人諸人與祖師無二無別既是無二無別又用特地設位安奉作麼不見道慎終追遠民德歸厚矣復舉五祖演禪師投機偈云山前一片間田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風大衆還識五祖老人立地處麼翠巖為汝指出山前一片間田地從來無變易叉手叮嚀問祖翁猢猻入竹筒幾度賣來還自買桑田何代成滄海為憐松竹引清風此際全歸掌握中既歸掌握畢竟如何受用下座與兩序大衆同到祖師堂拈香上供上堂僧問真不立妄本空因甚又道諸佛為一大事因緣出現於世師云壑風吹磬斷杉露滴華開進云坐斷十方猶點額密移一步看飛龍如何是密移一步師云下坡不走快便難逢僧禮拜師乃云今朝臘月十五屋角梅華正吐長連床上衲僧承當切忌莽鹵不莽鹵焦尾大蟲原是虎喝一喝除夕小參年窮歲盡貧富一般忙送舊迎新僧俗同攀例是故數日以來若內若外若兄若弟漿洗底漿洗補綴底補綴砍柴底砍柴踏碓底踏碓爛搗熟米果細捏穀華糖磨不停輪鍋不停沸蔬果雖不甚豐齋供且喜俱備直至今朝獻佛前大家作禮同分歲分歲了喫茶喫茶了瞌睡睡到五更睡正濃報鐘又是從頭起大衆且道是世法耶是佛法耶若作佛法商量貶向二鐵圍山若作世諦流布何異三家村裏俗漢到者裏須是箇大休大歇大解脫漢直下打成一片方能任運無拘也不見有佛法可欣也不見有世法可猒也不見有生死迷悟也不見有年月日時動靜一如古今一致物我一體根塵一源所以道有情之本依智海以為源含識之流總法身而為體大衆除卻揚眉瞬目折旋俯仰下喝頓腳豎指擎拳阿那箇是法身委悉麼如未委悉流年莫虛擲華髮不相饒考工夫夜參立程途定期限大似虛空穵窟竉較迷悟考得失何殊嚼飯餧嬰兒豈不見高亭隔江見德山招手便橫趨而去水潦被馬祖一踏踏倒起來便道百千法門無量妙義只向一毫頭上識得根源去臨濟喫黃檗三頓痛棒便道元來佛法無多子你道者三箇老古錐當時如何做工夫德山馬祖又如何考較須知此事無汝用心處無汝湊泊處你才上蒲團牚眉努目惺惺地思量卜度時早已蹉過了也直饒你不思量不擬議未免坐在黑山鬼窟裏古人不得已作死馬醫向第二義門與你和泥合水説道喚作竹篦則觸不喚作竹篦則背不得有語不得無語與麼稱提已是八字打開了也爭奈根性遲鈍不能領略遂將此話蘊在八識田中時刻追究謂之看話頭做工夫宋時有箇大慧禪師常握竹篦鉗鎚學者一時宗風大振不減馬祖嗣後相襲成風皆以看話頭為參禪凡學者一進門來師家亦不管青黃皂白便掇出一句死話頭與他參或云你看念佛底是誰或云一口氣不來畢竟向甚麼處去或云萬法歸一一歸何處或云父母未生已前那箇是你本來面目學者亦不辦邪正才禮拜起便云求和尚一箇話頭癡人五燈會元上好少哩因甚要千里萬里去求知識話頭殊不知領得一句話頭死獦狚地去念念到彌勒下生也不會悟道又不若念念阿彌陀佛還不虛度時光所以天童先和尚但有求話頭者劈頭便打云老僧祇會打頭沒有甚麼話頭山僧初炙爐鎚時猶信不及每自忖云佛法要妙當微細開示為甚麼問著便打將以為非耶和尚望重一時將以為是耶焉得痛打便是佛法每日入室長跪合掌涕泣交流悃求開示和尚惟加痛棒山僧疑團愈切迷悶悽惶二六時中如聾若啞一日請益次又被痛打一頓乃云老和尚沒頭腦祇是打和尚云你作打會那山僧方釋然如夢忽覺始信者一棒提持卻勝三寸舌頭百千萬倍雖然今日若執一棒提持未免亦成死法山僧者裏有時棒喝交馳石火電光追不及有時平田淺草和泥合水笑嘻嘻有時叫伊看話頭有時不叫伊看話頭因人而施初無實法所以道若將實法與人土也消不得今晚一七已滿毋論工夫得力不得力各依單次出班相見考畢師乃云參貴真參悟須實悟實悟得底出言吐氣自然如函蓋相稱箭鋒相拄諸兄弟皆是英靈倜儻漢子各各氣宇如王祇是工夫未到工夫若到見地若親莫説德山馬祖黃檗臨濟縱使黃面瞿曇到來且喚伊提草鞋著何故不是從前多意氣他家曾踏上頭關
