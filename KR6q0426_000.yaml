body:
  text: 翠巖古雪禪師語録序佛法須人而傳甚於吾儒儒所傳者可以求之於六經語孟諸書不幸而不遇其人其所傳者固未嘗亡也釋氏自達磨大士東來直指見性成佛一切修多羅藏俱屬贅疣何語言文字之可恃然苟得其人則雖拈椎豎拂揚眉瞬目無處不遇何況語言文字何況修多羅藏是故其所傳者實無可傳命之曰別傳傳無可傳遍大地求之而卒不可得古尊宿既已究明此事視七尺幻軀與夫十方世界無不可涕唾棄捨獨惓切於嗣法之無人夾山致歎於石頭風穴生悲於讖語其皇皇汲汲反甚凡夫似續之情豈不以其人之難獲哉臨濟一泒自妙喜中峰後已屬晨星至隆萬間幾成絶響僅天童密和尚噓枯吹燼隱顯明州瞿曇慧命不絶如線吁可慨也古雪禪師夙秉智炬照徹人天蚤歲讀天童老人録喟然曰是其末法之梯航乎遂策杖囊鉢而往叩之入門即被痛棒已復鉗錘數番師遂豁爾開悟舉無量劫來生死根本一時擲向大洋辛巳秋來吾江右誅茅白法院虎豹與偕猿狖與處師絶不以置懷適香城諸剎恢復翠巖僉議主叢林者非師不可師遜讓再四卒弗獲辭乃始一笑而出登座之後朝暮提唱縱橫妙密吾江右數百年所未有也今春其高足上人出師語録相示俾辨簡端豫惟天童得師而續臨濟何異風穴之首山念遍大地求之而不可得者今乃猝然相遇足稱希有盛事昔真點胸説法翠巖黃魯直為序其語録擬之行川之水走盤之珠政謂其無死句於中耳吾無以擬師即擬以翠巖之石鐘石鼓無邊聲響有時消歇石鐘石鼓之聲響無時而消歇也是同是異請問之真點胸余何敢妄揣弟子陳弘緒敬撰翠巖古雪禪師語録序昔保寧勇禪師出楊歧之門道聲不減雪竇至於提唱之語尢為精峭嘗曰風鳴條雨破塊曉來枕上鶯聲碎蝦蟆蚯蚓一時鳴妙德空生都不會都不會三箇成群四箇作隊向前村後村折得梨華李華一佩兩佩可謂抖擻尿腸為人説禪而南堂欲公尚道禾黍不陽艷競栽桃李春翻令力耕者半作賣華人則説法之難也審矣雖然諸佛威儀進止諸所施為無非佛事故其示人也或有以光明相好佛身焉或有以飯食臥具衣服焉或有以園林臺觀虛空焉或有以菩薩化人菩提樹清淨土焉或有以寂寞無言無説無示無識無作無為焉豈僅曰語言文字乎哉獨此方真教體清淨在音聞故雖德山臨濟棒喝交馳終亦不廢語言三昧然求其縱橫辨肆樂説無礙一以理勝不詭俗不淫陋言言見諦句句超宗非揚眉有正法眼藏點胸有涅槃妙心而能若是乎吾老矣何幸尢及見翠巖哲公禪師其人者公炙先師實當天童旺化之日一時鳳毛麟角爭相騰踏軒昂太白之門唯公年齒最少志願獨堅鑿索斧搜晝鞭夜策汲汲皇皇不間暑寒者十年始浩然大徹先師室中箠尺極嚴許可尢審肯諾之聲未嘗為耆年假也直以侍者參得禪為公助喜則其屬望於公也可知已乃公方鋭意住山徑爾別去遁迹亮公舊隱耕雲種月一钁十霜由是洪州道俗相率捐資贖古翠巖挽公出世為中興第一代祖道遂顯著於時卓哉公也幻有師翁不云乎除卻釋迦老子福慧兩足有幾人焉但於本領有實證則龍天必不相負況公律身之嚴求道之切奉師之恭謹事衆之勤渠固宜龍天推出無足為公怪者獨其問答提綱星馳電卷發揮玄賾光闡大猷駸駸乎山谷所謂青山白雲開遮自在碧潭明月撈漉方知鐵石崩崖霜弓劈箭不受然鐙記莂自提三印正宗假令古佛出頭也下一椎定當乃足多耳惜乎先師未之見焉敬為序次質諸當世明眼作家住東齊青州之大覺寺同門道忞撰古雪哲禪師語録目録序二開堂疏二卷一上堂小參晚參一卷二上堂小參晚參二卷三上堂小參晚參三卷四上堂小參晚參四卷五上堂小參晚參五卷六上堂小參晚參六卷七上堂小參晚參七卷八上堂小參晚參八卷九上堂小參晚參九卷十普説一卷十一普説二行實卷十二問答機緣入室機緣卷十三頌古卷十四法語贊卷十五書卷十六啓卷十七偈一卷十八偈二卷十九偈三卷二十佛事雜著古雪哲禪師語録目録終陳司理請疏伏以拍洪樓畔重續鷲嶺之輝迎笑堂前又聽鯨鐘之響人天共快瞻注同心恭惟古雪大和尚百世津梁五宗華岱間揮妙偈一天華雨覆栴檀靜吐慈音萬壑松風搖几席鍾武夷之靈秀寶筏渡盡迷津膺天童之正傳慧日高懸沙界玉毫瑞相飛來洪井丹爐金口微言錯落香城丈室惟真公芝老之禪堀是西山南浦之名區雷護橘叢留伴筍蔬清供霧藏茶縷烹殘沙石幽泉嘆鳩盈馴鴿堂邊幾歲珠龕版蕩遂草長散華筵內頻年寶地塵霾諸名德共深廓清之思彼闡提猶恣猙獰之勢雲端鍚振野犴弭耳以奔騰座上香浮耆臘喧呼而手額茲值來復之候適逢結制之辰擊法鼓以震大千灑甘露而蘇吹萬祇園再闢同隨正覺銖衣化域方新共仰清規囊鉢念居諸之過隙須摧鐵壁銀山慨逝者之如斯專恃朝提莫唱弘緒久淪塵濁悔歲月之全虛遙禮犍槌識身心之有託曾迓海昏法駕欣依嶺際慈容選佛場開敢浪擬龐公之酬對安禪影靜庶長聞臨濟之宗風聊布悃誠冀垂鑒照弟子陳弘緒謹疏熊少宰請疏伏以末法將興共禮玉毫之妙相名山復振群宣金石之微言有待而隆無誠不暴恭惟古雪大和尚風姿高邁道性澄泓受天童之法乳雨露三乘揚少室之宗門雷霆曠代固已包含衆善擊汰群蒙一千龍象隨高步豈曰非時萬里香華結勝因寧唯異地維此翠巖夙稱巨剎溯洪井之淵源玄徽灝渺澤神阿於漫漶寶氣輝煌所以精藍代起於雲煙因而往哲留題於翰簡夫何後嗣失守致滋祖道夌夷鞠茂草於珠宮聚農氓於紺殿茫茫桑海落落晨星然而靈奇示幻慧上人見夢裏之浮屠縹眇呈因諸童子識雪中之寶字以故合緇流而發願捐衣鉢以為資贖自符宗歸同趙璧草木葳蕤盡洗干戈之色川原煥發一新鐘鼓之音應真飛錫以來遊雲水聞鈴而畢集不有宗工領袖誰為後學津梁用瀝凡情祈垂愍度伏望我師表大覺為靈根將與衆生共有叩真空而不壞豈唯聖者獨知刊垂九帶咸標指月之輪辨示兩兒若誘聚沙之塔庶幾薝蔔香分才經手而並馥醍醐味爽乍灌頂以皆醒誰云道岸先登佇見寰區普耀無辜勝會永贊昌期弟子熊文舉謹疏
