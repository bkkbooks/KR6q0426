body:
  text: 嗣法門人傳我等編法語示春侍者五則江河湖海谿澗溝渠皆水也而有淺深清濁之殊日月星辰皆光也而有小大之別鳳凰鴻鴈皆禽也而有羽毛長短麤細之不同道一也而有偏圜種種之見由見有未至故各說異端如群盲摸象其指出耳目口鼻非不相似但不得象之全體耳是故學者稍得一知半見不能廓徹圜融亦猶摸象然安得如威鳳之翱翔杲日之麗天江河湖海之汪洋無際哉德山棒臨濟喝祕魔杈俱胝指皆向上提持全機大用學者不究厥旨才入叢林菽麥不分奴郎不辨是處胡喝亂棒何異以千鈞之弩而彈燕雀識者未嘗不為之嗟惜也宗門差別語句直須一一透過毫髮無疑始得不可妄生穿鑿亦不可儱侗推開明得古人意旨然後自心明去古德誠言豈欺我哉吾人最惡賴習氣是貪怒癡然有輕重不等未見道時終日為貪怒癡所轉既見道後便能轉貪怒癡其或無明煩惱逐境遷移不能彊作主宰則生死到來依舊一場懡㦬曹谿而後衣缽遂止不傳後世但以機緣契合為據近代學者名根未剪學識弗精唯以衣拂為事才哄到手不管七家村裏土地廟中裝模作樣自大自尊豎拂拈椎逢人賣弄獨不思傳持慧命之任重苟非真操實履行解相符不足以弘闡宗猷報佛恩德有志法門者切宜慎之示禪人五則學道之要貴在立志專用功純功純則諸妄自息志專則閒情自遣古來正因行腳之士三二十年依附明眼宗師食不求飽居不求安脅不至席二六時中攢起兩道眉毛憂戚戚地如瘖啞人相似獃墩墩地見人扯淡則趨而避之見日西沈則哭泣嗟咨見宗師提持箇事則如飢遇食如渴遇泉此無他蓋其為生死之志專而參究之功純熟故也近代學者多務外無大志初入門來也說箇生死事大問伊如何用功也說看箇本來面目及察其所安則胸中毫無箇事恰似了道人一般見人學書也學書見人作詩也作詩人嬉亦嬉人笑亦笑逐浪隨波荏苒過日竟不知行腳之為何初志之為何嗟夫如此用功莫道入一叢林親一知識直饒走盡四大部洲參遍臨濟曹洞下尊宿也祇成得箇老骨董謂之打野榸漢一朝老病臨身死境現前叫爺叫孃叫蒼天遲矣暮矣噬臍何及悲夫修遠滋禪者自寶峰來相依未及一載而告假者三度吁白法固是一箇種田博飯喫底村僧原非善知識亦無佛法與人相信則同甘共苦伴守寂寥不信則一任奔馳南北吾復何留但到諸方被人問著眼眨眨地莫言曾見白法來滋禪臨行出紙求示因書此以勉旃辛卯臘月朔前一日雪嶺攢眉梅華欲吐之際有一禪客攜囊負缽昂然而來達摩峰前合爪作禮凡夫曰巍巍堂堂來何所求客曰求戒凡夫曰持戒但束身非身無所束求之何益客曰禪以戒為基故先乞戒戒以禪為極故必學禪吾鄉數十里之遙接壤數十剎之眾皆傾渴道風欲棄應歸禪結社學佛使禪戒均明自他俱利願丐一語以為前矛凡夫曰善哉希有今天下髡髮而衣緇者如毛禪戒均明者如角所以祖道夌徲正宗不闡公等誠能於此劫火洞然之餘棄應而戒由戒而禪由禪而利他自利則西江之法道自公輩再振矣天道無時不見無處不周無人不具者也但以積迷之久為聲色利欲等妄塵所蔽固不能返照自歸必假明眼宗師指點而後知此本具之道所謂迷時師度悟了自度歷觀從上諸祖未有一人不是放下萬緣屏息眾務瞻風撥艸訪友尋師如慈明之結社參汾陽雪峰之合伴謁臨濟乃至一語千山三登九上蹋破多少艸鞋始得腳跟點地公輩果能從此具戒之後誘引同袍立大志結大社繭足千里煙水百城浙東西江南北一人所在也到半人所在也到忽若艸窠裏遇著箇咬豬狗底手腳驀地親遭一口歸來始好作大應赴所謂隨緣赴感靡不周而恆處此菩提座譬如釋迦老子棄卻萬乘之尊攢眉雪嶺冷坐六年飢得骨瘦如柴若不得一點明星刺瞎雙眼爭能分身塵剎隨機接引豈不是釋迦老子是箇大應赴達摩祖師是箇小應赴夫如是則唯恐應赴之不多耳焉用棄為若是打鐃鈸執手爐戴毗盧帽者葷酒不斷禪戒不知非應赴也正所謂光頭百姓耳今有行光頭百姓之事而諱光頭百姓之名正猶執熱而不以濯也果能如佛祖之普應萬邦而不離此座則思過半矣且道如何是此座試去衣線下攢起眉毛東卜西卜忽然卜得著時大家攜手來洪井洞邊與汝烏藤三十未入母腹之先自己在甚麼處住既離軀殼之後自己向甚麼處去識得去處始不被生死之所縈纏識得住處始不為境風之所搖蕩古來有志之士割恩愛離鄉井直入窮崖絕巘木食澗飲甘心枯寂以勤求者求此也雪嶺夜半睹星南陽竹邊一擊而頓悟者悟此也天下大宗師碁布法幢千言萬語乃至棒喝交馳雷轟電摯以指示學者指此也知此則去住自由隱顯無礙雖終日住山不見有青山之可住終日塵勞不見有紅塵之可染此從上達人之標格也末世法道夌夷人心怠惰雖入禪門不知禪為何物戒為何事絕不以生死為念稍聰敏者則習經懺學吹唱以應和檀那廣求細滑英俊者則工字畫習詩詞以資談柄椎魯者則從朝至暮從暮至朝唯耕作是務佛不禮咒不持課不誦食不施銖積寸累以生放養羊畜豕以征利聞善言相誡則瞋以為欺己見客僧食宿則惡之如仇讎借有司聲勢大張示諭以絕其往來且曰本山自耕自食并無醆飯盆米夫醆飯盆米固當接納方來而自耕自食則客僧遂不得稍分其惠耶殊不知業已出家則若田若屋若艸若木一一皆出信心檀越所施客僧安得無分一寺一菴行之諸山效之師授諸徒徒授諸孫相襲成風牢不可破欲望叢林再振法道重隆不可得矣嗟乎予癸未春遊西山慕亮座主之高風誅茅白法雖火種刀耕嚙糠歠粥必與十方共之正所謂曾為浪子偏憐客也髻珠菴覺悟禪者從予受具已來經今四載踐履冰霜通山僧俗靡間揄揚予因以院事付之更欲開擴其志以種般若正因毋蹈今時流獘二六時中忙裏偷閒看看生前在那裏住死後向何處去果能久久不退密密用心一旦築著磕著則覿體現前異日生死到來自然千穩百當如是出家方為真報佛恩如是住山方為續佛慧命勉之有非常之人必有非常之事發明非常之事須是非常之人在昔有周西土迦毗羅國有非常之人其號曰悉達偶遊四門見生老病死眾苦逼迫遂生猒離夜半逾城棄王宮入雪山宴坐六年蘆茅穿膝鷃雀巢頂不自知也一夕抬眸睹星豁然大悟是所謂非常之事也嗣後道振西天法流東土聯芳續燄列派分支至梁時有香至國王季子達摩大師特特航海而來茲土傳佛心印謂之教外別傳不立文字直指人心見性成佛是所謂非常之事也唐宋以來機器漸熟宗風愈彰而公卿大夫宏儒碩學莫不深研此宗為內外護其間挂冠鏟艸如風穴丹霞之流不可勝數皆具大知見得大辯才是所謂非常之事也故張文定公曰自孔孟之後儒門淡薄收拾不住天下英傑皆歸於釋氏而無盡居士以為知言嗚呼自今日觀之則釋門淡薄又將收拾不住矣不知天下英傑安所適歸乎鑑禪負文武全才稟忠義正氣適丁國步艱難未獲展其懷抱遂斷葷血割恩愛來白法堂前鏟艸向雲峰峰頂結茅雖親友屢招兒女遮留脫然不回一瞬此亦可謂非常之人也既是非常之人必須發明非常之事昔香嚴謁溈山山曰聞子在百丈問一答十問十答百試向父母未生前道一句看嚴不能答乃憤然入南陽縛茅以居一日埽除聞瓦礫擊竹聲瞥爾大悟且道擊竹聲與父母未生前事相去多少若也會得始許發明非常之事堪與悉達達摩丹霞風穴輩把臂並行苟或未然直須放下萬緣剪除百念將從前世智聰辯麤重習氣一筆勾下二六時中單單看箇父母未生前如何是我本來面目自參自問自審自疑行住坐臥動靜忙閒密密綿綿勿令須臾間斷驀地築著打失鼻孔不妨來白法堂前痛與三十拄杖鑑禪自謂初機未達入門捷徑因書此勗之并示以偈慷慨隳冠大丈夫安名鏟艸越群儒直須頓徹生前事始可人間作範模空華陽燄悉是法身遞水傳茶無非玅用爭奈積迷既久妄見紛紜乍聞知識提持不能直下頓徹所以勞他諸聖出興設百千方便無數權巧鞠其大意無非要人自證自悟此本有法身而已近來學者多務虛名不肯實究者邊經冬那邊過夏全無真實痛為生死念頭才入叢林先學轉語頌古哄善知識善知識見學者有些小聰明相似語句便云某人有箇省發遞相欺誑疑誤後昆所以一期之中常有幾十箇稱悟道及乎推勘將來依稀彷彿了沒相干此蓋近代禪獘若是有血性漢子決不被他牢籠虛度一生耳羅雲氶子從予薙染以來志氣越諸儕輩巾瓶之暇自肯密密用工茲擬挈囊行腳予恐其心志不堅生死不切不免為近世風氣所移故書此以勗之向去更莫別處用心但刻刻自問云除卻行住坐臥思量分別那箇是我底法身忽然失腳蹋破虛空正好歸來迎笑堂中痛領大棒示居士三則從上諸聖出世皆觀機說法因時救獘斷非膠柱調絃者可同日而語所以吾佛世尊於四十九年之間五時八教之別或權或實或頓或漸偏圜半滿經律禪淨教網雖殊鞠其指歸無非欲一切人知有父母未生已前一段風光而已是故權開淨土法門三根普攝則曰其土有佛號阿彌陀今現在說法又云七日一心不亂即生西方末後拈華示眾直接上根則曰教外別傳不立文字直指人心見性成佛又云理雖頓悟乘悟併銷事在漸除因次第盡然則一心不亂即見自性彌陀現在說法豈非淨土之禪見性之後真操實履漸盡無始虛妄惡習豈非禪中之淨土由是觀之禪淨根源從來不二頓漸雖異理事無殊後代知見未融涯岸各封者蓋因不達先聖立法之苦心故耳宜川為西江奧區宗風最盛唐宋之際剎竿相望弓箭之聲禁墮之語霆震海內邇來三災競起萬界滄桑法門龍象藏牙伏爪於千巖萬壑之間而邑中諸君子不忘靈山記莂或結社以修淨業或訂盟以究禪宗濟濟森森轟轟烈烈初祖所謂震旦有大乘氣象者非此也耶丙申春予以赴請歸里道過宜川堅明松公偕禪淨兩社居士殷勤修供啟請說法於龍泉予固辭不允因念其向慕之誠特述從上諸聖本懷及禪淨不二之玅旨諸公儻能劈破藩籬親見自性則父母未生前一段風光頓現紅塵堆裏令不二法門復啟東土而金蓮華發遍界香飄西方云乎哉宜邑云乎哉乃易金蓮為不二凡禪社諸公於朔望之際仍至龍泉同修淨業蓮社諸公於修淨土之餘仍究禪宗關捩彼此互相激揚互相切磋非特禪淨不二即儒釋僧俗亦不二乃至貴賤老少城市山林皆平等不二則一會靈山儼然未散於宜川之上矣雖然更須知有向上一著不屬修證悟迷了無禪淨階級待諸公親入不二法門之後再來與翠巖木上座相見戊戌之秋十月望旦遠山檀越鍾子陳公修設伊蒲塞再四稽首悃請陞座舉揚第一義諦以求嗣胤予以赴請之洪都途次儀式不備辭鍾子復求法語且曰諸佛不違眾生所願故求男者得男求女者得女和尚續諸佛慧命師表人天津梁苦海而蓼莪諸什諄諄孝道以啟覺末流三載之間梓里中感悟者無限曩歲馳書攀迓正欲有所懇耳今和尚固辭不允陞座願乞指示修何善可以遂其所求滿其所願庶幾不蹈無後之愆予曰善哉問公為求貴胤以酬孝思乞法語以行善事是所謂善求者也詩云愷悌君子求福不回其斯之謂歟昔給孤獨長者布金祇園建精藍以奉佛當其草創之際嘗與尊者舍利弗親自牽繩區畫其地弗忽微笑長者詢其故弗曰長者發心建寺寺雖未成六天宮殿已備者曰何以知之弗乃借以天眼令其自視果見六天宮殿莊嚴偉麗非人間可及乃問弗云六天中何天最勝弗云下三重放恣上二重怠惰唯第四重中常有菩薩示生其間晝夜說法諸天警悟精進不懈者曰弟子願生第四重天言畢五天俱隱由是知建立梵剎福感天人信不誣也公今施遠山以奉伽藍捐四事以供三寶雖在草昧經營之際而天宮之福已備矣復從予受三自歸及不殺戒即至善也儻能體上帝好生之德與吾佛同體之悲堅持不犯則螽斯蟄蟄可立而待也雖然求男得男求女得女諸佛菩薩之悲願接引眾生之方便耳所謂先以欲鉤牽後令入佛智若欲親聞第一義諦須待石虎生兒即向公道甚矣三界之無安也而欲界為最三途固無論已吾人處欲界之中墮五陰區宇遂迷本有覺性妄認浮泡四大為自身相資身之具為自家相妻子兒女為眷屬相童顏皓首貪戀不休殊不知無常老病不與人期一息不來即同灰壤故三界大師火宅之喻可謂彰明較著者也然諸子幼稚無識耽著五欲東西馳走不思求出竟為烈火所燒得不辜長者之婆心哉雖然即此火宅裏面具有清涼世界刀兵水火侵害不得入風五欲擾亂無門故六祖云誰知火宅內原是法中王第吾人未嘗惕然返省耳昔舍衛國有兄弟四人入山學僊得五神通自知壽盡悉圖趨避一藏空中一藏海裏一擘山兩半入中還合一入市中俱不可得脫三界大師聞之因說偈曰雖然藏在空及處大海中假使入諸山而欲自翳形欲求不死地未曾可獲定是故精進學無身乃為寧悲夫無身之說非參悟莫委生死之患非無身莫除蓋五陰之身既空則本有覺性頓現本有之性既現則覓生死了不可得矣彼神僊者流雖得五通御風乘雲猶未見性故不獲免於無常之苦耳虔州用韜郭子深信佛語猒離火宅久遊龍德之門學參悟法客冬聞予抵虔不憚初寒遠迎殷勤請法予以修途勞頓辭郭子再請乃諾以今歲詎料春夏以來杜門養痾老病益作日漸衰朽因書數語以代陞座幸毋謂非第一義而忽之也郭子其勉旃授九峰白長老法衣華鋪錦上語播坤維九峰果熟四海香吹信衣授爾爾其勗之博接英靈紹乃宗枝示靖藩李太夫人并授戒衣如幻三昧是諸佛母壽等太虛河沙莫數我來粵東原為佛事道人成之紫金光聚戒是慧根佛佛相授時披法衣三學偕就一切如幻乾城露珠頓悟自心女中丈夫贊釋迦文佛銅像塵剎全彰是大雄堂堂玅相古今同因從數粒胡麻種行歷三祗遠劫崇鏡智已圓空泡影悲心時發怋童蒙娑婆億界緣初熟天竺千門日正中白象倒騎趨鳳闕青蓮端坐出王宮三乘法布悲無盡八十形銷像未窮鏤石鏤檀還鏤玉烹金烹鐵復烹銅萬斤模脫三年裏丈六身成百粵東未細琢磨仍有漏再加補飾始為工通身自是金光紫寶髻從斯杲日紅殊勝儼然兜率降精嚴不異鷲山逢王臣共慶酬初願樵牧同欣見大功南浦香花迎驛路西峰鐘磬遲芳叢二千餘里經旬至十八高灘一棹通瑞氣已先凝翠竇祥光應更耀寒空願言久住人間世度盡天人暢本衷千佛名經過現未來三世佛皆因敬禮五十三五十三位婆伽名一一皆從玅光說玅光佛說釋迦聞展轉相傳至今日聞名禮敬如河沙成佛何啻三千數我亦三千數內一幸生釋迦像法中獲聞如是殊勝名猶覿玅光親口說試問玅光佛當時五十三佛從誰聞釋迦聞在三千先何以成佛居賢劫如我思惟此玅義佛與眾生本平等賢劫星宿及莊嚴猶如翳眼見空華眼中翳落空華滅三千佛亦本無名自心念念釋迦生自心念念玅光發自心念念轉法輪自心念念降魔外自心念念度眾生自心念念空三際八萬四千三昧門一一皆從自心入八萬四千塵勞海一一皆從自心出了證自心本來空塵勞三昧將安寄聖名凡號總虛聲一切法中無住著復從無住法中起示現空華鏡象形建立殊勝希有事或權或實難思議一切時中如是觀成佛何殊眼中屑一切時中如是禮曠劫業猶湯消冰我今稽首說是贊如蠡測海管窺天四十八尊活如來應信因我得禮你七佛有序癸巳臘杪雨雪迭作趺坐之餘偶閱傳燈初卷首列七佛且按阿含云七佛精進力放光滅暗冥乃撫几太息曰嗟乎一切眾生常處暗冥者怠惰之故耳去聖時遙人多若此安得古佛再來曉此長夜耶因不揣寒陋特織蕪辭百拜稽首而為之贊毘婆尸佛婆提城內古如來心識渾無正眼開樹下嘮嘮三會說偈中歷歷一時該幻人步月臨千嶂鐵馬追風上五臺謾謂莊嚴為遠劫祇今現在語如雷尸棄佛覷破風燈聚沫身閻浮隨處且同塵深明善惡皆虛幻卻愍盲聾昧至真七萬歲人親得見百千年後與誰鄰遙知鬱密分陀利一度華開一度春毘舍浮佛九霄月運絕途程千佛何妨最後成地水火風龜背髮身心世界闥婆城紙衣不借機非玅樓子情空眼自明四句伽陀今古在未知誰共契無生拘留孫佛賢劫中居第一尊談何法可利兒孫金剛圈細應難透栗棘蓬麤不易吞身見既亡珠燦燦凡心未盡月昏昏佛人固是無殊別幾箇曾親達本源拘那含牟尼佛死生夢破坦然歸苦海茫茫應萬機向道有知即是佛誰知有佛亦還非止啼每每拈黃葉入市頻頻挂垢衣烏暫樹邊消息在幾回風送白雲飛迦葉佛波羅奈國示生時火裏優曇祇一支二萬人沾新法乳三千界覿古風規珠藏衣內何曾失劍挂眉端更勿疑直下了然親見性師姑原是比丘尼釋迦牟尼佛百億分身箇老翁願深豈啻降王宮千華競秀春歸樹四海騰輝月在空夢裏金人遊震旦傳來嫡骨是天童心燈燄燄原無盡何幸吾生續大雄文殊大士古眉禪師請七佛師五臺主獅子兒常作侶日日談玄口不開策起眉毛親聽取普賢大士洗象圖缾無涓滴水亙古用不竭象無秋毫埃終朝洗不歇洗得歇大地山河一片雪觀音大士有序五龍城北有荒岡曰章陵不知從何處降下古觀音大士一尊高不盈二尺其顯應如答響四方之朝謁者扶老攜幼肩摩踵接殆猶勝於補怛洛伽己丑秋予赴翠巖請道經章陵得一瞻禮之辛卯春亦饒劉公以大士誕日詣翠巖稽首請曰敝邑僻壤也而大士屢示現其地若城崖若章陵先後感應如生此亦敝地眾生之幸也願丐一贊以報深恩予曰感應乃大士之餘事也如公輩之學孔孟然但患其不能為孔孟耳夫既已為孔孟矣則糠秕土苴亦足以陶鑄堯舜又何患乎修齊治平哉公既欲報深恩直須頂𩕳上迸出金剛眼睛親見大士面孔始得公曰若據金剛眼睛大士也著伊不得予笑曰且喜與大士相見了也公載拜稽首而退因援筆以為贊淡抹濃裝婆心笑面淨土穢邦無剎不現提魚入鬧籃活蛤登金殿碧樹囀黃鶯雕梁飛紫燕處處啟圜通時時施方便可憐今古人觸目不自見忽然見五龍元在安義縣一點慈心千變萬化奼女形容不借而借蒲團寂寂獨跏趺舉世何人是丈夫無限風流描不盡笑看皓月落江湖老婆習氣未曾除小小籃攜大大魚舉世無人能著價至今獨立在閻閭具足八萬四千臂為人聊現一十八雖持劍槊示威雄無始劫來未嘗殺雖坐千葉蓮華臺百億分身遍塵剎面門豎亞摩醯眼根器萬殊無不察或折或攝或慈威究竟無非令苦拔苦因拔盡樂因生便是人間好菩薩普天之下莫非吾兒兒心所願吾豈不知是故求男者得男求女者得女求富貴壽考爵祿利名與夫辯才智慧三明六通及八解脫者靡不相許所以天擁衛乎雲端龍侍立乎洲渚海門風卷浪華飛綠楊深處鸚哥語鸚哥有語卻無聲大士圜通已十成誰謂僧繇描不得即今面目太分明片石可趺群華自發獨有寒梅馨香在臘通身爛爛盡黃金舉世誰人觀此音觸背二途俱透脫鳥鳴幽谷總禪心捏串數珠抱膝坐坐下蒲團幾劫破春風浩浩鳥關關報與禪流休錯過水一盂兮柳一枝錦鱗躍起互相窺窺來內外渾無物正是圜通開眼時煩惱海裏分形怛補巖前宴坐親證耳根圜通始知飯是米做疏竹下懸崖頂靜觀之皆幻景欲證圜通門目前須自惺默然踞犼而譚童子袒腹而聽通身不挂一絲始能三十二應以玅戒為淨水以慈力為楊枝歷遍塵沙除熱惱依然寸步不曾移獨步大方不移半跬祇貪度人忘卻自己紅杏腮珂雪齒烏木珠白玉指多少癡男兒日夜思量你咄嬌態美如華癡心堅似鐵論劫為人忙持缾又持葉欲灑熱惱清驢年也未歇誰知聖與凡總是水中月送子像芝菴周別駕請慈至極深子亦可送非是情緣孝思為重千里之駒九苞之鳳如意頭邊一時俱貢不離洛伽普門示現不斷髮鬚恒彰本面如何是本面東谿皓月西谿見不離蓮華臺分身遍塵剎譬如春風吹百華一時發所以應群機有求皆響答富沙行琅陳心期在顯達補袞既已閒且圖出世法我今為先容大士幸深察檀香羅漢手捏胡盧身披木葉六賊俱擒萬國安通身一具白栴檀胡盧倒捏藏何藥木葉橫披凍不寒台蕩罷遊唯踞坐人天頻供亦慵餐眾生病劇還知不掌內靈丹試借看布袋和尚過逆不瞋隨流不惑柳巷華衢刀山火宅布袋雖寬眼孔卻窄龍華三會下生時半箇惡人容不得夫是之謂真彌勒廬山香爐峰景法師有序齊大沙門景公衡陽人結屋匡廬神人共仰一日語門弟子曰吾壽當九十但餘年無益於世而四大有累於人思拯助眾生不得久留此乃端坐合掌曰願即生三途救一切眾生苦瞑目而逝予閱至此掩卷長歎曰真大乘菩薩弘誓也乃稽首為之贊夢落三途中倉皇毛卓豎覺來了不驚目前無可睹眾生知在夢百苦一時愈爐峰大沙門示作天人父臨行無別詞一語超今古願即生三途救彼眾生苦良哉願何深滄溟焉足數稽首悲願王願躡茲步武達磨尊者一葦截千流全身無向背若道是神通依前還不會會不會今古長江如鼎沸石鞏藏禪師逐鹿趁牛雄心未改射得半箇又遭人拐至今弓箭尚全提誰是英靈識此機復云看箭龍池傳和尚瘦骨棱層雙肩挺特荷笑巖向上不傳之真宗契滹沱獨脫無依之正脈覆一笠以深韜入千峰而誰識法雷忽響荊谿山兒孫已遍大明國賊半邊鼻孔今拈得天童悟和尚一丁不識老樵夫撞入龍池氣岸麤踢倒銅棺天地窄高提鐵棒佛魔恗惡聲流異域毒氣滿江湖聞之者怖見之者孚非但使辯者訥聰者聵智者愚抑且能令活者死死者蘇盡道獦獠再來誰知濟北風顛又轉軀無法說觜都盧兀坐匡床風愈孤一千五百常圍繞誰敢當前捋虎須黃面老見也無正眼從來付瞎驢黃介子居士請示生寒微家每懷出世想既壯棄妻孥事師類廝養龍池關未摧旦夕深悵惘偶過銅棺山家私一時蕩三度辭拂衣六據名方丈一行與一言末季真標榜中興濟北宗一條黑桼杖擣盡野狐窠兒孫遍天壤我雖腳下兒自慚百不象稽首贊師真千峰月初上大覺山翁和尚寫寄大覺師兄親寫得寄與西山小瞎驢天子呼來曾不動何緣肯降翠巖廬渠即我我非渠七尺烏藤雙手捏儼然太白令行初抹殺五家宗旨瞎卻四海眼目一味奪食驅耕到處取髓敲骨生得迕逆兒孫滿大明箇箇罵祖罵爺兼罵佛惡名塞破乾坤喚作曹谿正續且道是誰天童老禿蓮首座請眼裏有珠舌頭無骨不是禪師亦非古佛喝散銅棺頂上雲踢翻濟北蒼龍堀要知白法源頭看取天童面目咄白法觀首座請黃巖峭拔萬仞盤空谿迴路轉黛抹霞封崛起而為西甌千山萬山之祖者亦猶天童太白之卓出乎明州之塢也巖之巔曰玅應峰秦漢而後僊跡接踵岐僼梅福往來憧憧而祖道無聞焉丙申春王巖華盛開予從西江一杖歸來始弘先師之道於此山此山峙西甌天童踞東海相去千里餘吾師道常在後昆未識師好向黃巖寺裏白棒頭邊猛自著精彩黃巖寺請踢倒銅棺千古永覺泉石悠然儘堪獨樂太白爐邊盡力吹茶熟煙消香正奇半盃快飲宜川上一默能開四眾疑永覺師請南嶽山中見伊蘭便作栴檀用銅棺頂上逢沈速卻當爛柴燒口如扁擔眼似眉毛一雙空手赤條條問著當頭惡水澆兒孫滿地成狼藉若箇超然物外高徑山雪嶠師太那一竺來桼桶不快打破疑團虛空粉碎從此摰風摰顛在處為殃為害遇魔不瞋見佛不拜嗣龍池而不肯龍池之語句廉纖罵天童而卻喜天童之作用超邁閒吟活句百千篇淡寫青山三兩塊喫桮茶罷便抽身生死關頭真自在夫是之謂徑山雪師太真寂聞谷印師太德訓耆舊請飲龍池水布雲棲雲教人念佛德訓久聞鞀鼓聲中如大徹先後天心不必分顓愚大師入空印室契圜通旨華發五臺菴中果結石頭城裏向人自稱我無起止子細撿點將來正是抱橋柱澡洗而今喜離葛藤窠壞笠枯笻也自多颺下不須收拾得坐看明月挂松蘿雲門爾密澓禪師壅壅腫腫邋邋遢遢雙耳聞鑼即便聾兩眼看山一似瞎若耶谿畔撒土拋沙石繖峰前橫該豎抹道是散木一支何異澄江浪發齏瓮深深葬錦鱗我亦幾乎被淹殺淹不殺千古萬古乾坤闊五峰學禪師三目禪人請君是老大哥我是最小弟支葉雖不同且喜同根蔕不讀東魯書卻會西來意七月東瓜艸上橫琅琅擲地作金聲一言自可傳今古何必千箱與萬籯龍池萬如禪師龍池猊座塵埃欲滿不是吾兄誰能紹纘萬指叢叢千峰岋岋福耶慧耶人天叵測少林道詮和尚佛頂寺請不受少林帕子卻是達摩嫡骨接得跨灶兒孫可稱八閩古佛碧天太祖偶爾未披衣非是不受戒直續少林宗豈希罕缽袋宴坐嬾說禪知有兒孫在且道是阿誰佛頂老師太體空受業師千年氣象壯禪關已懸黃巖之讖一條楖栗遊江海洞明夢筆之宗小子無知卻紹天童須信根源忘不得不煩揩背已同風自贊身似翹松之鶴心同出水之蓮雖紹盧公之後卻居王佛之先釋迦峰下藤條惡曾把虛空痛著鞭面目果然邈得像閒名千古任君傳蓮首座請亮公洞裏眠雲麻葉糠團常作飯洪崖井邊話月捏雙空手便成家繼曹谿三十四世不傳之心燈棒棒見血走支那百千萬里忘軀之布衲法法無差鐵壁摩空如觀得庭前枯竹糝梅華白法觀首座請天曆一書生西江大和尚名相有千差本身無二樣雖嗣臨濟宗不拈臨濟棒手握銅如意佛來也不讓瞎卻人眼睛破卻人家當如此大惡人豈可受供養分付黃巖眾弟兄快些趁下山前深深葬黃巖寺請數莖瘦骨如柴一雙眼孔天大要逼生蛇化龍擊碎無邊腦蓋翠巖黃巖佛頂次第已歷三會座下聽法者誰師叔師伯師太形儀陋劣不堪何事紛紛描繪祇為螺髻峰頭開法是第一代佛頂寺請儒名陳國賓釋號古雪哲究竟兩不通胸中墨漆黑既賴佛逃生又揚佛醜拙手拈如意子慣點金成鐵三處攪叢林惡名遍江淛語錄幾汗牛猶自滔滔說歸來故里中終朝灑淚血孝行未能全道亦何曾徹喚作活祖師口唇定笑缺分付振先公莫把栴檀爇天曆陳振先居士請者箇窮乞相豈可上丹青長年不念佛鎮日不談經懵懂卻有三四擔𠠢利都無一兩星㪬瞎天童正法眼虛名千古挂禪庭無念禪人請說你是真錯說你是假錯即假即真錯非真非假錯翠巖和尚諾如何得不錯鎮闍黎惺惺著鎮禪人請本是福建山裏人喚作中興翠巖祖極禪要明普化機雪際梅華香正吐極禪人請我無你莊不得你無我雙眼黑燄裏冰波中月是阿誰翠巖賊行莊請翠巖真面目佛眼莫能窺默坐毗耶室希音徹四維行音徐居士請陳相公之兒黃巖寺之僧豫章七返迎將去祇為親傳太白燈石菴陳文學請有時打佛有時鑄佛鑄佛時烈燄亙天打佛時痛棒徹骨權巧百千般胸中無一物夫是之謂翠巖老瞎禿超權孫居士請志在煙霞形遊城郭湛水寒蟾明天孤鶴紹臨濟不傳真宗提天童向上一著續燄聯芳十九人詎意虛名附驥末錯渠無名貌休圖度明天馮居士請齠年探魯誥滿肚文章不救貧離塵究竺墳通身佛法難醫病慣捉黃牛作馬騎嘗磨青石當銅鏡箇樣村僧村到家何事王臣咸恭敬就中卻有一毫長親見天童大法王超章王居士請孝子無時不念親忠臣無刻不懷主魯郎身在五羊城念念常思八十母求偈壽親復求像遙寄廬陵母供養我像無相亦無名誰是翠巖大和尚曾醫官請法名如經古雪大師翠巖和尚悉是虛名那堪供養不學嵩山單提白棒天童門下十餘人唯有者漢最無狀咄楊參戎請
