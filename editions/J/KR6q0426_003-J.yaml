body:
  text: 嗣法門人傳我等編住翠巖寺語錄上堂僧出打圜相云箇裏不許商量請師別通一路師以拂子打圜相拋向後進云手執夜明符幾箇知天曉師云何得把髻投衙進云透出龍門雲雨合山川大地入無蹤師云木龍雖有角未必解騰雲進云已飛霄漢外何勞更下錐師云腳跟下好與三十棒問喚作一物即不中未審喚作甚麼師云蚊子上鐵牛進云污染不得底人還假修證也無師云誰是其人進云突出目前師云切忌錯認進云覿面擊開無盡藏頭頭涌出自家珍師云好人不肯做更要屎裏臥問不入驚人浪難逢稱意魚如何是驚人浪師云當頭三十棒進云如何是稱意魚師云自領出去僧便喝師云亂喝進云老漢話頭也不識師云雪峰道底問談真則逆俗順俗則違真去此二途作麼生得恰好去師云鐵鷂飛雲外進云祇如古人道我宗無語句實無一法與人和尚五參未審又說箇甚麼師云事無一向進云恁麼則今古應無墜分明在目前師云你試舉目前底看僧禮拜云靈山受記不異今日師云且緩緩問南泉斬貓劍為不平離寶匣兩堂為甚臨機道不得師云伏惟尚饗進云未審南泉是何心行師云一任敲磚打瓦進云趙州戴草鞋藥因起死出金缾救得貓兒即今何在師豎拂子進云今日翠巖堂中也無貓兒爭得要且箇箇擒龍捉虎和尚又作麼生師云一狀領過進云手提殺活金剛劍誰敢當頭正眼看師云如何是金剛劍僧便喝師云三十棒一棒也不饒問人人鼻孔遼天箇箇舌頭拖地本分一著為甚有明與不明師云未到烏江畔知君未肯休進云明知生是不生之理為甚麼卻被生死之所流轉師云知之一字眾禍之門乃云碧水丹山盡是當人自己鴉鳴鵲喿無非古佛家風乃至妄想昏沉無明煩惱三毒四倒九結十纏一一精明一一解脫所以道一切障礙即究竟覺然雖如是鍼眼魚吞卻嘉州大象即不問你觀世音菩薩將錢買胡餅放下手為甚麼卻是饅頭不到烏江畔知君未肯休上堂僧問五參提唱百丈成規照例施行即不問如何是繼往開來底句師云高低山色朝昏見斷續鐘聲遠近聞進云與麼則一回拈出一回新也師云你試拈出看進云曉風凄玉樹霜月照瓊枝師云重說偈言乃云千山萬水來尋師決大事將謂有法求原來沒巴鼻日裏不得閒夜間不得睡抬磉路又遙搬柴山難跂肩頭腫似桃腳皮如粉碎腰又酸頭又悶粥又稀菜又淡衣又單風又利才到爐邊偷箇閒又被人家生論議仔細思量著好悽惶好生受也眾兄弟眾中或有箇擔版漢出來道長老寶華王座上須是說些禪說些道說些玄說些玅何得一味世諦流布同兒戲翠巖但向他道擔版漢你豈不見黃面老子說道治世語言資生業等皆與實相不相違背大眾還見實相麼大磉八人抬小磉四人舁平古法堂基上堂僧問言前薦得猶落今時如何是言前薦得底句師云月高林影盡進云有人不向佛法僧求到者裏和尚還有安頓他處麼師云霜重柳條疏進云只如功德天黑暗女移奪他不下底未審他具甚手眼師云洪州紙貴進云某甲則不然師云你又作麼生進云曾經大海休誇水除卻須彌不是山師云驢揀溼處尿乃云法燈既滅法堂摧蒿棘成叢瓦礫堆今日淨除無一物祖師何事不歸來驀拈拄杖云正恁麼時木上座跳出來說道老漢寱語作麼即今千指圍繞四海同堂赤肉團頭壁立萬仞阿那箇不是祖師靠拄杖云一釣便上復云以虛空為堂聚白雲為蓋不假椽柱棟梁不屬住空成壞呼釋迦為奴使達摩為价正恁麼時且道是誰境界一僧出眾作禮起便歸位師便打上堂僧問千華座擁四眾咸瞻方便多途即不問一門超出事如何師云鐵蛇橫古路進云恁麼則頂𩕳流出師子乳點化凡身即佛身師云蝦跳不出斗進云只如今日我公飯僧請法用報師恩未審他先師還來鑑也無師云何處不逢渠進云刀山劍樹翻筋斗天上人間任往還師云也是重說偈言乃云十八灘頭遇一人面目渾無徹骨貧百尺竿頭進一步擊碎珊瑚誇巨富富非富貧非貧喚牛作虎渾閒事功位雙超始是親正恁麼時如何是功位雙超底句寒松靜夜無虛籟老鶴移棲空月巢復云山僧昔在百城煙水時有箇同參字羅峰從儒入釋氣宇不凡聚首天童未幾分攜至西江雅為獨尊我公所推重頃聞在粵中已遷化了也山僧深為太息乃者我公過訪翠巖齎金設供命舉宗乘用報師恩山僧因詰其鍼芥之由我云曾問先師大事未明如喪考妣時如何答云呼喚不來大事已明因甚亦如喪考妣答云追悔不及某於言下打破漆桶大眾羅峰與麼荅話祇有殺人刀且無活人劍忽問翠巖大事未明如喪考妣時如何但向他道路旁華表柱大事已明因甚亦如喪考妣階下破芒鞋佛成道日獨尊上座薦鑑進二禪人請上堂僧問智慧德相本自圜成六載雪山為明何事師云山桃葉落霜風急進云恁麼則大地含靈齊成正覺去也師云梅萼香飄清晝寒進云驀然打失瞿曇眼剎剎塵塵正體彰師云乞兒見小利問夜睹明星即不問圜成三聚事如何師云剎竿頭上風車子問此二亡人一明一暗離此二途請和尚道師云金鎖兩頭搖進云恁麼則雷音震大地聾人親得聞師云聞後又作麼生進云亡人承法力直超涅槃城師云者句最親切乃云一人就路還家一人離家就路離家就路寸步不曾移就路還家通身無影像便恁麼去猶在半途何況辛苦六年睹星半夜說迷說悟點肋點胸撿點將來不免喫翠巖手中痛棒大眾還知棒頭落處麼若委悉去便見得大地含靈本不曾迷釋迦老子亦不曾悟鑑進二禪客元不曾死目前四眾等亦不曾生所以道性真常中求於迷悟生死了無所得既無所得則釋迦老子亦不可得大地含靈亦不可得目前四眾亦不可得鑑進二禪亦不可得說底不可得聽底不可得所說之法亦不可得此不可得亦不可得與麼見得正是黑牛臥死水未得脫灑在須知死人路上有活人出身處活人路上死人無數灼然出得荊棘林是好手正恁麼時脫灑一句作麼生道卓拄杖云枯樹雲充葉凋梅雪作華打七晚參本自絕思議無端要起期期中疑未息大家要打七七日七夜不許眠通紅猛火著油煎煎得虛空頭腦裂眉鑯迸出珊瑚月且道迸出後如何海門東畔是新羅復舉歸宗禪師因僧問如何是佛宗云即汝便是僧云如何保任宗云一翳在眼空華亂墜師云歸宗老漢固是作家宗師其奈眼孔太窄或有問翠巖如何是佛劈脊便棒如何保任連棒打出且道與歸宗是同是別上堂僧問如何是金剛正體師云萬年床上雪漫漫進云如何是當人玅用師云缽盂峰畔古松青進云從體起用時如何師云洪爐翻玉浪進云攝用歸體時如何師云大地絕纖埃進云體用互呈時如何師云鼻孔下頭大進云體用已蒙師指示如何是新婦騎驢阿家牽師云前三三後三三進云不是輪他肌骨好大抵風流出當家師云你道譚董二將軍竟日商量何事僧云過師云未是當家在問莫守寒巖異草青坐卻白雲宗不玅意旨如何師云不許夜行投明須到進云如何是宗師豎拂子進云草枯巖裂時宗在甚麼處師云藏盡楚天月猶存漢地星進云恁麼則龍歸大海波濤壯虎到深山意氣雄師云念言語漢乃云十五日已前爾不得住我者裏竹密不妨流水過十五日已後爾不得去我者裏山高那礙白雲飛正當十五日雲橫四野水滿雙谿去住自由彼我無二維那手中巡香版忽然𨁝跳上非非想天擉瞎摩醯首羅三隻眼石門和尚倒騎洪崖先生雪精鑽入露柱鼻孔裏去也水口廟裏譚董二將軍擲下寶劍呵呵大笑云飛鳥盡良弓藏狡兔死走狗烹你輩瞌睡禪和子晝三夜三開眼也睡合眼也睡還曾睡醒也未卓拄杖云吽吽便下座晚參明朝一七已完村前有箇王媽媽今日到寺中恭恭敬敬下一請帖帖中道你們打七禪師盡是學般若菩薩作堂頭底坏子百劫千生難逢難遇明朝攀請列位到他家喫頓如意底放參飯祇是飯中醍醐也有毒藥也有你若不喫他底不免饑羸慞惶喫他底又被鬧殺且道喫底是不喫底是眾無語師云真箇可憐生良久復云不見身心世界亦未見自性在一拳打破虛空猢猻走入布袋謝靈杲三目無隱三專使天童埽塔歸上堂僧問庚峰設奠知恩報恩知恩報恩即不問肋下還拳事若何師云龍生金鳳子衝破碧琉璃進云恁麼則麟角鳳毛俱是瑞栴檀薝蔔一般香師云親言出親口乃云鄞江此去三千里總在先師一塔中百十餘旬遊歷遍芒鞋蹋破見同風同風已見消息已通法乳已酬真風已扇還有不假遊歷不出戶庭直下見得先師靈塔底麼其或尚留觀聽不免當陽指出以拂子打圜相云見麼覿面不明此一著回頭何啻隔千山昨來天童林野奇和尚云千里同風彼此知睽違許久弗無疑前朝接得真消息始信渠儂不負師道場山翁忞和尚云天童法乳潤閻浮若箇知恩解報酬颯颯千林秋色暮真風何意扇南州大眾二大老舌如利劍眼似銅鈴尋常訶佛罵祖抑古排今為甚麼卻放翠巖小長老出一頭地不見道同聲相應同氣相求然雖如是翠巖已被二員老賊活埋在無底阬裏了也諸人還知利害麼更有奉和道場法兄三偈舉似大眾道峰峰頂鐵船浮掣電機鋒不易酬佇看楊歧真嫡骨高提三腳跨神州巾缾共侍白峰時往事而今尚可追幾度向爺誇幼弟憐才豈惜兩行眉不才深媿繼天童推獎猶欣見古風誰謂分光非佛日毫端已現一輪紅立春小參霜華布地冰樹參天凍鎖千谿寒封萬岫正與麼時無言童子出來報道今日東君行正令霜華冰樹豈能留翠巖道子何以見得他道葭管已飛灰翠巖道葭管已飛灰東君在何處童子便禮拜大眾且道童子是會了禮拜不會禮拜若辦別得春冬同一際往復任隨流若辦不得歲華空復晚鄉思不堪愁昔有僧問雲門禪師如何是雲門一曲門云臘月二十五大眾雲門一曲可謂今古罕聞白雪陽春祇是難為接拍今日正當臘月二十五還有會得雲門一曲底麼翠巖固是病體支離也無玅音可和聊為應箇時節與大眾聽聽以拂子擊香案高聲唱云你若無心我也休除夕上堂僧問眉毛分八字鼻孔大頭垂迷悟不干懷合作麼分付師云空中書卍字進云祇如父母未生前者一著落在甚麼處師云燄裏結寒冰進云三十日到來又作麼生師云青山常在白雲中進云來年更有新條在惱亂春風卒未休師云未必乃云事無巨細貴在力行理無深淺玅在徹見徹見則事事皆如力行則頭頭合道山僧昨來肩竹過落馬嶺上無端蹋破舜若多神鼻孔直得百億須彌一時粉碎章江惡浪徹底俱乾香嚴老子從天降下拍手高歌云去年貧未是貧今年貧始是貧去年貧猶有半倉穀今年貧大倉小倉無一升山僧隨聲便喝云老老大大俗氣也不除大眾祇如脫俗一句作麼生道還知麼但得雪消去自然春到來復舉北禪賢禪師云年窮歲盡無可與諸人分歲且烹一頭露地白牛炊黍米飯煮野菜羹大家喫了向榾柮火唱村田樂免得倚他門戶傍他牆剛被時人喚作郎天童林野和尚云古德烹露地白牛分歲天童煮透海烏雞過年不用文武火燒放下自然頓熟大眾烹牛煮雞二老不妨奇特爭奈美食不中飽人餐翠巖者裏無牛可烹無雞可煮祇是一味平常麤茶淡飯與大眾分歲何故人情若好喫水也甜元旦上堂僧問元正啟祚即不問斬新號令請師宣師云杲日正東昇僧打圜相云者箇還有新舊也無師云寒蟬抱枯木進云祇如鏡清道有明教道無又作麼生師云塞北千人帳江南萬斛船進云恁麼則二途齊坐斷獨露一輪紅師云舌上覆金錢乃云鬧市裏識取天子百草頭薦取老僧老僧面目了無故新天子威光豈有遐邇既無遐邇則含元殿上釋迦峰前不隔寸絲當陽顯露既已顯露且道如何相見乃起身鞠躬云萬歲萬歲萬萬歲下座晚參三年倚杖谿頭寺千指團圞話歲寒誰是金毛師子子不妨吼出大家看有麼有麼僧問鐵牛喫盡欄邊草時如何師便打進云石人遇石虎相看早晚休師復打云且道棒頭落在甚麼處僧畫圜相師復打問如何是奪人不奪境聲未絕師便打云是人是境僧擬議師連打退云學語之流復云還有問話底麼眾不出師云拋鉤釣鯤鯨卻釣得箇蝦兒小參過年經五日紛紛來賀新通紅席帽下都是舊時人大眾昨日知客引箇戴席帽底漢子到方丈相見山僧深深向伊作揖了起來遂問尊駕高姓伊云黃梅道底請教大號伊云臨濟道底高隱何鄉伊云和尚何得忘卻大眾山僧被者漢一拶直得東西不辦南北不分眾中還有記得底麼試出來說說看既是舊時人因甚不諳他住處委悉麼莫怪相逢不相識隱隱猶懷昔日嫌上堂僧問子韶格物玅喜物格請師一言分明剖析師云籬頭吹觱栗進云如何是格物師云微風搖古木進云如何是物格師云細雨滴巖華進云格物與物格相去多少師云長江水上波進云明皇斬畫像彼中頭落意作麼生師云片葉飄庭際西風萬里秋進云恁麼則一劍橫飛兩頭俱落去也師云殷勤送出荒郊外僧便喝師云亂喝進云莫將鶴唳誤作鶯啼師云棺木裏瞠眼乃云禪堂裏繞露柱經行步步蹋著齋堂裏拈瓦碗喫飯下下咬著蒲團上疊雙膝打坐心心念著乃至東廊上西廊下東司頭火爐邊處處撞著既是撞著念著咬著蹋著則一一分明塵塵解脫因甚一七二七坐到三更五更畢竟不得疑團獦狚爆地從胸落喝一喝云無繩休自縛復舉襄州華嚴禪師上堂云大眾今日若是臨濟德山高亭大愚下兒孫不用如何若何便請單刀直入華嚴與汝證據平地摝魚蝦守廓侍者出眾一釣便上禮拜起便喝嚴亦喝廓又喝嚴亦喝兩箇漆桶相揩廓禮拜起曰大眾看者老漢一場敗闕又喝一喝拍手歸眾普州人送賊嚴下座歸方丈釣得金鼇即便休時風穴作維那上去問訊嚴曰維那汝來也叵耐守廓適來把老僧扭捏一上待集眾打一頓趁出再理竿絲連夜釣穴曰趁他遲了也自是和尚言過他是臨濟下兒孫本分恁麼錯下名言嚴方息怒鐵鑄面皮穴舉似廓傳言送語有甚了期廓曰你著甚來由勸者漢我未問前早要棒喫得我話行如今不打搭卻我者話也已喫華嚴三十棒了也穴曰雖然如是此話已遍天下不信道大眾舉已舉了註已註了還知二老著落麼不惜眉毛更為諸人拈出電卷星馳龍驤鳳翥敗闕則二俱敗闕作家則彼此作家還有單刀直入底麼若無欒布作爭得見韓光請知淨化主上堂僧問放出堀中師子吼震遍三千及大千收回直下無蹤影收放一句請師宣師云露柱穿靴水上立乃云清淨身原自絕塵也須入水見長人休論桶箍爆不爆乞米乞炭何妨道柳巷華衢信步行鍋子由來鐵鑄成已到未到喫茶去風前有路超調御毫端建剎亦尋常一柱明明牚一梁驀地打開無目面瓦解冰消全體現且道那箇是現底全體滿撒珍珠羅帳裏喝一喝復舉文悅禪師初參大愚芝芝曰來何所求曰求心法芝曰法輪未轉食輪先轉後生家趁色力健何不為眾乞食我忍飢不暇何暇為汝說禪乎悅不敢違未幾芝移翠巖悅納疏罷復過翠巖求指示芝曰佛法不到爛卻宜為眾乞炭悅亦奉命能事罷復造方丈芝曰堂司乏人今以煩汝悅受之不樂恨芝不去心地坐後架桶箍忽散自架墮落忽然開悟頓見芝用處走搭伽黎上寢堂芝迎笑曰維那且喜大事了畢悅不及吐一辭而去大眾芝老並不曾教伊看話頭做工夫為甚麼悅公便悟去還知芝老為人處麼野色更無山間斷天光直與水相通解制謝靈知藏齋兼普請栽松上堂僧打圜相云祇者箇三世諸佛不知有黧奴白牯卻知有因甚有結師云鐵馬沉寒水進云作麼生解師云雪晴天地春進云結解同源縛脫不二如何是同源不二師豎拂云見麼進云既解之後向甚麼處去師云看腳下進云未動腳跟前一步看來原不涉程途師云也是雲居羅漢乃云紙燈吹滅古路全彰疏鈔俱焚靈光獨朗正要滅胡種族何期誤入桃源一條白棒橫拈萬古威風凜冽更說即心即佛何殊癩馬繫枯樁縱使非佛非心也是烏龜行陸地直得不是心不是佛不是物一槌粉碎黃金骨也未是性燥漢那堪更向黑山下鬼堀裏東思西想說我坐禪提話頭做工夫活被周金剛笑殺跳出黑山鬼堀一句作麼生道瘦石連雲坐青松帶雨栽以拂子擊禪床下座上堂僧問人法俱空本絕蹤曹谿更立五家風手拈鐵棒敲殘月萬別千差直下通既是人空法空和尚更付何法師云春至百華開進云祇如世尊初轉法輪四眾俱從一門超出未審是那一門師豎拂子進云雖然果證無生國爭奈遭他毒藥何師云上座也跳不出乃云野渡無人舟自橫果然親到者裏大地山河一隻眼何妨爍破乾坤沒溺天下人須是紅爐玉浪鋪華新錦上還他春谷雪門一機既投千機頓赴一處既徹萬法全彰所以道承當恁麼事須是恁麼人若是恁麼人何愁恁麼事正恁麼時續燄聯芳一句作麼生道釋迦峰畔春風急四朵曇華一夜開復有一偈中原楚粵與雲間異地同參濟北禪分得翠巖峰頂月大千何處不團圜佛誕日靈宗禪人請上堂僧問蜀魄連宵叫鵽鳩終夜啼圜通門大啟何事隔雲泥如何是圜通門師云幽禽忽起藤華落澗瀑吹聲度石橋進云若將耳聽終難會眼處聞聲始得知師云你道陝府鐵牛因甚吞卻嘉州大象進云鐵牛且置祇如世尊今辰降誕和尚還有慶贊句子也無師云向日荷新卷進云恁麼則香水驀頭齊灌沐莫教錯過老金僊師云迎風柳正青乃云韶陽要打殺趙州不喜聞落華浮別澗流恨滿江村大眾古今禪客盡道韶陽透頂透底知恩報恩者一棒打得極好又道趙州把斷要津不通凡聖佛也沒奈伊何與麼見解未出常情有甚麼交涉殊不知二大老祇圖步步登高不解從空放下翠巖今日也不行棒不行喝一味笑臉相迎和南合掌淨點武夷茶三盞熱燒朮香湯一盆與伊從頭洗滌一遍不是攀條攀例亦非報德報恩可中有箇向合水和泥處一腳蹋翻不妨通身慶快慶快即不無且道昭王二十四年以前向甚處與伊沐浴峨嵋原不離西蜀下座浴佛畢復舉藥山與遵布衲浴佛次山云汝祇浴得者箇要且浴不得那箇遵云把將那箇來山休去大眾者箇適來已浴畢如何是那箇一僧云掬水月在手弄華香滿衣師打一棒歸方丈小參僧問處處綠楊堪繫馬家家有路透長安文殊七佛之師為甚麼出女子定不得師云洲白蘆華吐進云把斷要津不通凡聖罔明初地菩薩為甚出得女子定師云園紅柿葉飛進云大定等虛空廓然無出入正恁麼時喚甚麼作定師云草深蛇性悅進云出群須是英靈漢敵勝還他師子兒師云未放你在乃云未上堂先上嶺遵古規赴普請擔版歸說法竟無耳人始解領領即且置作麼生是所說底法道遠芒鞋破肩疼打拄撐復舉睦州禪師喚僧僧回首州云擔版漢大眾者僧從無始劫擔一片版忽被睦州老漢覷破直至如今不肯放下眾中還有放得下底麼眾默然師驀拈拄杖云你者一隊擔版漢不打更待何時一齊打散歸方丈晚參九十春光忙裏過百千妄慮靜中消繁興不出那伽內道定尸羅共一條大眾道共定共同具此心心定則諸妄不生心明則諸惡不作所以僧問趙州如何是不錯底路州云明心見性是不錯底路現前諸公還曾明得自心也未若也明得則終日忙忙那事無妨所以道那伽常在定無有不定時如是則一切戒門定門慧門一時具足不假外求其或未明祇是忙過一生殊無所益塵勞中人固為身家兒女浮名浮利忙出家比丘或住菴或入眾亦不免為口體忙舉世未見有為生死無常著忙者溈山云無常老病不與人期朝存夕亡剎那異世言念及此則口體可忘身家可棄昔鹽官會下有一主事僧忽見鬼使來捉僧云吾以主院事忙未暇修行容七日後同去何如使云待歸白大王若許即如命七日後鬼使復來遂尋此僧不見試問大眾七日前來尋得見七日後來為甚麼尋不見眾下語不契師代云片雪點紅爐萬歲牌成行裁汪居士請上堂一人端拱無為萬國咸歸至化干戈偃息河海澄清豈不是聖諦第一義著衣持缽埽地焚香抴木上高灘褰衣渡深水衝風冒雨戴月披星豈不是聖諦第一義乃至紅塵堆裏火宅頭邊挈斗持衡沽鹽買醋豈不是聖諦第一義與麼觀得則不離火宅便獲清涼不斷髮鬚高超正覺三車是甚閒家具八教何異碗鳴聲然雖如是達摩祖師因甚對武帝云廓然無聖橫按莫邪全正令喝一喝復舉世尊成道後在逝多林中趺坐有二商人以五百乘車經過林畔有二車牛不肯前進山神報言林中有聖人成道經逾四十九日未食汝當供養商人入林果見一人乃問云為是梵王耶帝釋耶山神耶河神耶世尊微笑舉袈裟角示之商人頂禮遂陳供養師云釋迦老子無端被山神覷破卻向二商人面前納場敗闕你道那裏是他敗闕處豎拂子云聻更為頌出梵王帝釋山河神著相耽名喪本真拈起袈裟如薦得當陽自證法王身無塵白夫人請上堂僧問第一義諦即不問今日陞堂事若何師云驀地喚回霜夜夢舉頭唯見月當空進云恁麼則萬古晴空絕是非師云剎竿頭上仰蓮心進云祇如古人道萬法本閒唯人自鬧如何是本閒底道理師云青松滿地栽進云恁麼則橫身三界外獨露萬機前師云放汝三頓棒乃云耆闍山上獻珠草枯鷹眼疾鹿門寺裏插髻雪盡馬蹄輕所以道群靈一源假名為佛佛既是假名則一切世間僧俗男女聖凡迷悟乃至山河大地草樹園林悉是假名回觀四大六根如空中華鏡中像水中月日中影如是則山不是山水不是水僧不是僧俗不是俗男不是男女不是女凡不是凡聖不是聖全體即佛無成不成全妄即真無證不證不壞假名而談實相不離萬派而歸一源正恁麼時歸源一句作麼生道眼中有翳須挑刮鏡上無塵不用摩昔舍利弗因入城遙見月上女出城舍利弗心口思惟此姊見佛不知得忍不得忍我當問之纔近便問甚麼處去女云如舍利弗與麼去弗云我纔入城汝當出城云何言如舍利弗與麼去女云諸佛弟子當住何所弗云諸佛弟子依大涅槃而住女云諸佛弟子既依涅槃而住我如舍利弗與麼去溈山哲云一人出城一人入城何言如舍利弗與麼去若人知得舍利弗月上女二人去處十二時中動轉施為無非住諸佛大涅槃若也未知業識忙忙無本可據大眾舍利弗雖然深入虎穴爭奈猢猻弄黐月上女固解倒捏蛇頭正是蠟人向火大溈順朱填墨未免依草附木翠巖今日向猛虎口裏奪食去也不居煩惱宅不臥涅槃床漢地不收秦不管倒騎驢子下淮揚以拂子擊禪床下座
