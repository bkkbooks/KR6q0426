body:
  text: 嗣法門人傳我等編住翠巖寺語録熊少宰陳司理等為師四旬入山設供請上堂僧問法王法誕喜重逢台旆聯翩陟梵宮萬指臨筵齊側耳祈師一語壽寰中師云北斗面南看進云恁麼則瑞草生嘉運林華開早春師云鐵笛橫吹宇宙清進云直得迦葉峰頭祥霧起鉢盂山畔慶雲生師云衆宰輔證明進云少宰壽章中道天童懷嫡乳白法豎宗風未審嫡乳在甚麼處師豎拂子進云恁麼則處處逢彌勒門門遇善財師云放汝三十棒乃云年登彊仕一無成鶴髮催人兩鬢生何意文星耀寒谷松杉深處降台旌台旌既降翠竇增輝曲彔高升合談何事若說忘形死心正是枯樁繫癩馬更或行棒行喝何殊操瑟立齊門到者裏畢竟作麼生即得豎拂云見麼一處真千處百處一時真一處見千處百處一時見譬如師子之毛無一莖不是金色栴檀之木無一片不具幽香在天而天中高明在人而人中尊特在朝而朝無斃政在野而野無怨言乃至紅塵堆裏鬧市頭邊若俗若僧若男若女一一天真一一明妙更無毫髮隱覆祇貴直下承當所以道若人見幻本來真是則名為見佛人圜通法法無生滅無滅無生是佛身大衆要見佛身麼年年驂野鶴踏破嶺頭雲復舉裴相國遊洪州開元寺睹壁間所畫高僧像遂問黃檗禪師云儀容可觀高僧何在檗呼裴休裴應諾檗云高僧何在裴當下大悟師云黃檗固是作家爐𩍁善能點鐵成金裴相國不昧夙因等閒一撥便轉諸人還知二大老針芥相投處麼卓拄杖云驀地喚回霜夜夢抬頭唯見月當空獨尊上座請上堂僧問空劫以前本自無生無生即不問預慶事如何師云一片月生海幾家人上樓進云此猶是學人疑處直截一句請師道師云白鼻崑崙舞柘枝問四十年來諸惑盡高提白棒指群迷指迷法要願垂慈示師云明月蘆華君自看進云恁麼則兩頭俱坐斷八面起清風師云十八灘頭鳥作窠進云人人咸和無生曲願祝吾師壽萬春師豎拂云者箇壽年多少進云與水牯牛同春師乃豎拂云大衆見麼三世諸佛向者裏示現受生分身百億移華兼蝶至歷代祖師向者裏垂絲擲釣拋三放兩買石得雲饒翠巖到者裏畢竟如何施設不入洪波裏爭見弄潮人中旭耆宿送僧伽黎至請上堂僧問千佛送袈裟慶世尊之成道耆衲呈法服祝和尚之遐齡未審其中事是同是別師云千華叢裏一華新進云可謂今古應無墜分明在目前師云剎竿頭上風車子僧禮拜師乃云金色伽黎異樣精線行畦路似生成披來獨踞華王座說法分明不是聲既不是聲所說底是何法還有證據得底麼若證據得便見得一切色是佛色一切聲是佛聲夢幻泡影全體無生涅槃妙心當陽顯露所以道塵說剎說熾然說無間歇既無間歇因甚十箇到者裏有五雙不聞委悉麼劍閣路危終易度趙州關險實難行復舉阿難問迦葉尊者云世尊傳金襴袈裟外更傳何物尊者呼阿難難應諾尊者云倒卻門前剎竿著大衆推倒即易扶起即難翠巖今日為阿難扶起剎竿去也卓拄杖一下喝一喝下座諸郡化士歸上堂敲遍千門萬戶戴月披星奔走四海五湖衝寒犯暑忘軀為法堪作典型垂手入廛是大化主衆生慳囊既破衲僧功行齊圜所以道為人如為己身彼此事辦正恁麼時自他兼利一句作麼生道數點方外雲幾處人間雨復舉黃龍南禪師因化主歸上堂世間有五種不易一化者不易二施者不易三變生為熟者不易四端坐受食者不易更有一種不易是甚麼人良久云聻便下座大衆黃龍祇知有難不知有易翠巖即不然世間有五種不難作麼生是化者不難隨色摩尼耀膽寒作麼生是施者不難泥彈博將金彈丸作麼生是變生為熟者不難一氣炊成恣飽餐作麼生是受者不難溪壑同歸滄海寬且道第五種不難又作麼生黑華貓子面門斑香城請上堂借順公法座展太白家風誰解當機互相酬唱僧問衆僧塔樣即不問如何是無縫塔師云鐵蛇鑽不入進云既是本無縫罅為甚今日始得合卻頂子師云不因夜來雁爭見海門秋問古鏡重開順翁法席仍舊浮屠圜頂翠巖機用斬新斬新句子乞師垂示師云山空雲自在進云恁麼則含靈俱有賴無處不騰輝師云天淨月孤圜問慈風普扇衆靈歸窣堵波中翠竇重輝遍界立達摩峰下因甚又離寶所特降香城師云戶外竹敲千嶂月進云臨濟正宗委在和尚因甚正法眼藏向瞎驢邊滅卻師云覿面有機人不薦問白雪溪頭古道場多年箇裏絶商量今朝喜見金毛現不審如何為舉揚師云聲前有路超今古進云如何是無縫塔師云適來已道過進云如何是塔中人師云鼻孔無半邊乃云空華落處洞無痕誰解生前究此源雲裏堵波新露穎直令枯骨盡沾恩大衆兵戈之後處處白骨遍野目擊悽然生無所託死無所歸此等蓋為生時唯貪世樂沒後不免沉淪及至禮骨鞭尸遲了八刻我輩衲僧家高蹈世表不與物移名利不干懷得失不為念生則以叢林為家死則以普同為塔既無暴露之慘又無凍餓之憂正好向百骸未散之前究取本源一著便見六道四生生生死死苦樂逆順皆如空華都無實有昨來請啓中道搐鼻示人久歇堀中師吼點胸躡嶺重聞天外龍吟豎拂云大衆即今順婆婆與真點胸同在山僧拂子頭上作大師子吼了也諸人還聞麼其或未聞不免再打葛藤一上要知此事便如造塔一般雖是現成山水現成石頭若無青烏選擇巧匠琢摩終不能成始自開基定向終至疊石合鑯方是歇手時節我輩學道亦然本源佛性雖是現成若不遇明眼宗匠指點琢摩終成廢器始自腰包行腳撥草瞻風終至㘞地一聲方是合鑯時節非特我輩為然即從上佛祖及天下諸善知識各各有一段合鑯時節正恁麼時如何是合鑯底句一點鋒鋩露千峰瑞色新昔有僧問古德如何是無縫塔德云囫圇磚翠巖即不然或有問如何是無縫塔但向他道一層山石一層灰如何是塔中人團圞相對坐共語不知名開爐上堂一住溪頭寺五開沒焰爐誰是銅頭客當機捋虎鬚僧問庫樓新就七尺單成箇箇剔起眉毛明明諸佛同體請問如何是諸佛底體師云石頭土塊乃云打開自己庫藏一物渾無運出自己家珍受用不盡三世諸佛受用不盡歷代祖師受用不盡一切衆生受用不盡既是受用不盡因甚一物渾無者裏薦得石頭土塊盡是精金脫或未然玉殿瓊樓翻成蔓草正恁麼時爐𩍁弘開轉凡成聖一句作麼生道萬機休歇無餘事正是心空及第時上堂僧問倒握烏藤乃佛乃祖之宗綱已振安居半月鍛聖鍛凡之爐𩍁且精祇如非聖非凡非佛非祖又作麼生師云百尺竿頭舞柘枝進云恁麼則道泰不傳天子令時清休唱太平歌師云須彌因甚倒卻一角僧擬議師云未明三八九不免自沉吟進云承師有言庫藏揭開萬疊銀山成粉碎祇如銀山粉碎是者邊事那邊事師云海枯終見底進云向上還有事也無師云有進云如何是向上事師云今日不打闍黎進云家珍運出一莖青草現瓊樓祇者一莖草因甚如此奇特師云大地無人識進云祇知樵子徑那曉鳥道行師云直饒行鳥道終未達其源乃云山僧近來咳嗽肌膚未老先皺無力旦望五參一句與君說透且道是那一句咳嗽一聲便下座觀初禪人請上堂僧問禪律並開人天普會共住之要尸羅為先尸羅即不問如何是恁麼事師云十八灘頭鳥作窠乃云千里百里擔囊負鉢皆是為戒而來其奈翠巖無戒可授三年五年摩褌擦褲皆是為法而住其奈翠巖無法可傳既無戒可授又無法可傳今日登壇憑何利物豎拂云四角團圞無底鉢當陽拈出莫遲疑願海旋沆四禪人請上堂願海旋沆修淨供供養四海僧伽衆承茲勝行滌前愆烈焰爐中飛彩鳳喝一喝靈峰不立耆舊三周忌志充禪人請上堂修身慎行保全髮膚菽水承歡左右奉養是人子事親之孝方袍圜頂執侍巾瓶無思不服唯命是從乃弟子事師之孝且道衲僧家以何為孝聻喝一喝云若明得者一喝落處則無恩不報無德不酬脫或未然聽取葛藤妙性圜明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真釋迦老子為汝諸人一槌粉碎了也試問大衆既是無有生死為甚不立耆舊化去三年影也不見豎拂云還見麼祇憑此段真消息戴角披毛遍剎塵體幻禪人等偕普明尼請上堂僧問傾囊敬飯五湖僧不待金牛喚始明法令已行三界外請師一語示無生師云空中騎鐵馬進云渠儂盡是英靈漢為甚轉身不得師云被底放風箏乃云苾芻苾芻尼求戒復求法弟兄十二人人人不缺乏既不缺乏復求何事沙囊如未開杯蛇難自吐成道日開大鍋請化主募大殿兼謝何介甫居士齊上堂僧問靈峰親坐斷萬象寂無形正眼從茲豁誰看中夜星師云玉華墜處山河隱進云始本原不二悟境何多門師云金錫敲時虎豹驚進云恁麼則掀翻海嶽求知己撥亂乾坤見太平師云古廟裏師子乃云夜半睹星悟道鍋是鐵造毫端現寶王剎千重百匝種穀決不生粟介爾景福且道各化一方有何所長鐵船款乃泛滄浪打七晚參七日便要悟道一鍬便要穵井井深必假工成道近剎那可省且道省後如何雪覆萬山寒孤峰仍露頂除歲大覺和尚寄天童先和尚頂相至上堂巍峨頂相千聖難窺赫奕威光萬靈叵測一一騎聲蓋色頭頭邁古超今遍現百億州都了無蹤跡歷盡塵沙歲月杳絶春秋若非嫡骨兒孫爭解全身描出大衆大覺法兄以至公無我之手眼描得至尊無上之面目毫髮無差遠寄西江以表同門法印適來迎笑堂中已自當陽展示諸人還曾親見也未若也見得親切便可遐暢先宗扶衰起斃其或見刺未抽不免重重指注遂展手云見麼人生相識貴知音水入水兮金博金泗洲聖向揚州現鐵樹華開香滿林歲朝大雪恆輝知浴五旬初度請上堂僧問元正啓祚萬物咸新斬新條令即不問如何是本來父母師云恆輝遍界進云如何是現在父母師云遍界恆輝進云如何是未來父母師云箇箇絶囊藏進云三世父母蒙親指報恩一句請師宣師云一枝梅綻萬家春進云恁麼則萬邦歌舜化千古樂堯年師云祇知白雪寒侵骨誰信紅爐凍殺人問新年頭佛法即不問尼父因甚五十猶學易師云春風初解凍乳燕漸歸巢進云如何是易師云太極收不得乃云父母未生前恆輝遍界父母既生後遍界恆輝與麼見得便知四十九年無非可斷百千萬歲無壽不延是故賢聖生時瑞雪慶雲常現象龍所至深淵峻石俱靈然雖如是欲明石裏無瑕玉須薦生前不老人卓拄杖下座晚參若論此事譬如野火燒山一般星星之火順風一吹縱使萬壑千峰枯枝腐草一時鞠為灰燼且道燒盡後如何青山依舊白雲中上元留兩序兼薦玉菴承公上堂燈月交輝未為真照主賓互換方見作家若非異目超宗爭解同生同死所以建大廈非一木之能濟巨川非一人之力然靜久思動人之常情去去又來叢林通例且坐斷去來不涉動靜一句作麼生道擊拂云棒頭喝下承當得遍界無非碧玉菴晚參一期曾未竟心識已紛飛壁角抄方語閒房話別離曲談猶夢夢直指謾孜孜珍重參玄客精神莫浪施復舉芝禪師上堂云翠巖路險巇舉步涉千溪更有洪源水滔滔在嶺西師云山僧即不然翠巖路坦平南北任君行誰信鼓鐘石朝朝夜夜鳴解制上堂昨日有人從河北來卻得江西信說道西山頂上去冬凍折一株老松壓倒五百人家屋子今春鐵樹宮前又被人偷去一員古井唯有杏華村裏無底草鞋甚賤一分買得一雙諸人明日出山去各須買取不得忘卻便下座涅槃上堂僧問未離兜率降王宮處處巖花綻曉風向道如來原不滅雙林何事去匆匆師云竹密不妨流水過進云恁麼則石火電光追不及大千沙界現全身師云如何是世尊底全身僧彈指師云且莫認奴作郎問毗藍初誕已顯本具之尊雙樹言歸直示無生之體請問如何是無生之體師云遲日江山麗進云九天雲影淨遍界悉清輝師云瞎老婆吹火乃云毗藍園裏不曾生雙林樹下何曾滅祇此不滅與不生便是眼裏黃金屑所以世尊道若道吾滅度即非吾弟子若道吾不滅度亦非吾弟子畢竟如何到江吳地盡隔岸越山多復舉秦跋陀禪師問生法師云法師講何經生云涅槃經陀云如何是大涅槃生云涅而不生槃而不滅不生不滅是涅槃義陀云者箇是如來涅槃那箇是法師涅槃生云涅槃之義豈有二耶某甲祇如此未審禪師如何陀豎如意云見麼生云見陀云見箇甚麼生云見禪師手中如意陀將如意擲地云見麼生云見陀云見箇甚麼生云見禪師手中如意墮地陀云觀公見解未出常情何得名喧宇宙生不能加答大衆生公說法能使頑石點頭因甚向跋陀面前重重納敗益見畫餅不可充饑敵勝還他師子敢問現前大衆如何是大涅槃衆下語不契乃云諸人要見大涅槃麼雨洗淡紅桃萼嫩風搖淺碧柳絲輕下座結夏上堂僧問三月安居泥裏洗土勦絶一句作麼生道師云雨花橋畔水今古向東流進云莫是他安身立命處麼師云逐逐駑駘步且非師子花進云龍得水時添意氣虎逢山勢長威獰師云方木逗圜孔乃云疾風暴雨來滿庭水漉漉不必再三請我自登曲彔中途不許停古廟不許宿拶斷虛空筋舌頭原是肉喝一喝復舉龐居士偈拈云護生須是殺尼寺覓胎髮殺盡始安居枯樁繫老驢要會箇中意泥蛇咬鱉鼻鐵船水上浮熱處冷颼颼大衆龐公葛藤已為汝等勦絶了也還有直下知歸底麼脫或未然九旬策起雙眉看一點疑消萬法通端午上堂僧問天童先和尚云到底輸卻自家寶如何是自家寶師云持燈覓火人無數進云一刀斫盡虛空時如何師云你刀子在甚麼處進云禮拜去也師云口銜羊角乃云五月五是端午河下競龍舟鄉間纏角黍往來今古人歲歲常如此衲僧家越今古日夜不曾眠剋期超生死且道生死作麼生超擊拂云懸崖撒手後遍界赤條條復舉天童山翁和尚因僧問人間此日划龍舟鼉鼓聲聲競碧流林下道人無別事請師顯露箇宗繇山展拂子僧云恁麼則覿面無私去也山云刺瞎汝眼大衆覿面無私近來禪和箇箇會說刺瞎汝眼十箇有五雙茫然試問大衆拂子在山翁和尚手裏不曾動著纖毫因甚卻刺瞎者僧眼若也會得盡大地無一纖毫過患若也不會直須到西天問取阿那律晚參武寧細茶是化來供衆底進賢黑豆是供山僧底供養山僧底大衆有分供養大衆底山僧亦有分山僧與大衆非二亦非一衆中未得入頭底直須薦取山僧已得入頭底須向大衆邊會取即今茶已飲了豆已喫了大衆邊事且置祇如山僧終日與諸人同行同住同坐同起還有親見山僧面目底麼試出來說說看一僧云武寧細茶師云武寧細茶與山僧面目有甚交涉僧云有水皆含月無山不帶雲師以如意連打兩下上堂禁足半閲月足不離地走赤肉團邊無位人汗珠日落兩三斗大衆無位真人本無相貌因甚卻有汗出還知麼月色和雲白松聲帶露寒昔臨濟祖師上堂云汝等諸人赤肉團上有箇無位真人常在面門出入未證據者看看時有僧問如何是無位真人濟攔胸擒住云道道僧擬議濟拓開云無位真人是甚麼乾屎橛長沙和尚聞之乃云萬法一如不用揀一如誰揀誰不揀即今生死本菩提三世如來同箇眼大衆二老盡力提綱爭奈時流不免錯認互說異端所以差以毫氂失之千里翠巖也下一著要與二大老相見卓杖云猛虎咬大蟲泥蛇吞鱉鼻上堂僧問把住則黃金失色放行則瓦礫生光不逐四時凋不落聖凡數底來未審把住即是放行即是師云葫蘆牽蔓上長空進云只如龍吟霧起虎嘯風生又作麼生師云姑蘇城外寒山寺黃鶴樓前鸚鵡洲僧舉坐具云有意氣時添意氣不風流處也風流師云如何是風流底句進云口吞佛祖眼蓋乾坤師云好與三十棒問如何是諸佛出身處師云馬腹驢胎進云薰風自南來殿角生微涼意旨如何師云前三三後三三乃云山僧昨晚與堂主商量道天氣炎蒸說得幾句淡話也不濟事明早不升座也罷堂主云旦望五參諸方常套既為求法豈懼炎蒸猶冀慈悲以法布施山僧云諾歸到室中不覺酣睡忽作一夢夢見瞌睡魔王與尖觜蚊子在僧堂中廝鬧甚喧瞌睡魔王道你者畜生太煞無狀我此堂中兄弟箇箇是剋苦真參底三更五更不眠不坐你何得貪己口腹啾啾亂鳴咂彼肌膚蚊子道你者魔王且莫懵懂古往今來被你魔過多少禪和子如螺螄蚌蛤昏昏昧昧空喪天日喫盡無限生受盛盡無限香板若不是我深錐痛劄爭得睡眼豁開兩箇喧競不已雲門扇子忍俊不禁從旁跳出撲地與伊一擊兩箇直得疾走無邊忽報鐘鳴山僧醒來始知是夢大衆昨夜床上作夢今朝座上說夢且道夢話還當得上堂法語也無若道當得盡大地人無有一箇不作夢者又用祖師西來作麼既當不得今日上堂當說何法還聞麼其或未然待你睡醒來再與你道上堂僧問大顛擯首座翠巖擯堂主是同是別師云天地懸隔進云大顛擯首座淆訛在甚處師云指東瓜罵葫蘆進云依稀似曲才堪聽又被風吹別調中師云果然問傀儡線斷事如何師云六月賣松風人間恐無價乃云六月賣松風人間恐無價若到翠巖門一文也不直何謂如此山深無六月大衆諸人箇箇在深山中經冬過夏還識山中景況麼脫或未知山僧為汝指出卓拄杖云桃花流水杳然去別有天地非人間慧習耆舊六旬請上堂僧問金風飄則梧葉落玉露降則桂子生如何是未生前事師云珠峰頭倒卓進云已生後又如何師云溪水向東流進云此猶是衲僧現成途轍撥轉上頭關又作麼生師云腳跟下痛與三十棒進云常將日月為天眼指出須彌作壽山師云須彌未為峻日月未為明且道如何是高明底句僧便喝師云喝即不無須是有句始得進云如何是句師云禮拜著進云將謂胡鬚赤更有赤鬚胡師云今日且放過問祖禰邊事即不問祝延一句是如何師云海棠花發正新秋進云祝延一句蒙師指水牯牛有多少甲子師云背陰山子向陽多進云恁麼則春秋不相涉乾坤弗能收師云你道潘閬倒騎驢因甚跌殺王番綽進云謝師答話師云有甚麼交涉乃云六十歲處胎出胎即紹伏陀密多之衣鉢六十年學道得道可繼順瑛二老之芳塵然此亦是曲徇時宜大權方便故示有佛有祖有出有入有得有失有促有延聊將蜜果子換汝苦葫蘆若約衲僧分上本無許多事所以道我智力如是慧光照無量壽命無數劫久修業乃得豎拂云大衆者箇豈不是慧光且道修習何業得如是長壽擊拂云合掌柏凝千古翠青蓮石噴萬秋香斫柴回晚參若論此事便如斫柴一般山愈深柴愈厚柴愈厚故刺愈多刺棘既多則下手最難須是有權巧方便始得你若眼目不清氣力綿眇刀子又鈍下手又不子細非但不能取柴連手腳亦刺得稀爛了又有一等刀子也快氣力亦充眼目亦精明祇是不肯著力雖到山中東覷西覷不覺夕陽斜照一日過了收拾歸來非但無可蓄積即炊茶飯亦不足及至風雨霜雪依前不免凍餒之患若是箇具眼老樵預先看定某山柴深某山柴淺某處路直捷某處路縈迂然後緊峭芒鞋磨快刀子一到山中便將荊棘一刀斫盡然後取柴縱有通紅山查絶好毛栗也不暇顧一氣斫完收拾挑歸歸到家中放下擔子揚下柴刀不知何者為柴何者為刺但遇烹茶炊飯時信手拈來用之不竭一任寒風蕭蕭凍雪飄飄香積廚中焰倍高衆中有等影響禪和畢竟道翠巖譬喻得不親切何故此事原不假功勳得豈向外邊求才出門時已蹉過了也大衆蹉過且置祇如不蹉過一句作麼生道衆默然師云既道不得今晚直捷為你們道破遂拈拄杖一齊打散歸方丈解夏上堂社燕巢空秋林木落消息分明時人不覺意下丹青紛紛圖度休圖度楊歧驢子三隻腳喝一喝下座王行達行立居士薦親請上堂僧問超凡入聖即不問了生脫死一句作麼生道師云當陽無向背進云未審王氏所薦二親歸何國土師云並蒂芙蕖火裏栽乃云樹欲靜而風不息子欲養而親不存廢詩停社遙相慰何似談宗共報恩大衆罔極恩深殞形莫報縱使生事以禮死葬以禮祭之以禮亦不過世間之孝惟有佛力法力賢聖僧力是破暗之明炬出苦之梯航使其永斷苦輪高升樂土豈不是人子之大孝然尤有一等信根微劣底便道人生在世親逢知識耳提面命尚不能領略何況歿後神識杳冥焉能聞法超升殊不知世人之情逢樂境則耽戀不捨遇苦境則厭離心生因其厭離之際便有可化之機譬如渡章江相似中流忽遇怒浪驚濤即平日極不信心者亦同聲疾呼觀音名號是故三世諸佛視此苦海衆生如一子想所以乘機化導不遺餘力我等才起一念厭離心便與諸佛感應道交截流到岸更復何疑雖然有苦有樂有升有沉有欣有厭有佛有衆生蓋是常情且道宗乘中事如何理論豎拂云會麼香飄丹桂知無隱月墮金莖在處明黃山恆證禪師請上堂僧問太白令行天下滹沱燈耀十方分燈列焰即不問千里同風事若何師云天涯海角同肝膽楚水吳山不隔塵進云若非親得天童旨焉能普應大千機師云秋風吹八極木落露千山進云恁麼則均沾法乳去也師云壁上畫碁盤乃云天都峭拔別是人間洪井幽深信非凡境古佛光搖四面面面輝煌白雲淡鎖千峰峰峰挺秀若作境致會去蹉過黃山法兄若作玄妙商量辜負翠巖長老直饒總不恁麼未免墮坑落塹正恁麼時同參一句作麼生道慈光直射西峰上翠靄高凝紫石間復舉馬祖遣僧馳書訊徑山欽禪師欽開緘見書中祇畫一相乃拈筆於相中著一點依舊封回後來忠國師云欽師猶被馬師惑師云馬祖搖頭徑山擺尾大小國師靴裏動指下座開爐聖修禪人請上堂師升座維那白槌云諦觀法王法法王法如是師云文殊來也諸人還見麼那出衆作禮師云將謂是文殊那云適來也不差師云猶隔天涯在那云小陽時至爐𩍁宏開鍛鍊聖凡憑何旨的師云眉間迸出吹毛劍進云恁麼則焰裏明珠光燦爛去也師云莫將黃葉作金錢乃云聖凡修證路千差眼裏金塵耳裏沙爐面撥開山寺火眉鬚墮盡見丹霞大衆彌天烈焰已撥開了也木佛舍利燦爛光明已當陽呈露了也諸人還見麼若也見得便可大開爐𩍁鍛聖鍛凡脫或未然豎拂云火星迸也急須照顧眉鬚始得
