body:
  text: 嗣法門人傳我等編住建州佛頂寺語録據室三藏十二部拈過一邊千七百葛藤束之高閣若是伶俐衲僧到此便知下落卓拄杖一下當日衆請開堂師至座前拈疏云請轉法輪是王臣事玉振金聲毫端已露儻或未見未知便請維那宣讀讀畢師指法座云此座高廣無人能上欲破天荒何須固讓便升拈香祝聖畢次拈香云此一瓣香手捏不聚斧斫不開陸沈萬指叢中了無依傍吐氣千峰頂上自有知音次第三回拈出專申供養寧波府天童寺上密下雲先大和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象衆當觀第一義僧問結蓋香雲彌佛頂漫天法雨出龜洋二十年前有此語今朝得見法中王請問如何是法王法師云螺髻峰頭著眼看進云恁麼則一毫頭上金星現點出真燈焰九州師云如何是真燈進云且喜了祖今重出頓使茲山破寂寥師云依稀越國倣佛揚州僧禮拜師乃云未出黃巖已到佛頂未升法座已露玄機便如是見得則不離本際可以遊化十方不動干戈可以澄清海宇不居廟廊可以贊襄王化不假爐鞴可以陶鑄聖凡到者裏是句亦剷非句亦剷如擊石火似閃電光不容擬議尋思祇貴單刀直入且道入後如何施設拈拄杖橫膝上云橫按莫邪全正令太平寰宇斬癡頑復起身敘謝云山僧林中散木爨底焦桐忝為太祖末孫未能媲美芳躅茲承護法檀越暨衆耆舊不忘悲願互作主賓再四相招命主此席深慚蟲負不足光揚記得一則現成公案不妨對衆商量昔三聖禪師上堂云我逢人即出出則不為人興化禪師上堂云我逢人即不出出則便為人大衆二大老舉揚臨濟綱宗可謂透頂透底譬如善舞太阿收放自在且道佛頂又作麼生拈拂云無鬚鎖子兩頭搖復有一偈舉似大衆百里藍輿赴遠迎寸心豈是釣虛名欲恢祖道酬高厚願見黃河百度清上首白椎云諦觀法王法法王法如是下座玉溪居士丘石廬等預慶師誕請上堂僧問老僧入夢誕高陽才出母胎葷不嘗四十四年前底事請師為衆廣敷揚師云空華休覓蒂乃云百年三萬六千朝修短窮通等朝露欲知無量壽世尊恰好今年四十四師誕日掃碧天太祖塔兼祀開山無了禪師像上堂僧問佛本不生和尚今朝露面塔原無縫師翁此日放光為是示真實相為是開方便門師云白萍紅蓼對秋江進云恁麼則一聲㘞地無餘事祖德宗功悉已酬師云哮吼還他師子兒乃云東建西甌三梵剎龍山佛頂與黃巖摩霄窣堵分三處須信真人骨不凡大衆昔世尊涅槃舍利靈骨亦分塔三處一在龍宮一在天上一在人間先祖乘悲願力示生末運中歲出家實有佛祖行履故化去二十餘年雖日換星移而三處靈塔宛然無恙且道祖翁修何行業依正二報得如是殊勝莊嚴拈拂云松因露頂年年翠竹為無心節節高昔無了禪師參馬祖得法初隱此山繼住泉州龜洋示寂後經二十載靈塔為山泉淹沒門人啓塔見全身浮於水面閩王聞之迎入府庭供養忽臭氣遠聞王焚香祝曰可還龜洋舊址建塔言訖異香普薰傾城瞻禮大衆大善知識隨處稱尊生死去來猶如昨夢因甚無了禪師不住府庭要還舊址一僧云樹高千丈葉落歸根師便下座初祖諱日兼謝張檀越上堂二十年前山僧為檀越參禪檀越為山僧建寺二十年後山僧為檀越住寺檀越為山僧參禪大衆住寺建寺各乘夙願互作主賓如西天之須達東土之蕭梁曹溪之陳亞仙雪峰之藍長者自古迄今共見共委祇如參禪一事雖父子至親不能相代何故説檀越為山僧參禪喝一喝云你若無心我也休復舉初祖示寂建塔熊耳後三年魏使宋雲自西域回見祖於蔥嶺手攜隻履翩翩獨逝乃問祖何往祖曰西天去雲歸具説其事及門人啓棺惟革履一隻奉詔取遺履於少林供養大衆死而復活隻履西歸古今盡作奇特話會錯過祖師了也殊不知有生有死有去有來盡是假形皆非真實諸人要見真祖師麼下座同到案前拈香上供開爐上堂僧問三條椽下鈍置聖賢七尺單頭沈埋佛祖未審還許學人隨緣放曠任性逍遙也無師云未到懸崖撒手時豈可隨緣虛度日進云恁麼則聚會群龍姑縮爪養成頭角待風雲師云直須拶透牢關去莫待臨春點額回僧禮拜師乃云大佛頂上豈假爐鞴鉗錘黑漆桶中必須開示悟入開口便棒豈不是開示入門便喝豈不是開示乃至猿啼霜月華發寒枝豈不是開示諸人還悟得麼還入得麼若向者裏悟得入得火焰日日為三世諸佛説法脫或未然爐邊受冷人無數賣卻心肝始得間昔地藏琛禪師因僧參乃問諸方佛法近日如何僧云浩浩地商量藏云諸方浩浩地商量爭如我者裏種田博飯喫大衆地藏老漢固是本色家風爭奈效尤者衆佛頂即不然諸方種田博飯喫爭如我者裏浩浩地商量且道作麼生商量欲破浮生千劫夢且趺深夜一爐香持平耆宿請上堂空中寶塔尚為法來諸人云何不勤為法大衆勤即且置如何是法拈拄杖卓三下復舉亮座主參馬祖祖問見説座主大講得經論是不亮曰不敢祖曰將甚麼講亮曰將心講祖曰心如工伎兒意如和伎者爭解講得亮抗聲曰心既講不得虛空莫講得麼祖曰卻是虛空講得亮不肯便出將下階祖召云座主亮回首祖曰是甚麼亮豁然大悟師云虛空無口為甚卻講得經大衆試説説看衆下語畢師乃云聲前歷歷無私句切忌時人亂度量開普同塔基上堂林間無數土饅頭盡是當年學道流道眼已知空泡沫遺骸未免葬荒丘大衆葬了便休因甚又要建塔卓拄杖云普收同一處坐斷百千差復舉忠國師以化緣將畢乃辭代宗皇帝帝問師滅度後弟子將何所記國師云告檀越造取一所無縫塔帝曰就師請取塔樣國師良久曰會麼帝曰不會大衆國師好所塔樣祇是無人解觀今日或有人問無縫塔樣即且置如何是普同塔樣佛頂但向他道普請開基去定兩序革單銀黃巖悅監寺請上堂僧問當家種草由來別解向毗盧頂上行吾師若有親分付請對人天大衆陳師云且滿三年願再扣萬重關進云一句了然超百億大家穩坐喫饅頭師云易開終始口難保歲寒心乃云一舊一新一進一退賓主交參東西易位要整法門紀綱直須革盡積弊若是爭單銀為施利不異假衣賊人果然圖悟道了死生堪入師子群隊所以道物以群分方以類聚正與麼時忘軀為法一句作麼生道祇奉一人天地貴從他諸道自分權更有一偈深慚暗昧乏兼才兩處叢林並主裁珍重股肱休惰怠調羹端的貴鹽梅除夕上堂春砌墓夏開池秋間登佛頂節外又生枝改門路定風規不運石便挑泥終歲忙忙營世諦何曾間坐話無為大衆且道如何是無為喫齋分歲了向火詠新詩元旦上堂僧問舊臘已盡新春未回秖如今日若何安頓師云庭前古柏年年翠進云當機一句無私語不動干戈定太平師云聾人爭得聞乃云陳年舊債尚未全還斬新葛藤又從頭起箇中有一句不涉新陳了無變易諸人若能知得便可頓空舊債截斷葛藤且道是那一句拈拄杖云燈籠吞卻庭前柱卓拄杖下座立春日大悟堂小參舊歲忙了一冬新春豈可空過大家打起精神坐參七日莫臥豁然大悟一番百結疑團頓破且道頓破後如何師姑原是女人做解制兼為開山中興兩祖像開光上堂僧問如何是解制底句師云出門休動步家舍莫停留進云如何是涅槃心師云十字街頭石敢當進云如何是差別智師云東西南北門相對乃云聞所聞而來見所見而去東方來底東方去西方來底西方去南方來底南方去北方來底北方去大衆且道龜洋祖師與碧天和尚從何處來若知得者兩箇老漢來處則眉間白毫大光普照便可與歷代祖師重開生面其或未然相逢不飲空歸去洞口桃華也笑人涅槃上堂二月中春節崖華在處開瞿曇伎倆盡依舊入輪回喝一喝下座復問衆云佛已成道為甚又入輪回維那云憐兒不惜兩莖眉師打一棒歸方丈為靈宗化士對靈小參八千里外慕道趨風十五年來為衆行乞大願雖未完大行已無敵胡為彼上蒼遽喪我良弼靈宗靈宗王侯將相悉傾心丈六金身何難畢五羊城裏既知歸快須究取真消息靈宗要知真消息麼杜鵑啼處百華新九九原來八十一擊拂一下挺然自暉覺源衆耆舊請上堂僧問佛頂至高誰人能到師云春日自暉空問翠巖佛法大師子吼佛頂宗風如何舉揚師云雲有出山勢進云殺人刀活人劍如何是殺活底意旨師云前三三後三三乃云竹邊筍稚漸露鋒鋩園裏茶芽旗鎗競展乃至岸柳含煙庭華笑日一一呈淨妙法身頭頭示西來大意因甚南泉斬卻貓兒大衆試道看衆下語畢師卓拄杖云百華落盡啼無盡更向亂峰深處啼極華兩禪人薦本師朗然請上堂賣被單以求法薦師棄庵舍而千里行腳受勞受怨而輔弼叢林廢寢餐而究明向上一著子孫長能若此師親一定超脫雖然一人食時難令衆飽縱有孝子賢孫不能相代何況章水閩山死生異處談玄説妙他又不聞豎拂拈椎他又不見作麼生説箇追薦底道理還知麼一念頓空塵界殞無處無時不朗然興福寺請上堂僧問為法忘軀如何得法師云鳥啼華落處雲散月明時進云得法之時如何益衆師云毒鼓當軒擊進云益衆之時何處圓滿師云寶劍劈頭揮乃云諸佛出世補網張風祖師西來泥裏洗土古今善知識全提半提千説萬説總是種空華撈水月所以道德山棒臨濟喝猶國家之兵器豈得已而用之何故蓋為諸人各各具有一段大事因緣淨如秋月寬若太虛五欲塵埃染他不得毗嵐猛風吹他不動本無迷悟豈有聖凡大衆既然如是因甚有苦有樂有貴有賤有壽有夭有智有愚到者裏直須知有始得山僧方外行腳二十餘年別無所得也祇知有者一段大事因緣今日挺然諸公迎至興福無非為舉揚此一段大事因緣現前大衆若能知有者一段大事因緣始可隨機赴感不動些毫與諸衆生作不請友可以興無邊之福可以示無盡之慧正恁麼時如何是知有的句拈拂云曲徑通幽處禪房華木深復有一偈金碧輝煌已四朝堂前毒鼓未聞敲斬新舉起滹沱令應見門風轉更高淳淨兩禪人請上堂僧問廣額屠兒性太獰朝朝宰殺度生平何為放下剛刀日立地能知佛一尊師云惡人偏作大進云生佛由來無二相只須當下解翻身師云南山石虎因甚咬殺大蟲進云昨日晴今日雨師云未解翻身在僧禮拜師乃云修羅嗔諸天樂纏縛無由得解脫整心慮趣菩提一念回機月滿溪大衆且道菩提作麼生趣向擊拂云截斷是非關稱錘浮水上立秋日上堂若論此事便如今日立秋一般金風才扇溽暑潛消一葉飄空千林漸稿祇見鴈聲嘹喨遠從塞北而來燕子呢喃卻自空巢而去我輩學道亦然道風才扇煩惱頓消一念既空千機自息視三界猶燕壘觀五陰若浮雲出沒無心去來自在所以道秋風涼秋夜長未歸客思故鄉現前大衆不是琉球日本箇箇常在故鄉不必思量得雖然鄉中有箇無鼻孔的漢子還曾看見也未若也親見一面便可永超生死普利人天其或未然寒暑密移人易老髮鬚漸白世難留圓普同塔上堂八省檀越施財五湖龍象施力經營未及期年雲裏浮圖幻出枯骨既已沾恩勞生更須委悉且道委悉箇什麼死死生生何日了富羅積骨未為高豎拂云當陽見得無生法曠劫輪回當下超復舉教中道建塔有三種意一表人勝二令他敬三為報恩若凡夫比丘有德望者亦當建塔餘者不合大衆且道佛頂建普同塔是為凡夫耶為聖人耶拈拄杖云幾多羅漢騰空去古洞依前覆白雲受洪都縉紳耆舊請再住翠巖上堂千里馳書七度迎三年絡繹未嘗停鬧籃已自無心入爭奈毗嵐八面生大衆且道毗嵐大起還有吹不動者麼自云有那箇是吹不動底拈拄杖云三日後看取授佛頂觀長老衣上堂衣以表信且道釋迦老子衣自何來法乃傳心祇如威音王佛法從誰得者裏見得始是出格英靈信者與他三千棒不信者也與他三十棒試問大衆不信者三十棒理所當行因甚已信者亦與他三十棒還知麼無授受中親授受還他眼目人天人靖藩韶武殿下請師升座拈香祝聖畢乃云戒壇已應千年讖道樹常榮萬古春今日王臣敷寶座是誰解共慶真人還有共相建立底麼試出來酬唱看衆默然師乃豎如意云千聖百王師祇此真如意壽量等太虛豈止千百億還會麼菩提樹上覺華開須是難兄與難弟所以道兄弟添十字同心著一儀大衆且道如何是同心底句放下如意云燈籠入露柱復云自古聖帝明王無不歸心佛乘欽崇祖道今日韶武殿下誕日特設伊蒲敦請山僧於光孝古寺舉揚大法上報四恩山僧深慚行解荒蕪不免聊舉古德公案以赴來機昔台州光孝德光禪師因宋孝宗皇帝欽詔入內觀堂賜座請問云朕心與佛心是同是別光云直下無第二人帝云如是則佛即是心心即是佛光云成一切相即心離一切相即佛帝大悅賜號佛照禪師大衆還知佛照直指孝宗大意麼拈如意云四海共遵王化遠千秋常慶德星高靖南王母如幻李夫人請上堂僧問菩提樹下轉大法輪華誕千秋請師慶祝師云靈椿初育秀丹桂正飄馨進云今日靖藩太夫人隨類教化畢竟如何得頓成佛去師云菩提樹老葉常春進云彈指頓超無垢界永證金剛不壞身師云欄杆頭上石師子僧禮拜師乃云三千年一實之桃是王母家常受用底不煩他獻玄圭白壁淨潔無瑕是王母本自具足底不假他呈八千歲為春八千歲為秋之大椿是王母久已培植底不勞他覓然則受王母之請升光孝之座畢竟將何慶祝記得昔年在太白峰前壒𡒁堆裏拾得一顆鎮海明珠光輝赫奕久蘊囊中今日四衆臨筵不免當陽拈出非特為王母祝無量之壽延無量之祥且使五羊城裏若男若女若俗若僧箇箇知有祖師西來大意遂豎如意云見麼海神知貴不知價留與人間光照夜下座平藩下劉章京請上堂僧問離卻向上機請師直指休歇處師云鎮海明珠常燦爛進云恁麼則搖頭擺尾去也師云滔天白浪實難衝僧禮拜師乃云紅塵堆裏建精藍鐘鼓笙歌共指南解向聲前明祖意賢于須達是同參大衆昔須達多從菩薩位現居士身為供佛故向舍衛城中布金贖園正區畫時六天宮殿一時俱現今日新菴劉公嘗於五羊城裏造像建剎安養衆僧直欲頓悟本來不冀天人福報茲以佛誕日偕叔侄兄弟及諸同袍揮金設供敦請山僧登臨此座舉唱宗乘大衆且道向上宗乘中還著得語言文字也無還著得思量分別也無還著得見聞覺知也無既皆著不得且作麼生舉唱喝一喝云若向者裏明得則萬井笙歌咸揚妙諦塵沙國土常誕佛身移西竺於東方變炎邦為淨土所以香至王子達磨尊者明得者一著子遂於大梁普通七年庚子特特航海梯山而來傳佛心印山僧亦以大清庚子來至仙城接佛聖像大衆且道接佛像與傳佛心是同是別若道是別仙城原在粵東若道是同山僧不是達磨正恁麼時心像同別姑置勿論且道佛既降生現在何處拈拂子云弟兄叔侄同肝膽扶豎宗風播五羊復有一偈舉似大衆後先庚子到仙城接佛傳心事不輕信得此心原是佛鐵舟何處不縱橫靖藩下曾副戎請上堂僧問五羊城外龜峰寺千古名藍此日新幸值宰官同請法願垂一語度群生師云熏風吹四野草樹緑陰陰進云可謂於一毛端現寶王剎坐微塵裏轉大法輪師云最是荷華盛香飄滿穗城進云昔日賢于插草今朝曾公建寺未審是同是別師云兩彩一賽進云古今一貫千聖同途師云亦有不同處進云西禪請師説法且喜入門未審和尚如何相待師云當頭棒子不輕拈進云千峰勢到嶽邊止萬派歸海上消師云念得甚好僧禮拜師乃云有真實行始可福利人天具殺活機方能權衡佛祖是故宗門下事卷舒操縱一切臨時有時掃蕩則人境俱奪凡聖雙亡直得三世諸佛歷代祖師齊立下風有時建立則禪律並行主賓互換任他斷碎瓦草木叢林同放寶光所以道欲知佛法當觀時節因緣時節若至其理自彰正恁麼時且道掃蕩是建立是還會麼西郊金碧重輝處東粵宗風再振時復云昨德宇曾公請啓中道西禪古剎東粵名藍雖戒行精嚴賴住持以立教而玄風精峻須臨濟以開宗大衆建剎布金為弘宗教可謂功不浪施苟非乘大願輪焉能豎茲偉績山僧今日忝承嚴命猊座高升不免舉則陳爛葛藤與大衆商量昔大宋曾學士嘗參雪竇禪師請問參禪旨要竇彈指一下云便向者裏領略得多少直捷儻向文字中尋求白雲萬里學士於言下大悟大衆跨千里烏騅須有拔山之力擊當軒毒鼓應帶返魂之香卓拄杖云翠巖今日直捷指示還有當下領略者麼復卓拄杖一下喝一喝靖藩下馮滕李郭衆宰官請上堂僧問擊鼓升堂即不問因齋慶讚事如何師云繽紛華雨正滂沱進云恁麼則法施財施等無差別師云打麵還他州土麥進云祇如臨濟大師道大凡演唱宗乘一句語須具三玄門一玄門須具三要請問和尚如何是一句語具三玄師云五月荔枝鮮進云如何是一玄門具三要師云狀元紅最妙進云如何是第一玄師云簇錦攢華在樹顛進云如何是第二玄師云皮核俱拋味自全進云如何是第三玄師云善買何須用半錢進云如何是第一要師云還記得三玄句子麼進云和尚答過了也師云是何意旨僧擬議師打云三玄三要是甚間家具問熏風鳴殿角法雨已均滋向上全提句祈師決衆疑師云瑪瑙盤中珠宛轉進云恁麼則山河及大地全露法王身也師云琉璃殿上月徘徊僧禮拜師乃云浩浩塵中先須辦主識得真主始可報不報之恩行難行之事非特枯業海蕩罪山且將八萬四千煩惱海翻為諸佛清淨慧海八萬四千塵勞門轉為諸佛大解脫門所以道塵勞之儔為如來種然雖如是銅沙鑼裏滿盛油即不問你芥子吸乾滄海水時如何豎如意云六榕寶塔高峨峨天童先和尚諱日靖藩下何參戎請上堂師升座拈香云此一瓣香兩朝帝主欽崇萬國兒孫並震打佛打魔一棒本絶去來從天降下五羊迥超色相爇向爐中專申供養天童堂上上密下雲先大和尚用酬法乳之恩斂衣就座上首白椎竟僧問護國雷音遍界聞傾誠豈啻兩將軍欲酬罔極無如法安得迷雲作法雲師云慣將如意子擊碎太虛空進云未審何門金氏聞法之後當生何處師云本來無相貌隨處任縱橫僧禮拜師乃云斷葷血以保親年卻勝割股求般若以酬罔極先須賣心賣卻心肝般若自現般若既現則十方虛空一時消殞本來父母觸處全彰所以道如我心空諸法空千品萬類悉皆同雖然有一人不求般若亦無心肝可賣且道此人居何國土還見麼一機投密室萬古憶天童昔天童先師因居士問弟子持咒念佛可了得生死不先師云了不得士云作麼生始了得生死先師打云向者裏會得方了得生死士云和尚還有生死不先師云你若有時我也有你若無時我亦無大衆生死大事各宜自悟自了何故道你有我亦有你無我亦無還知先師為人處麼豎如意云五羊兩浙七千里護國天台不隔絲中元日平藩下楊守備請上堂妙淨明心本無迷悟凡情未盡仍假證修所以玄沙築破指頭父生天界目連親證羅漢母脫輪回是知情均天倫應之則疾法無疏戚感之在人果能一念回機親見本來面目則盡十方界情與無情一時成佛豈有父母宗親不得解脫雖然懷州牛喫禾因甚益州馬腹脹你若會得不妨高超三界其或未諳莫道地官曾赦罪臺前業鏡不饒人迎佛還山謝兩藩及衆宰官上堂佛身曠劫已圓成豈待磋磨始見精今日紫金光燦爛方知護法有同心大衆現前列位護法自心本來是佛與佛無二且曾承佛授記現王臣身故能發廣大心造廣大像居廣大位植廣大福福慧既足將來依正二報莊嚴亦與佛無二所以道佛身者即法身也從無量功德智慧生從六波羅蜜生從慈悲喜捨生大衆即今佛身已生莊嚴已畢且道千里歸舟憑誰發棹還會麼四海龍王同送佛秋深猶見雨傾盆復云山僧人微德薄願重力綿頃荷兩藩及闔省宰官同心合德捐俸開爐一火鑄成丈六金身復蒙王舟遠送台旆俯臨今當起程之際不免上舉佛語少答涓埃昔世尊在靈山會上告梵王帝釋云世間有人能於我法未滅盡時造佛像者當來於彌勒佛初會説法即得解脫當知造佛聖像為三十二相之因大衆世尊言無虛妄當生敬信據此則現前僧俗男女凡有為佛施財施力乃至化者鑄者磨者補者迎者送者種種飲食華香供養者將來皆得親證三十二相之果然雖如是山僧既無財可捨又無力能施僅於丙申春為靈宗化主題得一疏且道將來得何果報披毛遊火聚戴角混塵泥平藩下都綱司實宗活源迎至永泰寺弘戒請上堂新舊兩都綱遼陽萬里至既登毗尼壇共豎大法幟更有諸同袍同心復同志揮金設伊蒲請説第一義第一義絶囊藏城上宣揚有畫角枝頭漏泄是桄榔既然如此焉用列祖出興還會麼不因風撼庭前樹爭見山華滿院香昔世尊云吾今來此世界八千返為此地上凡夫癡暗之人説我本盧舍那心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源大衆光明金剛寶戒是為癡暗人説忽遇不癡不暗靈利倜儻底來如何相接寸絲俱脫落痛與四藤條下座賈總臺設齋請上堂虎頭城外蓮華國到來龍象同休歇狂心歇處即菩提笑看一華開五葉葉底常敷無量光光中晝夜為宣揚且道宣揚箇什麼炎炎火宅諸男女盡是蓮邦大法王大衆既是蓮邦法王則舉足動步無非極樂山林城郭總是西方因甚教中又道三界無安猶如火宅衆苦充滿甚可怖畏蓋為狂心未歇智眼未開不免為欲火之所燒逼是故勞他黃面長者屈曲垂慈誘以三車方得出離火宅露地而坐大衆若據衲僧門下直饒露地而坐正好喫棒棒下薦得始得脫灑自由去住無礙然後回途火宅打鎖敲枷進而致君澤民文武俱備退而修功立德易俗移風直令啀喍嗥吠之流一一變作金毛哮吼所以昨來賈總臺請啓中道摶空師下寒草緑而百獸潛蹤愛日象行霜葉紅而群狐遁影大衆即今狐兔已潛蹤了也且道摶空師子在甚麼處喝一喝復舉教中道若有善男子善女人初日分以恆河沙等身布施中日分復以恆河沙等身布施後日分亦以恆河沙等身布施如是百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼大衆求福不回詩稱愷悌君子博施濟衆夫子尊為聖人因甚億劫捨身不如聞經生信諸人還識此經麼其或未知不免重重指注拈拂云白者非紙黑非墨語言文字咸超越北俱盧洲馬喫鞭南贍部洲牛出血卓拄杖下座黃都閫請上堂國有定亂劍四海晏清家無白澤圖千妖絶迹直得凡聖情解毫髮不留迷悟牢關一椎粉碎方有少分相應所以道大丈夫秉慧劍般若鋒兮金剛焰非但能摧外道心早曾落卻天魔膽豎拂云即今慧劍高提誰是當鋒者衆屏息師云若無欒布作爭得見韓光復舉黃山谷太史參晦堂禪師請問佛法大意堂云夫子道吾無隱乎爾那裏是夫子無隱處黃屢呈語不契疑悶久之一日隨堂山行次值木樨華開堂云學士還聞麼黃云聞堂云吾無隱乎爾太史直下頓悟大衆晦堂老人向頂門上痛下針錐黃太史於百草頭邊罷卻戈戟諸人還識伊針芥相投處麼拈拂云萬物自有功當言用及處耆庵劉居士偕男彝修文學請上堂若論此事譬如良醫治病一般若是扁鵲耆婆標本自知緩急一望顏色再切脈理細詳受病之淺深次擇良方之可不然後應病與藥無有不瘥者斷不肯以死方頭果子藥賺誤人家男女諸人還知麼三藏十二部是死方頭千七百公案是死方頭五家宗旨是死方頭你若不諳機宜不辨時節縱饒説得玄之又玄妙之又妙將五家宗旨從上公案穿鑿殆盡總成毒藥反添學者知解之病所以道妙義玄言春細雨莫教污我本來心若是本色宗師信手拈來無非是藥斷不肯以死法繫綴人有時建立有時掃蕩放行把住一切臨時所以道師名醫王行正令能與衆生治心病大衆且道心病作麼生治拈拂云爛研巴豆三千顆瀉卻諸方五味禪昔晦庵朱夫子嘗參開善謙禪師深究祖道一日述偈云齋居獨無事聊披釋氏書暫息塵纍牽超然與道俱門掩竹林密禽鳴山雨餘了此無為法身心同晏如大衆且道如何是無為法拈拄杖云詩成五字三冬雪筆落分毫四海雲佛成道日常山胡宮保偕太夫人宋氏請上堂僧問明星一睹歎奇哉劫外曇華雪嶠開宮保請升師子座祈師直指活如來師云優鉢羅華焰裏開進云恁麼則頭頭盡露瞿曇面大地山河絶點埃師云説食終不飽進云祇如宮保設供請法獲何功德師云山愈高兮海愈深進云可謂不忘靈山記共撫沒絃琴師云一語定乾坤問未離兜率已降皇宮未出母胎度人已畢因甚夜睹明星方成佛道師云憐兒不覺醜進云祇如舉一不得舉二放過一著落在第二和尚今日如何舉揚師云燈籠沿壁上峨眉進云可謂隨緣赴感靡不周而常處此菩提座師云如何是菩提座進云東西十萬南北八千師云未在乃云大悟得大機大機方可成大事大人具大智大智乃能明大用所以大機之用石火難追大用之機電光莫及薦得此機則無機不透明得此用則無用不該可以掃蕩天魔可以剪除禍亂可以安邦鎮國可以入聖超凡不假苦行六年頓證如來德相正恁麼時且道如來德相在甚麼處豎拂子云一點明星輝寶蓋萬家生佛鎮虔南送佛還山香城上藍諸剎請上堂西堂問昔日世尊升天為母説法旃檀瑞像迎歸今日和尚入閩報親粵王金像同出兩彩一賽即且置千佛同源是若何師云雙溪水捧山盂獻萬壑松敲鐘鼓迎進云一剎那際入正受互參三世妙難思師云且得闍黎共證明進云祇如護法耆舊七請和尚始肯回山如何是轉功就位底句師云一身俱是病百念總寒灰進云大冶規模鎔盡後瓶盤叉釧總成金如何是轉位就功師云戴角披毛行異類牽犁抴耙已多年進云白玉毫難藏瓦礫紫金光豈掩蓬蒿如何是功位俱隱師云緑樹啼黃鳥青松擁翠嵐進云千岌雲山俱坐斷寒綃蒙首涕慵收如何是功位俱顯師云五年再到洪崖寺一路人皆訝老僧進云萬本蒼松俱合抱一天華雨正繽紛師云爭奈猢孫騎鱉背進云祇如十六王子請佛大轉法輪未審法輪如何轉師云今日正升座堂禮拜云萬古宗風今再振千年模範喜常新師云歸位著乃云本來無住著萬里長空騰野鶴隨處任縱橫一波不動碧潭清是故衲僧家有時碧潭止水有時野鶴孤雲有時敝屣閻浮有時珍重陽焰去來動靜無非為人風雨雷霆悉皆成物正恁麼時去來無礙即且置作麼生是不涉去來底句豎拄杖云昨來風雨度章江今日寶華仍再據敘謝不録復舉世尊道吾今來此世界八千返為此娑婆世界坐金剛華光王座大衆釋迦老子大似為他間事長無明來來去去有甚麼了期檢點將來好與三十痛棒然雖如是知恩者少負恩者多更有一偈七請再來原為佛三年家舍在途中如今佛已還家舍截斷千差振祖風為藏西堂對靈小參雪崖公雪崖公三度迓我我不來及至我來你又去人雖去矣言猶在耳不逐除夕去不隨元旦來覿面無人識頭白一嬰孩者箇是你昔年所呈底法身句子誰家沒有佛一掌解攔腮月落虎城畔翛然歸去來者箇是你臨末梢頭得力底句子祇此一偈一機已足千古萬古豈待豎拂拈槌始是光揚列祖雖然如是更有箇末後句今日不免為你點破卓拄杖云杜宇聲聲啼未休盡是斬貓親切句
