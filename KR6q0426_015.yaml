body:
  text: 嗣法門人傳我等編書復桐城汪刺史承念承施至再至三德薄行微誠難消受然草衣木食穴處巖居乃上古之風規亦道人之本分此貧衲所願學而未能者也嗣後幸勿以區區之故動勞神思但望於參究之功倍加精采來教謂心意散亂不能禁制計惟辭去官衙逃歸林藪者貧衲道也不消得盡大地是箇解脫門遍十方是居士自己更擬逃歸何處乎殊不知官衙裏也有佛法鬧市紅塵中也有佛法所以淨名云塵勞之儔為如來種六祖亦云離世覓菩提猶如求兔角昔趙清獻參佛慧後仕青州政事之餘多喜晏坐忽聞雷震大悟述偈云退坐公堂虛憑几心源不動湛如水霹靂一聲頂門開驚起從前自家底渠又何嘗猒喧求寂逃歸林藪哉須知此事貴在善用心應機接物頭頭勿放過若不善用心直饒屏息衆緣依然坐在無事甲裏終無悟日所以前對居士道但向一念未生以前看取行也看坐也看間也看忙也看忽然看透方知舌頭元在口裏間忙動靜如太虛之片雲生滅去來若長江之幻泡不妨乘悲願力現隨類身誘引同倫齊登覺岸非特追清獻之步武抑將與淨名而把臂矣又來教云拌取身命竭盡參求一生不足繼以再三悟徹為期自他俱利此非夙具靈根安能發是堅固誓願哉欣羡欣羡但能如説而行剋期可得貧衲當跂踵以望也復會稽滕孝廉諱輝履端伊始遂承枉顧苟非真切為道焉能若是之汲汲耶欽羡欽羡衲昨以行迫弗及細談深為悵怏阻雪征途忽辱嘉惠遙頒不勝愧汗捧讀手諭知足下齠年好道且遇明師遂窺聖學大要而間斷不恆渾無得力處所以耿耿隱憂未嘗一日去諸懷抱貧衲竊謂即此耿耿隱憂便是入道最喫緊工夫在今天下之士終日怏怏悒悒不憂貧則憂富不憂名利爵祿則憂妻孥子女誰肯孜孜惟道是憂耶又謂向來只作求靜工夫若欲於此際了死生必須有箇悟入處方得奈障蔽過厚每一返觀迷迷悶悶不得穩當不穩當志便易衰再似從前作轍究竟不能出頭以故深自憂懼乃至討箇簡捷工夫為第一義於諸經教隨分參證者貧衲謂若據第一義則無工夫可做無死生可了無凡俗可離何故盡十方是箇灑落解脫底人何處更有一物與伊為緣為對為障為蔽為侶為伴哉所以蘇長公妙悟之後便解道溪聲便是廣長舌山色無非清淨身張侍郎一聞蛙鼓頓釋疑團便解道霜天月夜一聲蛙撞破乾坤是一家楊文公於兩箇大蟲相咬語下頓徹便道八角磨盤空裏走金毛獅子變作狗此數老皆儒而禪者也足下試看諸老悟後之語何等超脫何等透徹此豈剽割記誦之學可倣佛其一二哉正如足下所謂若欲了生脫死必須有箇悟入處始得否則求靜厭喧也錯動靜交修亦錯身體力行如金如玉惺惺不昧了了常知總是盲修瞎鍊弄業識認光影未是大解脫境界所以先聖云毫氂繫念三途業因瞥爾情生萬劫羈鎖蓋凡聖情念未空知解道理愈深見性愈難故云入此門來莫存知解又云理障礙正知見事障續諸生死欲得二障銷融直須懸崖撒手一番始得至謂儒修釋修原有分別者此則在人不在法如上所舉蘇張諸老未嘗非儒儻不求妙悟雖方袍圜頂亦無交涉耳馬師公案未透二語尚欠妥貼參究之志斷不可衰一切世緣漸漸放教冷淡去自然工夫得力未有終日紛紛擾擾而克證無上道者忝承下問不覺葛藤如許蓋以途遙晤艱不敢辜負足下一片真誠知不以山僧為饒舌也臨楮神馳幸祈為道珍愛不既復南昌蕭憲副諱應聘客冬辱承寵顧蓬蓽生輝別後病骨日羸跬步未出所以楊李之門竟未展候疏怠之罪何可勝言正懷念間忽翰貺下頒金額輝煌頓令千載禪庭榮增百倍光彩矣感佩感佩即擬趨謝稍布鄙私緣以腹疾未瘳弗能躬領大教唯日夕與湖海衲子焚修以答涓埃於萬一耳復南昌周大參諱之恆企想玄風末繇晉謁風雨雞鳴之感抑殆有日矣所欽誦者鈞示創頒立破魔軍之膽再捐清俸宏闢檀度之途是其惠𩆸仁飆溢播於方之外者固深大若是矣詎直豫章閭閻一路福星已哉久擬肅函申謝奈以託迹林隈未容造次乃辱教言錫之隹什聲塵寂處振太古之玄音川嶽破時開飲光之生面翠巖一袈裟地耳威光所屆既帡幪之若彼復揄揚之若此豈非靈山受莂示現大宰官身而為之説法也哉敬壽棗梨以垂不朽餘圖晤教罄所欲言不備復南昌李兵憲久仰台臺乘菩薩願現宰官身為法門之金湯作生靈之怙恃某緣鄙野抱拙窮巖雖未獲拜下風已承台光遠照茲蒙翰召飛錫章門登臺説法亟宜奔趨奈以賤軀染疾自秋徂冬飲食起居俱未復元山中藥餌甚艱尚欲求醫以自治又安能扶病説法哉方命之罪伏祈原宥肅此奉覆不一復奉新宋御史諱一貞曩歲蒙惠佳什如獲夜光日置案頭時沾風味茲復承示雄峰諸作不惟增光泉石且與大智重開生面矣展手説義大意目前豈非現宰官身而為説法欽羡欽羡翠巖山色承少宰令親翁一披雲霧漸見青蒼但即景詩題未荷驚人之句今春擬躬候興居面領至教而病骨離披不果所願遙知台光所被高下俱周斷不以西峰為異邑也臨楮曷勝瞻切不宣復安義劉廣文諱承寬接手諭悉起居清安種種稱意喜慰喜慰然稱意事為順緣不稱意事為逆緣遇逆緣則慷慨悲歌逢順緣則貪著無厭不知逆順二緣如龜毛兔角良由衰利二風飄鼓識浪故致八萬四千塵勞煩惱諸門一時俱啓此舉世人通病耳來教謂實欲就中打出隨緣以應而寸絲不挂者自在獨露一頭不忘珠峰一掌之恩者足徵左右靈根深厚一撥便轉其超出世人萬萬矣古德云得在剎那間履踐須長久左右既信得此段奇特因緣直須如説而行如行而説日居月諸久久不變則無始粗重習氣漸漸銷融世法佛法打成一片然後隨緣以應處由來不挂寸絲寸絲不挂時不妨隨緣以應即塵勞煩惱門翻為大解脫道逆順無拘死生一致所以道但盡凡情別無聖解耳左右其勉之復瑞州陳文學諱發新夫法界純真之理唯吾佛親見親證表裏洞然故能不舍一物不取一物所以百億分身如鏡象水月初無生滅去來豈有成壞空住譬若春之在華全華是春水之成波全波即水從上佛祖親見親契至此故拈華豎指行棒行喝直指一切衆生不離聲色堆頭頓見金剛不壞之體是以涅槃後有全身不壞者有舍利如雨者有齒牙流輝目睛舌根不化者亙千百世而下猶可以福利天人是皆從慈心三昧中流出非比外道業種性命雙修搬精運氣之輩可同日而語也今佛牙瑞現筠州蓋達人感應道交之所致百韻佳什足徵博雅承命刪改故僭為批抹貧衲敢謂足下祇知崇敬佛齒實未見佛身在何則夫齒牙佛也拳指亦佛也豎指擎拳則為誑嚇而露牙現齒獨非誑嚇乎若謂佛已去世數千年而齒不壞所以為奇今人所豎之指終歸腐爛不足為異如此見解正未達法界純真之理萬法歸一之宗焉能脫離生死頓超分段乎足下於魯誥竺墳胸羅萬卷不妨玲瓏踢透若是宗門下事猶隔一線在差以毫氂失之千里貧衲昔年初作八股閲竺墳時便知此身是假合底終歸敗壞一靈真性是不壞底亙古常存及至出家行腳見宗師提唱不啻鴨子聞雷盲人視日方信宗門別有長處不敢草草匆匆直至命根啐地斷後乃知從前皆墮歧路不免認魚目為明珠耳末法士大夫學道者一肚皮自是自滿唯喜人奉承愛人贊嘆山僧即不然交愈深言愈直佛法不是做得人情底寧可不信不敬不理我便休必不敢曲徇世諦瞎人眼目足下幸宥我於形聲禮法之外可也復鎮江笪明府承諭此著於日用間矛盾特劇乃至終不敢便謂小歇場即安樂地者此正所謂識法者懼耳今天下學佛者才入叢林領略得些門頭戶口邊事坐在意路窠臼中及至惡習現前依然走作或遇流俗阿師阿諛奉承歡喜不了若遇作家勘驗將來便生瞋恚求其如門下之真踐實履隨處解脫而且不自欺不自歇必期親到大安樂地非大根器孰能與於此哉欣羡欣羡但貧衲不審門下指何所為大安樂地憑何得到大安樂地幸當有以教我公餘尚冀枉駕空山互相酬唱使龐馬之風再見於今日是所望也復洪都熊廣文諱文登春間行迫弗及躬詣毗耶室中言別歉甚想近來台履亨嘉道味日濃也某疏慵暗昧動多謬舛幸蒙不棄垂念祖庭歷年弘護無斁故使堂殿煥然而鐵畫銀鉤五大字如渴驥奔泉怒猊抉石額之大廈之上非特壯觀祖庭抑足以使一闡提篾戾車之流知宰官中有大菩薩也銘謝銘謝夏間祭掃之後哀感過度形體頓衰念茲浮漚無復長久於人間世也緬惟松風堂畔爐香茗碗禪椅蒲團三多既全萬緣不擾正應拶透祖師關常作東土維摩詰是所望也路遠山遙會晤無日伏惟珍攝不盡依馳復洪都熊少宰諱文舉成住壞空世相所不免死生聚散幻軀所必然是故先聖知有無成無壞無死無生一著子乃能空華世相唾涕幻軀而於聚散成壞之際淡如也去聖既遠裨販益多視田園屋宅為己有貪戀護惜至老死而不忍割舍者滔滔皆是苟如是則焉得為解脫僧乎某不敏竊嘗聞先聖之教矣又豈敢蹈時流之覆轍乎辱命灑掃祖庭七八年來不惜身命為法求人實欲行己所學之道以報知己非有他也譬如士之仕也或鴻臚太僕或黃閣朱門無非欲翼贊聖明澄清海宇豈區區以朱門黃閣太僕鴻臚為念哉疊蒙台召再住翠巖自愧緣薄力不從心且衰病日增無益於世萬祈寬宥俾衲得投老煙霞木石之間不為夢幻空華所翳則弘護之功寧有既哉肅此裁謝不盡縷懷復洪都陳司理諱弘緒三年違教七度遠招入春以來翰音疊至苟非乘大願力呵護祖庭安能至此銘佩銘佩竊謂祖庭功業浩大非薄劣所能合鑯者非敢以翠巖置之度外而以桑下為釘楔也自去歲砌墓而後感傷悲涕賤體益尪羸諸病頓發形未老而先衰此區區凡情有不容自己者豈敢眷戀故土而暫忘大護法之高誼哉來諭銅像亦次第有成局不幸化士遽殞亟須山野身坐翠巖示信於遠方以結勝緣不可失此機會者敬如教命然山野有一問昔趙州云木佛不度火泥佛不度水金佛不度爐真佛內裏坐敢問左右那箇是真佛若箭鋒相直則不辜十載相知千里之外常相見也不然尚俟木樨華開扶病一來與山谷結此勝緣正所謂機會不容坐失也肅此奉覆無任神馳復洪都彭參議諱份景仰高風未遑晉謁然神交千里又未可以形迹論也昨無念禪人攜龍舒淨土文并大疏至益見左右不忘靈山囑付示現宰官身隨類隨機以化導群生者也至謂易濁界為樂邦不作二觀不作二念亦不作一觀不作一念則又超出龍舒一頭地矣非親見作家宗師入不二法門者安能若是哉欣羡欣羡某竊聞先聖出世本懷靡不為一大事因緣故蓋衆生根器萬殊不能一概直下承當不得已乃有權實頓漸偏圜半滿之談皆因機因時初無定法遇上根利智者與之論第一義中下二機則以權漸之法而攝受之今所謂淨土法門權漸之謂也執圜頓而廢權漸固非矣執權漸而毀圜頓得無謬乎然法久斃生非特參禪一門為然即三教九流乃至百千法門莫不皆然其起斃在人其救斃亦在人不可因人而廢法若謂參禪斃多傳燈諸老皆未脫輪回則世尊不當拈華達磨不合西來矣今龍舒文中廣引無根事迹以證參禪之斃其為誣污五祖真如者姑置勿辦祇如青草堂後身曾魯公一段且謂宋朝有二草堂其一曾受曾家婦人供養感恩不淺乃云老僧與夫人作兒子化後果生其家登高科作宰相不脫貪愛永在輪回云云及考之傳燈並無所謂二青草堂者而草堂清乃清濁之清今龍舒所指青草堂既非傳燈所録則非禪師明矣今僧中稍有品格者言不妄發豈有一代宗師出此猥褻之言耶此皆庸僧口吻遂引以為禪斃之證誣謗古人自感泥犁之報固無足惜誠恐後進初機一惑其説互相非毀同墜無間耳某竊謂龍舒亦法門中君子耳言不該典非君子所談豈有著述立言不稽古訓而可以垂範後世乎據貧衲細閲七卷文中必是後人偽增非龍舒本意蓋龍舒原文祇有十卷不然則大慧諸老何以不為之刪正而特稱其為火中蓮耶左右布袍蔬食心齋坐忘不減黃學士龐襄陽之踐履今復欲流通正法以惠四方一片婆心盡善盡美但譽堯非桀仁者不為矧齊東野語誣禪毀聖者乎數段必求大筆刪定永作竺墳董狐使禪淨並行不悖則彌陀古佛亦當破顏非特靈山會上而已草率奉瀆無任神馳伏惟台照不宣復常州莊內翰諱坰生昨承台旆寵顧荒山兼蒙金額晃耀佳什過褒不啻東坡玉帶矣謝謝宇內宗風久寂金紫中弘護法門者不道全無求其研究此宗虛懷決擇者如披呈揀月苟非乘願而來現宰官身焉能若是欽羡欽羡虛空粉碎一切不留二語見解已入微向去尤冀全身擔荷徹悟玄關直令楊李蘇黃齊立下風是所望也復建州周別駕諱士瑢從上諸聖出世靡不觀機逗教因時救斃故設百千方便權巧拯溺息焚非特印賢二老為然今以一目而羅衆禽一方而療衆疾雖三尺之童知其為不可即鼻祖西來因義學之士溺於筌蹄極力掃除然亦不廢文字語言三昧故其囑神光曰楞伽四卷可以印心嗟夫在今之學者不待達摩掃除已先自掃矣主法者自既不通文字語言不得全機大用復從而禁之曰我者裏祇重行德不崇機辨夫機辨豈易言乎哉歸宗曰馬祖下出八十餘員善知識唯有百丈得大機黃檗得大用其餘祇是唱導之師夫百丈黃檗有超師之見地故有逸群之機用然則機辨豈易言乎哉即傳燈所載如李駙馬楊文公諸老慧辨縱橫激揚向上豈學語之流所能企及苟如近日宗師所言則學者當如木偶如啞羊其不流於默照邪禪也幾希矣承諭索龐公録序將刊出為白衣榜樣者此舉甚善向因院務倥傯至今尚未屬稿昔者周海門先生曾集儒門得道者為一帙目曰知儒編其意謂知佛然後乃知儒荷山集弘釋録乃以文公諸大儒列於輔教篇竊窺二老命題之意雖欲會儒釋於不二之門似涯岸猶未全泯衲今據五燈次第集之目曰鏡華録僭為序言并録寄上儻可梓而行之則六十餘員知識一時湧出芝城豈非左右倡首之力乎翠巖事有斷不容辭者深荷法愛挽留尚圖面布別悰肅復不備復建州謝進士諱相禪學之盛衰其樞機蓋自王臣王臣好道則盛否則衰是故唐宋之際上自王公卿相下而牧豎輿儓罕有不慕禪學故禪學大盛於唐宋凡沙門之有道可以代先覺覺民者朝廷必錫號錫衣以旌勸之崇其屋廬厚其資産免其賦役出入則軒蓋相望幢幡相導使彼濫廁緇流之徒有所觀感而憤發焉迄元明以來宗風漸衰僧尼雜糅王臣鄙之非特不屑屈膝奉事於沙門且將奴隸犬馬其人矣悲夫僧既自侮而王臣侮之王臣侮之而魁偉奇倔之士復不屑為僧欲望教法之隆安可得哉衲濫尸師位無補法門痛念宗教之衰零難洗時流之積斃即敝山丁亂離之後耆舊凋殘典型滅裂所僅存者數椽而已因念先御史及列位賢昆仲弘護無斁眷注不遺雖譾劣無用如衲者且連篇纍牘以留之則此方法道之機其在諸閣下之主盟有以再整頽綱乎來諭婉辭西江護法復假數年者極荷厚愛尚俟秋清晤教面布鄙裏以決行藏肅復不備復建州謝進士諱玄銓昔遠公與十八高賢刻蓮漏於虎溪橋畔天子景仰道風至潯陽而三召不出芙蓉不受皇褒甘就刑罰汾州天使再至遂偕侍者坐脫立亡典型具在風範凜然蓋其輕身世等鴻毛重道德等丘嶽故於死生之際宴如也某行業荒怠遠不及古人撫己而觀直令羞殺然此行亦非為釣沽譽名實以翠巖繼席無人不得已一出與諸知己共議次補之事所以暫違嚴命儻一息尚存斷不敢忘金湯之高誼來秋歸期自當踐約草率奉覆不備不莊復新建歐孝廉諱德生兩辱鈞召佩德殊深貴省地處不爭敝鄉烽煙未靖誠如至教苟非真知己焉能為衲體貼至此其愛我之深為道之篤雖土肝木膽亦當感激豈容固辭第名山顯位天下有才有德者皆可居庶幾大同無我之風揖讓謳歌之世再見於今日耳若有絲毫憎愛取舍之情存於胸次是摘空華而撈水月矣惟高明諒之宥之聞台駕有長汀之役未知何時儼臨幸一顧我於紫雲白石之間共話不二何如遙空布謝無任神馳復安義徐劉衆鄉紳荊州未識聲氣已罔鴈塔雖遙風光不別兩承榮召理合鳧趨自恨衰殘難申螳臂知五龍之飛躍四海具瞻冀九傑之恩波八閩普潤神交雖久瞻注猶深何日向寒鄉一現宰官身始信是毗耶億變神通手肅此辭謝統冀台原不備復南昌齊文學諱凝烈祖庭法位也法無有我我興我住則與法相違矣法無有定膠柱鼓瑟則與法相悖矣法無取舍無高下無愛憎無小大苟尊泰岱而卑丘陵戀顯榮而恥巖穴是非法矣非祖矣又何以異於鷦鷯之戀一枝黑蚖之營一窟哉向承門下與合郡紳襟同詞遠召已布腹心乃者華翰再頒非愛我之深焉能及此謝謝尤冀門下於舉業之暇潛神祖道呵護法門使儒門君子知我法門中人亦自有超然物外非富貴尊榮所能籠絡者則佛祖之道當大振於域中矣翠巖云乎哉時炎惟祈為道自玉不既復天童山翁和尚歲杪專使還山伏審起居清勝為慰忝蒙法愛特寫先師頂相并如意遠寄西江其雨露焦枯栽培同學之深心不啻如天普覆矣焚香瞻拜之餘感激非可言喻洎捧讀全録全集機用峭拔波瀾浩渺直令河伯向洋望若而歎豈青藍冰水之足況其超卓哉仰羡仰羡頃聞已允青州大覺之請恨弗獲追隨杖屐以觀嚬呻回顧於東魯耳拙録蒙為災梨深煩神思且維揚丁歲凶之時又插梓人混擾叢席并勞兩序諸公照拂之冗愧恧滋甚不知何以報涓埃於萬一也疊承佳惠下及統此布謝臨穎神馳不備復黃山恆證和尚久耳雷震天都弗及鳧趨猊座乃辱瑤箋遠降幣録特頒愧慰何可勝言謝謝先師道價重一時兒孫遍寰海獨新安諸剎未聞白椎之聲既獲金錫遙飛慈光再耀雲龍風虎水到渠成又奚啻一剎之慶幸而已哉某鹵莽無似螳臂徒申退鼓頻撾業緣未竟不知何時得橫肩楖栗一訪故人於六六峰頭以話夙昔也專使歸促草率奉復尚圖專候興居不備東龍池萬如和尚自辛巳冬違教後煨鐺窮谷音問杳然每聞道弘陽羡聲播寰中誠可謂龍生龍子也弟不才無用埋影西峰準擬與草木同腐朽無何為一夥破落戶拉出洪井溪頭拖泥帶水一上客歲始致瓣香於先和尚塔前曾有小啓奉訊興居專使以途梗未達殊為悵然今秋高足破門闓公來翠巖相依不幸竟以疾故弟為之嗟咨太息親率衆為茶毗尚有拂一枝及頌古一册不敢遺失敬遣人齎上想吾兄於白雲巖畔亦不能不為之蹙額也山川修阻會晤無期臨風瞻企不盡依依復洞山元潔禪師曩寓白法時聞法駕登峰訪友深慚蓬蓽未及攀迎親領玄誨悵甚邇來衲子自分寧來者靡不稱頌德風然未獲睹全録昨辱專使遠惠如遇差珍蓋新豐一曲調高和寡非潛行密用洞達源底者莫能窺其涯涘今讀尊録詞簡義豐誠可謂玉線金針不忝為若耶真血脈矣欣羡欣羡翠巖重興機緣猶如蝕木何當華袞之褒客歲力撾退鼓未獲抽身虻負之慚不知何時可謝然後橫肩竹杖專訊法履於白雲青嶂間也臨穎神馳統祈崇照不既復洞山己任禪師辱承翰教遠頒財法並惠感謝無既且令法音普示俾大千界不隔毫端兩溪山一天風月者不慧到者裏直得鉗口有分何則耀爝火於太陽擊布鼓於雷門得不使明眼人冷笑乎雖然老兄幸是家裏人何妨説説家裏話生意各別養家一般餿飯殘羹不免搬弄一上非特因齋慶贊要且錦上鋪華昔年太白真贓悉為據款結案幸毋謂不慧饒舌也孟冬漸寒伏惟為法為人珍攝不悉復法昌冰鑑禪師承惠法儀提傳謝謝律宗久寒儀文不備幸獲令師和尚一集大成使後學知禪教律之不可偏廢此書大有裨補於法門自當與藏典並垂不朽惜此方未廣流通足下梓而新之誠可謂善纘其緒矣但法惠過多報瓊無路耳分寧諸祖剎漸為裨販之區聞之於邑足下既發明此一坐具地正應使盲龜跛鱉玉象金獅同歸此一坐具地益見炊煮之熟積蓄之深故發用之寬廣耳專使還肅函奉覆厚儀藉璧統惟鑒原不既復鼓山惟霖禪師甬水庚峰乍逢乍別者不啻幾河沙矣而流雲翔鶴天各一方眼中胸中無時不有故人面目存焉者何哉蓋以法門秋晚非鐵骨冰肝如足下者卒難負荷此宗耳豈區區鄉曲之情耶頃接翰教始知聖箭堂中依然陸沉下板豈所謂大器晚成者歟抑亦羞與時流同頡頏耶來諭年來開堂之風幾遍大地其付帕拂者如稻麻竹葦某竊謂非衆星無以顯日月之明非溪澗無以昭江海之深非群峰無以見須彌盧之壁立萬仞夫如是但患其不遍耳至若帕拂之多其斃蓋自少室評唱公案之徒源源而來者苟非壽昌天童諸大老倔起一整頽綱則宗風掃地矣餘枝末流胡足以較其醇疵哉惟冀足下全身擔荷大振先宗則聖箭之鋒自無敵於天下也鴻便肅復不盡依馳與佛頂觀長老一切世法即是佛法但以凡愚積迷未免觸事違理聲聞見偏因而執理棄事在今天下宗師高談闊論具大知見者不少實履真操滴水滴凍者亦不少求其事理圜融打成一片者指不多屈所以裨販之徒乘機而入遂至紀綱廢弛法化不揚高者則曰吾主持法道耳區區世務何足關心或枯坐經年或執卷竟日或吟詩畫畫種柳栽華卑者則曰吾百城煙水辛苦多年而今既坐方丈也須穿些紬絹喫些美甘享些自在福叢林之成敗法道之盛衰絶不關懷此輩所謂竊位者也山僧行腳時目擊其斃每以為誡故三處開堂十年於茲矣雖無補於法門清夜捫心稍可無愧汝言行篤實履道多年諸方時斃亦皆目擊今既出世弘道與隱居白法時不同當拌一條窮性命任他苦惱百千一往而進所謂將此身心奉塵剎是則名為報佛恩果能如是為衆則衆心必悅服如是為叢林則叢林必隆盛如是為法求人則英俊必至而法燈常朗矣復何後慮之可斷哉方丈去寺既遠時中常宜與兩序商酌事務調理大衆急其急而緩其緩從其重而舍其輕日居月諸近悅遠來湖海浩歸宗風自當大振耳書不盡言惟冀忘軀為道至囑復九峰白長老九峰勝概甲於筠陽雖未親遊久知為諸祖法窟今輿情歡洽敦請住持時至緣熟於茲可驗來札謂為法而行為法而住是衲僧之本分誠哉是言儒者為國求賢我輩為法求人苟以弘法為念則身世可忘矣去住云乎哉雖然法無定相舒卷臨時今既應緣已居勝地復有明公護持當晝夜忘疲及時行道方來衲子相從者毋論多寡愚智時以此事提持使其自參自悟一切小過宜廓落寬容如此則主伴重重六種四事不期備而自備矣法道濫觴波旬熾盛敗教傷風聞之髮指吾輩言行愈宜小心翼翼取法上古自不落今時之覆轍也勉旃
