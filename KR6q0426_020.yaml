body:
  text: 嗣法門人傳我等編佛事大佛像開光度盡自心衆生空盡自心地獄圜滿自心願輪成就自心古佛古佛既現魔外潛銷四衆同欽萬方共仰拋開錫杖月眉斜映海門秋撇下華冠螺髻右旋仙島碧直得大辨長者自除須髮著金襴道明禪和方便殷勤為侍者然雖如是者箇是有相佛那箇是無相佛豎筆云大衆還見麼復以筆點云一點雙睛頓豁開眼光爍破四天下像係地藏菩薩更成韋馱聖像開光一向倒戈卸甲今朝重整儀威波旬聞風破膽以筆點云普眼是處騰輝佇看金碧煥然處千古天香繞衲衣伽藍聖像開光一身尚如幻七寶寧復貪靈山親付囑隨處作伽藍且道主持叢林承誰恩力以筆點眼云眼裏瞳人吹木笛挂鐘版萬古叢林一朝再振不離聲色見聞看取法王號令遂擊一下挂鐘版鐘未鳴版未響坐斷千差無伎倆鐘既鳴版既響看看平地波濤漲正當恁麼時消息少人知當陽縣起處擊一下云一擊破群疑且道群疑破後又作麼生動容揚古路不墮悄然機香城寺請挂鐘版數百年冷落風規今朝再振百千衆暫齊號令特地重新動靜二相不生聲色兩關全露鉗鎚在握敲擊臨時擊一下云但於此處知端的日用無非上上機黃巖寺挂鐘版伐木版考金鐘無時無處不圓通一期頓悟聲前句萬古同揚濟上宗遂擊鐘版一下佛頂寺挂鐘版報鐘雖圜不是曹洞木版雖方亦非臨濟一椎粉碎十方空聲聲直指西來意且道如何是西來意遂擊鐘版一下臨濟慧照祖師忌日拈香一夜雨滂沱洪爐湧碧波祖師真面目亙古絶淆訛既絶淆訛因甚當機罔措不是烏藤三度擊豈知佛法本無多天童先和尚大祥拈香挂像燒香設忌歷歷清風匝地若作世諦商量蹉過衲僧巴鼻拈起香云大衆還見天童先師麼遍界全彰沒變遷誰云化去已三年可憐毒手親遭處萬古千秋恨未蠲天童先和尚忌拈香河鼓天孫相會日玄峰老漢獨行時青黃草色俄驚九妙體由來不間絲遂以手指像云大衆者箇是老漢底幻影妙體在甚麼處復以坐具打圜相於中作女人拜云一年一度一爐香報恩豈在拈三句天童先和尚十周忌拈香十年前施三頓棒擊碎我頂門十年後燒一瓣香穿卻你鼻孔源流拂子賺殺多少英豪提杖挈瓶博得半生懵懂越王城外密園中熱罵留我不住迦葉峰前方丈內盡力撼你不動既撼不動合作麼生起死回生茶一杯報德酬恩祇者是喝一喝天童先和尚忌拈香泰山穨矣梁木毀矣哲人萎矣十二年來秋風數起不肖稚兒今日向大江之西洪井之東扶起泰山重整梁木喚回哲翁直令五湖四海行腳高流年年日日見天童拈起香云大衆不須別處尋蹤跡面目分明在此中山翁和尚寄天童先和尚頂相至拈香肋下痛還一拳死蛇咬殺鱉鼻從茲毒氣衝天不受然燈莂記若非面目儼然臨爭見難兄難弟大衆難兄難弟依然在畢竟將何奉老爺洪井水烹西巘茗一杯卻勝趙州茶天童先和尚忌拈香用閃電機轟霹靂舌點鐵成金點金成鐵二十五載吳越令行一十三秋晝夜常說厭原山下炷栴檀太白峰頭金鼎爇且道以何為驗插香云萬里河山不隔線天童先和尚忌拈香本師和尚忌辰年年此日一樣今秋佛殿經始毫髮無可供養既無可供養畢竟作麼生爛煮一杯木樝羹大家相共飽膨脝天童先和尚忌拈香黃巖自開闢以來未及聞臨濟宗旨吾師倚杖此堂中森羅萬象皆歡喜所以覺來耆舊特走延津遠分香積設忌茲辰大衆香供已陳且道天童先師還來鑒納也無插香云桂輪夜夜到天湖天童先和尚忌拈香年年此日分明說爭奈聾人自不聞聞即且置正恁麼時且道先師所說何事插香云失腳踏碎銅棺山情與無情一齊露天童先和尚忌通玄峰頂此時滅螺髻峰頭此日生十七年來消息在一回相對一傷情大衆消息既在又傷情作麼插香云枝頭梧葉落片片是秋聲掃馬大師塔磚鏡臺前打失娘生鼻孔滕王閣畔宏開選佛壇場踏殺天下英靈喚回空中野鴨掀翻窠堀截斷葛藤明大用顯大機電光石火較猶遲藏頭白海頭黑鐵眼銅睛皆罔測燈傳三十二葉道播四海九州腳下不肖兒孫昔日親遭毒手源遠流長且置到者裏作麼生與祖師相見喝一喝云無縫塔中藏不得森羅影裏現全身掃黃巖受業本師塔茅針出土快於針一語曾蒙獎誘深今日鴛鴦親繡出虛空刺破血淋淋師父還記得同在湖廣黃安天臺山中打七時話麼你若先悟我轉拜你二十餘年言猶在耳可憐道義未嘗酬一塔先將玉骨收面目雖然無間隔傷心難免淚雙流掃住菴本祖塔絶葷四十年已具龐公眼平生好博施誰顧蕩家産晚歲入空門五子兼一孫孫今繩祖武五子半不存翻思拜別祇園日一語未終雙淚滴泹言子去必超群吾老不煩憂旦夕孫今垂老歸寺中祖翁鴈塔已凌空塔前水碧連天碧盡是翁翁舊面容送碧雲健堂菴主入塔冰鐵門庭迥絶儔咄訶怒罵鬼神愁棱棱傲骨非凡骨誰識終歸土一丘恭惟同參某氣厭諸方身閒一室撾白峰之塗毒絶後重穌分河水之餘波枯根可潤句中含錦繡齊貫當立下風筆底走龍蛇永素宜推上座夫何緣不逮慧遂致志莫能伸一別形山三周寒暑落華沒膝碧巖之松竹仍蒼新月揚眉窣堵之鋒鋩始露且全身拶入不落夤緣一句作麼生道遞靈骨云鐵牛喫盡欄邊草直向孤峰頂上眠送恆範庵主靈骨入普同塔離群索居先賢所斥忘軀為衆列祖風規隱顯雖然不同行願從來無別恭惟同參某鉢傳甬水酒醉曹山參少室之禪遂空文字杜毗耶之戶竟絶語言佛來尚不留何況人間童行靈臺非所重誰憐沒後餘骸所以化去三年不免露眠草宿今日幸遇香城啓如是之塔翠巖作不請之友大家相送入重雲一任面南看北斗送衆耆舊靈骨入佛頂普同塔師舉靈骨云直到西方底依然不曾離佛頂迸破鐵輪底不妨親切見法身法身既見南北東西共一家佛頂已登來去死生無二路所以道十方薄伽梵一路涅槃門正恁麼時寶塔凌雲即且置涅槃門啓事如何喝一喝云雨花巖畔全身入頑石嵯峨亦解空破門闓法姪起龕三吳兩浙歷盡風霜尺頭雖短腳步卻長便恁麼去是孟八郎畢竟如何請上火場舉火道未行門先破撒手歸祇者箇豎苣云闓公闓公還識者箇麼攛下云縱饒者箇自分明也須洪爐親鍛過宗質庵主舉火飄飄煙笠離三楚半世艱辛參列祖行到水窮山盡頭暗地點胸唯自許從茲直入厭原西石佛山前倚杖藜昨夜碧天霜月落寒光爍破五須彌惟我同參某公生平質朴不尚浮華六十餘年示閻浮之幻景三千里外探少室之真風遍叩諸方久經行陳步步腳踏實地頭頭蹈矩循規誓不自欺那弄虛頭伎倆願居學地常存綿密工夫誠末世之典型後昆之模範今朝時節既到撒手怡然便行大衆行即不無且道宗質菴主畢竟向甚麼處去以火苣打云遠委悉麼灰飛煙滅無尋處遍界全彰淨法身靈峰不立真公起龕年既高德亦高更嫌何處不逍遙大衆還識此老轉身句子麼天際目高冰樹泮溪邊雲暖凍華消舉火真不立妄本空鼴鼠吸乾滄海露柱跳入燈籠大衆此是不立真公末後葉落歸根底時節諸人還識伊生前事麼三十年住山勤勞不輟數千里行腳執侍大通導童蒙歸解脫之地變荊棘成釋梵之宮如海之納如山之容緇素共崇高行遐邇同欽德風六十六載幻華在空今日空華隨焰落聲光千古振靈峰無相直歲舉火屋漏不曾撿得完牆壁不曾修得好丹心片片輔禪庭奈何五蘊山先倒無相上座還知麼五蘊山雖倒一靈恆不壞鐵牛火裏快翻身無相光中常自在還霽庫司舉火清明今日已還霽不汝還者原不斃老胡漏逗知不知秋風黃葉歸根柢還霽禪德汝棄菴舍入叢林行苦行用苦心一衆所知也獨有向上一著未能徹底親契山僧略藉勝熱威光為汝重宣妙諦便攛苣自融德公舉火一睹德人容便諳仁者壽詎料朔風嚴搖落同枯柳八十一春秋白駒過其牖要知堅固身古今長不朽德公德公還知不但能觸處自融通火裏金毛常震吼體修禪人舉火倚衆修行多少好無端妄想去居山腰包尚未安停當又被山神趁得還體修體修既還家中還識家中事麼豎苣云祇者是莫顢頇金剛正體離生滅火裏張眉子細看隱光禪人起龕迎汝入山來春風拂楊柳送汝出山去爍石雲飛走來兮去兮本無心迎兮送兮金博金須信隱光隱未得堂堂縱步火中行本源禪人起龕返本還源去空中信步行踏翻蟾桂影何處不分明密聞禪人舉火木叉猶未受殼漏已先拋既是密聞得何須挂七條雖然名實未必相稱死生未必逍遙我今為授自性戒火光騰處赤條條擲下火苣性宗化主舉火五載擊柝破萬姓之慳囊一旦染痾受百骸之楚痛楚痛不過處須知有不痛之人死活不得時須信有不死之性性宗性宗即今三寸氣斷四大皆離性在何處擲苣云烈焰光中全體露寬和耆舊舉火體無不遍之謂寬用無不具之謂和今朝攝用全歸體古路分明見也麼豎苣云祇者是一條古路千聖共行你若見得便知去處八十三年浮雲朝露且道雲收露盡時如何擲苣云火裏蟭蟟噉木鵝定之禪人舉火八苦交煎時念念常在定有如是操持始名親見性若是半邊白半邊紅恰似狂華翳碧空而今要得狂華落大火聚中休卜度便擲苣寰虛禪人舉火一身精血同秋葉萬事紛紜付海漚賸有那邊消息在寰中虛寂任遨遊寰虛寰虛要識那邊消息麼今日分明為汝道破便擲苣不染耆舊舉火紅葉墜西風千林現秋色未過祖師關難免無常迫恭惟某耆舊典型法社鐵面無私恪守清規分文不蓄虛懷問道竟爾忘叔侄之分廢灶拍田慨然作同袍之倡今則幻影雖拋弘願堅同鐵石寧做貧家之兒不入王侯之室老耆舊便現王侯也不妨隨緣隨分作金湯攛苣云水中猛焰連天發催出荷華滿地香法榮耆舊舉火紆金拖紫未是法中之榮達本明心方顯圜顱之貴恭惟某耆舊年近八旬耕鋤不輟鶉衣百結儉朴可風為我作闍黎千指同師一字對公談淨土西方祇在目前今則火蓮初放毫髮不留且道彌陀如來正談何事投苣云腦後眉毛分八字上乘耆舊舉火乘最上乘直登寶所寶所既到有眼如瞽試問大衆已到寶所便該雙眼圜明因甚麼卻瞽攛苣云火裏蝍蟟吞卻虎淡雲禪人舉火奔走黃巖與翠巖道緣雖薄道心堅誰知霄漢浮雲淡又逐南風散遠天淡雲祇此堅固道心火燒不壞本絶去來豈有成敗汝今要知本無去來成敗底麼山僧聊倩勝熱婆羅門為汝直下點破便攛苣普印禪人舉火癡心戀世間修行須待老豈知泡幻身朝存夕不保禪戒俱弗知生死如何了豎苣云普印還知麼即此是戒不假師傳其或未了更聽偈言毗壇新掘不多深堪鍛人間未了心妄習妄情俱鍛盡南山下雨北山晴便攛苣正芳耆舊舉火正為迫桑榆勸公早圜戒豈期數日間皮袋果然壞正芳公皮袋既壞當知有不壞者在其或未知更聽一偈三尺火坑親手開斬新焰鍛衆如來凡情聖解都燒盡臘月蓮敷碧水隈雜著萬壽菴記菴所以安僧者也僧所以事佛者也佛之慈光無所不燭故其金容無處不現宮殿無方不豎雖小大有殊應機不一而其壽萬乘福群黎闢凡情啓昏聵則如隨色之摩尼吹毛之寶劍無往而不利也豐樂為西甌奧區去芝城一由旬地佛廬僧舍毋慮數百千其最著者曰斗峰與梅岐之黃巖高陽之鳳山鼎峙於西甌之域皆稱法窟代有高僧難量測公蓋黃巖碧天禪師之法孫也中歲念生死事大棄恩愛斷髮鬚一衲翛然自受具以來秋霜烈日壬申春偶經豐樂遂為范氏諸公遮留禮敬而遠近諸檀為結給孤之緣測公乃與其徒卓錫於滄洲之測鼎建精藍命曰萬壽一時紳襟如某某諸昆仲皆躍然而起施田及山為助道之具菴成冒暑徵記於豫擬勒石以垂不朽豫念其真誠乃為敘其顛末使後世君子知測公之德珠藏玉韞測公之願山高海深故能隨方利物剖破凡情豈非所謂五色之摩尼耶測公年至從心而精修不倦則其為四衆所敬羡也亦宜焉後之住此菴者其亦能修測公之至德與測公之弘願乎庶幾無忝為佛之孫子矣寶鏡菴記十年此地搆茅廬門外漫漫草未鉏古佛二尊先後到無生一曲濟曹符親懸寶鏡菴常朗喚出子胡石亦穌咬得木人紅血濺足心頭首當時枮此誠公貽豫詩也豫初負笈參方即依洞上知識聞其配合宗旨臆見紛紜間有以楞嚴之暗相永不能昏訓詁參同者有以文武頌君臣偏正者有以圖書奇偶配賓主者遂謂主有貴賤之別宗無明暗之殊豫時宗眼未明勿能甄別然心竊疑之迄見天童先師後乃知濟洞兩宗同異異同玄妙難測非可以教乘儒典配合者嗟夫元明以來濟洞二宗不絶如線矣先師令行吳越壽昌崛起西江實中興二宗之始祖昌得博山來公其道益振然及門之士不輕許可故潛行密用者往往於白雲青嶂問遇之歲戊戌豫以赴請之興福說法誠公延豫至精舍稽首曰某自從博山和尚圜具以來遍參諸大老俱承提激已而誅茅四處三十餘載末後始住此山曾蒙古航和尚親蒞獎導及挺然諸友贊成像設殿堂規模稍備今幸和尚光臨願丐一額以照林泉豫乃為顏其菴曰寶鏡菴傍有石可趺以其吐舌而蹲俗呼為狗石豫為易曰子胡因語公曰公久參曹洞禪必悉其旨如寶鏡三昧云銀碗盛雪明月藏鷺公如何會公曰莫是明一色邊事麼豫曰未在更須細參公唯唯次日呈偈有咬得木人紅血濺之句豫曰喚作一色得麼公欣然作禮噫使諸方見此不至有支離配合之斃矣豈非所謂潛行密用之流亞乎昨送豫歸佛頂復求菴記因為紀其大概菴經始於庚寅孟春落成於壬辰季冬高二十六尺去烏石一牛鳴地去芝城則三十里共創建蓋自誠公始也公諱道誠松溪李氏子自輝蓋其法號云僧護經序輪回升墜之說孔孟之書所不載唯大雄氏以無分別智洞達過現未來三世之事故能詳言之顯言之歷數天堂地獄因緣而直示之如指諸掌一聞其言靡不惕然省駭然悟必思所以蕩滌其志慮澡雪其根塵者然猶有撥無因果之徒眇其說為膚淺為詭譎不足信謂一切皆空復何報應之有因而放辟邪侈縱恣餘習張大言以欺佛誑人靡所不至故現報冥報之慘往往有不忍願聞者嗟夫經不云乎無我無作無受者善惡之業亦不忘永嘉云豁達空撥因果莽莽蕩蕩招殃禍達摩云解行相應名之曰祖然則先聖諄諄苦口獨不諳一切皆空之理乎蓋以理須頓悟事在漸除吾人自迷本有以來升墜於六趣既久習染既深縱使一念回機頓契本有一段風光而無始習染必須漸盡餘習淨盡則一切神通光明自然現前不從外得故曰不矜細行終纍大德至哉言乎豫濫廁緇流二十餘年矣未聞僧護經之名客歲偶於鄰菴故紙堆中得之展讀至獄中出家者衆白衣鮮少處喟然嘆曰悲夫出家原為超地獄脫輪回者也乃今僧護目擊世尊親宣謂獄中出家者衆得不令人寒心哉因念此經切中今時流斃而此方流布甚少久參忽而不閲初學素所未聞乃與諸新戒謀鋟梨棗以廣流通似於法門不無少補云爾諸公果能入海出海如僧護之翛然入獄出獄如僧護之自在遊戲無間如三禪天樂則大雄氏之書可廢為故紙矣不然則火樹火床未易躋攀在經論合鐫序天下皆知孝道之當盡也而不知所以盡之之方天下皆知不孝之不善也而不知所以革之之源天下皆謂出家之不孝也而不知所以孝之之至此無他蓋由吾徒不能遵佛祖之教廣佛祖之言以開天下之昧昧耳豫不孝宿業深厚幼孤始從先祖棄家入山學出世法而無後之惑胸中未能泮然一夕夢先子示之曰欲酬罔極母越出家既覺遂矢志披緇嗟夫生我之身定我之向往使我得聞佛祖之道此恩此德又豈特昊天罔極而已哉自惟駑鈍浪跡天涯二十五年於茲矣雖造次顛沛不敢忘先子之明訓客歲丙申始獲一撾退鼓於翠巖還鄉祭掃哀慟欲絶今春修葺墳隴既竣歸山為諸新戒講演孝論雖不足以答劬勞於萬一亦稍釋蓼莪之痛耳孝經曰能令二親奉持五戒執三自歸方為至孝悲夫二親逝矣夫復何言敬抽鉢資將斯經論梓而廣之命曰經論合鐫俾天下為人子者閲之知吾佛祖之教與魯誥無以異則不至有異端之呰而盡孝之方革斃之源如視諸掌矣客曰人子當孝儒釋同然固也祇如祖師謂父母非我親誰是最親者其義何居豫曰未曾吸盡西江水爭解峰頭泛鐵船客稽首而退輯鏡華録序三世諸佛是一朵鏡華歷代祖師是一朵鏡華天下善知識是一朵鏡華極而言之富者貴者貧者賤者愚者智者彭者殤者乃至飛者潛者植者動者銜鐵負鞍披毛戴角者無非是一朵鏡華舉世間人皆由不知此身是鏡中華遂於華中起種種妄見生種種染著造種種業因受種種苦報由是升沉異路男女殊形貴賤不同途修短不同命是故西竺大聖人愍之亦於鏡上百億分身標榜萬世或現佛身或現祖身或現帝王身或現宰官居士身或現比丘比丘尼身或現優婆塞優婆夷身如華嚴會上五十三位善知識各各具有無量神通三昧即赤縣神州自達摩東來之後其間王公卿相白衣黃冠乃至命婦大姑市餈婆子悉皆具大知見名垂僧史代不乏人不斷煩惱而證菩提不舍塵勞而登覺岸即此鏡中之華便成優曇鉢羅庸詎謂非金粟之後身邪富沙於神州為僻壤自馬大師過化以來碩學大儒聯燈續焰者不可枚舉邇來宗教濫觴金鋀莫辨美斯周公憂之客秋豫以赴請之東溪佛頂過富沙周公乃與其同袍謝公輩躬迓至蓮華社中舉揚第一義諦別來未幾復馳書至佛頂曰龐公東土之淨名也其偈頌機緣皆可以世惜此方罕見願丐大序以冠其顛使剞劂流通為白衣榜樣亦護法之一端也未審吾師以為何如豫曰善哉斯舉乎夫欲惡之孽為自性之蒹葭久矣及其始萌也而藝之則禾繁以滋吾輩治心亦然聖賢之治人治世亦然公今為榜樣白衣而先流通正法是可謂深耕而熟耰者也雖然唐宋之際何啻一龐公哉今據五燈所載六十餘員皆可標榜萬世者合為一録命曰鏡華梓而廣之則可使人人為龐公為靈照為計氏為洞賓為蘇為黃為李為楊隨所好而效之則榜樣不亦多乎哉昔內翰淡菴莊公嘗訪豫於翠巖詢及宗乘中事豫舉斬貓話示之莊通夕不寐黎明至方丈曰弟子會得也豫曰試道看莊曰虛空粉碎一切不留乃相笑而別試問諸公虛空本無形相如何粉碎得若知得此意則欲惡之孽自除一靈之性獨朗八角磨盤馳驟空裏金毛獅子哮吼寰中不然且向鏡華圖上看看他榜樣是如何翠巖寺規約序先聖以神道設教建立叢林聚衆匡徒朝夕焚修祝釐聖壽正所以陰翊無為之化同酬不報之恩也故為住持者不惜拖泥帶水為法求人多中淘汰覓得一箇半箇當家種草以續諸祖慧命所謂養育材器陶鑄聖凡故其門庭不得不峻禮法不得不嚴規矩不得不立所謂大匠誨人必以規矩學者亦必以規矩規矩立則上下安禮法嚴則不肖退門庭峻則師道尊矣故住持雖謙光接物海納山容而於痛下針錐之時不得不翻轉面皮學者往往望崖而退求其如葉縣浮山汾陽慈明者指不多屈矣是故中下二機非規矩無以束其身非禮法無以制其暴防其微杜其漸而後叢林內外始安於無事此大智禪師清規所由設也後世罔知軌度不守律儀遂至紀綱廢弛叢林凋喪得不辜先聖建立之苦心乎西江自馬大師開選佛場以來巨剎星羅而西山尤盛西山之名藍固多而翠巖獨盛宋元後宗風寥寥不振法席遂至滄更頃者石磬重敲海衆雲集多是法中龍象無煩節外生枝恐有一二初機莫知所守故折裏清規略摘數條可以救時斃者揭之於左儻有英俊衲僧才入門來打破牢關縱橫自在逆順無拘超然於規矩禮法之外而自合乎古轍者則叢林幸甚法門幸甚黃巖寺規約序夫巖居穴處難忘君父之恩方服圜顱敢悖佛祖之訓所以上求下化夕惕朝乾正欲同悟一心仰資萬壽而已然追風之驥不策而馳繞樹之猿非鎖莫制頑銅鈍鐵投大冶而遂作干將散木樗材遇良工而崇成廣廈是知規繩爐𩍁斷不可無而巧匠真師千秋一遇八閩自鼇山成道之後四海仰木毬象骨之高長者施宅作精藍王臣傾心為弟子由是佛廬僧剎碁布星羅故此寺開山實自唐雪峰禪師始也後代隆窪年深莫核中興以來四十餘載昭昭彝訓凜凜芳規三喧義虎之聲一奏新豐之曲本支七世千指秀出雲間濟洞兩宗一時霆震海內誠西甌之法窟也某久客他鄉愚頑無似乍歸丈室誠愧濫竽思創業之多艱慨法久而成斃爰集耆宿共酌重輕幹蠱雖貴因時立法自宜倣古故折裏規約臚列草條仰冀同志遵行毋恣頑梗使道德仁義之紀綱頓整戒定智慧之根本益堅下導群機上翼王化則八閩界內重窺象骨牚天一味堂中常見金毛踞地叢林幸甚法門幸甚佛頂寺規約序建安自五代而後剎竿林林高僧輩出然皆在郊郭之外而山谷無聞焉明末有大長者師事碧天和尚咨決心疑慕須達之遺風自西甌來東溪遙見一峰插漢雙澗合流乃詢里中父老曰是山亦有梵剎乎曰有曰何聖所居曰唐龜洋無了禪師肥遁處其寺曰佛頂長者聞之囅然披榛而陟但見殘僧數輩敗屋隤垣有不堪其憂者長者喟然嘆曰是祖庭也豈可久湮乎乃迎其師主之不數年間百廢具舉無何而其師化去長者復偕山中耆舊削牘至西江翠巖逆豫主席歲丁酉年秋籬菊香清薔薇露冷長者鬚鬢皓然矣復親送至山稽首揚言曰某年七十有七敬為和尚守此山二十餘年矣何幸垂老猶獲聞臨濟宗乘向者草昧經營規條未立後昆靡所適從今幸和尚儼臨祖庭有賴願定清規垂訓將來永為十方選佛道場以副初志則某之功不浪施也豫曰深山裏钁頭邊有一句子千聖難窺百丈未悉公還委悉麼長者曰願求指示豫握筆曰分明聽取募建大雄寶殿疏夫普光明殿統凡聖而無遺大解脫場亙古今而不易良由一念背覺遂至六趣橫生染淨既隔雲泥依正自殊優劣是故棄九五之位法位彌尊現四八之身凡身莫測隨方寶閣遍界香臺非硨磲瑪瑙之所成豈土木瓦石之能況皆緣熏修積劫施珠玉等泥沙力踐多生舍身命猶草芥故能威懾魔外福被天人為暗夜之明燈作苦海之舟楫也翠巖古剎南浦名區創始普通之年鶴書頻鍚中興己丑之歲瑞兆先呈然寶殿千楹未副雪中之讖敗椽數段還同樹下之居某下里卑人濫膺重任朝乾夕惕行忖坐思五閲寒暄未遽輕裁短疏再觀時勢乃敢奉啓高賢一時名公倡首於前四方衲子戮力於後祇園既闢布金應有奇人法宇重新插草寧無達士放大雄氏之行徑人人自證大雄依解脫法而修持處處無非解脫陳紅朽貫堪培歷世之良因間碧塗金必獲多生之勝報萬乘之尊特原自一笠七錢百福之莊嚴正賴雕梁畫棟幸繼齊安芳躅佇看明堂瓦插簷欲知真祖門庭試聽風甌鳴殿閣募鑄銅像疏土木瓦石皆是佛身而世人不信蠢動含靈皆具佛性而世人不知水流風動雀噪鴉鳴皆演佛音而世人不聞牛頭馬面羅剎夜叉皆呈佛相而世人不見所以煩勞黃面老漢屈曲垂慈權挂垢衣假名為佛遂現三十二相八十種好坐菩提場橫說豎說嘗對空生言若以三十二相觀如來者轉輪聖王即是如來又云如來說三十二相即是非相當是時黃面老人已自披肝瀝膽兩手分付矣爭奈著相者依前眚目迷沉空者未免金塵翳眼直至臨末梢頭拈起金色波羅華始博頭阤一笑由是知此道之難明雖三賢十聖卒莫窺其閫奧毋怪夫世人之不見不聞不知不信也矣雖然吾佛之教權實並行理事無礙故一瞻一禮一香一華或繪或雕或塑或鑄或讚歎或恭敬皆獲成佛所以法華云或以指爪甲而畫作佛像漸漸積功德皆已成佛道由此觀之遵佛之訓事佛之像成佛可立而待也又豈特天人福報而已哉翠巖為洪都名剎滄更之後不知古佛飛錫何方雖土木瓦石洲渚園林時時現殊妙色身而凡夫所見不一頃者寶殿煥然香雲蔚靄四衆瞻依不可無像擬覓巧匠洪爐仍鑄金身丈六須用紅銅萬斤十方具眼王臣信心長者一擲阿堵百福齊臻優填之勝舉再興紫磨之金色常現即此火風地水全成堅固法身頓令牧豎漁樵悉見現前真佛臨機不昧直下承當一會靈山千古未散募禪堂疏夫叢林之有禪堂猶國家之有庠序庠序不立則賢才無由以生禪堂不開則慧燈無由以續是知紹續三世佛祖慧燈而不斷者實自禪堂始也故百丈大智禪師創叢林立規矩設廣堂通單以居其衆分兩序列職以任其勞縣鐘版以定其時執香版以策其惰限長期短期以發其勇鋭使湖海有志衲子同堂共命遞相切磋曉夜精勤時刻無間必期發明本有佛性及第心空而後已此其為惠後學恩至渥也後世不體先聖立法垂訓之心反以規矩為贅疣以禪堂為虛設由是上下偷安彼此鈍置甚至暗室屋漏靡所不為一期報終三塗永墜可不哀哉故梵網云若比丘不教化一切衆生建立僧坊佛塔及坐禪處所者犯輕垢罪蓋以坐禪之益廣博無涯可以破積劫之迷可以助無為之化可以資檀信之福可以報不報之恩故列祖出興於世未有不以茲為急務者也西山自亮公隱居後列剎相望近代以來正宗淡薄而名藍大剎半屬榛莽良可慨也癸未春豫始來白法縛茅以居深自韜晦而四方學者日漸臻茅舍褊小不能容因念先德住山雖獨宿孤峰而弘法利生之志未嘗斯須忘也豫雖德薄行微敢不遵大智之遺訓哉第白法自悅堂喜公後寸土尺木皆為橫目所有茲者欲搆數椽以為坐禪之所其奈難為無米之炊敬裁短疏用啓高賢伏冀不忘靈山之囑勃興護法之思大破慳囊助成勝事棟梁椽柱全彰古佛風規穀粟錢財悉露祖師巴鼻一飯能致天福七錢尚感輪王善果既由善因種穀決不生稗衲僧頓明心地續焰聯芳檀那正信此宗超凡入聖皇恩佛恩等報祖意教意均明其殊勳殊德豈曰小補之哉募建普同塔疏塔婆之福世利民滅惡生善也至矣哉梵語塔婆亦云支提此土翻譯為滅惡生善處故阿育王以瞋怒心殺八萬四千夫人罪當淪於地獄乃問道人當修何善得免斯殃道人曰唯有起塔供養衆僧庶幾可免王遂如教於一日中造八萬四千寶塔散置閻浮竟免淪墜故明州鄮山舍利塔至今以育王稱焉或謂供養如來舍利獲福固多祇如凡僧之骨並無舍利供之奚益曰經云凡夫比丘有德望者亦得起塔但露盤之多寡有殊層級之隆殺不一昔舍衛國有大長者嘗罄其家資建立塔寺命終生忉利天其婦以憶夫故常掃此塔夫從天降慰之曰我以造塔功德殊勝得生天上汝能勤掃塔寺亦得生天婦如其言後果生天夫婦同證須陀洹果嗟夫一念之嗔遂感地獄一念之善遂感天宮毋論王臣長者貧富貴賤莫不皆然是知一念不生善惡俱忘者上也苟或念慮紛紜未得無心三昧則當時時護念庶幾轉禍為祥移粗作細耳佛頂為東溪名藍自明季中興以來德望之僧不可勝紀然闍維之後散瘞林下未有塔婆豫恐久而暴露其骸骨荊棘其丘隴似非叢林所以祀先之禮且違世尊所以示人滅惡生善之教敬裁短疏奉啓高賢各發敬信心共成希有事非特比丘枯骨普同沾恩即忉利天宮生生樂享無既矣募浴室疏佛殿放毫光古靈曾開寶藏浴堂惺妙觸跋陀已證圜通梵剎重興真風未泯濟濟開士何啻二八之多卓卓群英寧殊五五之衆但兜羅未施誰能覿體承當金湯再新便可赤條相見湘江之滿載珍玉虛擲無勞洪井之半掬寒濤翻騰有待況乎戈鋋雜沓多藏總為他留因果分明博施還同自得一言道合萬善齊臻天人之福報匪輕心境之塵埃頓滌仰祈諾諾敢惜叨叨笑巖寶和尚語録跋果地人語言非果地中人莫能辦其深淺摩訶衍密義唯摩訶衍上士始解析其精微天下之無道也久矣非儀封人之俊乂何足以知夫子之木鐸是故東土自小釋迦而後騰空羅漢罕聞金錫之聲據座高僧未獲貝多之贈然則大聖降靈如晴空霹靂火裏優曇固無論已即知大聖人之道而敬事之者亦不易得由知己之不易故顯晦殊途盛衰異世安得吾道之常明於天下也哉吾祖笑巖老和尚乘願降靈迅雷再震關子嶺頭焚卻本來父母金沙灘畔密論從上綱宗故應真稱為摩訶衍上士大覺讚為果地中人苟非小釋迦再來焉能起臨濟於已墜之際耶西江鄧文潔公深於禪者也敘其集曰吾師接引諸方其機用與先輩無以異近溪羅先生當世之巨儒也亦以荷鞭策而知向方然則內而中國外而西土若應真若王臣皆知吾祖之道大何以終其身於蓬門陋巷之間也耶顏子曰夫子之道大天下莫能容豈其然耶曰非也聖人之生也求賢以續正脈力踐以挽頽風苟有益於時雖陋巷蓬窗亦足以明聖人之道又何暇與庸流競一時之聲利而已哉或曰因時救斃為道求賢吾師之言是也然而聯芳六人道脈之所係也囑付伽阤鑿鑿可據不數載而煙滅無聞苟非龍池一滴則臨濟正宗焉有今日而南北集中十餘萬言竟無一字及龍池者何哉曰是非爾所知也師資道契非語言文字可企及也方其翹足作修羅障日月時師翁遂悟去爾還知否或者無以對豫固曰是非爾所知也曩者先師住金粟日已鐫全集流通第未採入師翁機緣此蓋劉子明緘之過耳某忝屬遠孫不揣暗陋刪繁節要以廣流通蓋欲天下皆知吾祖之道而力行之則果地不難至密義不難論晚近頽波不難挽也讀是録者倘能因一臠而知鼎味則小釋迦猶在祭二親文維某年月日不孝男某泣血百拜於嚴父慈母之墓前特豎墓上之碑謹以香茗蔬饈致祭於二親之靈曰烏乎哀哉尚忍言哉二親先後仙逝不孝自此飄零迄今二十餘年墓木已拱把合抱而岑森烏乎哀哉尚忍言哉言之思之涕淚如雨肝腸寸斷咽不成語烏乎哀哉尚忍言哉追憶疇昔觸境增悲三度援筆竟無一詞其終不言也耶不孝之言幾滿天下矣而獨不能攄一言以告吾親何以異於雞豚犬馬耶烏乎哀哉非不能言也不忍言也不忍言也其終奈何語有之子不談父德僧不拜君親夫不拜親固遵世尊之明訓也不談父德而使天下後世無聞焉其不孝孰有過於此者然則不忍言者何哉夫親之學富逾五車三事八磚易於拾芥何以齠齔遊泮而終處巖穴耶此不孝之所不忍言者一也以親之仁慈惻怛恭儉溫良則宜躋耆頤耄耋之年何以未登彊什留一髻於芝城之西隱百骸於廣寞之野耶此不孝之所不忍言者二也甘斷虀之糲食服百結之鶉衣居陋巷蓬窗而坦然不憂視不義之金珠玉帛猶草芥而弗顧閭里共知其廉潔疏戚咸仰其孤標由是而推其盛德大業則應本支百世而不衰何以竟至於無後天之報施其有驗耶其無驗耶此不孝之所尤不忍願言者三也以三不忍言而終不言則何以舒鬱結之懷展親親之義耶烏乎哀哉姑就失恃怙以來二十餘年流離落魄之狀泣欣於二親少釋不孝之愆於萬一耳不孝初入紫雲志懷猶豫是夕夢中親承面諭子當決志不必狐疑出家得道吾復何悲不孝於是矢志披緇勤求至道南詢百城遍咨耆老席不暇暖食不遑飽值天童之法王聞一言而遂了乃侍巾錫前後八秋始刈把茆猒原峰頭思報罔極陟屺陟岵臨風愈覺凄其近淚信無乾土痛滄桑之數更歸故鄉而多阻爰興兩剎白法翠巖禪教及律數載喃喃念親恩之未答乃衆緣而悉芟東風正發千里揚帆直扺高陽擊目松杉烏乎哀哉睦州之編蒲妙喜之繼絶目連尊者之蘭盆忉利天宮之特說不孝固未能也珍玫於墓上陳芹藻於林間歌梵唄誦真詮亦不過流俗師僧之故套又胡能俾二親之靈覺皎然如日月之麗天烏乎哀哉不孝其無可奈何也然則終奈何哉不孝其試以所學之道呈於二親之前天聽雖高幸俯鑒焉唯茲靈覺包含六合本無去來豈有苦樂男身女身空華數朵夭壽窮通何有於我我誠不孝無可奈何以道孝親或不見訶烏乎哀哉百拜稽顙唯靈在天來格來饗
