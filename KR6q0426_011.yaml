body:
  text: 嗣法門人傳我等編普說二安樂堂普說竹椽茅瓦蓋新堂堂角春風布綠楊到此盡成安樂漢百骸四體一時康大眾百骸安樂則一心安樂一心安樂則百骸安樂所以道心外無別法法外無別心淨名云觀身實相觀佛亦然楞嚴云汝身汝心皆是玅明真心中所現物般若云一切智智清淨無二無二分無別無斷故如是會得則身病心病凡病聖病不假扁鵲盧醫一時解脫六度萬行不須經歷阿僧祇劫當下圜滿然後遇茶喫茶遇飯喫飯寒則添衣熱則乘涼到與麼地始為得大安樂從上乃佛乃祖親到此地更欲一切人皆得大安樂故說大法以安其心立常住以安其身述因果罪福以啟迪其敬信所以梵網經云八福田中看病第一若父母師僧弟子病皆供養令瘥如佛無異高菴禪師云貧道常閱藏典諦審佛意不許比丘坐受無功之食每遇辰朝偕諸弟子持缽乞食心無高下使獲福者一切均等後所稱常住者本為老病不能行乞者設山僧昔閱律部佛在世時每月兩巡寮一日至一寮中見一比丘涕泣不已佛云汝泣何為比丘云飢渴病苦故佛云汝幾日不飲食耶比丘云已經七日佛云何以無人瞻侍比丘云以臭穢故皆猒嫌而去佛云汝不須泣吾當親自瞻侍汝遂為易淨衣浣其污者給以飲食復以兜羅綿手為其按摩云汝今安不比丘云世尊金手一按遍體安樂佛因為說苦空無常之法比丘言下證阿羅漢果歸至講堂聲鐘集眾普諭其事復云若同居比丘有病必當互相瞻侍若猒棄去者得無量罪非吾弟子大眾者便是釋迦老子為一切眾生安身安心底第一箇榜樣也高峰玅禪師居山時有若瓊禪者病中思醋峰於四十里外乞醋與之復思浴峰亦給侍之瓊因浴睹影忽大悟述偈云三十年來顛倒今日一場好笑孃生鼻孔豁開放出無毛鐵鷂者便是第二箇為學者安身安心底榜樣也先和尚初住天童時每以延壽堂未立為恨一日因雲間錢鄉紳求嗣先師遂開導伊捐資建堂施藥錢如命堂成錢遂得子其時山門雖有土木之役先師一月必數次至堂慰問開示故堂中常有坐脫立亡者者便是第三箇使學者身心俱安底榜樣也真歇了禪師嘗有涅槃堂偈云訪道論交實可傷經年獨臥涅槃堂門無過客窗無紙爐有寒灰席有霜病後始知身是苦健時多為別人忙老僧自有安閒法八苦交煎總不妨大眾還識得安閒法麼若果識得非特八苦交煎縱使劍樹刀山鑊湯爐炭亦自安閒其或未然同是有漏色身爭免八苦煎逼山僧初住翠巖即欲立一堂以安老病其奈福緣淺薄三年始成今特請某為堂主某為行者尚冀仰效佛祖之標榜俯念疾病之酸辛勤加照拂使彼身心調適直到大安樂之地則功不浪施矣且道如何是大安樂底去處愛日到門先曬背和風送暖不添衣普說理須頓悟乘悟并銷白雲斷處見明月事在漸除因次第盡黃葉落時聞擣衣大眾須知事無理外之事理無事外之理若單悟理不除事此人有眼無足若單除事不悟理此人有足無眼若能理事圜融行解相應此人方有語話分大眾要識事麼祇你二六時中胡思亂想起貪瞋癡造種種業底猢猻子是要識理麼祇你一念未生以前無欲無依無見無聞底主人公是你若親見得主人公一面猢猻子自然不敢作怪所以祖師門下玅在頓悟頓悟之後觸境逢緣自能隨處作主縱有無始妄習一時銷融譬如夜夢千秋覺已隨滅你若單除事不契理謂之盲修瞎鍊直饒向六根門頭死獦狚地去遏捺爭奈猢猻子依前跳梁不能馴伏所以道但得本莫愁末在今天下出家者如牛毛得本者如麟角所以正宗寂寥叢林衰落現前諸公冒險乘危不遠千里百里來求大戒便是末法精進光明幢假使普天下出家者皆如諸公何愁佛法不興但受戒亦非小事律中道受戒後不得離依止依止即和尚阿闍黎謂依止和尚阿闍黎可以進道故間有愚鈍者終身不得離依止如今受戒者七八日內草草匆匆三壇說話尚聽不清何況微細條章歸到家中衣缽束之高閣戒相視同故紙從年卒歲不見依止一面何況說欲羯磨昔迦葉佛時有一比丘度諸弟子不勤教誡中有一人廣行非法命終墮落為龍龍法七日一受對火燒其身肉盡骨存苦不可忍自知宿命本作沙門不持禁戒師亦不教遂生瞋念欲害其師其師一日同五百商人泛海龍遂捉船且云汝擲下此比丘始放汝去眾問其故龍如上答眾即欲捉此比丘置水中比丘言不須見捉我自投水因此殞命大眾據此因緣為師難為徒不易師不教誡過在師教而不聽過在徒所以今晚有三件事先與諸公斷過受戒之後不能依止叢林者凡遇冬夏戒期必詣依止省覲無犯自說清淨有犯發露懺悔此是一受戒之後當立志參學不得仍行應赴等事此是二受戒之後當朔朢誦戒及學大乘經典不得為檀越誦血盆三官等偽經儻有不遵者即九師及同壇上中下座皆得鳴鼓而攻追其衣缽昔世尊謂采菽氏云若比丘輕慢佛語犯眾學戒九百萬歲墮泥犁中其間罪人手生鐵爪相摑肉墮痛苦難忍眾學戒梵語突吉羅五篇中之最輕者犯此輕戒尚受如此長夜之苦何況犯五篇中之最重者其苦尤甚大眾人命無常眨眼便是來生當念泥犁苦發向上志專精持戒努力參究究取自己主人公一朝打失布袋親見一回始知理事不二頓漸無殊且道除卻頓漸理事如何通信白雲斷處見明月黃葉落時聞擣衣普說參禪須求玅悟不可掠虛發言須契正宗不可儱侗儱侗則正宗不達卒落野狐之群掠虛則悟門不親終滯知解之網所以道參須真參悟須實悟閻羅大王不怕多語近代學者祇因悟門不親學處不玄所以語多滲漏如群盲摸象各說異端互相是非取笑識者豈不見阿難尊者於楞嚴會上聞佛開示身心蕩然得無罣礙自知心遍十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提玅明元心心精遍圜含裹十方反觀父母所生之身猶彼十方虛空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本玅心常住不滅大慧杲禪師於熏風自南來殿閣生微涼言下直得一念不生前後際斷此二尊宿因聞法得悟悟中境界說來自然不同雪巖欽禪師於堂中經行忽見面前如地陷一般天童先和尚過銅棺山頂豁然大悟便覺情與無情煥然等現你看真箇悟得底說出悟由自然親切略舉一二可見從上尊宿無不從真參實悟中來所以發出一言半句如木柤羹鐵釘飯無你咬嚼處你若是夙有靈骨底直下打破漆桶你若不會便須薶頭真參豈可掠虛謾人寒山大士云我見謾人漢如籃盛水走及至到家中一點也無有教中所謂大妄語成下無間獄豈是小事現前諸公雖未徹悟且不掠虛一聞結夏之說內外踊躍不懼炎烝頓忘寢食要向九夏之中了決無量劫來生死疑團便是正因行腳衲子今晚當起期之初有幾件事先與諸公議過第一不得閒坐第二不得妄想第三不得瞌睡第四不得學轉語第五不得念話頭依得此五件事敢保一切禪病自然脫落大眾須知此事元不涉文字語言天下老和尚萬不得已垂一機一境開口見膽要你直下徹去休去歇去生死病根頓盡去譬如良醫相似據你所害底病下一劑藥要你通身汗下其或服藥不效便須另覓良方不可向人道我病雖未愈藥已喫得純熟了而今念話頭者亦然十年二十年抱箇死話頭去念卻向人道我工夫做得純熟了話頭不間斷癡人你若不求玅悟縱念百年有何所益此近代參學者大病牢牢靠著一句話頭如乞兒杖子相似縱遇知識當機直指渠亦不顧又有一等鹵莽禪和被知識逼拶得緊祇管去學轉語來唐塞也不管自己悟不悟信口胡柴豈不見雲居初住菴時興化問權借一問以為影草時如何居無語化云情知你答不得者話不如禮拜了退可見古人慎重不妄發言至若瞌睡妄想參禪通病不待細言古德云若人靜坐不用功何年及第悟心空直須提起吹毛利要剖當陽第一義可見閒坐取靜亦是大病驀豎如意云大眾山僧提起吹毛也還見第一義麼擲下云急著眼覷普說百舌無聲鵙又鳴物情迭變洵堪驚胸中未得空諸有萬象依前翳眼睛大眾一切諸法本來空寂不待離散敗壞而後為空天地若不空則不消隕日月若不空則不沉沒山河若不空則不崩竭四大五蘊若不空則不離散乃至三界二十五有內外諸法皆是空華都無實有若知得一切皆無有實便是出生死底捷徑所以道知是空華即無輪轉亦無身心受彼生死非作故無本性無故大眾既無生死又無輪轉為甚六趣昇沉至今不息良以一切眾生從迷至迷不覺不知隨順業識妄生執著於無生死中妄見生死於無是非處妄起是非於無人我處妄分人我於無遷變處妄見遷變所以道心生則種種法生心滅則種種法滅又道如我心空諸法空千品萬類悉皆同故龐居士向一口吸盡西江水言下心空及第二祖於覓心了不可得處始得心安心既不可得則六根六塵六識十二處十八界及一切諸法皆不可得一切諸法既不可得則本來面目觸處全彰驀豎如意云還見本來面目麼你若未得心空底畢竟喚作如意子要且不見本來面目者箇說話喚作入理深談你若未得心空見人說道理便作道理會見人向上提持便作玄玅會見人說空便著空見人說有便著有譬如矮子看戲隨人上下日前有箇禪客入室中請益云達得無常苦空是小乘法如何是大乘真空山僧便打客茫然諸人還知棒頭落處麼若也知得則四句俱離百非頓絕盡無邊香水海遍微塵國土是自己一箇清淨法身求於空有二相了不可得其或未然冬至日長夏至日短瞬息百年三途路險珍重普說九夏須臾盡秋風又再旬時時不空過方契本來人大眾山僧一夏以來不持咒不誦經困即打睡健即經行可謂不空過諸人一夏以來肩竹肩木收米收穀亦可謂不空過眾中有等懵懂禪和便道翠巖老漢說無事禪我們一夏以來嘮嘮攘攘七上八下雖是行得些苦行博得些癡福究竟禪不曾參得道不曾悟得正是空過日子和尚一月以來不上堂不開示不談宗不論義爭得不空過大眾與麼見識何異三家村裏俗漢我且問你本來分上還著得者閒家潑具也無所謂金屑雖貴落眼成翳昔有一老宿一夏不曾為眾說話會下有僧嘆云不敢望和尚說佛法得聞正因二字也難得老宿聞得乃云闍黎莫𧬊速若論正因一字也無道了叩齒云適來不合恁麼道鄰舍有老宿云好一釜羹被一顆鼠糞污卻雪竇顯禪師拈云誰家釜內無一兩顆大眾要識鼠糞麼參禪學道是鼠糞成佛作祖是鼠糞談玄說玅是鼠糞要識清淨羹麼更舉一則古人公案與諸人聽昔仰山夏末上溈山省覲溈云子一夏作甚麼仰云鋤得一片畬種得一籮粟溈云子可謂不空過仰云和尚一夏作甚麼溈云日中一食夜後一寢仰云和尚也可謂不空過道了乃吐舌溈云寂子何得自傷己命大眾溈仰父子主賓互換縱奪可觀即且置祇如仰山吐舌溈山因甚道寂子自傷己命若撿點得出也許你是一員無事衲僧其或未然時中切不得空過普說僧問施主殷勤請陞座未審吾師有何垂示師云昨夜南山虎咬大蟲乃云梵語阿彌陀此云無量壽若能直下自承當狐貍便作獅子吼獅子既吼群狐腦裂吹毛出匝凡聖不留縱使無量壽世尊到來也須斬為三段更說甚麼樂邦淨土何殊翳眼見空華指東劃西大似止啼拈黃葉豈不見六祖大師答韋刺史道東方人造罪念佛求生西方西方人造罪念佛求生何國凡愚不了自性不識身中淨土願東願西悟人在處一般所以佛言隨所住處常安樂使君心地但無不善西方去此不遙若懷不善之心念佛往生難到今勸善知識先除十惡即行十萬後除八邪乃過八千念念見性常行平直到如彈指便睹彌陀使君但行十善何須更願往生不斷十惡之心何佛即來迎請若悟無生頓法見西方祇在剎那不悟念佛求生路遙如何得達惠能與諸人移西方於剎那間目前便見各願見不眾皆頂禮云若此處見何須更願往生願和尚慈悲便現西方普令得見祖言大眾世人自色身是城眼耳鼻舌是門外有五門內有意門心是地性是王王居心地上佛向性中作莫向身外求自性迷即是眾生自性覺即是佛大眾六祖大師已開口見膽一時說破了也還信得及麼若信得及便與古佛齊肩不須向外馳求所以長蘆賾禪師云實際理地不受一塵則上無諸佛之可念下無淨土之可生佛事門中不舍一法故有念佛三昧開示往生法門東土自遠公結社之後念佛者甚多著淨土文者毋慮數十家雖有抑揚偏重之說未嘗非毀禪宗獨龍舒王日休所述淨土文中力排禪獘且引無根不稽事跡為證即草堂五祖真如惠古諸大尊宿皆遭貶斥然王公原文祇有十卷今所傳者增廣二卷大抵排禪之說乃無知庸妄之談斷非王公本意頃因無念禪者偕眾檀入山設供特攜此文質正山僧擬募緣鏤板故對眾點破免致以訛傳訛疑誤後學不是山僧執參禪為是排念佛為非念佛參禪總是先佛法門遇上根利智教伊參禪中下二機即令念佛對機說法何是何非譬如害熱病底與他涼藥害冷病底與他熱藥病盡藥除非但禪淨二門即諸佛諸祖及天下善知識百千方便總是止啼黃葉都無實義正恁麼時藥病兩忘生佛無二即且置敢問大眾無量壽世尊即今居何國土還知麼白蕅華中藏不得紅塵堆裏現全身更有一偈舉似大眾禪淨相兼也不妨娑婆寧復異西方頂門未具超宗眼莫把虛空較短長行實辛茆臘頑石禪人設茶偕兩序大眾稽首請云諸佛出世皆有生緣歷祖降靈各敘行腳吾師續天童之正脈復翠巖之禪庭三載開爐千指圍繞願示行由以開來學師云日出西方夜落東眾云不會師云且歸本位坐看取畫虛空眾歸位師云山僧本無姓字亦無方所無端於甲寅年十月初四日亥時幻現於建寧府甌寧縣之高陽鄉前一夕先母余氏夢一老僧鬚眉如雪從峨嵋來借宿乃分娩甫出胎遂不茹葷血先父陳氏諱之奇為邑庠生嘗謂人曰吾先代多好善樂施每遇饑歲倉廩為之罄空後世子孫必有起者觀此子沉潛溫敏動止有則似非常兒可比因命名國賓字賓王稍長隨父讀書於山寺中極喜聞梵唄之聲每晨盥漱畢即同胡跪結印默持準提咒三七遍年十六翻然有出世之志乃隨先祖出家於黃巖禮本師上體下空薙染命名真哲字若魯嘗自思曰此世界中不知有幾許人人中有幾許凡幾許聖即此世界憑何而立一日閱中峰警策歌至三界塵勞如海闊無古無今鬧聒聒盡向自家心地生一念不生都解脫處恍然自得即有志遍參一日閱傳燈至青州布衫話如撞鐵壁悶不自解乃閉戶絕食竟日趺坐揭字於門曰今日不出戶久之無所得聞天童法席冠海內遂定向往辛未冬始腰包出嶺道過夢筆為覺浪和尚所留壬申同抵武林聞其力詆天童且信且疑莫決去就侍行吳楚中原三載衣不解帶脅不至席雖執爨負舂採薪乞食靡不為之然於本參毫無影響甲戌冬乃棄去從潁州至天童參先師相見次便問向上一路千聖不傳棒喝交馳合明何事先師便打山僧云明知生是不生之法為甚被生死之所流先師打云還知麼山僧云便恁麼去時如何先師云賺殺闍黎一日問萬法歸一一歸何處先師云萬法且置如何是一山僧豎一指先師云此猶是萬法畢竟如何是一山僧無語先師便打每入室長跪請益先師唯大棒打出二六時中猶如木人直得東西不辦南北不分日則隨眾作息夜則倚柱為床一日求侍者單先師云老僧無侍者山僧云大尊貴生先師笑云你因甚要作侍者山僧云朝夕得親近和尚先師云如何是你親近處山僧呈偈云如何是我親覲處覿面當機絕回互云云先師指覲字云此字錯了山僧云未審當用那箇覲字先師以杖驀口指山僧當下豁然便趨出次日入室云某甲有箇見處特來呈似和尚先師云你見處作麼生山僧畫一圜相先師云也當不得山僧作禮而出從此於本分事了無疑滯但於古人公案猶不能盡透臨機用不出一日隨先師開萬工池次山僧問起石挑沙即不問冒雨衝風事若何先師便打山僧云恁麼則箇箇壁立萬仞去也先師亦打丁丑春以出山養病呈偈有室中若箇呈新見杖下吾曾豁正眸之句先師云如何是你豁開底正眸山僧云瞎先師云作麼生是瞎底意山僧無語先師云絕後再蘇欺君不得須知有者一步工夫此去不得浪遊病愈即還山山僧奉命至武林調息半旬即上徑山參雪嶠師太道過缾窯遇永覺和尚遂問聞師親見壽昌老人是不覺云是山僧云如何是壽昌得力句覺云若有得力處不到於今山僧云者便是壽昌得力處麼覺云汝何多事山僧云也不得放過到語風居見雪師太纔度香儀太接得便云汝那裏得來底山僧便掌太把住云者小禪和得恁麼無禮我不會打那山僧云師太作打會那太乃笑山僧禮拜起復問雪覆孤峰時如何太云愁殺人雪厭梅華時如何太云落也雪點紅爐時如何太云化雪消春到時如何太云一點也無山僧云恁麼則片片不落別處也太便喝山僧亦喝便禮拜太云老僧自住山以來並不見一箇𠠢利衲子當時唯有箇道開禪者是福建老頗有些氣息山僧云是家母舅太云怪道外甥多似舅即贈行腳詩一律中有綻衲渾身都是語快情唯汝自相宜之句乃留休夏於雜華菴菴去語風居十里太一日親過菴相看山僧門迎太取下笠子山僧接得便問天不能蓋地不能載因甚被者笠子遮卻太休去山僧隨後作禮云適來造次夏滿辭返天童太為作偈送行云今朝喜見雨中秋萬葉將為不自由獨許梧桐通此竅一枝飄泊逐寒流到徑山大殿遇雪關和尚上堂山僧出眾問獨步大方時如何關云你腳跟點地也未坐斷孤峰時如何關云老僧在者裏上堂處處逢渠時如何關云面面春風山僧云恁麼則雪消雙徑滑雲散五峰清關云洞口桃華開也未山僧云已被風吹落關云何曾夢見靈雲山僧云且喜大眾證明關云證明箇甚麼山僧便喝關云再喝喝看山僧連喝兩喝歸眾關云鼓粥飯氣到雲門見爾密和尚問未得底人如何下手門云向無下手處下手已得底人如何保任門云直須恁麼去已得底人與未得底人相去多少門云今日是幾山僧云恁麼則聖凡不二觀也門云猶是自家見山僧云誰知席帽下元是昔愁人門云如何是昔愁人山僧便喝門云也當不得山僧云疑則別參門留結冬命掌記室山僧觀爾老說法詶機從容自在邋邋遢遢不衫不履了無近時裝點扭捏之習誠本色宗師乃就職期中痛自策勵必以大悟為期機鋒轉語影響邊事撥向一邊時中但自揣云瞎底意旨分明會得因甚臨機道不出古今公案祇是一箇道理因甚透不得日夜鞭逼一日經行次聞僧舉開善謙與宗原馳書公案直得如放下重擔相似歸單坐十餘枝香無著歡喜處當爾之時並不見有身心世界亦不見有昏沈妄想正所謂常光現前壁立萬仞底境界從前疑處如開門見山因述偈云云次日值門落堂考工夫次山僧出眾問脫卻汗布衫且無蝨子咬一夜得安眠清晨起得早試請宗師大人考一考門低頭良久山僧作整冠束帶勢云一色杏華紅十里狀元歸去馬如飛便歸眾門云你看者醜驢亂做山僧便作驢鳴門便歸方丈一日門上堂山僧問馬祖一喝百丈為甚麼三日耳聾門云今日雲靄靄雨霏霏聲未絕山僧便喝云猶打葛藤在門云也須細細嚼過山僧云誰人知此意令我憶天童便拂袖歸眾解制上堂山僧問兩堂共聚千餘指大徹心源有幾人門云並無一箇山僧云恁麼則臨崖看滸眼特地一場愁門云闍黎又作麼生山僧云九萬里鵬纔展翼數千年鶴便翱翔當日辭返天童相見次即問單刀直入擬取師頭時如何先師云放汝三十棒山僧便禮拜而出次日入室云昨日觸迕和尚先師云道甚麼山僧云裝聾作麼先師拈棒山僧便出一日先師為佛音兄舉火將法語揭於壁上末云中有六字欠妥大眾為我改之山僧呈偈云謾言打草驚蛇出自是憐兒醜不知六字已更停妥了好看紙墨未形時先師覽畢乃云你是死蛇驚你作麼山僧便向先師肋下築一拳云且解咬人先師微笑一日開路次路有兩條先師云祇開一條罷山僧云兩條都要開先師云一條尚錯何況兩條山僧云不見道路路透長安先師休去先師一日舉熏風南來話問山僧你作麼生會山僧云山月如銀牽野興閒行不覺過峰西先師云此是老僧底山僧云拈匙便舉手喫飯便張口不是師子兒爭解師子吼先師大笑一日又舉熏風南來話問山僧山僧便掌先師亦打山僧禮拜一日舉有句無句話問山僧山僧云雲在嶺頭閒不徹先師云大慧因甚道到者裏如狗舐熱油鐺山僧云祇為滯句承言一日先師閱雪竇頌古次至楚王城畔朝宗水喝下曾令卻倒流問山僧作麼生會山僧便喝云者老漢莫不識痛癢一日入室中云某甲有箇頌子呈似和尚先師云拏來看看山僧展兩手先師便打山僧云者老漢頌子也不識一日先師問眼處聞時始得知意旨如何山僧云動容揚古路不墮悄然機先師云汝今日始作得老僧侍者山僧云是何言歟一日呈偈云一入天童五歲除箇中消息自如如汗衫帽子都稀破扁擔芒鞋尚拮据眼底了無塵世夢燈前漫讀古人書深藏丘壑看時節臘盡春歸萬物舒先師覽畢顧旁僧云者小老卻參得禪自此室中朝夕叩擊投機語句頗多不能悉舉辛巳冬侍先師於祁御史密園一日禮辭先師住山先師痛罵不已復呈偈云何事衝寒離杖側把茅欲向碧峰蹲目前殘局渾休論壯志深深在報恩先師亦不閱唯加罵詈山僧云某甲終不敢辜負和尚竟禮辭至西江南安臥雲菴與二三衲子火種刀耕喫瓔珞粥將有終焉之意未及一載忽聞先師訃音乃出山買舟東下至洪州遇同參健堂義公公以世道亂離江河梗塞再四挽留於西山白法結茅自癸未至今倏忽九載而埽塔之念無時暫置今秋始獲遣專使一通法嗣書埽先師塔伏承山翁林野兩法兄述偈上堂極口獎導山僧自惟不唧溜資性椎魯在俗既未能博通經史出家又未曾遍歷講筵行腳參禪受盡波吒枉用許多心力唯是將勤補拙始有今日諸公切不得學山僧不唧溜漢行徑若學山僧行徑和諸公亦不唧溜今晚因頑石禪者請敘行實不惜向虛空中圖畫一上回觀三十餘年事猶如昨夢且道未入母腹時諸公向甚處與山僧相見擊拂云石頭點處天華落雲腳收時夜月明
