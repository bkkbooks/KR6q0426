body:
  text: 嗣法門人傳我等編住建寧府黃巖寺語録陳如珄居士等迎歸天曆忉利寺請上堂僧問忉利移來在曆臺九旬妙法一言該二親已展千秋孝始信宗門有傑才如何是一言師云十字街頭吹尺八進云祇如一子出家九族生天又作麼生師云四海同甘雨千林共早春進云合族皈依古今罕見殷勤請法當獲何功師云人人鼻孔盡遼天進云與麼則一回親見性無煩誦蓼莪師云如何是見性底句進云青山常在白雲中師云好與三十棒僧禮拜師乃云衣錦還鄉可以榮親而不可以報親升天説法可以報親亦可以利人所以道大孝釋迦尊歷劫報親恩大衆祇這一點孝心刀割不開斧斫不斷入火不爇入水不濡可以通儒釋貫今古超去來越生死所以道孝順乃至道之法孝為百行之先孝為為仁之本乃至感天地動鬼神筍抽凍竹魚躍層冰娥江尸湧鼓腹超升無非是此一點孝心發現若無此孝心則與禽獸不異一切罪垢由此而生舍身受身從劫至劫不聞父母三寶名字名字尚不聞又豈有鞠我育我出入腹我及受戒聞法之事故經中云敬師長者今生始遇明師長孝父母者今生始得好父母大衆生事以禮死葬以禮祭之以禮乃至揚名聲顯父母育子孫續宗祖是在家人之孝且道出家人當以何法孝親豎拂云若向者裏見得最初父母一面是真孝子是名報恩故先德云流轉三界中恩愛莫能捨棄恩入無為真是報恩者大衆山僧棄愛出家二十餘年遍歷名山大川受盡千辛萬苦祇學得此無為之法合族諸公殷勤啓請舉揚般若亦無非説此無為之法憶得三十年前隨先嚴藏修此地先嚴曾有聯云本來是箇光棍子為甚在世界中裝模作樣大衆先嚴此語宛與本來無一物同一關捩諸人還識得本來麼若也識得便解無為脫或未然不免當陽點破拈拄杖云要識本來者箇光棍麼以拄杖左邊卓一下云這裏是要識世界中裝模作樣底麼以拄杖右邊卓一下云者裏是所以風穴云若立一塵家國興盛野老顰蹙不立一塵家國喪亡野老安貼正恁麼時畢竟立即是不立即是擊拂云家國傾亡後鄉關信不通回途能復妙孤鶴出銀籠更有一偈舉似諸公香隨金錫覆高陽誰謂還鄉道不香但自一心空十惡不煩神足上天堂天中節巖邊陳如璋居士偕衆姓請上堂若論此事譬如久客還故鄉一般即此五穀巖乃山僧讀書之所天曆臺是山僧幻影投胎之地巖邊埂頭前坪栗坪乃山僧世代之親鄰然離鄉既久鄉間景況乃至親戚老少姓名盡情忘了今雖歸家舊時親友皆不能認舊時地名皆不能記必求常在家中之人一一指點某處為前坪某處為栗坪某處為巖邊某處為埂頭某處為天曆臺某處為五穀巖某為叔侄某為兄弟心中一一領略分明然後應酬交接秋毫不紊我輩學道亦然從無始劫來迷卻本有佛性之家向外狂走家中佛法盡情都忘輪回於四生六趣既久必須求大善知識開示指點始知回頭故達摩祖師云一念回機還同本得然回機之後更須微細操履始能及盡玄微深明差別所以道涅槃心易曉差別智難明現前列位鄉親暮夜負米設供請法即此一念便是涅槃心若能永斷諸惡常修衆善一旦瞥然開悟如山僧還故鄉一回則一切佛法本來現成所以高峰道祇是舊時人不異舊時行履處大衆且道還鄉後如何行履拈拂子云慣使艾人驅魅鬼頻拈蒲劍斬邪神更有一偈舉似大衆我是昔人非昔人㲯毿敝衲不沾塵一回曳杖還鄉黨無數鄉親是法親上和文學張玄隱瞻百等迎至普濟巖請上堂三十年前到上和重重樓閣碧嵯峨而今再擁籃輿至極目凄清感慨多大衆萬事無常猶如飛埃過目有成必壞還同兔角龜毛所以經中道因妄有生因生有滅生滅名妄滅妄名真大衆且道妄作麼生滅莫是持經持咒禮佛念佛麼且喜沒交涉莫是擯除聲色屏絶見聞麼且喜沒交涉莫是閉眉閉眼澄心靜坐麼且喜沒交涉莫是萬緣休歇一切不為麼且喜沒交涉所以張拙秀才道斷除妄想重增病趣向真如亦是邪既不許趣真復不得斷妄畢竟如何得與真相應去豎拂云見麼若向者裏覷得透則川流嶽峙華笑鳥啼法法純真塵塵顯露所以道即此見聞非見聞無餘聲色可呈君箇中若了渾無事體用何妨分不分是知了即聖賢不了即凡夫當其未了之時祇向兔角龜毛上較長短論得失既了之後便能越死生齊物我融得喪超因果所以道諸優戲場中一貴復一賤心知本是同所以無欣厭於無欣厭處不妨遊戲塵沙剎海或為帝王或為宰輔或為比丘或為居士或為童男或為童女乃至僻壤遐方深村窮谷一一普現色身處處作大知識使彼迷頭狂走之輩箇箇知有本地風光長揖四生永超八難豈不是普濟萬方若以七寶五穀玉帛金珠不過濟一時一世一鄉一郡之飢寒困苦爭得名為普濟正恁麼時如何是普濟萬方底句澗下石龜相對語崖前雪瀑散天華下座上阜文學江君俊李振凡洎衆鄉親等迎至圜明菴請上堂僧問萬國同尊是法王千年一遇降茲鄉鏗鏘天樂迎將至處處圜明願舉揚師云千尺金峰凌碧漢進云與麼則當陽無背向覿體露全機師云數行寶樹入青雲問遠迎象駕求法皈依未審吾師將何指示師云玄關倒插無鬚鎖進云隨處作主遇緣即宗時如何師云千山勢到嶽邊止進云瞻之在前忽然在後又作麼生師云萬派聲歸海上銷僧禮拜師乃云大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方此英雄帝王撥亂反正創業垂統之後榮歸故鄉慷慨悲歌之詞也毀形守志節割愛辭所親出家弘聖道誓度一切人此大雄法王棄萬乘辭二親入道之初誓千古之模範也且道人王法王是同是別若道是同一箇居塵一箇出塵事迹懸殊染淨迥別若道是別救世婆心原自不差到者裏如何得融通合一去聻大衆當知利名夢醒人我情空一念不生前後際斷偃自心之戈鋋歸自心之正道便是人中之法王創法席於十方施法恩於四海隨機導物釋縛解粘便是法中之人王所以永嘉祖師道法中王最高勝河沙如來同共證但能解此如意珠自利利他終不盡大衆當知此如意寶珠祇在衣裏不假外求但能上無攀仰下絶己躬自然圜明瑩徹猶如月映千江所以華嚴會上無數日宮天子月宮天子人間天子閻羅天子大梵天王阿修羅王迦樓羅王娑竭龍王緊那羅王乃至主晝神主夜神主風神主雨神主江神主海神皆是大權菩薩示現受生或慈或威或隱或顯或僧或俗或男或女無不乘此如意寶珠光明無不乘此如意寶珠神力廣利有情同離火宅然雖如是或若衣破形銷人亡家喪時此珠畢竟在甚麼處不惜眉毛為諸人道破乃以拂子擊香臺朗聲唱云聲光著兮四海揚寸土不留兮是故鄉千江一月兮應無方復以拂子連擊香臺兩下下座普慧耆舊送衲衣至兩序慶誕請上堂僧問師親俱報孝行已全壽同列祖即不問未審生從何來師云一片紫雲籠嶽頂乃云一衲珍藏十數秋相傳原自老堂頭而今惠及黃巖叟日日披來接上流大衆若是上流之士不假言詮一點便知千差頓息所以布毛才吹侍者狂心便歇衲衣未脫興化道眼圜明道眼既明則終日著衣不曾挂著一縷絲終日説話不曾動著舌頭如是見得則生即不生滅即不滅於不生不滅地不妨現百億身入生死海提拔四生同悟同證正恁麼時如何是頓悟無生底句翡翠踏翻荷葉雨鷺鷥衝破竹林煙昔唐太宗皇帝誕日語大臣長孫無忌曰今日朕生日世俗皆為樂在朕翻成傷感何也朕今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之憾也詩云哀哀父母生我劬勞奈何以劬勞之日更為晏樂乎大衆聖明天子間世一出格言孝行千古可風我輩沙門釋子雖無晏樂之事罕有傷感之心人莫不有父人莫不有母人莫不有生人莫不有死各宜悲傷感慨思量求出生死報父母之法則不空來人間世矣且道如何是出生死報父母之法卓拄杖云無根樹上華常發下座佛頂心安耆舊等請上堂未到佛頂底用盡機關終日覬覦不得到已到佛頂底息慮忘緣長年任運不肯住雖然不肯住究竟未嘗離佛頂雖然不得到爭奈盡力跳不出正恁麼時且道佛頂在甚麼處卓拄杖云雪庭臂斷心安後鐵樹華開月上時圜戒日開爐普滋闍黎等請上堂僧問兩堂結制即不問請問和尚如何是聲前句師云峰尖翻巨浪進云聲前一句蒙師指濟上家風事若何師云井底種桃華進云恁麼則黃巖號令傳千古今日當軒一句新師云聾人爭得聞乃云黃巖寺裏開爐乾柴受用不盡逼得寒氣高飛通身自絶百病冷病熱病毛病懶病膏肓病八萬四千煩惱病一時俱消諸病既消便見心地戒光本自圜滿本自逍遙行也逍遙坐也逍遙動也逍遙靜也逍遙生也逍遙死也逍遙雖然歧梅真人跨鶴下雲端因甚踏折龍門橋喝一喝云一雨普滋三草秀六華彌布四山凋立春日悅監院請上堂僧問考鐘伐鼓大衆雲臨送舊迎新即不問向上宗乘事若何師云三面狸奴腳踏月進云能為萬象主不逐四時凋如何是萬象主師云兩頭白牯手拏煙進云恁麼則法王殿上傳新令大地齊彰劫外春師云剎竿頭上仰蓮心問寒暑推遷即不問如何是不遷義師云萬年松在最高峰進云太陽門下日日三秋意旨如何師云拄杖頭邊挑日月進云識得東風面枝枝總是春師云一翳在眼空華亂墜僧禮拜師乃云與衆同樂故能常樂與衆同安故曰大安與衆同參故名普參與衆同證故為圜證圜證之後始能荷負法門巨任掌握叢林大綱大綱既整衆目齊張除卻焦芽敗種無有不沾其恩澤者正恁麼時如何是圜證底句劫外春光常溢目庭前鐵馬慣嘶風除夕小參今年歲月不虛度了卻平生三大事一父母二師長三檀護鞠育恩深同雨露先掃塔次掃墓豐碑已得大文字施義田矜孤孺紀綱再整酬知遇此是山僧三大事試問諸人大事還曾了也未如未了火急參火急悟韶光不可等間度且道悟後如何有相身中無相身寒暄歷盡渾如故復舉雪竇顯禪師示衆云三分光陰二早過靈臺一點未揩磨貪生逐日區區去喚不回頭爭奈何大衆雪竇老漢大似為他間事長無明雖然如是恩大難酬黃巖續貂亦有一偈萬事浮雲眨眼過吹毛頻用不須磨聞風破膽人無數誰敢當機問若何喝一喝元旦上堂入新春説新法眉毛寬虛空狹拶得開全機活無根樹華齊發華即且置如何是無根樹抴拄杖便下座斷菴書記五旬請上堂僧問不問有生不問無生如何是廣度衆生底法師云今春春色早桃李隔年開進云等間識得東風面萬紫千紅總是春師云莫戀藤邊蜜休貪夢裏珍進云謝和尚指示師乃云色身有生有滅法身無滅無生踢斷虛空脊骨金烏夜半常明大衆要會半夜金烏麼為汝分明指出拈拂云眼觀春色如流水昨日少年今白頭燈節益叟張公偕衆耆舊請住佛頂上堂僧問皎月當空寧有高低之不普真燈照世本無晝夜之可分月即且置請問如何是真燈師云照燭不留影進云誠知佛頂高而無上望不可及未審還照燭也無師云大家在裏許進云好景好時人盡曉無根樹子孰能知師云你還知麼進云知師云如何是無根樹僧翻筋斗而出師云笑殺旁觀問上元節已竟光陰密變遷如何是不遷不變底意師云高燈偏照遠進云聖量現前無得失凡情盡處是何人師云演若不迷頭乃云同門為法太殷勤三度飛書到紫雲但得人人歸佛頂心燈寒焰不分分大衆不分而分南山起雲北山下雨分而不分鞭起陝府鐵牛吞卻嘉州大象正恁麼時分即且置如何是心燈千珠浮碧澗雙蓋偃青松解制上堂結是自己結解須自己解春風開遍故園華爭奈枯根容未改大衆且道枯根未改還怪得春風也無喝一喝云那箇男兒不丈夫大士誕日忉利函公偕衆檀越請上堂僧問大士示生即不問群機普應事如何師云無底籃中赤鯉多進云祇如西江檀護耆舊再四攀迎如何得不辜負去師云迷雲如未散覿面隔千山余居士問知識難遇大法難逢請問如何是法師云山僧原是高陽人進云今日非昔比悟道即超凡師云今昔原無異迷悟自殊途士禮拜師乃云過去正法明現前觀自在觀既自在則聽亦自在聽既自在則生亦自在生既自在則死亦自在如是則隱顯去來他方此界無在而不自在是故示現千臂千眼接引群迷直令六道四生箇箇得大自在所以道觀音妙智力能救世間苦大衆且道如何是觀音妙智擊拂子云擊碎虛空雙耳門掀翻忍界成忉利圜戒日謝復菴居士等請上堂僧問受波離戒律習馬勝威儀祇如隔壁聞叉聲即破戒戒如何持師云聚螢豈可爇須彌進云三壇等施六度齊修如何是齊修師云俊鷂貼天飛進云如何是漸修師云烏龜階下立進云龍得水時添意氣虎逢山色長威獰師云龍虎在何處進云面目分明當機不露師云切忌認奴作郎乃豎拂云雪嶺末後拈華黃巖日日豎拂猛虎咬殺大蟲枝頭梅子正熟擲下拂子云戒光非色亦非心有何背兮有何觸喝一喝復舉龐道玄居士偈云迷時愛欲心如火心開悟理火成灰灰火本來同一體當知妄盡即如來大衆龐公雖是鍛過底精金爭奈猶涉程途在黃巖即不然灰火本來同一體當知箇箇是如來玄六豎宗妙協衆禪人請上堂沒世無聞君子所疾知恩不報先聖所呵末法僧徒見利忘義思源報本能有幾人是故筆尖點出金剛眼至今照耀乾坤橋邊拾得夜光珠亙古芳聲不墜正恁麼時拾得夜光即且置如何是金剛眼睛若能道得是真報恩脫或未然虛生浪死衆屏息師云山僧卻請木上座為諸人點出金剛眼睛去也乃豎拄杖云仰嶠蒼煙盡樵川秋水清新鑿放生池工竣赴佛頂請上堂僧問百丈大義即不問如何是普度群迷底句師云積水留新月進云天不能蓋地不能載底來又作麼生師云開池貯錦鱗僧禮拜師乃云胎卵濕化原同一體江河池沼並出一源達其源明其體始可頓超三界長揖四生是故衲僧家有時殺有時放有時平高就下合水和泥有時聳漢侵雲壁立萬仞壁立萬仞處螻蟻蚯蚓躋攀無門合水和泥時錦鱗紅尾感恩不盡今則高隄已築積水已澄湛似寒潭圜同新月九夏劬勞即且置一源深達時如何拈拂云當門徹底明如鏡無數鯨鯤躍浪來復舉梵網經第二十不行放救戒語畢乃云大衆世尊道若見世人殺畜生時應方便救護解其苦難祇如南泉斬貓歸宗斬蛇當恁麼時作何方便可以救得若能道得是真護生其或未然不免為諸人點破豎拂子云黿鼉魚鱉并蝦蟹盡在常光一道中復有一偈舉似大衆開池不為聚浮財欲使群生離禍胎煩惱海中能解脫峨峨佛頂任徘徊因事普説留得殷勤請得真龍驤虎驟各生嗔須知叢社千秋下應羡忘軀為法人大衆天地間有二種法一曰王法二曰佛法復有四種人知法守法知法犯法知法為法不知法為法是為四種人知法守法者在世間則為君子為賢人出世間則為高僧為德士知法犯法者在世間則為小人為殘賊王法所必誅出世間則為裨販為邪魔三途所必陷何謂知法為法即今天下弘宗演教據位稱師者自知無上妙法旨趣復為法求人以紹續此法使燈燈不斷者是何謂不知法為法即今天下有志衲子腰包頂笠撥草瞻風親明師求益友決擇此無上妙法者是譬如今日之事西江耆舊遠齎合省護法書幣冒險乘危四番請歸翠巖豈不是為法本山耆舊鳴鐘擊鼓羅拜遮留豈不是為法留得愈堅請得益切一則曰我輩千辛萬苦重興翠巖原為和尚一則曰我家和尚在江右十餘年化導已久嗣法有人今始歸家坐席未暖豈可復出兩家議論不一未免嗔心忿起言語參商大衆即此一段公案千古之下可為標格何故若為爭勢利競人我而嗔則非衲僧家事今既為法而爭則嗔者罵者請者留者與夫堅臥不起者皆足為叢林盛事天下出家之徒儻箇箇肯如此忘軀為法則佛法日盛自不至有犯法之事更舉箇古人公案與諸公商量昔風穴沼禪師于郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破祇如不去不住印即是不印即是還有人道得麼時有盧陂長老出問學人有鐵牛之機請師不搭印穴曰慣釣鯨鯢澄巨浸卻嗟蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴便打一拂子曰還記得話頭麼試舉看陂擬開口穴又打一拂子牧主曰信知佛法與王法一般穴曰見甚麼道理牧主曰當斷不斷反招其亂穴便下座大衆今日江西緇素請去黃巖耆舊留住一衆共知且如何是去即印住住即印破底道理衆下語不契丘居士請代師乃云那邊不坐空王殿爭肯耘田向日輪文學李又蓁居士等請至燕溪上堂綵結曇華不偶然萬家生佛現閩川燕溪春漲瀟湘浪看取新龐泛鐵船大衆鐵船浮處凡聖全超生佛現時天人罔測所以毗耶城內勝熱門中現百億之神通示無邊之三昧或分香積之飯或決善財之疑是故小中現大大中現小一多相含真俗並照或經世則景星燦慶雲騰或出世則曇華開道樹長雖普利萬方而親疏有序不類墨子之兼雖同居五濁而恩愛情空不染凡夫之習故進而致君澤民則為萬家生佛退而修身鍊行則為一代高賢然雖如是若在祖師門下看來不異鏡中之華波底之月且道祖師具何眼目得如是超邁拈拂云屏山直躡青雲上燕水滔滔竟不流昔崔尚書參國一欽禪師請問弟子出家得否欽云居士出不得家崔云弟子出將入相為甚出不得家欽云出家乃大丈夫事非將相之所能為後來駙馬李遵勗閲此公案忽然大悟乃述偈云學道須是鐵漢著手心頭便判直趣無上菩提一切是非莫管大衆要會無上菩提麼分明為諸公點破擊拂云打起黃鶯兒莫教枝上啼啼時驚妾夢不得到遼西翥鳳六奇諸禪侶偕衆耆舊迎至鳳山復放生池請上堂鳳山勝地故里名藍雖陵谷屢遷而鐘鼓無恙歷代知識向者裏各出手眼演毗尼合煙戶抽石筍書梵字山僧頃以祭掃還鄉合山耆舊屢迎説法然佛祖語句充棟汗牛舉世無人聽著況山僧以爝火之光耀於太陽之下何異牧唱漁歌且千聖出世説法利生因時救斃斃若不革則法即不靈法既不靈説之何益譬如治病相似黃連甘草附子人參貴圖去疾疾若不去則人參附子亦為長物然治病固有緩急革斃亦有後先所謂急則治其標緩則治其本山僧有箇救斃妙法不假變齊變魯自能合乎至道不勞減煙減灶自然斧劈不開今日既承雅召到者裏豈可緘口豎拂云聞聲見色是尋常春暖山華處處香但得主人恆不昧任他六戶各分房昔鼓山永覺和尚住此山時因僧問如何是無作戒體覺云林中石筍透天高進云一塵不染底人來時如何覺云三十棒趁出大衆鼓山老漢者三十棒打得極有理祇是不合時宜今日或有問如何是無作戒體山僧但向他道池中魚勿網忽遇一塵不染底來時如何天外鳳常鳴更有一偈半畝塘開古寺門魚蝦正好施洪恩燕溪且有垂綸禁況是親親佛子孫檀越王楊張偕衆居士請至仁溪上堂若論此事便如倡義殺賊一般先須公舉一位韜略俱全智勇兼備之士為首然後布號令定賞罰嚴節制整戈甲更須探偵賊巢在何處賊路自何來賊衆有多寡賊陳作何狀所謂知彼知己百戰百勝既知賊陳形勢方乃發兵勦除對陳交鋒自可一鼓而下活捉渠魁搗其巢穴然後班師凱旋稱功定爵大者為公次者為侯伯又其次者子男我輩學道亦然先以自心大智為義首次以自心淨戒為戈甲兼以三明六度及八萬四千諸波羅蜜為師旅然後奮大勇猛生擒六賊盡殄群魔群魔既盡則自心法王隨方示現在處稱尊始可坐致太平然雖如是外賊易破家賊難防正當此時六賊交侵如何抵敵喝一喝云置之死地而後生置之亡地而後存破釜沉舟同力戰魔軍倒退入無門昔龐道玄居士偈云有男不婚有女不嫁大家團圞頭共説無生話大衆龐公既捨不得出家又歡喜説大話幸賴有一張吸盡西江底口不然三十拄杖一下也饒不得後來有箇楊無為居士卻云男大須婚女長須嫁討甚間工夫更説無生話大衆楊公雖是頂門具眼爭奈俗氣不除山僧即不然無男可婚無女可嫁既遇故鄉人便説故鄉話且道如何是故鄉話至仁溪闊從魚躍大義橋高任客行更有一偈舉似大衆非官非佛亦非神何故村村送迓頻合里但能修十善繽紛華雨四時新下座元度謝孝廉美斯周別駕振公周文學等迎至蓮華寺上堂僧問按下紫雲頭便踏蓮華上為是神通妙用為是法爾如然師云峰臨城外層層秀進云恁麼則十聖三賢難測度人間天上任逍遙師云石到溪邊箇箇圓進云恭惟和尚過化存神人天交慶師云上座又作麼生進云人人本具問西來大意請師直指師云通都橋下水日夕響晴雷乃云風飄敗葉莫景蕭條露滴金華寒香馥郁榮枯迥別幻化無殊凡迷不惺妄遭淪墜是故維摩大士親證此如幻解脫三昧遂能隨類現身入塵勞海或語或默或隱或顯以四攝法廣引同流共證此如幻解脫三昧當其居毗耶離城之際示有玉帛而無貪戀示有刑罰而無嗔怒示有妻妾而無染著蓮華不足以喻其清潔秋月不足以喻其孤明即此火宅炎炎便作清涼世界現前諸公若能親證此如幻解脫三昧則箇箇是金粟再來不妨撫治邦家又安宗社孝以事親忠以事君慈以御下惠以濟物全理全事無是無非所以道知幻即離不假方便離幻即覺亦無漸次雖然如是紫芝山頂即不問你平政橋邊道將一句來衆下語畢師乃云一回及第心空後方信橋流水不流昔有僧問智門禪師蓮華未出水時如何門云蓮華僧云出水後如何門云荷葉大衆智門與麼答話固是截斷衆流仔細檢點將來猶有依傍在今日或有問山僧蓮華未出水時如何但向他道開元石烏龜出水後如何但向他道揚州朱頂鶴更有一偈三十年前到水西樓臺幻出與天齊如今擊目蓬蒿遍誰復區區被幻迷通都橋首張魁軒居士等請上堂僧問是法住法位世間相常住請問和尚如何是常住相師云山圍故國周遭在水打空城寂寞回進云祇如衆居士肅潔猊座殷勤請法畢竟將何指示師云城東打鼓城西響進云恁麼則道不虛行遇緣即應師云園內華開園外春問諸檀為法念頭堅冒雨衝風設供筵坐佛頂𩕳姑緩問途中受用請師宣師云紫芝峰上浪滔天進云從來慣吸西江水今日平吞建地雲師云孔子原是山東人進云允矣人天調御者果然無處不稱尊師云滂沱秋雨連宵下洗盡塵氛道眼開僧禮拜師乃云若論此事便如建通都橋一般第一要橋不堅牢第二要橋梁平正第三要橋屋完備三者既全萬無一失任他怒浪驚濤衝突不動千妖百怪搖撼無門度馬度人永無沉溺之患我輩學道亦然先以三聚淨戒為橋不次以那伽大定為橋梁更以般若妙智為橋屋果能具此三種則茫茫苦海一任往來隨順世緣了無罣礙可以回既倒之狂瀾可以援己溺之黎庶可以陰翊王化可以普度迷流雖然可中有箇漢子常在他鄉不離本地且道還假橋梁舟渡也無長空今古月輪孤復舉龐居士偈云先須持五戒方始得人身有財將布施身即不窮貧若行十善業聞道得天人天人生滅福來去如車輪有為接梵世不及一毫真更欲談玄妙只恐法王嗔大衆還識一毫真麼分明為諸公點破拈拄杖云城外青山如屋裏東家流水入西鄰到龍德檀越盧參華等請上堂問師子之兒未能返擲報恩一句乞師拈出師云鶴飛千尺雪龍起一潭冰進云可謂身心奉塵剎草木亦霑恩師云白雲乍可離青嶂明月難教下碧天進云恁麼則無行而不與縱奪在臨時師云山盡疑無路溪回別有村乃云父少而子老舉世所不信諸人還信得及麼若信得及銀碗盛雪明月藏鷺其或未諳山僧直下為諸人點破乃以如意向空中畫更有一偈延汀虔吉千餘里繞道來看老法嗣豈是師資情未割祇緣慧命寄懸絲下座
