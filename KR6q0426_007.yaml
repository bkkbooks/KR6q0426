body:
  text: 嗣法門人傳我等編住建寧府黃巖寺語錄山門還鄉盡是兒孫事祖父從來不出門且道那箇是不出門底祖父拽拄杖便入佛殿家中原有佛毋勞向外求一番親見面頓破古今愁便禮拜伽藍黃巖翠巖隨處作主整頓頹綱惟我與爾祖堂鴃舌鄉產祖國共商量無可說象骨老師曾輥毬何似黃巖新棒月韋馱滄海桑田銅駝荊棘梵剎尚依然全是金湯力從茲應更著精神扶起宗風振八閩據室罵詈佛祖鞭笞龍象道得也三十棒道不得也三十棒為甚麼如此發機須是千鈞弩陞座拈香云此一瓣香覆燾萬物長育群靈以德以仁無偏無黨爇向爐中奉為北闕之至尊用祝南山之聖壽伏願五風十雨再見陶唐之時萬國九州共樂羲皇之化次拈云此一瓣香囫圇無縫八面玲瓏隱密難描萬方普現源流有據現前四眾共知時節不違次第二回拈出爇向爐中專申供養明州天童堂上傳曹谿正脈第三十四世上密下雲先大和尚用酬法乳之恩斂衣就座上首白椎云法筵龍象眾當觀第一義僧問西江久已振三玄閩嶠迎歸道愈傳未動腳跟前一著請師端的為人宣師云七尺烏藤敲白月進云祇如入塵垂手又作麼生師云萬竿翠竹掃清風進云世尊說法天雨四華黃巖陞堂有何祥瑞師云優缽羅華遍界開進云春回百谷華鋪錦月到千峰樹續燈師云解吹無孔笛何處不聞聲進云與麼則一回親見得鼻孔盡遼天師云祇恐不是玉是玉也大奇問斬新日月特地乾坤日月乾坤即不問斬新特地事如何師云鐵鷂搏空際進云翠巖已布天童令閩嶺從今法再新師云金釵鎖碧流進云人人皆頂戴因甚不知歸師云春色無高下華枝自短長進云恁麼則枯木龍吟去也師云腦後依前欠一槌僧禮拜師乃云煙霞深處寶藏不虧敝垢衣中夜光無價無端對演若之鏡遂爾泣楊朱之歧江北江南怖頭狂走拌身拌命把火尋燈參遍濟洞兩宗作家添得胸次一團知解末後到太白山下撞著箇極惡底知識痛與腦後一槌直得家中寶藏衣裏夜光一時百雜碎從此跛跛挈挈如聾如瞎祇圖向亮公洞裏嘯月眠雲豈料洪井谿頭業風頓發吹出人天眾前未免撮土為金喚七作八所以本山護法耆舊謬采虛聲飛書屢召無奈葛藤延蔓驟歷三秋今春始獲一辭西江檀護買棹章江沿途所經州邑不啻三千龍象萬里香華一到家中恍如隔世因思童顏問道皓首還鄉行解荒蕪有負師友既到者裏當談何法可報深恩記得福州古靈神贊禪師行腳回受業師問曰汝離吾在外得何事業曰並無事業遂遣執役一日因澡身命靈去垢靈乃拊背曰好所佛堂而佛不聖業師回首視之靈曰佛雖不聖且能放光曰汝行腳遇何人吾前後見汝發言異常靈曰某甲蒙百丈和尚指箇歇處今欲報慈德耳業師於是告眾致齋請靈說法靈乃登座舉唱百丈門風業師於言下感悟曰何期垂老得聞極則事大眾有縱有奪有殺有活古靈可謂青出於藍冰寒於水現前兄弟箇箇有一座佛殿六門放光晝夜無間當此滄桑之後能使金碧輝煌百廢具舉即此殊功偉績一一天真但肯回機自悟誰敢道佛不聖箇箇可以師範天人人人可以梯航萬有正恁麼時如何是梯航萬有底句拈柱杖云紫雲已布東風雨遍界優曇次第開更有一偈百城煙水太茫茫二十餘年苦備嘗今日迓歸雲裏寺碧桃開遍滿林芳白椎云諦觀法王法法王法如是師下座清明埽受業塔兼謝汪斐然居士齋上堂未祭雙親塋先埽諸祖塔非是不親親祇緣深重法眾兄弟正心誠意修身齊家治國平天下是儒門治世之法割愛辭親方袍圜頂以戒定慧度貪嗔癡識心達本徹證無為是吾門出世之法且道諸祖出世以何法接人豎拂云見麼若向者裏見得則一切世法即是佛法生滅去來全體不動森羅萬象觸目皆如遍現十方剎塵不離無縫塔裏所以道一切智智清淨無二無二分無別無斷故楊子江心把柁須彌頂上張帆百億舜若多神撐篙底撐篙盪槳底盪槳驀然觸落東海龍王一對眉毛直得驟雨傾盆迅雷震地釋迦老子卻向摩羯阤國裏口喃喃地說道我此法印為欲利益世間故說在所遊方勿妄宣傳大眾黃巖已宣傳了也還識此法印麼若也識得得大利益受用無窮便能以此法印接一切人紹隆祖位永斷輪迴脫或未然不免再打葛藤一上荒塚壘壘埋盡古今豪傑野狐隊隊穿空大小骷髏縱饒富比石崇尊同萬乘三寸氣斷萬事皆空衰草寒煙焄蒿悽愴悲歌薤露淚雨空灑於夜臺祭列蒸嘗紙錢徒爇於翁仲到者裏父子至親不能相替夫婦至愛不能相替師徒至密不能相替惟有自悟無生法忍方能出生入死自在自由所以道惟有佛菩提是真歸仗處大眾菩提之法充塞人間不遇明師對面千里所以諸祖乘悲願力前後出興誨我童蒙同出火宅如此恩義重逾丘山設藻陳芹何足云報直須識取自己一座無縫塔子則五欲塵埃不埽自盡無明荒草不拔自除正恁麼時諸人無縫塔畢竟在甚麼處拈拄杖云祭華已吐清明節乳燕將鳴穀雨天不染耆舊七旬賣田設供兼謝黃陳兩護法過訪請上堂僧問法令當行千差坐斷坐斷即不問如何是法令師云剎竿頭上煎䭔子僧禮拜師乃云從心所欲能不踰矩見色聞聲還同石女從今更不染諸緣一片私田盡棄捐雨笠煙簑高挂壁笑看露地白牛眠大眾且道露地白牛還有鼻孔也無擊拂子云聞一以知十還他君子儒佛誕振先陳居士祈嗣請上堂僧問一手指地又指天周行七步震三千當機一句真消息今日請師為眾宣師云露柱夜懷胎燈籠朝育子進云識破不值半文錢師云未具摩醯眼誰能捋虎鬚進云雲門信手橫拈棒師云打殺後如何僧一喝師云未在乃云露柱夜懷胎燈籠朝育子㘞地一聲大振先祖十萬八千僧伽耶歲歲香湯浴老爺須信爺兒原不二爛泥堆長白蓮華豎拂云大眾者箇豈不是兒子且道爺在甚麼處擲下拂子起身以手指天地便下座高陽本族偕諸戚屬請上堂僧問闔族同熏五戒香高陽宗祖愈增光滹沱正脈流今古四眾臨筵願舉揚師云雨散雲收後崔嵬數十峰進云翠竹黃華古佛心其中消息幾人明師云誰家樹不春進云有意氣時添意氣不風流處卻風流師云大鵬展翅蓋十洲籬邊之物空啾啾僧一喝師云果然問海天嚴淨黃巖境別立門風事更奇如何是更奇底事師云綠暗紅稀日山山啼子規進云當機一句賓主分明如何是賓主句師云扶桑夜半日頭明進云如何是主師云鼻孔慣遼天進云如何是賓師云眉毛展不伸進云如何是賓中主師云蹋斷谿橋無片語進云如何是主中賓師云白棒高提接四鄰進云如何是賓中賓師云牽羊納璧且稱臣進云如何是主中主師云不共羲皇侶進云賓主已蒙師指示向上更有事也無師云癡人面前不得說夢僧一喝師云野干鳴問翠色重重露黃華日日新翠色重重即不問如何是黃華日日新師云刺破眼中睛進云如何是黃巖境師云天湖掩映雙輪影進云如何是境中人師云兀坐唯聞流水聲進云人境蒙師指超宗事若何師云無舌童兒唱凱歌僧一喝師云黃巖用不著僧禮拜師乃云春風扇處百華妍九族生天豈浪傳同里同宗皈且戒芙蕖火裏愈光鮮大眾寒族叔侄弟兄及諸親戚鄰里鄉黨數十餘人衝風冒雨負米登山受戒皈依揮金設供請談無上般若以作苦海舟航大眾須知即此一念真誠便是自性般若不假外求般若智光既現則殺盜淫妄一切惡事自不肯為惡事既不為則雖居紅塵不被塵染豈不是火裏芙蕖人間忉利所以宋文帝云若使率土之濱皆遵佛化朕則垂拱坐致太平大眾正當此時如何是安家樂業共享太平底句拈拂云心王不妄動六國一時寧上堂佛法本無多日日陞堂說解將雙眼聞始信渠無舌大眾即今箇箇口裏有三寸舌頭那箇是無舌漢豎拂云春風多在綠楊岸昔日有箇賣柴底漢得錢三文即以施僧重置缽盂歸家五里步步歡喜報得後身為王名拘留沙隨所住處東西南北五里之地隨掘皆得三缽金錢大眾拘留沙王前生寒微三錢之施遂感為王黃如珝兄弟登山皈依設供請法且道來生當得何報直超三界外豈戀九重宮復有一偈如珚如珝復如珹瑕玷渾無貴力行已具三多超八難生前正好究無生真如菴主悟虛請上堂僧問心包太虛此則心外無法祇如今日齋主求出世因和尚畢竟示他何處安身立命師云不因西嶠殘冰盡爭見東山一帶春進云某甲即不然師云闍黎又作麼生進云雖然舊閣閒田地一度贏來一度新師云泰山廟裏賣紙錢問如何是出世之因師云鐵人騎鐵馬進云不會師云蹋破萬重山僧禮拜師乃云正法眼藏含裹十虛涅槃玅心全超萬象於全超處悟得則十方虛空一時消殞向含裹處知歸則翠竹黃華無非真如般若所以三祖大師道一有多種二無兩般昨夜玅應峰頂歧梅二仙倒騎黃鶴入諸人鼻孔裏去也直得南山起雲北山下雨諸人還知麼擊拂云爛柯樵子疑無路挂樹壺公玅有家復舉乾峰和尚上堂云舉一不得舉二放過一著落在第二雲門出眾云昨日有人從天台來卻往徑山去峰云典座來日不得普請便下座大眾乾峰向高高峰頭鼓浪雲門向深深海底颺塵雖是同死同生未免手腳俱露黃巖今日將者兩箇老漢縛作一團拋向龍門橋下一齊淹殺然後日日普請何也園中茶已老隴上麥初黃圜戒日立兩序定規矩黃陳眾護法請上堂僧問欲明大法綱宗須是古規重整如何是大法綱宗師云仲尼原是孔夫子進云如何是古規重整師云雀巢中有定風枝進云祇如斬新條令一句又作麼生師云七星壇上祭東風進云恁麼則全憑弘護力大振古叢林師云壁上畫棋盤翼中居士問不問有句不問無句祇如黃巖今日扶起剎竿請和尚通箇消息師云萬人叢裏奪高標進云此猶是有句師云識取鉤頭意進云和尚莫瞞大眾好師云居士亦不得瞞山僧士禮拜師乃云天命之謂性家家有柄無星秤率性之謂道夜半日輪當午照修道之謂教方圜規矩隨時玅所以道欲知佛法當觀時節因緣時節若至其理自彰理既自彰則戒光從口出有緣非無因一一蓋色騎聲時時循規蹈矩時節既至則雲從龍風從虎聖人作而萬物睹重重主伴交參箇箇氣吞寰宇選官選佛殊途同歸現俗現僧津梁末世成就空華佛事振作水月道場總不出此時節所以眾護法請啟中道昔時龐馬聚頭冤家狹路此日瞿曇覿面緣幸三生大眾瞿曇既已覿面畢竟當談何事豎拂云君看馬上紅纓紱便是去年雙秀才孝廉石堂陳居士請上堂僧問他方行化廿餘年法鼓雷音振大千台旆請登閩嶺座還鄉一句請師宣師云萬派皆歸海進云還鄉一句蒙師指財法均施事若何師云不是傾盆雨爭教萬卉榮僧禮拜師乃云一靈真性非聖非凡三教法門有同有別其別也或束帶立朝或餐霞僻谷或現三十二相或示勝熱婆須開合縱橫卷舒殺活隨宜通變不滯一隅其同也無非欲正人心去邪術斷意中之三毒復本有之一真一真既明則萬別千差一時坐斷六凡四聖總是空華所以道知是空華即無輪轉亦無身心受彼生死非作故無本性無故現前諸公箇箇具此本來佛性但能親見一回便可超凡入聖正恁麼時如何得親見自性擊拂云試玉須經火求珠不離泥陳惟任居士祈嗣請上堂僧問震旦雖闊無別路要假兒孫腳下行如何是腳下底兒孫師云眉橫鼻直問如何是五穀巖新境師云榴華照眼明進云和尚大法王無短亦無長本來非皂白隨處現青黃時如何師云枝頭金果正纍垂乃云諸佛不違眾生所願所以求男女者得男女求富貴者得富貴求智慧者得智慧求成佛者得成佛眾生皆是諸佛所生所以休戚相關患難相顧分身塵剎拯溺救焚譬如時雨普滋三草二木五穀百華悉得生長惟有焦芽敗種枯根壞櫱縱遇五風十雨不能發生亦如窮子捨父逃走傭賃展轉甘心客作父雖時時懷子子無一念思親所以伶俜辛苦無有休歇正恁麼時曠劫窮兒歸家就父因甚父全不顧卓拄杖云一馬生三寅石牛攔古路寶峰眾禪人請上堂七眾同心百里遠來請法為求福龜毛眼上栽大眾此眼未開直須求慧此眼已開正好修福福慧二種如鳥兩翼如車兩輪車無輪而不轉鳥無翼而不飛福德既足智慧益深方可自利亦可利人所以釋迦老子稱為兩足之尊然雖如是正眼看來不異龜毛兔角正當此時那箇是正眼馬渡寶峰張江葉范復舉興化禪師因僧問四方八面來時如何化云打中間底僧禮拜化云昨日赴箇村齋中途遇一陣卒風暴雨卻向古廟裏躲得過大眾者僧只有先鋒且無殿後姑置勿論祇如興化道向古廟裏躲得過且道古廟在甚麼處怡闍黎云說法已竟師云說法即不無畢竟古廟在甚麼處怡白椎云諦觀法王法法王法如是師便下座雪峰眾禪人請上堂著衣持缽是第一義禮懺誦咒是第一義受戒聞法是第一義種田鋤地是第一義送客迎賓是第一義作揖打躬是第一義乃至文字語言山河大地鶯啼喬木蝶舞芳叢無非是第一義你纔擬議思量時便不是了也直饒你百不思百不想亦是黑山鬼窟下活計未會第一義在畢竟如何解接無根樹堪捶海底燈復舉臥輪禪師偈云臥輪有伎倆能斷百思想對境心不起菩提日日長六祖大師偈云慧能沒伎倆不斷百思想對境心數起菩提作麼長大眾臥輪不善用心大似無繩自縛六祖雖是對病說方其奈以五十步笑百步黃巖即不然陸地千波涌長江一滴無佛誕峽陽王無說居士等請上堂儒月道星佛日古今品藻固的眼底迷雲豁開涯岸何須各立大眾三大聖人朝來向山僧拄杖頭邊一時降誕了也諸人還知麼其或未知山僧卻請木上座為汝點破諸人要見魯司寇麼驀拈拄杖向左邊卓一下云向者裏薦取諸人要見柱下史麼拈拄杖向右邊卓一下云向者裏薦取諸人要見悉達太子麼復拈拄杖向中間卓一下云向者裏薦取大眾木上座已為諸人點破了也且道三箇老漢面目何似莫是貌似陽虎麼且喜沒交涉莫是騎青牛過函谷鬚鬢皓然底麼且喜沒交涉莫是一手指天一手指地三十二相八十種好底麼且喜沒交涉既都不是諸人見處又作麼生試出來說說看良久云悉達太子見諸人不會卻回迦毘羅國去也惟有孔李二老尚留震旦當恁麼時拂子出來道孔李且置吾聞如來者無所從來亦無所去和尚何得道回迦毘羅國去大眾拂子不妨𠠢利要且未見鑿頭方畢竟如何峽陽街在劍州河到槐李寺乘空禪人請上堂一月印千江一燈光萬戶一句破群疑一機超佛祖薦得此機則機機普應透得此句則句句明宗直得社舞村歌同揚聖諦鳥啼華笑悉露玄機誰言新建山高多法窟南昌地闊少禪庭即今湖光瀲灩樹色蒼茫槐李枝頭尚垂唐宋之雨露薜蘿門內儼然樂土之風規到者裏人人壽量等虛空箇箇法身無變易祇貴自達自證從來無欠無餘所以道楞伽寶山高四面無行路惟有達道人乘空自來去大眾要識楞伽寶山麼卓拄杖云不在西不在東祇在勞生日用中下座到石鞏蘭城關主請上堂僧問千峰雪覆百獸潛蹤杲日當空全身獨露如何是獨露底句師云幽谷春蘭香正發進云如何是恁麼不恁麼總得師云八尺眉毛頷下生進云如何是恁麼不恁麼總不得師云把斷關津水莫通進云恁麼則華開碓觜大地全收師云三千里外定淆訛問慧祖垂機一隻箭唐至于今千餘年幸遇和尚重赴席願示無為度群迷觸色聞聲有為底事畢竟如何是無為師云髑髏粉碎始知音進云但願不惜婆心力指點群迷向上機師云三汲浪高魚化龍癡人猶戽夜塘水問如何是古佛心師云庭前階下草問石鞏中興三十載今朝弓箭喜重拈如何是聖箭師豎拂子進云如何是一箭穿卻半箇聖人師云拽出髑髏去乃云沒下手處不覺水盡山窮掉轉身來依舊張弓架箭箭鋒相直罕遇作家半箇聖人言中有響所以精金百鍊始見光輝錯節盤根方明利器直饒空空湛湛絕朕無依正是半箇聖人縱使穿楊手神臂弓未是全提金鏃拈拄杖卓三下云若向者裏領略得便解殺活同時卷舒一致佩三玄戈甲震四喝雷霆隨方建立法幢在處解粘釋縛豈不見此山始祖慧藏禪師因三平來參便云看箭平劈開胸云此是殺人箭如何是活人箭祖彈弓弦三下平禮拜祖云三十年架一張弓兩隻箭祇射得半箇聖人大眾師資會遇千載一時劈開胸襟直下領荷豈不是特達英靈為甚麼祇是半箇者裏揀辦得出許伊具擇法眼諸人還知落處麼莫守寒巖異草青坐卻白雲宗不玅到南源洪爐禪人請上堂僧問龍吟霧起虎嘯風生正恁麼時請師露布師云洪爐飛片雪進云恁麼則育龍潭畔谿聲浩盡是吾師演法音師云未曾飽喫廬陵米休把蒲團當作天乃云本源一著離相離名格外一機全收全放全放處終日合水和泥不妨壁立萬仞全收時長年壁立萬仞不妨合水和泥如是見得則前身後身還同電影眾生諸佛總是空華所以昔日哲祖向空華影裏乘悲願力示生臨汝鏟草南源入翠巖之室轉圜木之枕踞大溈之法席啟烹佛之洪爐道振一時法流千古山僧昨以赴請歸閩道過臨川合山耆舊咸謂哲祖再來特特遠迎請陞此座舉揚般若正眼看來亦不異空華現前諸公解向空華影裏中興祖庭樓臺殿閣聳出雲間豈不是夙植勝因故能恢此弘業諸公更能悟取本源一著則箇箇是祖師再來並無秋毫差別死生出沒觸處全彰南北東西隨方利物正恁麼時且道如何是隨方普利底句喝一喝云育龍潭上風雷動遍界為霖不露蹤
