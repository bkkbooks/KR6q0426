body:
  text: 嗣法門人傳我等編偈一再參本師和尚雪擁寒空凍色濃孤懷偏憶最高峰遙遙越嶺幾番度蕩蕩堇江一棹通眼底風光唯獨得腳頭消息許誰同扶笻直入清關裏驚起堂前白髮翁參語風師太空撥煙波浩蕩中桃華夾岸對誰紅雪消獨快伶俜子春暖偏懷瞌睡翁高臥五峰煨折腳活薶雙徑語清風相逢何在頻頻問一掌揮開千指宗遊普陀為叩白華老乘風海上遊半瓢千頃浪萬里一孤舟稽首全身露抬眸覿面酬南詢當草七誰是善財儔雲門解制荷條楖栗出仙霞踏遍溪山覓作家㘞地雲門才放下參天枯木便開華千華臺畔呈機變萬竹林中露爪牙今日解開叉袋口長街短巷總生涯挽黃巖受業師海外忽聞師已逝初疑似實轉疑非雲歸故國雖薶影月落天湖豈隱輝一日別離千日恨十霜父子五霜違木人本是無情漢到此難禁淚滿衣送林野禪師之金沙踏斷春江煙浪聲眉間霜劍逼人清為憐滿地忘歸客閒逐東風入市城悼黃檗以直禪師忽得西陵信遙遙念故知楚雲天際沒江月夢中移方羡典型在將扶晚世危那堪千里外又賦弔君詩登雪竇乳峰不可極絶頂勢崚嶒二覺今何往孤笻此際登虛堂縣夜月古塔繞新藤寂寂空山裏誰為剔祖燈示文峰五六十年事紛紛瞬息間有身愁白髮無地覓童顏欲達無生旨須明棒喝關豁開真面目萬法本來閒乾溪晚眺溪煙靄靄夕陽斜極目山村數十家天外暮鴉歸樹杪千峰明月上蘆華休夏高明寺閲圜通疏熱殺人間六月天杳無暑氣到林泉竹梢風入繩床角蓮子華開古殿前十卷楞嚴遮活眼幾家詮疏漫搜玄信知見月能忘指教外何曾有別傳再遊石橋一條瀑布分青嶂千尺飛虹鎖斷崖為愛此中泉石好幾回策杖去還來徹凡請題牧牛圖黑白未分誠難狀才落丹青多異相披毛隨類踏溪山縱步緑楊芳草上四蹄輕雙角壯鼻無繩索誰能抗獨有風前箬笠翁七尺烏藤未輕放漢萍請題雙龍杖傑出叢林勢逼霄一枝分合見同條翻騰有待風雲際變化毋勞電火燒驚走葉公非峻峭扶歸費老未孤標而今拈在衲僧手打斷驢腰與佛腰送吳行效歸閩吾鄉俊傑雖無數幾箇超然能獨步羡爾求師千里來誰道靈根非夙具要參禪須妙悟不悟靈光那透露者回歸去猛提撕莫教錯過來時路娑羅樹根苗自是不尋常託質偏於古道場一核娑羅名獨遠千秋太白讖猶詳華開便見祖師面葉布還驚帝罔張從此乾坤承蔭覆何人不仰樹中王叢林十事巡照夜深獨自繞廊行東照西看到五更欲覺枕邊酣夢客短笻聊卓兩三聲抴磨兩片磨盤函蓋合一雙空手就中推任他皮殼重包裹到此從教當下灰炊飯日日炊來香滿甑直令箇箇飽膨脝不須望月瞻星得自有金雞報五更煮茶瓦銚聲銷翻浪白瓷甌氣吐見香清睡魔縱在眉端上一到脣邊雙眼明知印從來載道獨憑言殺木災青代舌宣妙印全提須好手一模脫出古今傳淨頭一塵不著方為淨淨到無塵淨亦蠲忽爾兩頭俱踢脫蕅華透出糞碙邊種田博飯須栽數畝田自家活計自攙先也無大義為君說把钁還應握兩拳舂米一番襲復一番舂簸盡秕糠出臼中欲得精純無糅雜更經簏過兩三通斫柴刪去朽樗供瓦灶養成合抱蔭崔嵬不徒歲月燒無盡且使叢林有巨材燒火灶底無煙聊撥撥寒灰焰起木叉頭一聲飯熟方休也直得通身白汗流即韻酬黃介子居士三首兒女團圞話未遲瞻風正好及茲時但能物外逢遷老便可言前見馬師玉振斯文應賴汝金湯我法更由誰而今歸去蓉城裏漫把同參次第錐先覺非先晚不遲由來千聖各乘時拈華已得投機子斷臂曾聞為法師正眼親承須自徹全身擔荷復憑誰相逢盡是糢糊漢誰肯深加痛處錐箭鋒相直不容遲筆戰何如法戰時才涉思惟成野干踏翻窠臼是真師進前退後因憐囝活捉生擒為阿誰莫道渠儂無面目從來牙爪利如錐即韻示漳州朱居士己卯六月十七老和尚命代答十方世界一真人蓋色騎聲處處真日用堂堂全體現非經非佛亦非僧火裏蓮華朵朵新超然非妄亦非真分明告爾朱居士切忌將心更覓心山僧無法指他人白棒全提絶謂情絶謂情邊如薦得無死無生是據憑侍寮自警六首得侍明師非小可親聞大法豈尋常而今既入如來室夙夜無疲必自強一二十年爐𩍁下千差萬別盡敲開徹頭徹尾憑誰力半是師承半自裁時丁末法澆漓極遍地狂風孰可回子細更宜加子細出群須是出群才大話等閒容易說力行寸步亦艱難直須行說常相應始可無羞佛祖顏古人曾以木為枕枕畔雖眠常自惺顧我操持復若何那堪長夜恣安寢自癢自抓方自快自知自病自家訶養成一味無欺力天下誰人奈爾何參禪偈八首參禪須是發真疑莫管人家是與非自救尚猶忙不徹肯將心緒別分飛參禪須是發真疑疑不起時痛自笞逼得身心如鐵壁何愁箇事不相宜參禪須是發真疑疑處真時悟處奇擊竹觀桃明底事有何聲色更參差參禪須是發真疑一處疑通處處隨識得趙州三寸舌說無說有任施為參禪須是發真疑剔起眉看更是誰直下不生顛倒見形山一寶現多時參禪須是大丈夫舉措昂昂意氣孤縱使群魔千匝繞心安如海不驚虞參禪貴在死生切如坐囹圄欲求出較計窮時活路通㘞地一聲方妥帖參禪切忌掠虛頭一著虛時著著浮心地未能明似鏡口頭何必滑如油白公有頌徒增臭詰老無言覿面酬珍重正因行腳者直須剋實究根由庚辰除夕客路風霜又十年杖盂隨處獨安然乾坤物物渾如夢烏兔騰騰洵不遷門外任堆三尺雪座中且對一爐煙剎那耳畔鐘初動無限春光到眼邊紙爆身無半箇椰兒大腹蘊轟雷摯電機時至為君通一線驚天動地火星飛呈別本師和尚何事衝寒離杖側把茅欲向碧峰蹲目前殘局渾休論壯志深深在報恩挽涵照教授師二首昨日河頭忙問疾今朝倏爾送闍維傷心歷歷難藏處流水松風盡帶悲隔旬預別無人信誰料而今真箇歸生死在師如旦夕奈何漸見老成稀白法結茅十詠定基白法由來古道場年深幾度變滄桑而今定奪基偏正四顧無如此處良開徑一條捷徑沒人行荒草年年繞徑生從此闢開無窒礙縱崎嶇處坦然平運木別峰有木誠堪用運得歸來任所施長短自量還自斷為椽為柱各相宜剪茅嶺上青茅雖易剪挈歸奈是路迢遙鄰菴有箇方摩詰儒履飄巾為我挑豎屋方方一丈鑯頭屋豎起雲間四壁空誰謂法王宮殿窄大千沙界在其中編籬自芟苦竹東岡下歸夾疏籬傍緑蘿穿過篾頭明祖意禪和幾箇是仙陀引泉東澗源低西澗高東西汲水不勝勞分開竹筧雲廚內免使朝朝舉桔槔搭灶一隻郎當折腳鐺東拋西擲不堪評者回搭向孤峰頂煮月烹雲過此生進火鑽木取之元是妄靈山傳得亦非優杖頭撥動無煙火八面燎人正未休供佛者裏向言著不得佛魔潛覷總無門放開線路興悲仰殿內還須奉一尊即韻贈長文宗侯了知身世幻不復羡紛華脫俗能隨俗居家仍出家懷中收至寶物外弄空華記得靈山囑分形豈有涯山居二首幽居無物令人崇一味清貧冷淡風好鳥雜鳴枝上下野華競發葉青紅爛煨黃獨思前哲忽睹明星憶大雄有客到門仍問問何須高坐揖王公碧巖三度見清秋是事隨緣懶預籌方內有誰忘逐鹿峰頭輸我倒騎牛乘雲何必尋仙客玩月毋勞上庾樓覷得祖師關子透不風流處亦風流西山懷古十首亮公禪師闡馬祖一信得虛空解講經何妨垂手入紅塵也知八十餘員在撾鼓升堂自有人雙嶺玄真禪師嗣鹽官安足跡難尋是此翁無神通處現神通渾身儼在雙峰上祇是諸人見不同翠巖守芝禪師嗣汾陽昭十字街頭石幢子千峰頂上老眠牛鼻繩摰斷無蹤跡唯見洪崖水自流翠巖可真禪師嗣石霜圜點胸點肋稱無敵善老鋒前仍墮機逴得石霜霜刃子顛拈倒弄恣橫揮翠巖文悅禪師嗣翠巖芝乞米乞炭任堂司為法忘軀敢固辭痛恨自心疑未瞥桶箍忽爆展雙眉章江晦堂禪師嗣黃龍南未曾得入須親入既入門來貴力行咳唾而今皆祖意章江日午打三更香城順禪師嗣黃龍南千峰盤繞一山城法道曾經幾度更順老不知何處去野華荒草自枯榮雙嶺化禪師嗣黃龍心信手拈來不是塵森羅萬象現全身眼中拔出黃金屑雙嶺華開萬國春雲堂貫休禪師未詳法嗣詞壇走筆千篇易禪客相逢一句難要識此心真面目雲堂山下水潺潺白法且喜禪師未詳法嗣塔存香城亮公雖是終身隱今古虛名隱未曾何似喜翁更超絶不將姓字上傳燈即韻示楊建明居士世間名與位俱崇也是浮雲聚曉風才見柳條垂地緑又驚楓葉拍天紅齧藤二鼠時堪怖逼屋群山勢更雄跳出塵勞須鐵漢偶因無事語明公挽玄阿宗侯三首楊華落盡惜春殘居士門前倒剎竿訃未入山先耳熱杖將臨柩倍心酸猿啼古渡蒼煙冷鶴唳空庭曉月寒安得晤言如往昔祇應惆悵到江干去秋江上笑談時大喜年來又得師稱我妙齡聞道早自嗟老病入山遲毗耶一榻為誰設白法千峰祇自思時不待人良可痛深雲又作再生期雪嶺叮嚀尚不諼金湯我法破群昏王臣已現生前願刀剪猶貽末後言南浦雲迷新悉達西峰月憶古王孫寥寥坐冷巖中客更對誰談不二門悼喻均可文學四首葉墮丹楓萬戶寒水流雲散太無端道人撒手迢迢去誰把空華鏡象看春風吹動百華枝正是山中論道時今日樹凋群葉落茅堂孤坐為誰悲神前盤子西來意女作師姑白法禪一掌當機如透徹百千公案應時圜功名富貴枕邊夢生滅去來海上漚君若豁開如是眼吾何哀悼學時流即韻示汪海渡刺史我是人間無用人不知誰妄復誰真從生至老渾如是月落江空眼更親甲申除夕石帽峰前寄一支韶光兩度見推移空華影裏分新舊乾闥城頭記日時露地牛烹頻賣弄遼天鶻放謾追隨諸方若問年窮句金鴨香銷錦繡幃過田西禮令超禪師塔石塔巍然挂薜蘿滿林幽鳥自成歌超公面目今何在瞻拜歸來感慨多示歐陽元珍居士打破虛空無可說語言道斷心路滅頭頭獨露本來身韓盧跳入金毛穴示方山子居士青蓮念佛白法佛念沙裏無油麥中有麵翻身師子牙如劍渴鹿紛紛趁陽焰者六時那六時箇中端的不曾移趙州使得成何事鐵牛橫踞關西路印宗禪人送佛入山書此示之雨過寒巖草更青巖華風送滿庭馨世衰可笑僧無賴根鈍翻嫌佛不靈波底月明知水潔目前雲翳見空冥移來白法時談法珍重諸人著眼聽即韻答燕及姜相國敲落天邊月光境兩俱絶萬里淨無埃正眼頂門揭傷嗟世上人幾箇皮有血浩浩談仁義矯矯論道德自負真聖賢奈何迷聲色吾門方衣徒充塞真丹國律為名相纏教苦文字惑更有裨販流甘作假衣賊祇圖飽而溫誰知苦在即我祖特西來施茲脫苦法向道道根源自性原不乏自性超色聲自性離文墨自性非自然自性非白黑自性無生死自性無失得但能見自性是名直指直世降道亦衰美食無人食何期金紫中卻有斯氣息試手跳金圈揚眉吞栗棘我亦一凡僧荊州面未識活薶西峰隈長年不作唧神交亦何深向往如此亟寄我白雪篇字字冰華勒調羹手既高說禪口何忒吸得盡西江姜裴同一刻題木如意不是曹家女亦非西嶺木皮膚脫盡露風骨麟之角兮鳳之毛文采縱橫益自韜填溝塞壑知幾載知己不逢顏不改今朝拈山碧峰巔鐵額銅頭謾近前薦得機先那一著明明午夜日輪圜示行文宗侯裴老當年參斷際卓犖靈根何太利一呼直下便知歸覷得高僧半邊鼻便有倔彊如老韓上書詆佛恣顢頇自從親入大顛室卻道禪機是一般緬想吾門二台輔赫赫聲光播千古吾門近日冷如灰宇內誰堪追步武洪州有箇人中傑彬彬文質敻殊絶磻溪版築且同塵陋巷簞瓢自怡悅至人用舍固知時窮達於吾何有之收得中原無價寶安邦定國猶糠秕朅來訪我空巖客𩖼𩖼熏風動庭柏坐對紅稀緑暗間慨古傷今長太息滄桑幾變何足數浮名浮利如塵土丈夫唯有道堪尊道存意氣充寰宇目前見徹道根源夜半日輪正當午裴兮韓兮安足論祖兮佛兮亦何取人王孫即法王孫默默常談不二門要識天然尊貴處倒騎鐵馬上崑崙示魏明卿居士不忘靈鷲當年囑示作南州有髮僧放下萬緣來選佛蒲團孤坐氣棱棱示羅無塵居士本來面目淨無塵遍界明明獨露身吸得西江涓滴盡曇華又放劫前春即韻答呼總戎閒看柳線緑含春縱舞塵埃不帶塵貌是將軍心是佛眼如鶖子見如神新詩謾寄眠雲客古道曾聞面壁人端的無身無住著何妨遍現普門身宿香城寺和寂音尊者韻二首古殿鐘寒眼更清蕭蕭萬籟盡停聲松根火暖平分座柏子煙凝列作城案有瓶梅春正好窗無山月夜偏明不知竹裏連雲榻趺坐於茲夢幾經漏盡更殘話轉清時聞隔壁打呼聲夢緣斷後空雙眼智境符來逾百城香解染人稱絶妙燈能照自是圜明劇談幸有知音在誰更區區讀夜經示鄧惟憲文學家近西峰倚翠巒窗開時復見仙壇不嘲仙子趨歧路豈訝桑門作異端琢句立殘天際月翻經然盡篆邊檀達人自具超方眼三教何妨一體看示篤初居士四首結屋西山下悠然長者家門迎蕭岫月窗映北溪霞不飲陶潛酒時烹趙老茶閒同雲外客一啜破千差百年同一夢夢裏孰惺惺身世蜂銜蕊功名蟻逐腥才驚槿樹萎又見柳條青獨有君先覺晨昏一卷經僧俗形雖異賢愚性本真試看燈録上半是白衣人有念皆為染無心始出塵有無俱坐斷全露自家珍蔬食堪明道原居可學禪但尋衣內寶便是火中蓮詰老髻猶在龐公頂未圜豁開真面目何礙共談玄贈法空禪友二首音以目觀雲將耳聽聞見既超聲色何病一翳在眼萬法紛紜三日聾後方堪聽雲西峰之上南嶺之巔一菴寂爾百衲翛然猿鹿既馴牧樵皆化凡厥有心咸知德大贈洪浪禪友巖棲樹宿也安然況是深峰有數椽草榻矮趺三布衲蓬窗高事一金仙閒雲靄靄籠幽石皓月娟娟印碧泉見道渾忘山共水桃華翠竹祖師禪石幢即景六首石幢菴依巖結屋兩三重重疊峰巒聳碧空奇怪石頭能自立法幢高建白雲中惺惺巖虎丘曾被生公騙忙點頭來未是惺何似惺惺巖畔石長年無說亦無聽別傳峰祖師足未離西天碧岫攙先示別傳文字語言渾不著朝朝對面共談玄師壇石金襴傳得去匆匆坐具何緣落此峰想是頭陀拈不動至今攤向月明中一錫峰特地橫拖錫一支穿雲渡水不曾移多年鈍置孤峰裏他日還堪付與誰三笑洞薜蘿深處洞門高把臂何須倩陸陶幸有二三知己在不妨談笑破塵勞白法院即景六首亮公洞無地可逃名有巖堪嘯月誰謂不談宗古洞朝朝說且喜崖嶮崖猶壁立喜翁何所之古今無限意低頭祇自知石帽峰登高當九日帽落幾千載磊磊戴山巔狂風吹不改龍舌石片舌慣藏鋒興雲不吐霧我愛趺其中蒼龍莫相妒象鼻峰不萌草下眠了無狂奔想鼻孔自遼天遍吉徒瞻仰選佛場馬駒久不鳴此曲誰新唱選得一尊歸雙眉在眼上示行堅徒侍我居山六七年頑皮痛打不曾穿欲知棒底真消息石帽峰頭月正圜香城即景十二首香象橋身作橋梁行最高度人度物不辭勞若非法堀真香象誰敢當頭觸怒濤石師關不是凡胎生孕得豈從烏弋國中來巖巖獨踞重關上百獸聞風心膽摧戒珠峰無持無犯是尸羅掩耳禪和似不多卻許孤峰知此意圜陀陀地碧嵯峨洗月池湛水清光亦是塵誰知影象總非真者回滌盡光和境不作茫茫階下人講經臺嶽頂臺高鎖暮霞是誰多事撒泥沙縱饒講得天華落爭似忘言野衲家古硯石盡道古人摩硯石那知石硯解摩人張顛懷素今何在一片精堅尚未湮合掌柏無手如何能合掌須知開合兩無心歲寒不改蒼蒼色節操從來異衆林揚眉棐香寺昔聞棐有眼誰家又道解揚眉無中唱出如相悉露柱生兒未是奇青蓮石誰言陸地不生蓮一朵青青插徑邊歷盡寒暄無異色濂溪應亦羡當年白雪溪浩浩隨流不變色明明不變卻隨流分支已潤人間世古澗寒光尚未收羅漢壇五百聲聞齊打哄闍黎鬧裏解抽身壇中高坐渾無事冷笑諸方捏怪人將軍峰功成名遂在煙嵐豈羡公侯伯子男片片赤心夌碧漢巍巍千古護名藍哭本師和尚壬午孟秋七月七通玄峰頂西風疾吹折東南大法幢人天恃怙從茲失小子入山方一年恰拾松柴煮橡栗俄然千里聞訃音仰天哀痛不成泣吁嗟叢林正下衰野干成群鬧啾唧濟北之道如縣絲誰秉慧燈開暗室吾師傑出陽羡山揭露玄關猶杲日不說諸方五味禪直指當陽一真實升其堂者群疑銷入其室者藏於密五湖四海導人師盡是吾師腳下出六坐名藍振祖風九重城內曾相悉朝野同欽古佛來衆魔不敢生憎嫉將期永作中流砥誰謂化緣今已畢我憶當年初見時疑團如嶽心如漆合爪趨前問未申白棒臨頭兼咄叱直下皇皇雙涕垂食不甘兮寢不謐自此心眸頓豁開始信眉橫鼻子直八載周旋左右間硬掌粗拳何妙密而今孰是箇般人更與一頓洵超軼遺憾滿腔寫向誰目視重霄空閣筆也知匝地起清風與師相見非形質昔既不來今焉往相憶相思又何必奈何師絃忽絶響衆盲觸處皆成窒堂堂我師寂光中寧不略為群生恤鏡形水月現何難願輪活潑原無尼合同船子去還來震旦不妨重遊踤颯颯金風玉露垂枝頭葉落聲蕭瑟瞬息光陰暗逼人轉眼於茲一秋卒師恩如海重如山慚愧未能酬萬一風前惆悵漫追思萬疊雲山高崒嵂次韻贈友鉢袋同傳十五春西拋東擲不黏塵閒披壞衲隨雲鶴謾結團瓢類谷神稱子無心能辦物頂門有眼卻知人白峰舊話頻頻舉老大還驚夢裏身
