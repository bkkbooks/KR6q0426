body:
  text: 嗣法門人傳我等編偈二闢亮公洞有序亮公古之隱者也亮公洞西峰之古洞也古之人道眼既明直入千巖萬壑之間茅茨石室匿跡韜光目視雲霄窅忘人世豈得與叔季沽名釣譽之徒同日而語哉昔司馬子長之贊孔子也則曰高山仰止景行行止雖不能至而心鄉往之予於亮公亦然頃因暇日偕二三子趺坐龍舌石上偶見其旁隱隱有石戶乃相顧而笑曰此中幽邃如是無迺亮公盤桓偃息之區乎遂命二三子剪荊茀抉壤塊平高就下外實中虛幽洞俄闢曲徑亦成迺顏其洞曰亮公蓋亦竊慕其遺風云爾客曰亮公之隱於西山也埽蹤滅跡人莫能知矧已化去數百年矣而師乃今以洞名之得非為虛空安耳穴乎予曰噫子何見之陋也子徒索亮公於影象庸詎知夫真亮公乎夫亮公向馬駒一言之下頓息萬機則盡大地是一亮公無古無今無隱無顯無在無不在即今松竹搖風藤蘿抱石鳥啼華笑雲散月明無非是亮公示現處子何見之陋也客曰若是則古洞儼然亮公何在予曰伯牙與子期不是閒相識客曰忽若覿面相逢時如何予曰直入深深處衝開上上關客橫趨而去予與諸子坐洞中歠清茗聽清泉杳不知身之在人間世也因援筆以志之時乙酉又六月立秋後十日舊洞新開傍翠岑廓然獨見亮公心煙霞坐臥遺諠寂日月聲名自古今白石猶標無縫塔寒泉時奏沒絃琴半千年外風流在未審何人和此音禮大寂禪師塔石門深鎖石浮屠落落遺蹤羨馬駒姓字昔曾揚竺國兒孫今已遍寰區艸青古徑憑誰薙月冷虛堂祇自娛三拜起來長太息何時再振舊規模寶峰懷友古寺殘燈冷翠微是誰重剔見餘煇象龍喜聽槌初白猿鶴愁看錫又飛碧岫暖雲眠五老寒潭孤月照雙磯晨鐘未許驚遙夢我欲登匡扣竹扉辭寶峰請小參說玅談玄數似麻頹綱委地轉堪嗟泐潭幸自清如鏡何事於中亂撒沙送洋維那三回上白法兩度躡珠峰畢竟緣何事歧路自憧憧四月五月天正熱腰包又卷忙忙別且將白紙覓伽陀誰知此道離言說君不見倔彊克賓曾法戰饡飯罰來趁出院頂門不具超方眼臨機未免隨情轉一機相契萬機休山川何必都遊遍風前透得觸背關千里萬里長相見即韻答舒八公茂才窗外煙收見遠峰如旒如髻兩三重地幽易使紅塵隔苔老難將古路封玉帶未蒙君子擲禪關先許道人從何時吸竭西江水握手同論不二宗石門道中枝頭蜀魄一聲聲百里春山送又迎拈得泐潭潭上月直教千古照人清過匡廬訪𠁼菴禪友搘策原非為避炎故交今臥五峰鑯山分兩國人猶舊水隔千谿路欲淹楓葉乍驚秋色老木樨初綻冷香甜現前幸有陳公案且對知音一笑拈宿雷岸黃給諫谷口艸堂九州蠻觸各爭鋒誰識隆中有臥龍門外及時栽五柳窗前鎮日對孤松髼鬆短髮蓮華笠瀟灑芒鞋紫竹笻幾度夜深延衲語世情何似道情濃贈古雲印菴主紫竹心空道已南一枝秀出綠蘿菴敲殘夜雨風生壑埽盡晴雲月到潭小銚且將千澗煮高名未許萬峰函翻思長者當年事羊鹿牛車謾設三凌霄崖懷遍融老宿峭壁層層近斗旁參差怪石自成房賣柴客去苔華老揮麈人來貝葉香徑窄有階容上下臺空無地寄興亡禪家況是超今古日日門開對漢王再遊龍雲寺乃巖頭奯禪師說法處午夜寥寥霜磬清冰輪偏向客窗明雲收古殿龍常現風鼓寒林鳥不驚竹榻已空塵劫夢地爐猶話舊時盟也知奯老原無恙此際何妨一再行紀夢臘月蓮華夢裏開紅光遙映碧樓臺已無綠葉擎雲蓋賸有青莖傲雪堆十四朵分元並帶二三友翫不同裁醒來獨自摩挲眼猶覺香風枕畔回贈竹菴法師講罷楞嚴入翠微茅菴深自掩雙扉一聲竹斷香嚴夢數點星寒鷲嶺機木落遙天山正瘦艸枯平地石偏肥㲯毿玉麈高縣壁且看紅爐白雪飛禮東林遠法師塔聖哲不再生淼淼思陳跡步出虎谿西餘波吞落日西阿霜雪林斜枝徒鬱密荔塔尚巍然高蹤何處沕荒院四壁圮龕燈久如桼古路覆苔蘚砌艸枯還茁吾慚少苾芻師堂頗堪騭理策上空階荊莽胡能窒合爪向堵波歔欷三拜畢徐徐讀謝碑孤標見行實維昔晉室衰賢明多隱逸或謝三詔書或辭五斗秫或落知解阬或為文字桎師自鴈門來乘時乃一出結社匡北村黑白十有七蓮漏六時聲聲聲同一佛匪不欲談禪良由機未一循循善誘之久乃堪入室一心苟不亂成佛亦何必啟茲淨土門師實為之帥師歸門徑荒蓮池春水溢紜紜異見輩巴歌和啾唧唯師獨不然文必稱於質著書盈萬言厥論高且軼論高尚可尋旨深卒難悉遙瞻擲筆峰雲端尚崒嵂末世行解違空言世所黜師操逾冰檗束身猶以律寧殞夢幻軀不飲傷生蜜優曇華既摧滿地生蓬篳徘徊不忍歸臨風多惕怵安得若而人為師重繼述黃給諫命含輝長老請住東林即韻辭之忘形為法豈微緣扶病衝風艸店眠破曉入雲招野衲乘時住院繼先賢蓮華社冷憑君續柏子禪高敢自專為我寄聲林下客祖燈須是大家傳再遊西林寺鱗鱗萬瓦古精藍幾度憑軒憶永曇機謝每來雙虎侍道高嘗卻眾僧參煙霞有意縈香谷風雨無端妒塔龕猶喜波離真子在閒提金錫振匡南偕𠁼菴訪別峰法師不值共友還尋友深深下艸坡林空枯葉盡樹老活藤多出谷雲將雨環谿水欲波到菴唯默坐閒卻幾如何懷青閣傑閣新營古寺西登臨便覺萬峰低鷹披青入寒更夢人破曉開浩劫迷直裰有光韜慧日皮鞋無底出桐谿而今不和新豐曲格外家風赤手提過東林和本師和尚壁間韻二首四句伽陀一味禪知音不遇也徒然當時若得師垂手法席應超晉宋前不談淨土不談禪白社風流已寂然十八高人相對坐忍看秋色滿庭前五老峰不學陶潛隱雲端共出頭插霄分五位閱世幾千秋石露崚嶒骨天開紺碧眸群峰雖雪頂猶是子孫儔五乳寺二首五乳峰頭禮昔賢行行正值菊華天憨公已作盧公伴折腳鐺留待孰煎行解深深已入微全身不壞示真機塔中莫謂無言說萬象森羅聽指揮別𠁼菴禪友歸西山已盡登臨興還思返故岑浪遊非有意卜築本無心霜重蒼苔冷風高古木森隨身一杖在信步出雲林遊雲居次日大雪萬仞歐峰挂夕陽歲寒猶見柏蒼蒼禪房彷彿摩星斗祖道依稀憶宋唐雲出寺前山轉秀月臨湖上水生光我來尚未閒揮麈何事天華落滿廊輓顓愚大師二首繖居常閉戶語默悉圜通但願精三學無心繼五宗石城華正萎歐阜月當空恨我生遲暮區區仰德風世外全高節寰中獨讓師王侯曾莫致名利豈能移一旦津梁歇千峰猿鳥悲未諳籌室裏幾箇是親兒雲居除夕浮生皆逆旅何處是家鄉眉底客塵盡胸中世念忘燈搖殘歲影風遞古梅香坐久推窗看春光已上堂仰天窩示眾禪者四首春日熙熙春氣和扶笻攜友上天窩白雲何事多偷嬾不肯隨風下綠蘿為僧最好是居山山色谿光鎮日閒欲得不遭閒境惑直須親透趙州關祖師心印沒囊藏日夕舒光照艸堂心境未能融得盡不妨策杖走諸方石牌茆屋萬峰巔夜夜疏星壁上懸老衲焚香相對語不知身在率阤天瑤田寺羃䍥松煙村路東寒鐘十里逐谿風牧童幾度歌聲滑盡入無生曲調中城崖山百尺崖頭地一拳剎竿高豎指青天孤雲片片來投宿伸腳同參自在禪酬慧習耆舊迦陵久已不聞音犬馬群喧古殿心鐘鼓難侵存碧漢杉松易老賸空林寰中弘道全憑願格外知音豈在琴但可堂堂扶白法那能眷眷惜黃金百年雀角穿禪室一旦狐蹤遠翠岑霜華景裏蓮華吐瀑水聲中雲水臨大功既就傳無際慧燄常明照不陰顧我酸寒慚繼席倚笻崖畔骨毛森即韻酬雪堂熊少宰過訪寶殿夜來書積雪密機密讖神先裂笑看師象集雲端立聽疏鐘敲夜月頭顱雖別願還同雪上重新古梵宮誰謂毗耶消息斷明明匝地起清風懷干岸熊廣文絡緯初鳴萬樹秋井邊梧葉下枝頭火雲燄冷金風動素月涼生玉露流巖桂香浮人夢覺田黿聲鬧客情休遙知方外熊司馬迷悟雙關一筆勾即韻酬士業陳司理松菊頻栽三徑中紛紛香氣遠浮空器堪宰相心慵應道可傳燈志愈工瘦柏傲霜枝自老修筠敲雨節偏雄鴈行未許柴桑並白蕅華開優缽叢即韻答谷暘笪明府蓮華社內久潛神知是多生有正因指點群迷官即佛廓清四相幻全真煙霞已傍林泉老艸木忻逢雨露新法運也隨天運轉匡扶還藉解空人翠巖寺即景十二首釋迦峰星星蠃髻聳危巒鷲嶺西峰不異觀誰謂法王無面目峨峨千古露雲端迦葉峰糞埽㲯毿髮不刪多年雞足自偷閒者回突出孤峰頂一度華開一破顏缽盂峰雙谿捧出缽多羅數樹松華蘸碧波我亦欲傳真種骨不知誰解說伽陀達摩峰蔥嶺無端誑俗人幾時藏得祖師身青峰萬古摩霄漢舉眼看來更逼真無雲嶺雲影枮來山更峻月華高處路猶迷芒鞋踢得虛空破無限風光在嶺西鐘鼓石巨石雙雙挂半空橫如法鼓豎如鐘知音豈在頻敲擊自有希聲達九重磬石頑石何因遠近聞祇緣清韻自超群隨敲隨應無高下幾度和風奏夕曛迎笑堂金師生得主麒麟一笑相迎眼倍親十笏洪爐猶未冷不知誰是爆箍人拍洪樓西閣崔嵬欲接天軒窗面面七星縣洪崖縱有神僊術應立禪家次一肩玅高臺石摩日月樹摩星下視群峰數點青身在其中誰覺峻悠然如步梵王庭洪崖橋雙谿匯處浪華飛誰共浮槎接翠微寶所不遙須進步莫迷煙柳竟忘歸雷護橘果熟霜林紅欲然誰家兒女不垂涎迅雷豈是多偏護要使偷心當下捐蟠龍寺松竹蕭疏曲徑成煙籠紺殿碧苔生世殊莫睹高人塔碑斷猶存見性名魚躍淺塘華正發鳥歸深樹月初晴晨鐘暮鼓渾無恙誰續當年說法聲登香城寺古基寶地談空日焉知我不聞化移煙艸合錫振雨華芬荒砌寒籠月高臺冷襯雲順瑛何處是相笑對斜曛即韻酬晦山禪友萬指叢中我最凡自甘沙銚煮寒巖豈期爝火煇名剎卻出煙嵐種小杉壁峭四時溫有雪囊空幾度凍無衫隔村高衲能同調寄得新詩貯滿函送無住歸石屋孤峰頂上石為菴歸去應須著實參佛到且從門外立客來休雜世間談煙霞緲緲堪成侶松竹森森盡指南徹見舊時人面目果然非女亦非男示獨尊上座千重百匝亦何妨舒卷從來別有長但得腳跟紅線斷不須歧路泣亡羊贈山翁和尚住青州大覺傑出庚峰是老兄令行吳越獨崢嶸五遷名剎轟塗毒再握長竿釣巨鯨東魯佇看迎活佛西江遙聽播芳聲須知華雨繽紛處端為宗門集大成即韻答天童奇和尚鄮峰一語破重關道譽先流寰海間霜鬢老兄原不老灰心閒弟愛偷閒松培萬樹林添翠鱗躍雙池水欲斑閩蜀也知聲調合同風何似更同山寄己任禪師人境俱忘後泥牛吼碧潭燈傳深洞火華擁綠蘿龕閩蜀風非別洪筠月自含翻思煙水日無夕不同參詠筍寄觀首座高節深薶未出頭和沙和石漫為儔養成一色夌霄翠撼月搖風振未流送玉浪上座南詢籬菊香飄細指南孤帆偏愛向遙參吳山越水休淹滯一箭須穿五十三示繼曇瑞侍者細細一毫頭明明無量義一蹋便知歸已自落第二那堪費鹽醬捏回野鴨鼻那堪吹布毛父子相鈍置翠巖雖有言無說亦無示早晚侍巾缾莫負參方志一拳拳透祖師關曇華繼現千林瑞送十虛禪人歸武夷武夷有峰三十六拔地夌霄如削玉之子離塵家此中老樹蒼藤幾回綠六六峰前九曲泉泉中一葉可蹁躚龍吟虎嘯深如許玉女金釵高插天我生半生湖海外家裏名山曾未會子當先為卜巖房待我歸來伸腳睡睡起夷茶三四桮笑看藤華落又開不是儂有鄉情在從來鳥倦亦知回即韻送藏西堂之閩杖底夌雲氣飄飄過別區詩文囊佛缽日月貯僊壺頒白猶行腳毋欺是範模艸芳千嶂碧風動七閩孤劍水浮舟楫重城放僕姑但能舒片志何在疊雙趺見翳爭黧牯疑銷葬野狐忘機情易竭囿理蔓難圖路險鞋頻斷峰高策自扶碧谿啼白鳥綠樹繞青蚨崿崿關如透茫茫海亦枯殺生生始活棒佛佛方符颺下荊山璧寧貪赤水珠不迷原不悟誰誰愚吾里君遊日君鄉吾化孚秋風望歸笠相解愁胡示無塵道者大道幽曠唯證乃知鶖子莫測豈涉言思言思路絕無說而說是以宗門棒棒見血英靈道者直下承當竹翠松青了無覆藏見聞不隔根塵匪迫銀漢鶴高蘆華月白出死入生雨施雲行不作聖解肯落凡情凡情不住常光獨露朵朵芙蕖火中正吐贈智閒禪友并序智閒敏公與予同侍天童先師於祁御史園中予擬至西江結茅呈偈以別先師擲偈怒罵不已予竟力辭先師隨後追至梅墅堅留予已登舟去矣公獨侍先師天年後始誅茅別峰噫予事師之不及敏公多矣昨承訪翠巖復述其事予為悽然涕下因次韻以贈并懷先師御史園中猊座前別來月色幾回鮮十年友越千峰至萬里雲將一步還白髮共嗟明鏡裏烏藤誰契峻機先翻思老漢婆心切淚滴谿頭顆顆圜示春侍者祖祖相傳傳此心此心不屬去來今了知心法傳無際春到人間萬木森示同山後堂明暗雙彰殺活機等閒拈出絕思議主賓分處如相悉烈燄爐中白浪飛壽玉菴老宿十首玉菴承公今臘八旬予適有閩嶠之行乃用島詩一僧年八十世事未嘗聞為韻作偈十首預為之壽雪嶺夢回時汀州紱麟日德臘兩俱高西峰推第一塵勞海正出棲鳳嶺先登不醉曹山酒居然一聖僧泉洗池邊月華開石上蓮片雲橫古寺憨臥竟忘年面門𦒻固多耳目猶聰察偶爾閱殘經雙眸如二八閒步別峰巔驅烏趁不及如此老成精何啻百二十殊寺不殊僧同鄉不同藝君獨閒一生我慚忙半世壺中天自寬誰云耋將至閒坐困即眠此外復何事晝夜一百八玅機超情謂不知韓相公睡眼曾開未君且不思鄉予心豈弗忘奈何緣未了鄉水又重嘗生即無生句叢林已猒聞為君翻別調孤鴈破寒雲示兩序十首并序母難日兩序設供請陞座祝壽予不諾因垂問曰棒下無生忍臨機不見師既是不見師更祝甚麼壽一僧曰知恩方解報恩予曰也是順水之波僧曰老老大大面皮厚多少便出予因命眾頌棒下無生意旨復以二句為韻作偈十首示之予初入天童嘗疑此一棒誰信活骷髏頓見光明藏慚愧老頑皮知打幾百下擊出夜光珠舉世難酬價人道常州有我道常州無有無俱踢脫壽量等毗盧霜葉此時墜漚華此日生虛生三十九一事總無成我生最轗軻百苦曾備忍不陟太白峰驢年苦未盡水雲不相約紛紛自遠臨翠巖無法說意路謾思尋語言文字外別有活人機不是鳳凰子九霄未易飛諸方盡相肯自家還肯不偷心如未休醍醐反成毒臨濟正法眼瞎驢獨親見肉骨已雙還突出那吒面具得殺佛手堪與佛為師逆水能興浪始稱師子兒示行耀齊文學一點靈光耀古今莫將知見別追尋行超顏閔猶歸漸學邁韓歐未足欽有念盡為顛倒念無心方契本來心谿聲山色分明在好繼東坡悟後吟示普副寺夢入精藍境亦奇掀翻缽袋復何辭钁頭雖鈍能無倦囊底常空似不知青菜葉呈真實相破伽黎示古風規會須記取當年夢莫負蒼蒼兩道眉四旬初度露滴芙蓉四十秋電光石火一旋眸道慚北濟波瀾闊錫卓西江歲月流紅葉易搖霜後樹白蘋難翳雪中舟五湖共豎三千指誰是金鼇上直鉤雪中領眾斫柴十首磨刀欲取深山雪裏柴刀兒須是快如𩘅門前有片青青石莫惜三回兩度揩著屨紅鞋氈襪尚嫌單芒屨如何禦得寒欲陟斷崖千仞雪直須緊捎莫辭難呼伴誰聞行苦不攢眉況是冰華滿樹時伴我入林無難色許伊堪繼獦獠兒入山極目青山盡白頭單刀直入展雙眸試看何處堪垂手莫使衝寒恣浪遊選柴參差散木自宜刪留得杉松覆碧山謾謂柴頭情識在從來殺活有攸關剪棘周遭荊棘貴先除免使牽連礙短袪任是葛藤長百尺一刀剪盡更無餘斫斷柴樁多是凍成堆凝結層層撥不開盡力一揮方倒斷空山依舊碧崔嵬束起斫得艱難束更難攔腰束起勿令寬兩頭輕重須無異始可全提下翠巒捶歸玉樹瓊華滿擔挑歸來何啻一冬燒飽柴飽水渾無盡香積從茲破寂寥放下萬苦千辛得到家從今放下足生涯洗將雙腳爐邊坐遮莫長空墜六華再住翠巖聲鐘極力辭豈敢負相知進退非無故行藏各有思月高鄉夢遠歲久道心疲去去又留住偷閒在幾時擬漁父辭十首并序甲午夏予與諸子輯元明以來諸老語要入續燈錄因念從上尊宿無不從剋苦真參大誓奮發中得來蓋誓不大志不苦則中道而廢惰矣安能透頂透底徹證徹悟哉乃摘其參證行由歷歷可稽者作漁父辭十首命曰宗門標格以示諸子客曰法無定相豈可拘格則乎隔江橫趨一蹋便徹又何嘗費許多鹽醬來若以死法繩人則西來大意翻成塗轍矣焉得為圜頓教耶予曰噫子所學者近代之禪也寸香未了心識紛紜片語合頭便為省發一期之間稱悟道者數十欺天歟欺人歟予恐圜頓教門將如冷灰矣今子徒知水潦高亭之得處瞥脫而不知其苦心研究非特一生兩生千百生而已耳予試問子馬駒一蹋是死法耶活法耶客沉吟予連棒趁出天目高峰玅禪師北澗塔頭才問訊何事烏藤連打趁轟雷掣電未為迅門千仞垂手相牽不肯進者漢眉毛都落盡見聞夢想何須擯五載骷髏薶鐵櫬枕兒震一聲撲碎空王印天目斷崖義禪師六華散處山河殞客夢初醒松露泯死關辣手誰堪忍全身隕伎窘懸崖心未窘七日不證誓自盡朝忘飲啄夕忘寢南北東西原絕眹豁然省石中迸出摩空筍靈雲鐵牛定禪師截取頭做舀屎杓片語堪為靈驗藥任他百病一時作忘驚愕更不迢迢尋扁鵲勵精提起本參著目睫不交雙淚落驀然擺斷黃金索乾坤廓曠劫沈痾從此削金陵碧峰金禪師五穀胡為誓不食疑團鬱鬱填胸臆柏葉松鍼且延息自鞭逼眉山萬仞曾親陟伐木丁丁聲太直呼起法身赤吉力汗如雨澍歡無極水莫淢定中消息誰能測玅果竺源盛禪師大地平沈無一物誰是人兮誰是佛參天荊棘從茲刜非彷彿全體頓現何潛沕無間雖深不足恤苦是袈裟下身失弘誓不堅焉得出須委悉莫待臨婚治癭疾天真毒峰善禪師阿鼻永墜誰欣願願深志苦行方健名利牽人蔓復蔓殷勤勸休把光陰棄分寸聲色頭邊原不溷金鐘未動鼓先噴大夢未醒猶困頓正悶悶一搥敲斷千生恨護國無用全禪師古來剋苦真參者寧可無言不亂瀉虛頭伎倆俱消也居叢社孜孜日夜如聾啞一拶當機同大冶睡不安兮食不下虛空粉碎方瀟灑無可把倒趁泥牛騎木馬香嚴古溪澄禪師大器從來不自肯已越凡流千萬等譬似登山須到頂孤迥迥丹霄獨步誰能並趙關未破徒咨鼎從前解路皆酩酊奮然一拶頭如剄夢初醒團團皓月當空炯壽昌無明經禪師寰中久寂新豐曲野干啾啾空躑躅西江再誕古西竺超流俗斷絃喜見鸞膠續日裏開田夜燈錄一座好山千載毒默默提撕自催促驀然觸石邊飛出遼天鵠天童密雲悟禪師積薪觸發生前事恩愛牢關一時棄曉夕咨參求指示惟罵詈那知句句吹毛利情與無情原不二翳根未拔空華墜銅棺頂上回頭視煥然地謦欬無非西祖意懷笑巖和尚四首有序笑巖祖翁以萬曆辛巳春化去塔於燕之西城羅公大參銘之甚詳先師住金粟時已將南北集并銘梓行於世天下學者家諭戶曉頃有蜀僧謂尋之十二年而不得海內實無一人知之乃作四詩以紀其事庶後之稱子孫者知其祖翁尚在噫妄誕之談何異井蛙醯雞耶因即韻以志感從來大隱不居山柳巷何妨露一斑霹靂舌藏人莫委嵯峨門啟孰能攀蕭蕭煙笠傳南遠落落浮屠鎮北閒今古西城城上月盲龜咄咄淚潺潺殘碑幾度繡莓苔古塔依前郭外隈蒿長砌邊枯又活鶴巢鑯上去還回一燈有燄東西續八面無門晝夜開十二年中尋覓者未曾親見謾疑猜小小菴居矮矮楣誰知正與道相宜生來不解圖虛譽死去何須立峻碑一火活焚真父母百年遙誕好孫兒琉璃殿上風光在門外遊人那得知團團無縫亦無方合爪趨前已面墻潭北湘南金玉國鍬頭钁底利羅場斷磚縱可修殘穴片石徒勞補上蒼寄語野盤途路客祖師不在帝城旁焚萬松評唱公案若依評唱會祖師焉用特西來而今一火都焚卻免使兒孫口亂開
