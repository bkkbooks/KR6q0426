body:
  text: 嗣法門人傳我等編偈三即韻答鶴臺熊銓部北窗高臥獨知微敝衲曾勝玉帶圍華滿園林渾不戀鷗閒湖岸竟忘機青青五柳今猶在落落雙蘇世所稀峰頂鼓鐘聲未寂隔江招手幸無違謝函三蕭憲副送額寶域重開已六秋文星時映碧谿頭霜隨玉輦飛寒谷月逐銀鉤上翠樓一帶乍留千古頌四言雄鎮萬峰幽仁風自此披泉石鐘鼓謳歌並未休次山谷韻答熊少宰自顧一身輕任此天下重掌握有樞機縱橫皆玅用為我豎法幢幾載切寐夢一旦獲楩楠可梁亦可棟因知雪中書奇讖今始中誰云泉石幽不與廊廟共試看補袞手摘取曇華供我有沒絃琴遲君同撫弄酬黃山恒證禪師六六峰談最上禪奇松怪石總三玄一枝秀出新安迥四面光浮古殿穿雲海倒傾機未活桂輪全落見初圜知君已得先師意千里何嘗有二天輓林野和尚汾社六兄弟唯君最逸群君先鳴海嶠我獨臥江雲柏老蒼枝折霜寒紅葉分玲瓏末後句千里孰親聞輓箬菴和尚二首長空為座水為琴廿載頻宣石磬音兩浙忽沉天際月千峰猿鳥亦傷心先師金錫下西湖曾見吾兄捋虎鬚往事不堪嗟逝水克家喜有鳳麟徒寄夜日杲書記梨華兩度笑春風客路迢迢窮未窮好把善財參遍旬歸來說與曼殊翁即韻酬澹菴莊內翰過訪二首撥草遙尋世外師翠微推倒更由誰祖關未透沉空有玄旨才明越即離幾樹丹楓霜月裏一聲牧笛朔風時袖中無數如椽筆佳景何妨次第題剪盡人間爛葛藤翛然塵外儼如僧木天署已傳心學金粟堂期續祖燈聲色見聞同水月鹽梅舟楫亦宗乘芒鞋頭戴知音者斬卻狸奴似不曾燈華不借東君力通紅夜夜閒一心唯向上數朵絕纖埃蜂蝶飛難近冰霜凍莫摧昏衢曾照徹續燄待誰來贈天鼓震侄禪師五老殷勤留不住衝炎特特到西山行藏已自超儕輩真贗何煩更照顏桂萼漸敷秋色裏鴈行遙唳水聲間報恩定有驚人句一棹姑蘇勿更還贈古眉山侄禪師萬仞峰頭自活薶世心冷落久如灰雪迷樵逕人難到雲鎖蘿扉晝不開夜靜但聞鳴瓦缶春深未見響晴雷應思南澗當年囑曳杖乘時破碧苔南昌槐李寺陞座不懼彌空雪軒車自遠迎地幽新插草寺古舊知名春色凝槐李湖光映塔城回機如透徹法法演無生宜川石鞏寺陞座春風為箭月為弓幾度穿雲射碧空猿鳥謾驚神臂遠象龍應識祖機雄鞏從峭處蒼煙斷石向虛中活路通扶杖卻慚登猊座千年公案話無窮臨川南源寺陞座古澗源深處濤聲雜鼓鐘峰迎天外錫潭育法中龍慕慚先哲引宗愧短笻再來如有約春到草茸茸旴江景雲寺兩姑如畫峙西南遙對空王默默參玉麈豎來成第二璃盃未舉見前三池深蝦蟹眠初穩春暖鷗鳧翥亦堪信宿卻煩開丈室閒談誰信是玄談旴江資福寺吾道原無諍波旬影射空嵯峨瞻玉殿寂寞憶金峰關密人難度年深草自封聊將摩詰默為子會殊宗宿蕭君殿水中月影樹頭雲印現無心合又分日暮不須投古寺焚香下榻有蕭君杉關道中敵樓無戶塞無墻絡繹寅昏有巨商閩嶠月同章水月諸方何苦話關防石峽聞警驟雨狂風報綠林誰知盡起自家心欲令萬戶常安枕斬取心頭殺盜淫杭川華嚴堂鶴影雲蹤廿六年今朝始飲故鄉泉雜華已沐如膏雨一瓣誰先綻曉煙龍興寺蘭若將圮盡猶存一箇僧雨多侵佛頂星朗代禪燈蕭笠誰重覆香臺我獨登杭川春正好休負古龍興龍吟寺三條瀑布遙空落一曲深潭浸碧天夜靜龍吟歌梵唄應知此地即祇園開放生池十首白眾千指同商茗一盃碧池特地為誰開殺機斷盡生機活今古無煩問劫灰問石麤麤細細石雖多何處林巒易出坡盡道東岡歸路邇宜舁宜載亦宜拖修路峰頭樵逕曲彎彎巨石如何運得還斫盡樹根刪盡棘從教驀直到家山運歸木船撐出碧峰尖老大如磐亦可兼莫謂下坡先放意纜頭牢捉始安恬命匠石頭須是善安排鍛鍊無勞倩女媧應手得心稱大匠誰知不在吉陽街下樁水浸無傷是石頭緣何徹底用松楸須知合抱偏多力一橛長樁百不愁築隄石一層兮土一層層層高築似崚嶒逐羶細蟻無容穴千古如山更不崩掘土頑泥難掘更難傾黏著如膠不易平鋤到月沉猶未歇大家燒竹照深更引泉不須別澗引寒泉鋤得深時水自涓門外一泓常湛湛錦鱗從此見堯天植柳萬物榮枯各有時柴桑門外獨垂垂秋風黃葉蕭疏下隄畔新栽三五枝弔黃巖受業師白侵雙樹後陵谷幾回遷舊隱叢新竹空林鎖暮煙法言猶在耳寶月映何天翻憶古靈事傷心淚滿川禮碧天和尚塔一林紅葉醉秋霜祖塔凌空愈有光須信本來無縫罅不煩特地問南陽悼明吾黃居士千里迎予意最濃黃華白髮間秋風歸來巖上華仍發不見當年白髮翁悼若俊黃文學干城梵苑經三世召我洪都歷五秋誰意法雷初震地文星先墜百華樓黃巖即景十首紫雲峰萬仞碧崔嵬紫雲復如蓋豈啻一枝橫法雨已滂沛木毬峰團圞在峰尖四海同珍重除卻曾家郎是誰解拈用碧天湖湖碧天亦碧天高湖更高源頭如自委遍界鼓洪濤放生池十千天上客知恩謝流水解興同體悲天華來未已解脫樹生長祇園東皮膚常脫落葉葉與枝枝盡是慳貪藥午時蓮杲日麗中天芙蕖香正吐開合自有時爛泥豈能汙貫華閣高閣倚雲端是我脫白處試問貫華人笑聲何處去一味堂殷勤祀二僊何如參一味棒下自知歸滿室芝蘭氣龍門橋桃華浪潑天燒尾知幾幾至今橋上春歲歲催蛇虺金釵關水泄不通處金釵一放行未透此關者徒聞雪浪聲懷王東里御史玄關親拶透白簡亦慵拈漳水今何似烽煙幾度炎榕聲猶颯颯嶽勢尚鑯鑯受得先師衲紅塵應不黏五穀巖重遊映雪地萬籟奏洪鐘弔古頻揮淚傷心祇築胸華開經幾度葉落又陰濃誰謂寒巖裏新聞濟上宗與振先居士話舊我昔棄塵氛片雲出幽谷道情高且深豈知有骨肉孤身萬里遊參遍名尊宿何期紹祖燈出辭成語錄皓首歸故鄉乾坤幾反覆猶喜麥秀中再見吾家叔屈指廿六秋流光何太速握手話平生淚珠傾幾斛誰謂尚義堂書聲成斷續定有鳳麟兒倔起光吾族人生一夢耳隆替何足恤所貴道眼明不為夢境束髮短固非僧鬚長豈是俗覷透未生前清光常溢目弔國聘弟最是傷心處同胞祇二人髮鬚予早斷骸骨汝先窀已覺彭殤夢誰將祠陳鶺鴒原上雨點點淚痕新謝愚谷繼曇若漚眾禪者助祭爾我而今是佛兒應知慧命若懸絲當陽見得親親面始可還鄉展孝思辭來雲禪師請法慣同石女話三玄病後俱忘五味禪何意秋風正蕭索一天春色上巖巔辭仰山專使仰山古精藍勝概甲兩府樵川與潭陽不過數百武友公來豫章堂堂一代祖師號降九重佛日光寰宇闃然三百秋宗風竟埽土紺殿長青苔道俗不忍睹鄰封七苾芻請我聲法鼓正值伏暑天畏日如畏虎何當枉高駕夾脊汗如雨慚愧老病夫不足追前古辭翠巖專使二首屈曲松枝已向東從今好作住山翁才疏應世偏多舛識陋交人慣不通石室有床堪寄夢藤條無力懶敲空情高最是西江月千里遙遙到谷中百億閻浮露一丸誰能留作久長看片雲出岫情無著倦鳥歸巢興已闌黃獨既移薶糞火徵書何事上層巒休將千尺崖邊寺勞我雙眉日夜攢示石堂陳孝廉弘釋弘儒是瑋琦榴華多發向南枝廟廊未布如膏雨忉利先尋話月師恩大君親圖必報道存性命貴無為池蛙聒聒薰風裏撞破乾坤更有誰高陽鳳山寺二首芳聯奕葉是南禪法窟幽深豈浪傳路隔吾鄉才咫尺僧能合戶可容千猿因無鎖攀危樹鷗為忘機入暮煙慚愧寶公曾噉鴿兒孫今古學風顛喪盡偷心始契禪心空正好續單傳果能實實行分寸豈在叨叨語萬千豹背久披蒼嶺霧鳳毛應拂碧池煙柳條已朿東風骨莫遣春來又放顛過報國訪天怡禪師青杉四面鬱童童何代嵯峨闢梵宮僊谷喚雲迷宿鳥杜谿將水送潛龍炎氛盡處清涼至皓魄升時暗相空坐對知音追往事萬千惆悵付薰風答瞻百鳴九眾文學二首十里迎將鼓樂揚彩旗蔽日太輝煌自慚陋質非生佛何事氤氳滿路香鬚髮雖遺道不遺道存儒釋總堪師錦標翌日如親奪記取榴華爛熳時示維遠李文學二首在家欲問做工夫不必疑他狗子無但得世情生鐵冷自然與道密相符七歲羅𬑟千丈藤雪山雖近豈能登試看萬乘俱捐者寵辱渾忘百念冰懷古沖李太宰何故前身一道人再來便現宰官身須知悲願原無盡五葉華開萬古春酬李又蓁眾文學五首細樂鏗鏘特特招輦輿薄暮到山椒寒松瘦石凄其甚一旦春風破寂寥燕水沈沈冢宰衙銓衡聖代玉無瑕道人本自超塵累鏡裏何妨一現華行業文才蓋一鄉滿庭多士盡琳琅樓邊茂艸何須慨試看秋風桂子香戶外嵬峨擁翠屏朝朝說法有誰聽缾鵝呼出金魚帶萬里扶搖起北溟新斑兩序立叢林玉樹森森遠近欽他日股肱天子室須知不異此時心葺天曆菴二首流水谿橋尚宛然不知金錫去何天佛頭再整蕭公笠金鴨應浮卍字煙菴離天曆一牛鳴童稚時聞念佛聲割愛為僧今老大始知活佛亦虛名普濟巖萬仞崖頭話祖關谿聲日夕響潺潺已叢古木填深壑應剪餘枝迓遠山老屋數椽仍未老閒僧何歲得清閒但將身世同雲鶴普濟人間信不艱雪峰菴雲收萬壑雨初霽無數奇峰呈遠翠策杖探奇過別峰割耳茅深如劍利茅深路僻杉松老綠樹亂鶯啼未了疑是桃源古洞天一聲金磬千林杳林間何代佛來菴菴裏龐眉七十三馥馥香煙迎道左活似空生下碧巖到來卻問空生話何事小菴名獨大空生相對默無言不覺西峰日又夜緬想吾鄉老雪峰聲光籍籍怒雷轟莫問莖茅曾插未杖藜到處是禪叢五湖今古仰芳躅盡道嵯峨唯象骨誰識高陽有雪峰不輥木毬惟種穀種穀栽田也不差琛公白璧本無瑕若非九到三參後未免狂心亂似麻示行璧行𤩱兩文學二首儒師孔孟釋瞿曇萬論千經共指南言行但能同白璧不須遙向百城參根本如何得不迷直須悟徹未生時夜深燒佛眉鬚落祇恐顏曾亦弗知答謝龍光文學二首擬議固非玅無思未入玄豁開情理障便是士夫禪霆震知龍躍燈明任客傳龐公忻再睹父子上峰巔名場招不去拉友探三玄香浣盆中佛荷翻水面禪已聞無說說應達不傳傳何意東林社新移向此巔與余尼生屹雲兩文學話舊二首雕梁畫棟已成塵猶喜還鄉見故人記得芸窗同舞勺那堪霜鬢又新新君學儒兮我學禪丈夫志氣各沖天誰知儒釋元無二一念回機道自圜元度謝孝廉美斯周別駕率眾請法書此酬之二首虎谿何似建谿深荷葉蓮華總被沈格外宗風親指出群賢中幸有知音郭外寥寥秋氣高玄機試扣野方袍須知鴈塔題名日獨許英雄跨巨鼇示行善吳孝廉元為萬善長可將亦可相隨處力行之佛光生頂上贈飛鄉謝文學對奕且能平禍亂談禪灼可定邦家東谿源遠東山峻應作塵中優缽華辭翠巖四請為淵闍黎作十首偶因避地過龍沙數筆青山便作家誰謂有家偏有累真人無位自無差和尚闍黎太斬新亮公從此墮紅塵可憐洞淺難藏月收取餘光貯八閩明月湖邊冒暑迎海棠初發恰新晴如今老大成枮木八面春風吹不生不契蕭梁已折蘆何妨依樣畫胡盧石幢幸有田園在戴月披星且種圃叢林何幸得蕭曹隴蜀重重望倍高詎意石獅關更密爪牙鋒利付猿猱龜毛兔角本無根杖拂誰知絕點痕歷遍恒沙何處覓目連鶖子亦昏昏建州到後又汀州贏得骯髒滿肚愁鳥道羊腸都蹋遍豈知公案未嘗酬如意何嘗被賊偷打開直袋任君搜搜來搜去渾無物笑殺山中老賊牛黃巖山下奪衣時四品將軍兩度癡何似缽盂搖不動一機搴盡五方旗獨腳蜘蛛夜渡江自由句子信無雙十年又長通身腳辜負圜翁血一腔佛頂即景十首螺髻峰拔起何巍巍群峰皆末裔白雲蕩清風涌出青螺髻西來峰我來破天荒君來為何事天外獨昂頭共話祖師意羅漢洞石室自虛通應真頻來此不是事閒遊同開新窣堵解空石無情且解空磊落雲端立擾擾塵中人胡乃不如石雨華巖壁立萬仞處坦然可疊膝天華落未休空生豈能識寶蓋松一蓋獨凌空萬松立其下是誰親手栽臨濟钁頭大石龜洋半田獨露身洋底深藏六卦兆太分明孫臏卒難卜孕龍潭澄澄不見底知有老龍踞黑霧勃然興兒孫從此去嘯月臺石臺近月邊夜闌常獨步長嘯兩三聲盡是驚人句望雲亭螺峰去紫雲一百二十里亭上曠觀時不隔些些子謝陳學夔眾鄉紳三首同聲同氣且同陳知是靈山一會人選佛選官無別意大家垂手度迷津螺髻峰巔古道場松寒石冷憶龜洋千城喜有新龐在秋晚猶聞桂子香爝火慚分太白燈輝光祖域恨無能十年海內三移座繼起還須萬里鵬建普同塔十首選山尋將勝地刱浮圖蹋遍層巒探有無莫謂牛眠皆可用也須子細問青鳥得地無陰陽地最為靈現在人前若箇惺今日杖頭親指出免教南北更伶俜點穴玅穴天然不可移高低形勢貴相宜定南鍼上分休咎毫髮無差應在茲啟壙壙中不著臭皮鞋掘得深時好活薶土既爛然呈五色百千舍利任安排鑿石平日硜硜頗有聲不因鎚鑿豈能成拼將有縫同無縫始信良工手眼精起窯衰草寒煙翳古窯陶師去後久寥寥而今再發連天燄鍊得泥團片片牢合鑯磚鱗鱗並石鱗鱗聳出雲端樣斬新絕頂一鑯今已合不知誰見塔中人瘞骨痛鞭勤禮總成空憎愛雙亡是普同狹小一門親拶入髑髏無復暴荒叢植樹竹鞭能與塔為讎縱使森森亦勿留栽得一株無影樹直教千古蔭神州刱菴塔前小搆屋三間細艸纔生即便刪刪盡艸根埽盡葉雨華巖畔客初還示張益叟居士十首尋山問水到東谿絕頂登來萬岫低此地既堪為佛地黃金自古賤如泥滿頭雪髮倒㲯毿為法殷勤請再三送我登山休更去山中要箇活伽藍鐘鼓轟轟二十年與誰共話祖師禪信知時節難移易白菊香飄九月天十丈珊瑚一鐵鎚生前誰解覓便宜還他須達能先覺萬古堪為長者師我亦身心嬾似牛項邊犁耙久思休可憐未了多生債又被芒繩抴鼻頭招提任重最難肩燄續芳聯賴後賢欲得十方同選佛佛門規訓貴先傳革盡東堂獘自除十金難合古賢書雪山瘦骨如柴橛豈是王宮庫藏虛七十七年精進幢紅塵堆裏信無雙西江吸得乾乾淨誰謂翁翁不姓龐問君何處是真家一語投機儘可誇大地果然無寸土不妨隨處立生涯兒既賢兮孫又賢芳垂奕葉自綿綿不須更為兒孫計好向蒲團息萬緣又辭翠巖專使千里閩山不易行況當天際正飛霽吳宮已絕洪崖夢何事三回五度迎別周別駕洎眾鄉紳送送又送送情高山未崇論心秋夜月話別桂華風浪發章江遠雲行閩嶺通禪機如大徹千里見群公即韻別簡生傳公兩昆仲歸歟才歎罷忽忽又三秋夢挂夷山洞形疲章水舟不緣孤鴈遠敢卻二蘇留預訂蓮華漏相將破積愁即韻別爾上梅生龍光眾文學三首定力難驅障虛名胡足崇葵傾雖向日鶴野又隨風跪跪欲留住行行似不通木樨香再發預訂向明公薔薇開幾度山勢自來崇梅傲羅浮雪蓮披白社風入磚胡足羨一貫等閒通誰謂楓宸遠重看夢謝公儒釋原同道何妨兩並崇立殘熊耳雪笑拂舞雩風巷陋人偏樂蘭幽香自通懸知千里外相憶有明公即韻別嗣啟夏文學書詩疊疊再三留衛法風高豈易儔梁枕固空塵界夢芒鞋偏與腳為讎鉤頭綸線何難卷句裏陽春未可酬青嶂肯來貽玉帶擬將敝衲換輕裘即韻示峽陽駱應眾文學白社誰開峽水西庭前古柏與天齊鴻儒已自聯鑣入凡鳥何煩對戶題鐘為覺人聲漸遠月因破暗影常低芸窗信宿添新夢夢到羊腸路亦夷別元熙文學傑閣清輝尚儼然白鷗秋水自相便豈徒千里懷明德共快西江皓月圜示幻菴上座三界都盧一幻菴誰分東北與西南欲開界內人天眼須是薶頭自飽參舟次桃源洞口和陳體泉司馬韻洞口危橋鎖亂流好山無數迓扁舟桃開四季華如醉霜落千林樹不秋壁峭尚留司馬韻泉清疑自武陵浮何年駐錫深源裏一把茅將萬念休遊定光寺何年一杖到長汀古佛依然長老形贈以之中人不識峨峨玉殿振金鈴過隘嶺百折盤空嶺路長馬蹄牛跡太忙忙隘邊萬樹松風發又送寒雲出故鄉雪獅歌千峰突兀萬境寂然寒氣蕭疏凍雲縹緲一出六出兮飄飄三片兩片兮皎皎牧童樵子皆斂其衽兮徬徨飛禽走獸不聞其聲兮遯藏唯白山之獅子乃獨露而堂堂卓然踞地兮骨髓皮膚渾一色有時返擲兮乾坤海嶽皆平沈雙眼兮日月之麗天片舌兮劍刃之當前縱牙爪之斑斑逞風流而孰先威而不猛坐而若眠其裏兮一味冷冰冰識情心意俱烏有其表兮觸處淨光輝萬象森羅不可偶雖玉碗銀盆之潔潔兮未足方其姿或白雲明月之悠悠兮庶幾可為友握內毬尚未拋項下鈴誰敢取朴素兮若愚約訥兮自守豈大音之希聲固默默而緘口抑待時之將至兮乃奮怒而哮吼師兮師兮天下之望子兮長且久胡不將兒而出堀大震洪音高蹋蹴直使四海五湖見之聞之皆徹骨上灘歌上灘歌歌為何灘高水急木難拖岸邊行不得河中石又多進半尺退一丈怒浪驚濤千萬狀雙手牢將纜子牽進兮退兮曾不放黯淡灘三峽水飛流直在半天裏扁舟蕩漾疾如梭何似此灘高莫擬灘既高河又曲七曲八曲蛇伸縮龍舒橋上小橋西塔影參差遙在目塔南面是招賢古廟也堪暫息肩可憐打盡閒之遶依舊離披在塔前日已高水正熱炙得肌膚片片裂皮膚脫落兩三層笑殺飛龍成跛鱉細思量未是苦苦中有樂人難睹此身不為法劬勞浪死虛生復何補學道人如抴木逆水灘頭休觳觫忘疲直上萬重灘毫端頓現黃金屋獵人歌勸獵人休打獵禽獸與人原不別祇為昏迷造業多戴角披毛藏洞穴形骸雖異性還同怕死貪生心更怯千澗冰萬山雪打溼羽毛寒凜冽飢寒無耐出林行獵犬一聲逃不徹那知誤入網羅中百棒千椎椎到絕氣雖絕憾未絕冤冤相報何時歇謾言他劣爾剛彊有時他彊爾卻劣狹路逢時躲不開方悔從前錯打獵勸獵人休打獵打獵能招地獄業地獄中苦百千般盡是人間業報攝人間添得口頭肥獄中受苦無窮劫或剝皮或拔舌或薄批或細切鐵蛇銅狗相咀嚙從朝至暮暮至朝死而復生生又滅閻羅老子不容情牛頭獄卒心如鐵莫怪他自作業業鏡臺前皎如月殺一槍兮還一槍剟一剟兮還一剟自作自受自辛酸悔殺當年錯打獵勸獵人休打獵百歲光陰如電摰口腹無猒莫恣貪貨財有命休爭竊一氣不來萬事空贏得通身冤債結要解結休打獵要長壽休打獵要富饒休打獵要子孫休打獵要得人身休打獵打獵能招貧夭子孫絕人身滅滅卻人身異類中為狼為虎為龜鱉受他烹宰痛難禁始悔前生錯打獵獵人獵人聽吾說山僧不是閒饒舌快把網羅裂弓箭折回頭自射自打還自獵直教曠劫生死無明煩惱當下歇
